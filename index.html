er": "N"}, {"id": 316, "question": "A Chief Information Security Officer wants to lock down the users’ ability to change applications that are installed on their Windows systems.\nWhich of the following is the best enterprise-level solution?", "options": [{"letter": "A", "text": "HIPS"}, {"letter": "B", "text": "GPO"}, {"letter": "C", "text": "Registry"}, {"letter": "D", "text": "DLP\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  study_study Highly Voted  1 year, 4 months ago\nSelected Answer: B\nGPOs allow centralized control over system configurations, including enforcing security settings and restricting user privileges, making them ideal for\npreventing users from changing applications on their machines.\nupvoted 9 times\n  helenwonderland Most Recent  8 months, 2 weeks ago\nSelected Answer: B\n\"GPO\" most commonly refers to Group Policy Object, a feature in Microsoft Windows that allows administrators to centrally manage and configure\nsettings for users and computers within an Active Directory environment.\nupvoted 3 times"}], "answer": "N"}, {"id": 317, "question": "An employee received a phishing email that contained malware targeting the company. Which of the following is the best way for a security\nanalyst to get more details about the malware and avoid disclosing information?", "options": [{"letter": "A", "text": "Upload the malware to the VirusTotal website."}, {"letter": "B", "text": "Share the malware with the EDR provider."}, {"letter": "C", "text": "Hire an external consultant to perform the analysis."}, {"letter": "D", "text": "Use a local sandbox in a microsegmented environment.\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  HeatSquad77 3 months ago\nSelected Answer: D\nThe correct answer is D. Use a local sandbox in a microsegmented environment.\nIn the context of CompTIA CySA+ (CS0-003), when a phishing email delivers targeted company malware, the security analyst's priority during analysis\nis to gain behavioral insights (e.g., via dynamic execution) while preventing any risk of disclosing sensitive company information to external parties—\nincluding attackers, competitors, or unintended third parties.\nupvoted 1 times\n  1403ad2 1 year, 3 months ago\nSelected Answer: D\n\"to get more details about the malware and avoid disclosing information\" D is the only option that isnt sharing the details outside the company.\nupvoted 3 times"}], "answer": "N"}, {"id": 318, "question": "A Chief Finance Officer receives an email from someone who is possibly impersonating the company’s Chief Executive Officer and requesting a\nfinancial operation. Which of the following should an analyst use to verify whether the email is an impersonation attempt?", "options": [{"letter": "A", "text": "PKI"}, {"letter": "B", "text": "MFA"}, {"letter": "C", "text": "SMTP"}, {"letter": "D", "text": "DKIM\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  BadoBully 1 year, 1 month ago\nSelected Answer: D\nOnly one that makes sense\nupvoted 2 times\n  4a8c1a0 1 year, 4 months ago\nSelected Answer: D\nDomainKeys Identified Mail creates a cryptographic signature in the email header to verify the sender's domain. This ensures that the email wasn't\naltered during transit.\nupvoted 4 times"}], "answer": "N"}, {"id": 319, "question": "An analyst is investigating a phishing incident and has retrieved the following as part of the investigation:\ncmd.exe /c c:\\Windows\\System32\\WindowsPowerShell\\v1.0\\powershell.exe -WindowStyle Hidden -ExecutionPolicy Bypass -NoLogo -NoProfile -\nEncodedCommand\nWhich of the following should the analyst use to gather more information about the purpose of this command?", "options": [{"letter": "A", "text": "Echo the command payload content into ‘base64 -d‘."}, {"letter": "B", "text": "Execute the command from a Windows VM."}, {"letter": "C", "text": "Use a command console with administrator privileges to execute the code."}, {"letter": "D", "text": "Run the command as an unprivileged user from the analyst workstation.\nCorrect Answer: A\nCommunity vote distribution\nA (88%)                          B (12%)\n  BadoBully Highly Voted  1 year, 1 month ago\nSelected Answer: A\nit says EncodedCommand, we should decode the command vefore running to see what it is\nupvoted 5 times\n  2c7fd04 Most Recent  1 month, 1 week ago\nSelected Answer: B\nSafest way to investigate\nupvoted 1 times\n  fafd232_ 1 year, 1 month ago\nSelected Answer: A\nI chose A because executing the command from a VM may not reveal the full scope of information about what the command does. Echoing the\ncommand and decoding the encoded parts of the command will at least show the analyst what the script is trying to do, even if doing so outside of a\nVM is risky.\nupvoted 3 times\n  1403ad2 1 year, 3 months ago\nSelected Answer: B\nit makes the most sense to run any unk code on a VM, C & D make no sense to run it again even from a anylast workstation with permission on that\naccount or system. A seems like a good option but i think running it on a vm and see what it does is more important for overall understanding\nupvoted 1 times\n  ybyttv 11 months, 3 weeks ago\nthe reason why you want to sandbox the execution is because you want to observe what do it do. This mostly happens to binary instead of script\nlanguage. It's much easier to read the script than let it execute and observe what it does\nupvoted 1 times"}], "answer": "N"}, {"id": 320, "question": "An organization’s threat intelligence team notes a recent trend in adversary privilege escalation procedures. Multiple threat groups have been\nobserved utilizing native Windows tools to bypass system controls and execute commands with privileged credentials. Which of the following\ncontrols would be most effective to reduce the rate of success of such attempts?", "options": [{"letter": "A", "text": "Disable administrative accounts for any operations."}, {"letter": "B", "text": "Implement MFA requirements for all internal resources."}, {"letter": "C", "text": "Harden systems by disabling or removing unnecessary services."}, {"letter": "D", "text": "Implement controls to block execution of untrusted applications.\nCorrect Answer: C\nCommunity vote distribution\nC (79%)                            D (21%)\n  6f9c9e3 6 months, 3 weeks ago\nSelected Answer: D\nBest Answer: D. Implement controls to block execution of untrusted applications.\nThis effectively prevents attackers from abusing native or unauthorized binaries for privilege escalation.\nOption C is good hygiene but doesn’t directly address attackers using existing Windows binaries to escalate privileges.\nupvoted 1 times\n  Krocker77 8 months ago\nSelected Answer: C\nWas C on Youtube called Comptia CYSA+ questions and answers.\nupvoted 2 times\n  1574aa7 10 months ago\nSelected Answer: C\nC deffo , this is question 320 , and i saw another question i forgot the number ,, earlier in this question bank, same question , and majority voted c\nwith a good explanation , so voting c again, same question\nupvoted 2 times\n  JayWeston 10 months ago\nSelected Answer: C\nThe key to this question is to focus on the attackers using \"native Windows tools\". You need to disable those tools if they are not being used\nupvoted 4 times\n  1574aa7 10 months, 1 week ago\nSelected Answer: C\nI pick C seems to the one to avoid any of that happening, D with privileges i believe can still be overun\nupvoted 2 times\n  1574aa7 10 months, 2 weeks ago\nSelected Answer: D\nI pick D as c is also good but i was between C and D , as implementing controls to block execution of untrusted apps , seems more reasonable , as\nthey attackers bypass control and get privileges, harden systems by disabling unnecessary services dont think would be enough , but if an attacker\ngets through and trys to execute an app from unstrusted source , that exe will be blocked\nupvoted 2 times\n  JayWeston 10 months ago\nIn this scenario the attackers are \"utilizing native Windows tools\" in what we would call a living of the land attack. Since they are Windows tools\nthey would be trusted by default, it would be best in this situation to go with answer C and remove any tool that is not being used so the attacker\ncan't use them.\nupvoted 1 times\n  BadoBully 1 year, 1 month ago\nSelected Answer: C\nOnly one that is practicle\nupvoted 2 times"}], "answer": "N"}, {"id": 321, "question": "When undertaking a cloud migration of multiple SaaS applications, an organization’s systems administrators struggled with the complexity of\nextending identity and access management to cloud-based assets. Which of the following service models would have reduced the complexity of\nthis project?", "options": [{"letter": "A", "text": "OpenID"}, {"letter": "B", "text": "SASE"}, {"letter": "C", "text": "ZTNA"}, {"letter": "D", "text": "SWG\nCorrect Answer: A\nCommunity vote distribution\nA (55%)                     B (31%)          C (14%)\n  Popeyes_Chicken Highly Voted  1 year, 4 months ago\nSelected Answer: A"}, {"letter": "A", "text": "OpenID\nOpenID simplifies the authentication process across multiple SaaS applications by using a federated identity model. It reduces complexity by\neliminating the need for separate credentials for each application.\nZTNA is related to access control, it doesn't specifically address IAM simplification for SaaS applications.\nSASE is more focused on network security than simplifying IAM specifically for SaaS applications.\nSWG is unrelated to IAM or reducing complexity for SaaS access.\nupvoted 6 times\n  ajk02 Highly Voted  1 year, 6 months ago\nSelected Answer: B\nSASE is a cloud-native security architecture that integrates networking and security services, including identity management and access control,\nwhich simplifies and centralizes the management of users and devices accessing cloud resources.\nupvoted 6 times\n  HeatSquad77 Most Recent  3 months ago\nSelected Answer: A\nThe correct answer is A. OpenID.\nIn the context of CompTIA CySA+ (CS0-003), the scenario involves systems administrators struggling with the complexity of extending identity and\naccess management (IAM) to multiple cloud-based SaaS applications during migration.\nOpenID (specifically OpenID Connect, often just called OpenID in exam contexts) is an open standard for federated authentication built on OAuth 2.0.\nIt enables single sign-on (SSO) across multiple SaaS applications using a centralized identity provider (IdP). Users authenticate once with the IdP, and\nthe SaaS apps trust the IdP for identity verification without requiring separate credentials or per-app IAM configurations. This directly reduces the\nadministrative complexity of managing and extending IAM to numerous cloud assets.\nupvoted 2 times\n  Brigand 4 months, 3 weeks ago\nSelected Answer: C\nZTNA provides identity‑centric access control to cloud and on‑prem resources.\nIt removes the need to extend traditional IAM into each SaaS app individually.\nInstead, access is granted based on identity and policy, not network location.\nThis directly reduces the complexity described in the question.\nupvoted 1 times\n  3lVhylla 6 months, 1 week ago\nSelected Answer: A\nim going with A, cause SASE focuses on network security convergence...VPN replacement, secure web gateways, CASB, and so on, not identity\nfederation.\nupvoted 3 times\n  2d3d7b4 5 months, 3 weeks ago\nThat is what I am thinking as well.\nupvoted 1 times\n  Shawn100 9 months, 1 week ago\nSelected Answer: B\nSASE is the complete solution, rest are some of its componente\nupvoted 1 times\n  cj207800 11 months, 3 weeks ago\nSelected Answer: C\nZero Trust Network Access (ZTNA) is specifically designed to simplify and secure identity and access management (IAM) across cloud, hybrid, and\non-premises environments. It provides a unified, identity-centric approach, enforcing strict access controls, verifying trust before granting least\nprivilege access, and allowing for consistent access policies across all workloads—including SaaS applications. This addresses the complexity\nadministrators face when extending IAM to cloud-based assets during migration.\nupvoted 2 times\n  ouflomana 1 year, 1 month ago\nSelected Answer: B\nSASE helps reduce this complexity by combining network security functions (like Zero Trust Network Access, SWG, CASB, and FWaaS) with WAN\ncapabilities into a single cloud-delivered service model.\nOpenID is an authentication protocol, not a full service model.\nupvoted 2 times\n  Thunder_Cat 1 year, 1 month ago\nSelected Answer: B\nSASE is a network architecture model that integrates SD-WAN (Software-Defined Wide Area Network) with cloud-native security functions, such as\nSecure Web Gateway (SWG), Cloud Access Security Broker (CASB), Firewall-as-a-Service (FWaaS), and Zero Trust Network Access (ZTNA), into a\nsingle, cloud-delivered service.\nupvoted 2 times\n  Vel1730 1 year, 3 months ago\nSelected Answer: A"}, {"letter": "A", "text": "OpenID\nReasoning:\nOpenID is an authentication protocol that allows users to log in to multiple services using a single identity provider (IdP). It simplifies IAM by enabling\nfederated identity management, reducing the need for complex configurations when extending authentication to cloud-based resources.\nupvoted 4 times\n  7167087 1 year, 4 months ago\nSelected Answer: A\nWhen migrating multiple SaaS applications to the cloud, managing identity and access across all applications can become complex. OpenID is an\nauthentication protocol that simplifies this by enabling Single Sign-On (SSO). With OpenID, users can use a single set of credentials to access\nmultiple cloud-based SaaS applications, reducing the complexity of identity management for systems administrators.\nSASE is a cloud-based security framework that integrates networking and security functions, like SD-WAN and secure web gateways. While it\nenhances secure connectivity, it doesn’t specifically address identity and access management challenges.\nupvoted 4 times\n  Yanwo 1 year, 5 months ago\nSelected Answer: C\nThe service model that would have reduced the complexity of extending identity and access management to cloud-based assets during a migration is"}, {"letter": "C", "text": "ZTNA (Zero Trust Network Access)\nupvoted 2 times\n  mschott 1 year, 5 months ago\nSelected Answer: A\nOpenID is a method of authenticating users with specific websites that participate in an OpenID system. It allows them to maintain a single account\nacross all participating websites. A user registers with an OpenID system on a given domain as they would with any other account, and a website\nunder that OpenID domain gives the user the option to log in using that system. The website then contacts its external OpenID provider to verify that\nthe login credentials provided by the user are correct. Large companies such as Google and Amazon use their own OpenID systems. OpenID Direct\nadds an authentication layer to OAuth 2.0, the latest version of the protocol.\nupvoted 3 times"}], "answer": "N"}, {"id": 322, "question": "A security analyst reviews the following results of a Nikto scan:\nWhich of the following should the security administrator investigate next?", "options": [{"letter": "A", "text": "tiki"}, {"letter": "B", "text": "phpList"}, {"letter": "C", "text": "shtml.exe"}, {"letter": "D", "text": "sshome\nCorrect Answer: B\nCommunity vote distribution\nB (71%)                          C (29%)\n  taketaa 1 year ago\nSelected Answer: B\n\"PHPLIST pre 2.6.4 contains a number of vulnerabilities including remote administrative access, harvesting user info and more. Default login to\nadmin interface is admin/phplist\"\nHas to be B, having unauthorized administration privileges is worse than a possible DoS attack, it could lead to eventual RCE or LFI.\nupvoted 3 times\n  Paradox_Walnut 1 year, 1 month ago\nSelected Answer: C\nSelected 'C' due to shtml.exe being able to be exploited by an attacker to crash the FrontPage by requesting a DOS device. Even if the DOS has not\nbeen attempted, this is still a major vulnerability.\nupvoted 2 times\n  Popeyes_Chicken 1 year, 4 months ago\nSelected Answer: B\nphpList is flagged in the report as containing \"a number of vulnerabilities including remote administrative access.\"\nupvoted 2 times"}], "answer": "N"}, {"id": 323, "question": "Which of the following explains the importance of a timeline when providing an incident response report?", "options": [{"letter": "A", "text": "The timeline contains a real-time record of an incident and provides information that helps to simplify a postmortem analysis."}, {"letter": "B", "text": "An incident timeline provides the necessary information to understand the actions taken to mitigate the threat or risk."}, {"letter": "C", "text": "The timeline provides all the information, in the form of a timetable, of the whole incident response process including actions taken."}, {"letter": "D", "text": "An incident timeline presents the list of commands executed by an attacker when the system was compromised, in the form of a timetable.\nCorrect Answer: C\nCommunity vote distribution\nC (90%)                          A (10%)\n  78f9a0a Highly Voted  1 year, 5 months ago\nSelected Answer: C\nAn incident response timeline is a detailed chronological record of all events and actions taken during the response to a security incident. It includes\ntimestamps and descriptions of each step, providing a comprehensive overview of how the incident was detected, contained, mitigated, and resolved.\nThis timeline is crucial for post-incident analysis, helping to understand the effectiveness of the response, identify areas for improvement, and ensure\naccountability and transparency in the incident handling process.\nupvoted 5 times\n  kareem101 1 year, 5 months ago\nFrom you explanation, the answer is A\nupvoted 3 times\n  Popeyes_Chicken 1 year, 4 months ago\nWhile a timeline does provide information useful for postmortem analysis, it's not focused on real-time events. A doesn't fully capture the\npurpose of the timeline.\nupvoted 1 times\n  Shonda_Ron Most Recent  8 months, 1 week ago\nSelected Answer: A\nGonna have to say A on this one, just due to the fact it specifies the importance of a timeline to the postmortem analysis\nupvoted 1 times\n  Popeyes_Chicken 1 year, 4 months ago\nSelected Answer: C\nIn agreeance with 78f9a0a. A timeline provides all relevant details in order for the entire response process. Which ensures nothing is overlooked\nduring analysis / reporting.\nupvoted 4 times"}], "answer": "N"}, {"id": 324, "question": "An auditor is reviewing an evidence log associated with a cyber crime. The auditor notices that a gap exists between individuals who were\nresponsible for holding onto and transferring the evidence between individuals responsible for the investigation. Which of the following best\ndescribes the evidence handling process that was not property followed?", "options": [{"letter": "A", "text": "Validating data integrity"}, {"letter": "B", "text": "Preservation"}, {"letter": "C", "text": "Legal hold"}, {"letter": "D", "text": "Chain of custody\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  BadoBully 1 year, 1 month ago\nSelected Answer: D\nChain of custody is the correct answer\nupvoted 1 times\n  ada26b1 1 year, 1 month ago\nSelected Answer: D\nThe definition of the chain of custody is the procedure, documentation, tracking, and protecting of evidence on its journey from a crime scene to the\ncourtroom.\nupvoted 2 times"}], "answer": "N"}, {"id": 325, "question": "A security analyst is assisting a software engineer with the development of a custom log collection and alerting tool (SIEM) for a proprietary\nsystem. The analyst is concerned that the tool will not detect known attacks and behavioral IoCs. Which of the following should be configured in\norder to resolve this issue?", "options": [{"letter": "A", "text": "Randomly generate and store all possible file hash values."}, {"letter": "B", "text": "Create a default rule to alert on any change to the system."}, {"letter": "C", "text": "Integrate with an open-source threat intelligence feed."}, {"letter": "D", "text": "Manually add known threat signatures into the tool.\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  HeatSquad77 3 months ago\nSelected Answer: C\nThe correct answer is C. Integrate with an open-source threat intelligence feed.\nModern SIEM systems (even custom-built ones) detect known attacks and behavioral Indicators of Compromise (IoCs) most effectively by\nincorporating external threat intelligence. This includes known malicious hashes, IP addresses, domains, URLs, file signatures, and TTPs (tactics,\ntechniques, and procedures) from threat actors.\nOpen-source threat intelligence feeds (e.g., Abuse.ch, AlienVault OTX, MISP communities, or others) provide regularly updated lists of these IoCs.\nIntegrating such a feed allows the custom tool to automatically enrich logs, match events against current known threats, and generate alerts on\nmatches — without requiring manual updates for every new IoC.\nupvoted 1 times\n  ada26b1 1 year, 1 month ago\nSelected Answer: C\nC sounds correct\nupvoted 3 times"}], "answer": "N"}, {"id": 326, "question": "Which of the following responsibilities does the legal team have during an incident management event? (Choose two).", "options": [{"letter": "A", "text": "Coordinate additional or temporary staffing for recovery efforts."}, {"letter": "B", "text": "Review and approve new contracts acquired as a result of an event."}, {"letter": "C", "text": "Advise the incident response team on matters related to regulatory reporting."}, {"letter": "D", "text": "Ensure all system security devices and procedures are in place."}, {"letter": "E", "text": "Conduct computer and network damage assessments for insurance."}, {"letter": "F", "text": "Verify that all security personnel have the appropriate clearances.\nCorrect Answer: BC\nCommunity vote distribution\nBC (67%)                          C (33%)\n  kaka321 1 month, 1 week ago\nSelected Answer: BC\nOn further research on comptia standards it is bc with regards to events\nupvoted 1 times\n  kaka321 1 month, 2 weeks ago\nSelected Answer: CF\nfor me in exam cf is the best option b is procurement role and not hr. f is more of hr and security governance\nupvoted 1 times\n  magmadiver1937 5 months, 3 weeks ago\nSelected Answer: C\nOnly C seems to be in legal's domain. The rest seem like the responsibility of CSIRT and/or management.\nupvoted 1 times\n  BlackSkullz 1 year, 1 month ago\nSelected Answer: BC\nB and C- Legal\nA and F- Human Resources\nD and E- Security/IT/IR Team\nupvoted 2 times"}], "answer": "N"}, {"id": 327, "question": "Which of the following characteristics ensures the security of an automated information system is the most effective and economical?", "options": [{"letter": "A", "text": "Originally designed to provide necessary security"}, {"letter": "B", "text": "Subjected to intense security testing"}, {"letter": "C", "text": "Customized to meet specific security threats"}, {"letter": "D", "text": "Optimized prior to the addition of security\nCorrect Answer: A\nCommunity vote distribution\nA (83%)                            C (17%)\n  ishmaeljambai Highly Voted  1 year, 3 months ago\nSelected Answer: A\nThe best answer is:"}, {"letter": "A", "text": "Originally designed to provide necessary security\nSecurity is most effective and economical when it is integrated into the system from the beginning rather than added later as an afterthought. This\napproach, often referred to as \"security by design,\" ensures that security controls are inherently built into the system, reducing vulnerabilities and the\ncost of retrofitting security measures.\nupvoted 8 times\n  vannydabest Most Recent  1 year, 1 month ago\nSelected Answer: A\nA this security by design, the best practice for building secure systems from the ground up. It avoids costly repairs later\nupvoted 2 times\n  a190d62 1 year, 4 months ago\nSelected Answer: C"}, {"letter": "C", "text": "Customized to meet specific security threats: The most effective and economical security is one that is tailored to the specific needs and threats\nfaced by an organization or system. By customizing security controls and measures, the organization ensures that it is addressing the unique risks it\nfaces, rather than applying generic or unnecessary security measures. This allows for more targeted defenses and can be more cost-effective, as\nresources are focused on mitigating actual threats rather than generic ones.\nupvoted 2 times"}], "answer": "N"}, {"id": 328, "question": "Which of the following is the most likely reason for an organization to assign different internal departmental groups during the post-incident\nanalysis and improvement process?", "options": [{"letter": "A", "text": "To expose flaws in the incident management process related to specific work areas"}, {"letter": "B", "text": "To ensure all staff members get exposure to the review process and can provide feedback"}, {"letter": "C", "text": "To verify that the organization playbook was properly followed throughout the incident"}, {"letter": "D", "text": "To allow cross-training for staff who are not involved in the incident response process\nCorrect Answer: A\nCommunity vote distribution\nA (80%)                          C (20%)\n  Susan4041 1 year, 1 month ago\nSelected Answer: A\nThe primary purpose of involving different internal groups in the post-incident analysis is to uncover specific flaws related to how each department\nhandled the incident, ultimately improving the overall incident management process (A).\nupvoted 2 times\n  vannydabest 1 year, 1 month ago\nSelected Answer: C"}, {"letter": "C", "text": "To verify the playbook was properly followed.\nObjective reviewers can fairly assess adherence to incident protocols\nupvoted 1 times\n  ada26b1 1 year, 1 month ago\nSelected Answer: A"}, {"letter": "A", "text": "To expose flaws in the incident management process related to specific work areas.\nInvolving different departmental groups allows the organization to identify flaws or gaps in the incident management process specific to their areas\nof expertise. This helps improve the overall incident response and refine the organization's strategies for handling future incidents.\nupvoted 2 times"}], "answer": "N"}, {"id": 329, "question": "An analyst has discovered the following suspicious command:\n\"; $xyz = ($_REQUEST['xyz']); system($xyz); echo \"\"; die; }?>\nWhich of the following would best describe the outcome of the command?", "options": [{"letter": "A", "text": "Cross-site scripting"}, {"letter": "B", "text": "Reverse shell"}, {"letter": "C", "text": "Backdoor attempt"}, {"letter": "D", "text": "Logic bomb\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  93d818a 10 months, 1 week ago\nSelected Answer: C"}, {"letter": "C", "text": "Backdoor attempt\nupvoted 2 times\n  srtysrhtyjumnuyedt 1 year, 1 month ago\nSelected Answer: C\nThis php command essentially tells the server to retrieve input from an HTTP request with xyz as the key and execute any arbitrary command input\ninto that xyz key. The \"echo \"\"; die;\" tells the server to only send back output from the command, stripping away any web page content. If this is\nsuccessfully executed, the attacker could send a request at any time such as \"https://example.com/example.php?xyz=cat+/etc/passwd\" and the\nserver would reveal the contents of the passwd file. This is effectively a RCE backdoor\nupvoted 4 times"}], "answer": "N"}, {"id": 330, "question": "A company classifies security groups by risk level. Any group with a high-risk classification requires multiple levels of approval for member or\nowner changes. Which of the following inhibitors to remediation is the company utilizing?", "options": [{"letter": "A", "text": "Organizational governance"}, {"letter": "B", "text": "MOU"}, {"letter": "C", "text": "SLA"}, {"letter": "D", "text": "Business process interruption\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  ada26b1 1 year, 1 month ago\nSelected Answer: A"}, {"letter": "A", "text": "Organizational governance\nBy requiring multiple levels of approval for changes to high-risk security groups, the company is enforcing a structured approval process, which is a\nform of organizational governance. This type of governance ensures that high-risk actions, such as modifying security groups, are carefully controlled\nand reviewed, but it can also slow down the remediation process due to the added layers of approval.\nupvoted 2 times"}], "answer": "N"}, {"id": 331, "question": "Which of the following attributes is part of the Diamond Model of Intrusion Analysis?", "options": [{"letter": "A", "text": "Delivery"}, {"letter": "B", "text": "Weaponization"}, {"letter": "C", "text": "Command and control"}, {"letter": "D", "text": "Capability\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  39a1535 Highly Voted  1 year, 5 months ago\nSelected Answer: D\nThe Diamond Model of Intrusion Analysis includes four key attributes (or vertices) to describe and analyze cyber intrusion events. These attributes\nare:\nAdversary: The entity or attacker responsible for the intrusion.\nCapability: The tools, techniques, and resources used by the adversary to carry out the attack.\nInfrastructure: The physical and virtual resources used by the adversary, such as command-and-control servers or phishing domains.\nVictim: The target of the intrusion, including individuals, organizations, or systems.\nupvoted 9 times"}], "answer": "N"}, {"id": 332, "question": "SIMULATION\n-\nAn organization’s website was maliciously altered.\nINSTRUCTIONS\n-\nReview information in each tab to select the source IP the analyst should be concerned about, the indicator of compromise, and the two\nappropriate corrective actions.\nIf at any time you would like to bring back the initial state of the simulation, please click the Reset All button.\nCorrect Answer:\n  TommyZ Highly Voted  1 year, 4 months ago\nMain point is what 7167087 said. \"website was maliciously altered\" IP 41 logs in and modifies the index.html file which is what the question states.\nSo IP 41. Modified Index.html file.\nChange the password\nBlock external sftp access\nI'm taking the exam tomorrow and that's what I'm going with. This question was just posted a week ago. Expecting to get it. Wish me luck   🤞\nupvoted 14 times\n  Wolf541 1 year, 3 months ago\nHow did your exam go I am taking mine in a few days?\nupvoted 2 times\n  Popeyes_Chicken 1 year, 3 months ago\nGood luck! Check back in if you see this to let us know how things went! I'll be taking it next week =]\nupvoted 2 times\n  Popeyes_Chicken Highly Voted  1 year, 4 months ago\nI think the source IP is incorrect. 32.111.16.37 shows one failed login attempt after a previous successful login. I don't see any indicator of a brute\nforce attempt, the failed attempt was probably a typo. The multiple tcp time wait connections may have been legitimate activity. The modification\nhappened directly after 41.21.18.102 authenticated successfully.\nThoughts?\nupvoted 10 times\n  taketaa 1 year ago\nyeah, I'm think the same, sjames is both logged on a private AND a public IP address. 41 IP address is the malicious source, and it is still logged in\nto the machine!\nupvoted 2 times\n  PatrickH Most Recent  1 week, 1 day ago\nIt is the 41 address. It was logged it at 23:00 and the login attemt directly afterwards was unsuccessful.\nupvoted 1 times\n  7b52438 5 months, 2 weeks ago\nTommyZ is correct :\nSource IP: 41.21.18.102\nIndicator of compromise: Modified index.html file\nCorrective actions:\n-Change the password on the sjames account\n-Block external SFTP access\nupvoted 1 times\n  7167087 1 year, 4 months ago\nI believe it's the 41. address that is the malicious source IP address. The question is about the website being maliciously modified. The 41. address\nmodifies the index file as an external address and has an existing connection.\nupvoted 8 times", "options": [{"letter": "", "text": "No answer choices parsed. Use the PDF for this PBQ/image-based item."}], "answer": "N"}, {"id": 333, "question": "SIMULATION\n-\nAn organization has noticed large amounts of data are being sent out of its network. An analyst is identifying the cause of the data exfiltration.\nINSTRUCTIONS\n-\nSelect the command that generated the output in tabs 1 and 2.\nReview the output text in all tabs and identify the file responsible for the malicious behavior.\nIf at any time you would like to bring back the initial state of the simulation, please click the Reset All button.\nCorrect Answer:\n  Dogsitter_3 Highly Voted  10 months, 2 weeks ago\nHad this on the exam.\nupvoted 10 times\n  Clayyy 10 months, 1 week ago\nI appreciate you.\nupvoted 2 times\n  efe498c Most Recent  4 months, 2 weeks ago\nEven though cmd.exe is modified and uses more memory, it is not sending data out of the network. sftp.exe matches the baseline hash but is actively\nmaking external SSH connections, which directly explains the data exfiltration—showing that a legitimate, unmodified tool can still be abused for\nmalicious activity. I think SFTP is actually the last answer.\nupvoted 1 times\n  3lVhylla 6 months ago\nnetstat\ntasklist\ncmd.exe\nfor me that is the correct answer in this simulation\nupvoted 2 times\n  Popeyes_Chicken 1 year, 4 months ago\nIn my opinion, all correct except the file being used for malicious behavior. The sftp.exe file hash matches, but legitimate programs can also be\nabused / used to live off the land. Multiple connections are also being established to different public addresses. cmd.exe looks to be a red herring,\nI'm leaning toward sftp.exe. Thoughts?\nupvoted 3 times\n  taketaa 1 year ago\nI first went with sftp.exe but I sticking at cmd.exe. An APT might've changed the binary to facilitate exfiltration trough the program itself.\nupvoted 1 times\n  fab34 1 year, 3 months ago\ncmd.exe has a memory usage of 18.020 kbits thats why i would go with the cmd.exe\nupvoted 4 times\n  JunkyJunk 1 year, 2 months ago\ndefinitely see the data exfiltration for sftp and then there's cmd.exe's discrepancies between hashes. This is a CompTIA question...both answers\nmight be correct but not entirely straightforward.\nupvoted 1 times", "options": [{"letter": "", "text": "No answer choices parsed. Use the PDF for this PBQ/image-based item."}], "answer": "N"}, {"id": 334, "question": "An analyst is creating the final vulnerability report for one of the company’s customers. The customer asks for a scanning profile with a CVSS\nscore of 7 or higher. The analyst has confirmed there is no finding for missing database patches, even if false positives have been eliminated by\nmanual checks. Which of the following is the most probable reason for the missing scan result?", "options": [{"letter": "A", "text": "The server was offline at the moment of the scan."}, {"letter": "B", "text": "The system was not patched appropriately before the scan."}, {"letter": "C", "text": "The scan finding does not match the requirement."}, {"letter": "D", "text": "The output of the scan is corrupted.\nCorrect Answer: A\nCommunity vote distribution\nC (82%)                           A (18%)\n  f90ecff 1 year, 1 month ago\nSelected Answer: C\nIf there was no data at all for the system, then A (server offline) would be valid.\nBut since it sounds like the scan ran and returned results, just nothing matching the filter, then:"}, {"letter": "C", "text": "The scan finding does not match the requirement\nis still the most probable and accurate answer based on the info given.\nupvoted 4 times\n  Susan4041 1 year, 1 month ago\nSelected Answer: A\nIf the server was offline during the scan, the vulnerability scanner would not be able to reach or scan the system, which could explain the missing\nresult for database patches.\nIf the server is offline, it would not be included in the scan results, which could create the appearance that there are no issues with database patches,\neven though they might exist if the server were online.\nThis is especially relevant if the scan is done in a time window where the server is unavailable or has intermittent connectivity issues.\nupvoted 1 times\n  ada26b1 1 year, 1 month ago\nSelected Answer: A"}, {"letter": "A", "text": "The server was offline at the moment of the scan.\nIf the server was offline during the scan, the scanning tool would not be able to detect or evaluate any vulnerabilities, including those related to\nmissing database patches. This could explain why the scan results show no findings, even if manual checks confirmed no false positives.\nupvoted 1 times\n  Wolf541 1 year, 4 months ago\nSelected Answer: C\nAnswer is C given their requirements\nupvoted 3 times\n  7167087 1 year, 4 months ago\nSelected Answer: C\nIt's clearly C. The customer asks for a CVSS score of 7 or higher. With database vulnerabilities, they are going to be higher than 7. The server being\noffline would just mean that the scanner would return an error and not reach the database server at all. If false positives were eliminated then it's\nlikely that the database server is functioning. Simply put, missing results is different than an error from an unresponsive, offline database server.\nupvoted 2 times"}], "answer": "N"}, {"id": 335, "question": "Which of the following is the best framework for assessing how attackers use techniques over an infrastructure to exploit a target’s information\nassets?", "options": [{"letter": "A", "text": "Structured Threat Information Expression"}, {"letter": "B", "text": "OWASP Testing Guide"}, {"letter": "C", "text": "Open Source Security Testing Methodology Manual"}, {"letter": "D", "text": "Diamond Model of Intrusion Analysis\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  ada26b1 1 year, 1 month ago\nSelected Answer: D"}, {"letter": "D", "text": "Diamond Model of Intrusion Analysis\nThe Diamond Model of Intrusion Analysis focuses on understanding and analyzing adversary tactics, techniques, and procedures (TTPs) in the\ncontext of the interaction between four key components: the adversary, infrastructure, capability, and target. This model is specifically designed to\nhelp analyze how attackers exploit systems and their vulnerabilities over an infrastructure.\nupvoted 4 times"}], "answer": "N"}, {"id": 336, "question": "A security analyst is improving an organization’s vulnerability management program. The analyst cross-checks the current reports with the\nsystem’s infrastructure teams, but the reports do not accurately reflect the current patching levels. Which of the following will most likely correct\nthe report errors?", "options": [{"letter": "A", "text": "Updating the engine of the vulnerability scanning tool"}, {"letter": "B", "text": "Installing patches through a centralized system"}, {"letter": "C", "text": "Configuring vulnerability scans to be credentialed"}, {"letter": "D", "text": "Resetting the scanning tool’s plug-ins to default\nCorrect Answer: C\nCommunity vote distribution\nC (80%)                            A (20%)\n  33e8122 9 months, 1 week ago\nSelected Answer: C\nChatgdp says C. Configuring vulnerability scans to be credentialed    ✅\nCredentialed scans log in to the system and check patch levels directly from the OS/software.\nNon-credentialed scans only “look from the outside” (banner grabbing, service versions), which often leads to false positives or outdated results.\n✔️ This would most accurately reflect true patch levels.\nupvoted 2 times\n  JayWeston 10 months ago\nSelected Answer: A\nI would say A because it sounds like the scans are credentialed because they are getting patching data just not \"current patching\" data. This leads me\nto believe the scan engine is out of date with detecting new patches. If they were missing data that should be there then I would check if they were\ncredentialed.\nupvoted 1 times\n  mastermint 1 year ago\nSelected Answer: C\nWhen vulnerability reports do not accurately reflect current patching levels, it's often because the scans are unauthenticated (non-credentialed). This\nlimits the scanner’s visibility and causes it to miss or misinterpret the actual state of the system.\nupvoted 2 times"}], "answer": "N"}, {"id": 337, "question": "A threat intelligence analyst is updating a document according to the MITRE ATT&CK framework. The analyst detects the following behavior from\na malicious actor:\n“The malicious actor will attempt to achieve unauthorized access to the vulnerable system.”\nIn which of the following phases should the analyst include the detection?", "options": [{"letter": "A", "text": "Procedures"}, {"letter": "B", "text": "Techniques"}, {"letter": "C", "text": "Tactics"}, {"letter": "D", "text": "Subtechniques\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  ada26b1 Highly Voted  1 year, 1 month ago\nSelected Answer: C\nThe most appropriate phase for the analyst to include the detection is:\n**C. Tactics**\nIn the MITRE ATT&CK framework, **Tactics** represent the overall goals or objectives of the adversary during an attack. The behavior described—\nattempting to achieve unauthorized access to the system—aligns with the objective of gaining access, which is part of the **Initial Access** tactic in\nthe ATT&CK framework.\nTechniques and subtechniques describe specific methods adversaries use to achieve those tactical goals, while procedures refer to how specific\nadversaries implement those techniques.\nupvoted 6 times"}], "answer": "N"}, {"id": 338, "question": "An analyst receives alerts that state the following traffic was identified on the perimeter network firewall:\nWhich of the following best describes the indicator of compromise that triggered the alerts?", "options": [{"letter": "A", "text": "Anomalous activity"}, {"letter": "B", "text": "Bandwidth saturation"}, {"letter": "C", "text": "Cryptomining"}, {"letter": "D", "text": "Denial of service"}], "answer": "A"}, {"id": 339, "question": "A newly hired security manager in a SOC wants to improve efficiency by automating routine tasks. Which of the following SOC tasks is most\nsuitable for automation?", "options": [{"letter": "A", "text": "Conducting security assessments and audits of IT systems"}, {"letter": "B", "text": "Investigating security incidents and determining the root causes"}, {"letter": "C", "text": "Reviewing logs and alerts to identify security threats and anomalies"}, {"letter": "D", "text": "Generating incident reports and notifying the appropriate stakeholders\nCorrect Answer: D\nCommunity vote distribution\nC (100%)\n  Popeyes_Chicken Highly Voted  1 year, 4 months ago\nSelected Answer: C\nReviewing logs and alerts is one of the most automatable tasks in a SOC. SIEM tools integrated with a SOAR platform can analyze logs and flag\npotential security anomalies / threats for further review.\nGenerating incident reports can be automated, but often requires customization and human input. Especially for detailed or nuanced incidents.\nupvoted 8 times\n  Wolf541 Highly Voted  1 year, 4 months ago\nSelected Answer: C\nThe answer has to be C because reviewing logs can and should be automated when possible.\nupvoted 7 times\n  2d3d7b4 Most Recent  5 months, 3 weeks ago\nSelected Answer: C\nI feel C and D are SIEM and SOAR. I am stuck between those two.\nupvoted 1 times"}], "answer": "N"}, {"id": 340, "question": "Which of the following is a circumstance in which a security operations manager would most likely consider using automation?", "options": [{"letter": "A", "text": "The generation of NIDS rules based on received STIX messages"}, {"letter": "B", "text": "The fulfillment of privileged access requests to enterprise domain controllers."}, {"letter": "C", "text": "The verification of employee identities prior to initial PKI enrollment"}, {"letter": "D", "text": "The analysis of suspected malware binaries captured by an email gateway\nCorrect Answer: A\nCommunity vote distribution\nA (86%)                          D (14%)\n  ada26b1 Highly Voted  1 year, 1 month ago\nSelected Answer: A"}, {"letter": "A", "text": "The generation of NIDS rules based on received STIX messages\nAutomating the generation of NIDS (Network Intrusion Detection System) rules based on received STIX (Structured Threat Information Expression)\nmessages would be an efficient use of automation. STIX messages often contain indicators of compromise (IOCs) and other threat intelligence data\nthat could be directly used to create or update NIDS rules. This can save time and ensure that the network defenses are kept up to date in response to\nemerging threats.\nupvoted 7 times\n  TheDorse Most Recent  10 months, 3 weeks ago\nSelected Answer: D\nChat GPT\nupvoted 1 times"}], "answer": "N"}, {"id": 341, "question": "A network security analyst for a large company noticed unusual network activity on a critical system. Which of the following tools should the\nanalyst use to analyze network traffic to search for malicious activity?", "options": [{"letter": "A", "text": "WAF"}, {"letter": "B", "text": "Wireshark"}, {"letter": "C", "text": "EDR"}, {"letter": "D", "text": "Nmap\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  helenwonderland 8 months, 2 weeks ago\nSelected Answer: B\nWhile Nmap and Wireshark are both essential tools in the network security and analysis domain, they serve different purposes. Nmap primarily\nfocuses on scanning and discovering network hosts and services, whereas Wireshark specializes in deep packet analysis.\nupvoted 2 times\n  Susan4041 1 year ago\nSelected Answer: B\nIt would be Wireshark.\nupvoted 2 times"}], "answer": "N"}, {"id": 342, "question": "A system that provides the user interface for a critical server has potentially been corrupted by malware. Which of the following is the best\nrecommendation to ensure business continuity?", "options": [{"letter": "A", "text": "System isolation"}, {"letter": "B", "text": "Reimaging"}, {"letter": "C", "text": "Malware removal"}, {"letter": "D", "text": "Vulnerability scanning"}], "answer": "A"}, {"id": 343, "question": "Which of following attack methodology frameworks should a cybersecurity analyst use to identify similar TTPs utilized by nation-state actors?", "options": [{"letter": "A", "text": "Cyber kill chains"}, {"letter": "B", "text": "Diamond Model of Intrusion Analysis"}, {"letter": "C", "text": "OWASP Testing Guide"}, {"letter": "D", "text": "MITRE ATT&CK matrix\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  Cyde Highly Voted  1 year, 3 months ago\nSelected Answer: D\nTTPs = MITRE ATT&CK\nupvoted 8 times"}], "answer": "N"}, {"id": 344, "question": "During a training exercise, a security analyst must determine the vulnerabilities to prioritize. The analyst reviews the following vulnerability scan\noutput:\nWhich of the following issues should the analyst address first?", "options": [{"letter": "A", "text": "Allows anonymous read access to /etc/passwd"}, {"letter": "B", "text": "Allows anonymous read access via any FTP connection"}, {"letter": "C", "text": "Microsoft Defender security definition updates disabled"}, {"letter": "D", "text": "less command allows for escape exploit via terminal\nCorrect Answer: A\nCommunity vote distribution\nA (64%)                    B (18%)      C (18%)\n  Justheretolook Highly Voted  1 year ago\nSelected Answer: A\nThe correct answer is: A. Allows anonymous read access to /etc/passwd\nExplanation:\nIn vulnerability management, prioritization is based on:\n• Severity of the vulnerability\n• Exposure level\n• Network context (e.g., corporate vs. guest network)\n• System sensitivity\nLet’s evaluate the options:"}, {"letter": "A", "text": "Anonymous read access to /etc/passwd on a corporate VPN server (Ubuntu 22.04)\n• Critical system in the corporate network\n• /etc/passwd can give attackers usernames and system information\n• High risk, especially if combined with other exploits\n• Must be prioritized first\nupvoted 6 times\n  taketaa Most Recent  1 year ago\nSelected Answer: A\nWent with A for the following reason, even if modern Linux does no longer store password on /etc/passwd, it is a VPN server. An attacker can gather\nthose listed users to then perform password sprays, proceed with phishing, or even just general Reconnaisance activity.\nIf, it manages to discover one of the passwords, it has credentialed access to the organization VPN.\nupvoted 2 times\n  taketaa 1 year ago\nAnd access to some part/all of it's resources (depending of the user).\nupvoted 1 times\n  ouflomana 1 year ago\nSelected Answer: B\nB allows easy remote access without authentication, while A needs some prior access to exploit. Also, modern /etc/passwd is not as critical\nanymore. It lists user account names and default shells, but the actual password hashes have been moved to /etc/shadow (which is more protected).\nAnonymous FTP is still a very serious risk because attackers can directly connect and act remotely, without needing any foothold inside the machine\nfirst.\nupvoted 2 times\n  taketaa 1 year ago\nAnonymous FTP is a risk, agreed, but, have a look at other information of the machine. It is a conference room computer (maybe has what, only\nmeetings in there? some occasional file sharing?) that is on a guest network, so we could assume that the room computer is segregated from the\nCorporate network.\nRegarding the question, is this computer that critical of an asset that it becomes more important that a Domain Controller and/or a VPN server?\nupvoted 1 times\n  taketaa 1 year ago\nAnd also, you can put restrictions on anonymous users and configuring some security controls.\nupvoted 1 times\n  Susan4041 1 year, 1 month ago\nSelected Answer: C\nA still has a security layer its in read where the server has no security layer at all. ITs C\nupvoted 2 times"}], "answer": "N"}, {"id": 345, "question": "An analyst is trying to capture anomalous traffic from a compromised host. Which of the following are the best tools for achieving this objective?\n(Choose two.)", "options": [{"letter": "A", "text": "tcpdump"}, {"letter": "B", "text": "SIEM"}, {"letter": "C", "text": "Vulnerability scanner"}, {"letter": "D", "text": "Wireshark"}, {"letter": "E", "text": "Nmap"}, {"letter": "F", "text": "SOAR\nCorrect Answer: AD\nCommunity vote distribution\nAD (100%)\n  3eb5fb6 1 year ago\nSelected Answer: AD\nA & D are network traffic capture tools.\nupvoted 4 times"}], "answer": "N"}, {"id": 346, "question": "An XSS vulnerability was reported on one of the public websites of a company. The security department confirmed the finding and needs to\nprovide a recommendation to the application owner. Which of the following recommendations will best prevent this vulnerability from being\nexploited? (Choose two.)", "options": [{"letter": "A", "text": "Implement an IPS in front of the web server."}, {"letter": "B", "text": "Enable MFA on the website."}, {"letter": "C", "text": "Take the website offline until it is patched."}, {"letter": "D", "text": "Implement a compensating control in the source code."}, {"letter": "E", "text": "Configure TLS v1.3 on the website."}, {"letter": "F", "text": "Fix the vulnerability using a virtual patch at the WAF.\nCorrect Answer: DF\nCommunity vote distribution\nDF (78%)                             CF (22%)\n  Justheretolook 1 year ago\nSelected Answer: DF\nThe best recommendations to prevent the XSS (Cross-Site Scripting) vulnerability from being exploited are:"}, {"letter": "D", "text": "Implement a compensating control in the source code"}, {"letter": "F", "text": "Fix the vulnerability using a virtual patch at the WAF\nExplanation:\n• D. Implement a compensating control in the source code\nThis is the most effective and permanent fix. Proper input validation, output encoding, and sanitization in the source code prevent XSS from\noccurring.\n• F. Fix the vulnerability using a virtual patch at the WAF (Web Application Firewall)\nA virtual patch is a temporary solution that blocks exploit attempts until a permanent code fix is implemented. This helps reduce risk immediately\nwithout altering application code.\nupvoted 3 times\n  Only12go 1 year ago\nSelected Answer: DF\nD Implement a compensating control in the source code (e.g., input validation, output encoding, Content-Security-Policy) Fixes the root cause inside\nthe application so untrusted data can no longer be rendered as active script in the browser.\nF Apply a virtual patch at the WAF Provides an immediate, centrally managed rule set that filters or sanitises malicious XSS payloads while the\ndevelopment team works on the permanent code fix.\nupvoted 1 times\n  noa808a 1 year, 1 month ago\nSelected Answer: DF\nF is for sure 1/2 of the answers. For me, it's a 50/50 tossup between C and D. Taking the website offline would obviously prevent any exploitation, but\nwould be a major hit to availability, where as implementing a compensating control would help to mitigate the vulnerability while maintaining\navailability.\nupvoted 2 times\n  BlackSkullz 1 year, 1 month ago\nSelected Answer: DF\nI think D and F. While it does say \"best way\" and taking the server offline would technically be best, it just doesn't seem practical and would affect\nuptime and availability of company services. D and F would correct the issue at hand and keep the website up at the same time\nupvoted 1 times\n  1403ad2 1 year, 3 months ago\nSelected Answer: CF\nI think fixing the server with a WAF because its public facing website and taking the website off online is possible because it mentions \"one of the\npublic websites of a company\"\nupvoted 2 times"}], "answer": "N"}, {"id": 347, "question": "Executives want to compare certain metrics from the most recent and last reporting periods to determine whether the metrics are increasing or\ndecreasing. Which of the following would provide the necessary information to satisfy this request?", "options": [{"letter": "A", "text": "Count level"}, {"letter": "B", "text": "Trending analysis"}, {"letter": "C", "text": "Impact assessment"}, {"letter": "D", "text": "Severity score\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  HeatSquad77 3 months ago\nSelected Answer: B\nThe correct answer is B. Trending analysis.\nIn the CompTIA CySA+ (CS0-003) exam context, executives requesting a comparison of metrics between the most recent and previous reporting\nperiods to identify whether they are increasing or decreasing are asking for visibility into changes over time\nupvoted 2 times\n  Tenten87 11 months ago\nSelected Answer: B\nTrending analysis involves comparing data over time to identify patterns, such as increases or decreases in key metrics. This is exactly what the\nexecutives are requesting — a way to determine if certain metrics are going up or down over recent reporting periods.\nupvoted 3 times"}], "answer": "N"}, {"id": 348, "question": "A security analyst is reviewing a recent vulnerability scan report for a new server infrastructure. The analyst would like to make the best use of\ntime by resolving the most critical vulnerability first. The following information is provided:\nWhich of the following should the analyst concentrate remediation efforts on first?", "options": [{"letter": "A", "text": "SVR01"}, {"letter": "B", "text": "SVR02"}, {"letter": "C", "text": "SVR03"}, {"letter": "D", "text": "SVR04\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  Robuste7 Highly Voted  1 year, 1 month ago\nSelected Answer: B\nNormally the highest score is A, but it’s not exploitable, so I think the answer is B,\nupvoted 5 times\n  1f2b013 Most Recent  5 months, 2 weeks ago\nSelected Answer: B\nA and D are not exploitable; B has a higher CVSS score than C, hence it should be remediated first.\nupvoted 1 times"}], "answer": "N"}, {"id": 349, "question": "A SOC manager reviews metrics from the last four weeks to investigate a recurring availability issue. The manager finds similar events correlating\nto the times of the reported issues. Which of the following methods would the manager most likely use to resolve the issue?", "options": [{"letter": "A", "text": "Vulnerability assessment"}, {"letter": "B", "text": "Root cause analysis"}, {"letter": "C", "text": "Recurrence reports"}, {"letter": "D", "text": "Lessons learned\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  Murpho 11 months, 2 weeks ago\nSelected Answer: B\nRoot Cause Analysis is used to:\nIdentify the underlying cause of a problem, not just its symptoms.\nDetermine why the issue is happening repeatedly.\nHelp develop permanent solutions to prevent recurrence.\nThis method is essential for resolving systemic or repeated issues affecting availability\nupvoted 4 times"}], "answer": "N"}, {"id": 350, "question": "A security analyst must assist the IT department with creating a phased plan for vulnerability patching that meets established SLAs. Which of the\nfollowing vulnerability management elements will best assist with prioritizing a successful plan?", "options": [{"letter": "A", "text": "Affected hosts"}, {"letter": "B", "text": "Risk score"}, {"letter": "C", "text": "Mitigation strategy"}, {"letter": "D", "text": "Annual recurrence\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  HeatSquad77 3 months ago\nSelected Answer: B\nThe correct answer is B. Risk score.\nIn the CompTIA CySA+ (CS0-003) context, creating a phased vulnerability patching plan that meets established SLAs (e.g., time-to-remediate\nwindows like 30 days for critical, 90 days for high, etc.) requires effective prioritization of vulnerabilities\nupvoted 1 times\n  ada26b1 1 year, 1 month ago\nSelected Answer: B\nA risk score is typically used in vulnerability management to prioritize patching based on the potential impact and likelihood of exploitation of the\nvulnerability\nupvoted 2 times"}], "answer": "N"}, {"id": 351, "question": "A Chief Information Security Officer has requested a dashboard to share critical vulnerability management goals with company leadership. Which\nof the following would be the best to include in the dashboard?", "options": [{"letter": "A", "text": "KPI"}, {"letter": "B", "text": "MOU"}, {"letter": "C", "text": "SLO"}, {"letter": "D", "text": "SLA"}], "answer": "A"}, {"id": 352, "question": "Numerous emails were sent to a company’s customer distribution list. The customers reported that the emails contained a suspicious link. The\ncompany’s SOC determined the links were malicious. Which of the following is the best way to decrease these emails?", "options": [{"letter": "A", "text": "DMARC"}, {"letter": "B", "text": "DKIM"}, {"letter": "C", "text": "SPF"}, {"letter": "D", "text": "SMTP\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  ada26b1 Highly Voted  1 year, 1 month ago\nSelected Answer: A\nDMARC (Domain-based Message Authentication, Reporting & Conformance) helps to prevent email spoofing by verifying that the email message is\ncoming from an authorized source. It builds upon SPF (Sender Policy Framework) and DKIM (DomainKeys Identified Mail), and provides a mechanism\nfor domain owners to publish policies on how to handle email that fails authentication checks.\nupvoted 7 times"}], "answer": "N"}, {"id": 353, "question": "A security analyst is conducting a vulnerability assessment of a company’s online store. The analyst discovers a critical vulnerability in the\npayment processing system that could be exploited, allowing attackers to steal customer payment information. Which of the following should the\nanalyst do next?", "options": [{"letter": "A", "text": "Leave the vulnerability unpatched until the next scheduled maintenance window to avoid potential disruption to business."}, {"letter": "B", "text": "Perform a risk assessment to evaluate the potential impact of the vulnerability and determine whether additional security measures are\nneeded."}, {"letter": "C", "text": "Ignore the vulnerability since the company recently passed a payment system compliance audit."}, {"letter": "D", "text": "Patch the vulnerability as soon as possible to ensure customer payment information is secure.\nCorrect Answer: D\nCommunity vote distribution\nB (67%)                            D (33%)\n  JayWeston Highly Voted  10 months ago\nSelected Answer: B\nIn no way should a \"security analyst is conducting a vulnerability assessment\" be ad hoc patching systems. Yes the system should be patched by the\nsystem administrator after going through the proper policies and procedures.\nThe next step would be to perform a risk assessment to evaluate the potential impact of the vulnerability and determine whether additional security\nmeasures are needed.\nupvoted 7 times\n  bes_i Most Recent  5 months, 3 weeks ago\nSelected Answer: B"}, {"letter": "B", "text": "Even though the vulnerability is critical and affects a payment system, a security analyst must not immediately patch production systems without\nfollowing the proper process — especially in environments handling payment transactions.\nupvoted 3 times\n  Clayyy 10 months, 1 week ago\nSelected Answer: D\nIDK guys I'm pretty stuck between A, B, and C.\nupvoted 2 times\n  f90ecff 1 year, 1 month ago\nSelected Answer: D\nIndubitably\nupvoted 1 times\n  ada26b1 1 year, 1 month ago\nSelected Answer: D\nQuite obvious\nupvoted 2 times"}], "answer": "N"}, {"id": 354, "question": "Results of a SOC customer service evaluation indicate high levels of dissatisfaction with the inconsistent services provided after regular work\nhours. To address this, the SOC lead drafts a document establishing customer expectations regarding the SOC’s performance and quality of\nservices. Which of the following documents most likely fits this description?", "options": [{"letter": "A", "text": "Risk management plan"}, {"letter": "B", "text": "Vendor agreement"}, {"letter": "C", "text": "Incident response plan"}, {"letter": "D", "text": "Service-level agreement\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  HeatSquad77 3 months ago\nSelected Answer: D\nThe document that most likely fits this description is D. Service-level agreement.\nA Service-level agreement (SLA) is a formal contract or document that defines the expected level of service between a provider (here, the SOC) and\nits customers/internal stakeholders. It typically outlines key performance metrics, such as availability, response times, resolution times (including\nafter regular work hours/on-call support), quality standards, and remedies for non-compliance. This directly addresses customer dissatisfaction with\ninconsistent after-hours services by setting clear, measurable expectations for performance and service quality, helping to align what the SOC\ndelivers with what customers anticipate\nupvoted 1 times\n  ada26b1 1 year, 1 month ago\nSelected Answer: D\nThe document that most likely fits this description is a Service-level agreement (SLA).\nA Service-level agreement (SLA) is a formal document that outlines the expected level of service between a service provider (in this case, the SOC)\nand its customers.\nupvoted 3 times"}], "answer": "N"}, {"id": 355, "question": "A systems administrator needs to gather security events with repeatable patterns from Linux log files. Which of the following would the\nadministrator most likely use for this task?", "options": [{"letter": "A", "text": "A regular expression in Bash"}, {"letter": "B", "text": "Filters in the vi editor"}, {"letter": "C", "text": "Variables in a PowerShell script"}, {"letter": "D", "text": "A playbook in a SOAR tool\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  HeatSquad77 3 months ago\nSelected Answer: A\nThe correct answer is A. A regular expression in Bash.\nA systems administrator working directly with Linux log files (e.g., in /var/log/, such as auth.log, secure, syslog, or messages) would most commonly\nuse regular expressions (regex) within Bash commands to identify and extract security events that follow repeatable patterns. Tools like grep (with -E\nfor extended regex or -P for Perl-compatible), egrep, awk, or sed allow powerful pattern matching for things like repeated failed logins, specific IP\naddresses in brute-force attempts, SSH anomalies, or consistent error signatures.\nupvoted 1 times\n  ada26b1 1 year, 1 month ago\nSelected Answer: A\nRegular expressions (regex) in Bash are a powerful way to search for and filter text patterns in log files. They allow the systems administrator to\nidentify specific patterns, such as repeated security events, in a repeatable and automated manner.\nupvoted 3 times"}], "answer": "N"}, {"id": 356, "question": "An analyst is reviewing a dashboard from the company’s SIEM and finds that an IP address known to be malicious can be tracked to numerous\nhigh-priority events in the last two hours. The dashboard indicates that these events relate to TTPs. Which of the following is the analyst most\nlikely using?", "options": [{"letter": "A", "text": "MITRE ATT&CK"}, {"letter": "B", "text": "OSSTMM"}, {"letter": "C", "text": "Diamond Model of Intrusion Analysis"}, {"letter": "D", "text": "OWASP\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  iliecomptia Highly Voted  1 year, 1 month ago\nSelected Answer: A\nWhen you hear TTPs always think of MITRE.\nupvoted 5 times\n  noa808a 1 year, 1 month ago\nYes! Exactly correct.\nupvoted 1 times\n  HeatSquad77 Most Recent  3 months ago\nSelected Answer: A\nThe analyst is most likely using A. MITRE ATT&CK.\nMITRE ATT&CK (Adversarial Tactics, Techniques, and Common Knowledge) is the leading cybersecurity framework that categorizes adversary\nbehaviors using TTPs (Tactics, Techniques, and Procedures). Modern SIEM platforms commonly map high-priority security events, alerts, and\ncorrelated incidents to specific MITRE ATT&CK TTPs on dashboards. This allows analysts to quickly contextualize a malicious IP's activity—such as\nseeing multiple events tied to techniques like Initial Access (e.g., T1190 Exploit Public-Facing Application), Execution, Lateral Movement, or\nCommand and Control—helping prioritize response by understanding how the observed behaviors align with known adversary playbooks\nupvoted 1 times"}], "answer": "N"}, {"id": 357, "question": "Which of the following is most appropriate to use with SOAR when the security team would like to automate actions across different vendor\nplatforms?", "options": [{"letter": "A", "text": "STIX/TAXII"}, {"letter": "B", "text": "APIs"}, {"letter": "C", "text": "Data enrichment"}, {"letter": "D", "text": "Threat feed\nCorrect Answer: B\nCommunity vote distribution\nB (72%)                           A (28%)\n  hackerguy Highly Voted  1 year, 3 months ago\nSelected Answer: B\nAPIs (Application Programming Interfaces) are the most appropriate choice for integrating a SOAR (Security Orchestration, Automation, and\nResponse) platform with different vendor platforms to automate actions. Here's why:\nVendor Integration:\nAPIs allow SOAR platforms to communicate directly with various tools and platforms, such as firewalls, SIEMs, EDR solutions, and threat intelligence\nfeeds.\nAutomation of Actions:\nAPIs enable SOAR to execute automated actions like blocking IPs, quarantining endpoints, or updating policies across different vendor platforms.\nInteroperability:\nAPIs are the standard method for interoperability between different tools, regardless of vendor-specific implementations.\nFlexibility:\nUsing APIs, SOAR platforms can trigger specific workflows and tasks tailored to the organization's security requirements.\nupvoted 10 times\n  Only12go Most Recent  1 year ago\nSelected Answer: B\nAutomate actions such as blocking IPs, disabling user accounts, or triggering scans\nIntegrate with tools from different vendors (e.g., firewalls, EDR, SIEMs, ticketing systems)\nAllow cross-platform orchestration in a standardized, scalable way\nupvoted 3 times\n  Waltsthe 1 year, 2 months ago\nSelected Answer: A\nAn API (Application Programming Interface) is a set of definitions and protocols that allows different software components to communicate and\ninteract.\nThey enable applications or services to share data and functionality.\nupvoted 2 times\n  taketaa 1 year ago\nCorrect answer is B, I think you miss clicked on the option.\nupvoted 2 times\n  7167087 1 year, 4 months ago\nSelected Answer: A"}, {"letter": "A", "text": "Know the acronym: (Structured Threat Information Expression) and TAXII (Trusted Automated eXchange of Intelligence Information). These\nstandards allow SOAR to ingest STIX and TAXII from different vendor platforms. We have a structured method of classfying and expressing threats\n(STIX) and automated exchange of (threat) intelligence information (TAXII).\nupvoted 3 times\n  noa808a 1 year, 1 month ago\nThe correct answer is B. Almost all cyber reporting systems use STIX and TAXII by default. The question is pertained to SOARs, and the biggest\nfunction of a SOAR is to automate tasks. The question is referring to how do you get the SOAR to take actions across different vendors of\nappliances? And the answer to this is APIs.\nupvoted 2 times\n  taketaa 1 year ago\nJust going to reinforce noa808a told, STIX/TAXII are for IoC's. You tie your whole suite of tools with API's, using a SOAR.\nupvoted 2 times"}], "answer": "N"}, {"id": 358, "question": "Thousands of computers were compromised in a breach, but the vulnerability that caused the compromise was detected on only three computers\nduring the latest vulnerability scan. An analyst conducts an after action review to determine why the vulnerability was not detected on more\ncomputers. The analyst recreates the following configuration that was used to scan the network:\nWhich of the following best explains the reason the vulnerability was found only on three computers?", "options": [{"letter": "A", "text": "Incorrect remote port specified"}, {"letter": "B", "text": "Lack of concurrent threads dedicated"}, {"letter": "C", "text": "Use of a credentialed vulnerability scan"}, {"letter": "D", "text": "Configuring an incorrect subnet mask"}], "answer": "B"}, {"id": 359, "question": "A security analyst needs to develop a solution to protect a high-value asset from an exploit like a recent zero-day attack. Which of the following\nbest describes this risk management strategy?", "options": [{"letter": "A", "text": "Avoid"}, {"letter": "B", "text": "Transfer"}, {"letter": "C", "text": "Accept"}, {"letter": "D", "text": "Mitigate\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  ada26b1 1 year, 1 month ago\nSelected Answer: D\nMitigation involves taking actions to reduce the impact or likelihood of a risk, such as implementing patches, applying security controls, or deploying\nprotective measures to prevent exploitation. In the case of a zero-day attack, mitigation could involve applying a security update, using intrusion\ndetection systems, or isolating vulnerable assets.\nupvoted 3 times\n  Cyde 1 year, 3 months ago\nSelected Answer: D\n...\"develop a solution to protect a high-value asset\"... = D. Mitigate\nupvoted 4 times"}], "answer": "N"}, {"id": 360, "question": "An organization identifies a method to detect unexpected behavior, crashes, or resource leaks in a system by feeding invalid, unexpected, or\nrandom data to stress the application. Which of the following best describes this testing methodology?", "options": [{"letter": "A", "text": "Reverse engineering"}, {"letter": "B", "text": "Static"}, {"letter": "C", "text": "Fuzzing"}, {"letter": "D", "text": "Debugging\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  Wolf541 Highly Voted  1 year, 4 months ago\nSelected Answer: C\nThe question explains the definition of Fuzzing clearly.\nupvoted 5 times\n  HeatSquad77 Most Recent  3 months ago\nSelected Answer: C\nThe testing methodology best described here is C. Fuzzing (also known as fuzz testing).\nFuzzing is an automated dynamic testing technique that involves providing invalid, unexpected, malformed, or random (\"fuzz\") data as inputs to an\napplication or system. The goal is to stress the program and observe its behavior, specifically looking for crashes, assertions failures, memory\ncorruption, resource leaks (e.g., memory leaks), buffer overflows, or other unexpected/unhandled errors. This method is widely used in security\ntesting to uncover vulnerabilities that might be exploitable (e.g., leading to denial-of-service, code execution, or data exposure), as it excels at finding\nedge cases and implementation flaws that structured testing often misses.\nupvoted 1 times\n  ada26b1 1 year, 1 month ago\nSelected Answer: C\nAgree with Wolf 541\nupvoted 2 times"}], "answer": "N"}, {"id": 361, "question": "A WAF weekly report shows that a daily spike occurs from the same subnet. An open-source review indicates the IP addresses belong to a\nlegitimate internet service provider but have been flagged for DDoS attacks and reconnaissance scanning in the past year. Which of the following\nactions should a SOC analyst take first in response to these traffic uptick activities?", "options": [{"letter": "A", "text": "Recommend a firewall rule implementation to deny all traffic from the IP subnet."}, {"letter": "B", "text": "Continue monitoring because the traffic spike did not cause any security notifications or concerns."}, {"letter": "C", "text": "Review the network logs to identify the context of traffic and what action was taken."}, {"letter": "D", "text": "Check the resource consumption levels to determine whether the uptick is due to a device performance issue.\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  3eb5fb6 1 year ago\nSelected Answer: C"}, {"letter": "C", "text": "Before taking any corrective measures, it's critical to gather and analyze more detailed information about the reported spike. By reviewing the\nnetwork and WAF logs, you can determine the nature and intent of the traffic – whether it appears benign, is an early warning sign of malicious\nscanning or DDoS behavior, or potentially something else. This investigation will help you understand the context, discern any correlation with other\nsecurity events, and validate whether immediate blocking or additional mitigation tactics (like firewall rules) are necessary. Jumping straight to a\nfirewall rule may block legitimate traffic, and simply monitoring without analysis might let an emerging threat go unnoticed.\nupvoted 4 times\n  jasondion69 1 year ago\nSelected Answer: C\nIt's C\nupvoted 2 times"}], "answer": "N"}, {"id": 362, "question": "In the last hour, a high volume of failed RDP authentication attempts has been logged on a critical server. All of the authentication attempts\noriginated from the same remote IP address and made use of a single valid domain user account. Which of the following mitigating controls\nwould be most effective to reduce the rate of success of this brute-force attack? (Choose two.)", "options": [{"letter": "A", "text": "Increase the granularity of log-on event auditing on all devices."}, {"letter": "B", "text": "Enable host firewall rules to block all outbound traffic to TCP port 3389."}, {"letter": "C", "text": "Configure user account lockout after a limited number of failed attempts."}, {"letter": "D", "text": "Implement a firewall block for the IP address of the remote system."}, {"letter": "E", "text": "Install a third-party remote access tool and disable RDP on all devices."}, {"letter": "F", "text": "Block inbound to TCP port 3389 from untrusted remote IP addresses at the perimeter firewall.\nCorrect Answer: CF\nCommunity vote distribution\nCF (100%)\n  Kakster 5 days, 20 hours ago\nSelected Answer: CF\nC is self explanatory, F makes most sense instead of D. D doesn't work because attacker could obviously change IP.\nupvoted 1 times\n  radkoun 1 month, 3 weeks ago\nSelected Answer: CD\nI agree that option F is generally best practice but for this exact scenario is the option D more precise\nupvoted 1 times\n  iliecomptia 1 year, 1 month ago\nSelected Answer: CF\nA - This is related to monitoring, not mitigation, and does not address the issue.\nB - This is plain wrong, why would you block outbound traffic, when the auth attempts are inbound\nD - This is not practical, as the attacker could simply change the IP\nE - This seems like overkill, also this more of an avoid tactic as you disable RDP altogether\nC and F are the most practical in this case.\nupvoted 4 times"}], "answer": "N"}, {"id": 363, "question": "A Chief Information Security Officer (CISO) has decided the cost to protect an asset is greater than the cost of losing the asset. Which of the\nfollowing risk management principles is the CISO following?", "options": [{"letter": "A", "text": "Accept"}, {"letter": "B", "text": "Avoid"}, {"letter": "C", "text": "Transfer"}, {"letter": "D", "text": "Mitigate\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  ada26b1 Highly Voted  1 year, 1 month ago\nSelected Answer: A"}, {"letter": "A", "text": "Accept\nWhen the CISO decides that the cost to protect an asset is greater than the cost of losing the asset, this aligns with the acceptance of the risk. This\nprinciple involves acknowledging the potential loss or impact of a risk and choosing not to implement costly controls because the costs outweigh the\npotential consequences.\nupvoted 6 times"}], "answer": "N"}, {"id": 364, "question": "After an upgrade to a new EDR, a security analyst received reports that several endpoints were not communicating with the SaaS provider to\nreceive critical threat signatures. To comply with the incident response playbook, the security analyst was required to validate connectivity to\nensure communications. The security analyst ran a command that provided the following:\nComputerName: comptia007 -\nRemotePort: 443 -\nInterfaceAlias: Ethernet 3 -\nTopTestSucceeded: False -\nWhich of the following did the analyst use to ensure connectivity?", "options": [{"letter": "A", "text": "nmap"}, {"letter": "B", "text": "tnc"}, {"letter": "C", "text": "ping"}, {"letter": "D", "text": "tracert\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  ada26b1 Highly Voted  1 year, 1 month ago\nSelected Answer: B\nThe output shown in the question (including RemotePort: 443, TopTestSucceeded: False, and other details) corresponds to the output format from tnc\n(Test-NetConnection), a cmdlet in PowerShell. This command is used to test network connectivity, such as checking if a remote port (in this case,\nport 443) is reachable from the endpoint.\nupvoted 9 times\n  HeatSquad77 Most Recent  3 months ago\nSelected Answer: B\nThe security analyst most likely used B. tnc.\ntnc is the built-in alias in PowerShell for the Test-NetConnection cmdlet (often abbreviated as TNC). This cmdlet is specifically designed to validate\nnetwork connectivity, including testing TCP reachability to a remote host and port. The output fields shown—ComputerName, RemotePort,\nInterfaceAlias, and TcpTestSucceeded (note: the question shows \"TopTestSucceeded,\" but this is almost certainly a typo or transcription error for\nTcpTestSucceeded)—are the exact properties returned by Test-NetConnection when run with the -Port parameter (e.g., tnc comptia007 -Port 443 or\nTest-NetConnection comptia007 -Port 443).\nupvoted 1 times"}], "answer": "N"}, {"id":
