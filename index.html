es with the incident response processes?", "options": [{"letter": "A", "text": "Tabletop exercise"}, {"letter": "B", "text": "Lessons learned"}, {"letter": "C", "text": "Root cause analysis"}, {"letter": "D", "text": "Forensic analysis\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  HeatSquad77 3 months ago\nSelected Answer: B\nThe correct answer is B. Lessons learned.\nAfter an incident, the after-action report (AAR) is a post-incident document that summarizes the event, response actions, outcomes, and key\ntakeaways. Management's primary focus for correcting validated issues with the incident response processes (e.g., gaps in procedures,\ncommunication breakdowns, role confusion, timing issues, or process inefficiencies) is the lessons learned section or document.\nLessons learned (also called lessons learned review or post-incident review) is the formal step where the team and stakeholders\nupvoted 1 times\n  noa808a 1 year, 1 month ago\nSelected Answer: B\nI was originally 50/50 between B and C, after re-reading the question key words \"incident response process\" lead me to B. Lessons learned.\nupvoted 3 times"}], "answer": "N"}, {"id": 415, "question": "A security analyst needs to prioritize vulnerabilities for patching. Given the following vulnerability and system information:\nWhich of the following systems should the analyst patch?", "options": [{"letter": "A", "text": "1"}, {"letter": "B", "text": "2"}, {"letter": "C", "text": "3"}, {"letter": "D", "text": "4"}, {"letter": "E", "text": "5"}, {"letter": "F", "text": "6\nCorrect Answer: C\nCommunity vote distribution\nD (100%)\n  fab34 Highly Voted  1 year, 2 months ago\nSelected Answer: D\nSystem 4 should be patched first because it is internet facing, requires no privileges, no user interaction, and has a changed scope, meaning it can\nimpact other systems.\nupvoted 13 times\n  Thunder_Cat Highly Voted  1 year, 1 month ago\nSelected Answer: D\nI agree with fab34, I picked D before seeing the solution. Attack vector being the network, attack complexity is low, and Permissions Required is none\nand its public facing are the main reasons to pick D.\nupvoted 5 times"}], "answer": "N"}, {"id": 416, "question": "During a packet capture review, a security analyst identifies the output below as suspicious:\nWhich of the following best describes the type of activity the analyst has identified?", "options": [{"letter": "A", "text": "Ping sweep"}, {"letter": "B", "text": "Port scan"}, {"letter": "C", "text": "DoS attack"}, {"letter": "D", "text": "Beaconing"}], "answer": "D"}, {"id": 417, "question": "An organization performs software assurance activities and reviews some web framework code that uses exploitable jquery modules. Which of\nthe following tools or techniques should the organization use to help identify these issues?", "options": [{"letter": "A", "text": "Security Content Automation Protocol"}, {"letter": "B", "text": "Application fuzzing"}, {"letter": "C", "text": "Common weakness enumeration"}, {"letter": "D", "text": "Static analysis\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  Justheretolook 1 year ago\nSelected Answer: D\nThe correct answer is: D. Static analysis\nExplanation:\n• D. Static analysis involves reviewing source code or binaries without executing them, to identify security flaws such as the use of vulnerable libraries\nor modules—like exploitable jQuery components. Static analysis tools can flag known vulnerable functions, outdated libraries, and insecure coding\npatterns.\nupvoted 4 times"}], "answer": "N"}, {"id": 418, "question": "An organization has implemented code into a production environment. During a routine test, a penetration tester found that some of the code had\na backdoor implemented causing a developer to make changes outside of the change management windows. Which of the following is the best\nway to prevent this issue?", "options": [{"letter": "A", "text": "SDLC training"}, {"letter": "B", "text": "Dynamic analysis"}, {"letter": "C", "text": "Debugging"}, {"letter": "D", "text": "Source code review\nCorrect Answer: D\nCommunity vote distribution\nD (82%)                          A (18%)\n  Only12go Highly Voted  1 year ago\nSelected Answer: D\nA source code review involves manually or automatically inspecting the application's source code for security vulnerabilities, backdoors, and other\ncoding flaws. It allows teams to:\nDetect unauthorized changes, such as malicious backdoors,\nEnsure adherence to security and coding standards,\nCatch vulnerabilities before deployment.\nThis is the best preventative measure against backdoors being inserted into production code, especially when change management processes are\nbypassed.\nupvoted 5 times\n  Kakster Most Recent  2 weeks, 4 days ago\nSelected Answer: D\nIt isn't A because SDLC training means jack if the backdoor was inserted intentionally. Source code review will find it!\nupvoted 1 times\n  blisstonia 7 months, 1 week ago\nSelected Answer: A\nGrok thinks it's A:\nAnalysis: The issue involves a backdoor in production code and unauthorized changes outside change management windows, indicating both a\nsecurity lapse (introduction of malicious code) and a process violation (bypassing change management). SDLC training is the best preventive\nmeasure because it addresses both aspects by educating developers on secure coding to avoid backdoors and on the importance of adhering to\nchange management protocols. This proactive approach reduces the likelihood of such issues occurring. Source code review is valuable but focuses\nonly on code inspection, not process adherence. Dynamic analysis and debugging are less preventive, as they occur later in the process or focus on\ndifferent aspects.Answer: A. SDLC training\nupvoted 1 times\n  Justheretolook 1 year ago\nSelected Answer: D\nThe correct answer is: D. Source code review\nExplanation:\n• D. Source code review allows for manual or automated inspection of code before it goes into production. It helps detect malicious code, such as\nbackdoors, and unauthorized changes, ensuring that only approved and secure code is deployed. This is critical in identifying insider threats or\nsecurity policy violations.\nupvoted 4 times\n  Sad3lf 1 year ago\nSelected Answer: A\nSDLC Training is correct I believe\nupvoted 1 times"}], "answer": "N"}, {"id": 419, "question": "An analyst reviews the following web server log entries:\n%2E%2E/%2E%2E/%2E%2E/%2E%2E/%2E%2E/%2E%2E/etc/passwd\nNo attacks or malicious attempts have been discovered. Which of the following most likely describes what took place?", "options": [{"letter": "A", "text": "A SQL injection query took place to gather information from a sensitive file."}, {"letter": "B", "text": "A PHP injection was leveraged to ensure that the sensitive file could be accessed."}, {"letter": "C", "text": "Base64 was used to prevent the IPS from detecting the fully encoded string."}, {"letter": "D", "text": "Directory traversal was performed to obtain a sensitive file for further reconnaissance.\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  Justheretolook 1 year ago\nSelected Answer: D\nThe correct answer is: D. Directory traversal was performed to obtain a sensitive file for further reconnaissance.\nExplanation:\n• The string %2E%2E/%2E%2E/.../etc/passwd is URL-encoded for ../../../../../../etc/passwd, which is a classic directory traversal attack. This\ntechnique is used to access files outside the intended directory structure, such as system files (/etc/passwd in Unix/Linux systems).\n• The attacker is likely attempting to reconnoiter the system by accessing sensitive files, even if the attempt didn’t succeed.\nupvoted 3 times"}], "answer": "N"}, {"id": 420, "question": "An organization is preparing for a disaster recovery exercise. Which of the following actions should be implemented first?", "options": [{"letter": "A", "text": "Gather all internal stakeholders and review the actions according to the defined incident playbook."}, {"letter": "B", "text": "Coordinate the supporting staff for the recovery process to ensure availability at the recovery site."}, {"letter": "C", "text": "Ensure that the vendor for the disaster recovery site is scheduled to support the recovery."}, {"letter": "D", "text": "Identify a business-critical system and test by failing over to the disaster recovery location.\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  HeatSquad77 3 months ago\nSelected Answer: A\nThe correct answer is A. Gather all internal stakeholders and review the actions according to the defined incident playbook.\nWhen preparing for a disaster recovery exercise (such as a walkthrough, tabletop, simulation, or full failover test), the first action should be to bring\ntogether the relevant internal stakeholders (e.g., IT, security, business units, management, recovery team members) and review the planned actions,\nprocedures, and roles as outlined in the organization's incident playbook (or disaster recovery plan/playbook)\nupvoted 1 times\n  iliecomptia 1 year ago\nSelected Answer: A\nFrom CYSA study guide:\n\"Full Incident Simulations—Mock incidents that include the full set of people\nand organizations involved in responding to an incident to test the entire\nresponse process, including communication protocols and the effectiveness of\nthe different response teams.\"\nDisater recovery exercise is an incident simulation.\nupvoted 2 times"}], "answer": "N"}, {"id": 421, "question": "As part of an incident investigation, an analyst creates a detailed document that describes all activities, timelines, root causes, and mitigation\nactions. Which of the following reports is the analyst creating?", "options": [{"letter": "A", "text": "Lessons learned"}, {"letter": "B", "text": "Business impact analysis"}, {"letter": "C", "text": "Tabletop exercise"}, {"letter": "D", "text": "Change control\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  HeatSquad77 3 months ago\nSelected Answer: A\nThe correct answer is A. Lessons learned.\nThe analyst is creating a lessons learned report (also commonly called a lessons learned document, post-incident review, or after-action report in\nsome organizations).\nThis type of report is produced as part of the post-incident activity phase in the incident response lifecycle (per NIST SP 800-61 and CompTIA CySA+\nCS0-003 objectives). It is a detailed, structured document that typically includes:\nChronological timeline of events and response activities\nRoot cause analysis (what allowed the incident to occur)\nDescription of all actions taken during detection, analysis, containment, eradication, and recovery\nMitigation actions implemented or recommended\nWhat went well, what didn't, gaps in processes/tools/procedures, and specific recommendations for improvement\nupvoted 1 times"}], "answer": "N"}, {"id": 422, "question": "A third-party assessment of a recent incident determined that the incident response team spent too long trying to get the scope needed for the\nincident timeline and too much time was spent searching for false positives. Which of the following should the team work on first?", "options": [{"letter": "A", "text": "Playbook edits"}, {"letter": "B", "text": "Ticket system automation"}, {"letter": "C", "text": "Detection tuning"}, {"letter": "D", "text": "Standard operating procedure refinement\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  HeatSquad77 3 months ago\nSelected Answer: C\nThe correct answer is C. Detection tuning.\nThe third-party assessment highlighted two key inefficiencies in the incident response:\nSpending excessive time determining the scope for the incident timeline (i.e., figuring out the full extent, affected systems, timeline of events, and\nwhat was truly relevant).\nWasting time investigating false positives (alerts that turned out to be benign, consuming analyst effort unnecessarily).\nupvoted 1 times\n  Justheretolook 1 year ago\nSelected Answer: C\nThe correct answer is: C. Detection tuning\nExplanation:\n• C. Detection tuning involves refining alerting systems (e.g., SIEM rules, IDS/IPS signatures) to reduce false positives and ensure that alerts are\naccurate and actionable. Since the incident response team struggled with false positives and scoping the incident quickly, this should be the first\npriority to improve alert quality and response efficiency.\nupvoted 3 times"}], "answer": "N"}, {"id": 423, "question": "A security analyst is developing a script to filter firewall vulnerabilities. The script will impact the integrity of data hosted on devices connected to\nnetworks. Which of the following is a CVSS v4.0 that the analyst can use to test a true positive for the script?", "options": [{"letter": "A", "text": "AV:L/AC:H/AT:N/PR:L/VI:H/VC:H/VA:H/SC:N/SI:N/SA:N"}, {"letter": "B", "text": "AV:C:L/AT:N/PR:N/VI:N/VC:N/VA:N/SC:N/SI:H/SA:L"}, {"letter": "C", "text": "AV:P/AC:L/AT:N/PR:H/VI:L/VC:L/VA:L/SC:N/SI:N/SA:N"}, {"letter": "D", "text": "AV:A/AC:L/AT:N/PR:H/VI:N/VC:L/VA:L/SC:N/SI:N/SA:H\nCorrect Answer: A\nCommunity vote distribution\nB (65%)                            A (35%)\n  kaka321 1 month, 2 weeks ago\nSelected Answer: A\nIntegrity is highly impacted. What is data without Integrity?\nupvoted 1 times\n  HeatSquad77 3 months ago\nSelected Answer: B\nThe correct answer is B. AV:C:L/AT:N/PR:N/VI:N/VC:N/VA:N/SC:N/SI:H/SA:L\nThis CVSS v4.0 vector represents a vulnerability that the analyst's script can use to reliably test a true positive (i.e., confirm the script correctly\ndetects and flags a real vulnerability that matches the intended filtering criteria).\nKey reasoning:\nThe script is designed to filter firewall vulnerabilities — meaning it scans for, detects, or identifies known/exploitable firewall issues.\nTo validate the script works (true positive testing), you need a test case where a vulnerability exists and the script should trigger on it.\nThe script impacts the integrity of data on connected devices (i.e., the script itself can modify or corrupt data integrity when run, or the vulnerabilities\nit targets affect integrity).\nupvoted 1 times\n  SecOps3 5 months, 1 week ago\nSelected Answer: A\nFor B: VI:None, How will you be able to detect it is a true positive if integrity is not affected by a script that is meant to set integrity?\nupvoted 1 times\n  2d3d7b4 5 months, 2 weeks ago\nSelected Answer: B\ni made a mistake its b\nupvoted 1 times\n  2d3d7b4 5 months, 2 weeks ago\nSelected Answer: A\nA is the only one with High on Intergirty\nupvoted 1 times\n  2d3d7b4 5 months, 2 weeks ago\ni made a mistake its b\nupvoted 1 times\n  bes_i 5 months, 3 weeks ago\nSelected Answer: A\n_______________ A\nupvoted 2 times\n  3be4e12 9 months, 1 week ago\nSelected Answer: A\nEven though it uses a local attack vector, Option A is the only one that has High impact on Vulnerability Integrity (VI), Vulnerability Confidentiality\n(VC), and Vulnerability Availability (VA) — all of which are relevant for testing a true positive that affects data integrity.\nupvoted 2 times\n  Nilab 9 months, 3 weeks ago\nSelected Answer: B\nConfusing, if you look at the AV is network then its B but if you look for the Availability is High then its A but I will go for B - as the Network AV is\nalways priortized.\nCorrect me if I am wrong please.\nupvoted 2 times\n  Maxwellchu 10 months, 3 weeks ago\nSelected Answer: A\nBecause option A is the only vector that both sets VI:H and realistically describes a script-based local exploit, it is the correct choice for validating a\ntrue positive in this integrity-focused test.\nupvoted 1 times\n  Only12go 1 year ago\nSelected Answer: B\nAV = N\nFirewall = Vulnerable System\nNetwork-connected devices = Subsequent Systems\nIf the script or vulnerability leads to data being altered on those networked devices, then:\nVI (Vulnerable System Integrity) = probably None or Low\nSI (Subsequent System Integrity) = High\nupvoted 4 times\n  Only12go 1 year ago\nSelected Answer: B\nAC = N\nFirewall = Vulnerable System\nNetwork-connected devices = Subsequent Systems\nIf the script or vulnerability leads to data being altered on those networked devices, then:\nVI (Vulnerable System Integrity) = probably None or Low\nSI (Subsequent System Integrity) = High\nupvoted 3 times\n  KotNinja 1 year, 1 month ago\nSelected Answer: B\nThe security analyst is looking for a CVSS v4.0 vector that represents a vulnerability meeting two main criteria for testing their script:\nIt should be a vulnerability that a script filtering firewall vulnerabilities might detect. This suggests a vulnerability that is network-facing or related to\nnetwork devices. The Attack Vector (AV) metric is important here.\nExploiting the vulnerability should impact the integrity of data hosted on devices connected to networks. In CVSS v4.0, the impact on other systems\nconnected to the vulnerable one is captured by the Subsequent System Impact metrics, specifically Subsequent System Integrity (SI). This should be\nHigh (H).\nTherefore; Option B is the only vector that describes a network-exploitable vulnerability with a high impact on the integrity of subsequent systems,\nwhich directly matches the requirements for a true positive for the analyst's script.\nupvoted 3 times"}], "answer": "N"}, {"id": 424, "question": "An analyst wants to detect outdated software packages on a server. Which of the following methodologies will achieve this objective?", "options": [{"letter": "A", "text": "Data loss prevention"}, {"letter": "B", "text": "Configuration management"}, {"letter": "C", "text": "Common vulnerabilities and exposures"}, {"letter": "D", "text": "Credentialed scanning\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  HeatSquad77 3 months ago\nSelected Answer: D\nThe correct answer is D. Credentialed scanning.\nCredentialed scanning (also known as authenticated scanning) is the methodology that directly and effectively achieves the objective of detecting\noutdated software packages on a server.\nExplanation:\nCredentialed scanning involves providing the vulnerability scanner with valid login credentials (e.g., SSH key, domain admin account, local admin) so\nit can authenticate to the target server.\nOnce authenticated, the scanner can:\nEnumerate installed software/packages (e.g., via package managers like RPM, dpkg, yum, apt, Windows registry, WMI, or file system queries).\nCheck version numbers against known databases of software releases.\nIdentify outdated, end-of-life, or vulnerable versions of applications, libraries, OS components, and patches.\nupvoted 1 times\n  Justheretolook 1 year ago\nSelected Answer: D\nThe correct answer is: D. Credentialed scanning\nExplanation:\n• D. Credentialed scanning involves scanning a system with valid login credentials, allowing the scanner to access detailed information about\ninstalled software, including version numbers, patch levels, and configuration settings. This makes it highly effective for detecting outdated or\nvulnerable software packages.\nWhy not the others?\n• A. Data loss prevention (DLP) – Focuses on monitoring and protecting sensitive data, not identifying outdated software.\n• B. Configuration management – Helps manage system configurations, but doesn’t actively scan for outdated software unless integrated with\nscanning tools.\n• C. Common Vulnerabilities and Exposures (CVE) – A database of known vulnerabilities, but not a methodology for scanning or detecting outdated\npackages.\nupvoted 3 times"}], "answer": "N"}, {"id": 425, "question": "A systems administrator receives several reports about emails containing phishing links. The hosting domain is always different, but the URL\nfollows a specific pattern of characters.\nWhich of the following is the best way for the administrator to find more messages that were not reported?", "options": [{"letter": "A", "text": "Search email logs for a regular expression."}, {"letter": "B", "text": "Open a support ticket with the email hosting provider."}, {"letter": "C", "text": "Send a memo to all staff asking them to report suspicious emails."}, {"letter": "D", "text": "Query firewall logs for any traffic with a suspicious website.\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  HeatSquad77 3 months ago\nSelected Answer: A\nThe correct answer is A. Search email logs for a regular expression.\nThe phishing campaign uses domain generation or similar evasion (different hosting domains each time) but maintains a consistent pattern in the\nURL path/query (e.g., something like /login?token=abc123def456... or a specific character sequence/structure).\nThis makes regular expressions (regex) the most effective and immediate way to proactively identify additional unreported messages:\nupvoted 1 times\n  magmadiver1937 5 months, 3 weeks ago\nSelected Answer: A\nPattern means use regex.\nupvoted 2 times"}], "answer": "N"}, {"id": 426, "question": "A security analyst receives an alert with the following packet capture attached:\nWhich of the following has occurred?", "options": [{"letter": "A", "text": "sslscan reconnaissance"}, {"letter": "B", "text": "A password stuffing attack"}, {"letter": "C", "text": "An Nmap scan"}, {"letter": "D", "text": "An nc reverse shell\nCorrect Answer: C\nCommunity vote distribution\nC (88%)                        A (12%)\n  Justheretolook Highly Voted  1 year ago\nSelected Answer: C\nThe correct answer is: C. An Nmap scan\nExplanation:\nThe packet capture shows a TCP three-way handshake sequence between 10.203.10.17 and 10.203.10.23 on port 22 (SSH):\n1. SYN from source to destination.\n2. SYN-ACK in response.\n3. ACK from source to complete the handshake.\n4. Then a RST (Reset) is sent, terminating the connection.\nThis behavior is typical of a port scan, particularly from Nmap, when used with options like -sS (TCP SYN scan) or more specifically -sT (TCP connect\nscan), which completes the handshake and then resets the connection without sending further data. Nmap does this to check for open ports without\nactually establishing a prolonged connection.\nupvoted 6 times\n  JayWeston Most Recent  10 months ago\nSelected Answer: A\nThis looks like an sslscan reconnaissance which can be done by nmap. I think if it was an my map scan then it would show more than one try on one\nport.\nDo a Google image search for \"sslscan reconnaissance packed sequence\".\nupvoted 1 times\n  iliecomptia 1 year ago\nSelected Answer: C\nThis looks like a TCP connect Scan from Nmap.\nRefference:\nhttps://nmap.org/book/scan-methods-connect-scan.html\nupvoted 1 times"}], "answer": "N"}, {"id": 427, "question": "A company runs a website that allows public posts. Recently, some users report that when visiting the website, pop-ups appear asking the users\nfor their credentials.\nWhich of the following is the most likely cause of this issue?", "options": [{"letter": "A", "text": "Rootkit"}, {"letter": "B", "text": "SQL injection"}, {"letter": "C", "text": "CSRF"}, {"letter": "D", "text": "XSS\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  HeatSquad77 3 months ago\nSelected Answer: D\nExplanation:\nXSS (Cross-Site Scripting) allows attackers to inject malicious JavaScript into pages viewed by other users. Since the site permits public posts, a\nstored XSS vulnerability is very plausible: an attacker posts content containing a script that creates a fake login pop-up (or overlay/form) when others\nview the page/post.\nThis script runs in the victim's browser in the context of the legitimate site, making the pop-up appear trustworthy (same domain, styling, etc.). The\nentered credentials are then typically sent to the attacker's server.\nupvoted 1 times\n  Justheretolook 1 year ago\nSelected Answer: D\nThe correct answer is: D. XSS (Cross-Site Scripting)\nExplanation:\n• XSS (Cross-Site Scripting) occurs when an attacker injects malicious scripts into web pages that are then executed by other users’ browsers. This\noften happens on websites that allow user-generated content, like public posts, without proper input sanitization.\n• In this case, the pop-ups asking for credentials are a classic symptom of an XSS attack, where the attacker injects JavaScript code to steal\ncredentials via fake login prompts.\nWhy not the others?\n• A. Rootkit – A type of malware that hides on a system, not related to website pop-ups.\n• B. SQL injection – Targets backend databases and usually results in data leaks or authentication bypass, not front-end pop-ups.\n• C. CSRF (Cross-Site Request Forgery) – Tricks users into making unwanted requests, but does not directly cause pop-ups asking for credentials.\nupvoted 3 times"}], "answer": "N"}, {"id": 428, "question": "A security manager has decided to form a special group of analysts who participate in both penetration testing and defending the company's\nnetwork infrastructure during exercises.\nWhich of the following teams should the group form in order to achieve this goal?", "options": [{"letter": "A", "text": "Blue team"}, {"letter": "B", "text": "Purple team"}, {"letter": "C", "text": "Red team"}, {"letter": "D", "text": "Green team\nCorrect Answer: B\nCommunity vote distribution\nB (91%)                       A (9%)\n  Superash 9 months, 2 weeks ago\nSelected Answer: B\nBeacuse “ both penetration testing and defending”\nupvoted 2 times\n  Casperkey 11 months, 3 weeks ago\nSelected Answer: B\nPenetration testing is done by red team.\nDefending the company’s infrastructure is done by blue team.\nThe purple team facilitates communication and collaboration between red and blue teams.\nupvoted 4 times\n  erfanse 11 months, 3 weeks ago\nSelected Answer: B\nA Purple team is a group that combines the skills of both the Red team (attackers/penetration testers) and the Blue team (defenders).\nupvoted 2 times\n  kaspen 11 months, 4 ered; Risk score = 4(Low) Prioritization 6.\nThe rest are correct.\nupvoted 2 times", "options": [{"letter": "", "text": "No answer choices parsed. Use the PDF for this PBQ/image-based item."}], "answer": "N"}, {"id": 436, "question": "After several tabletop exercises, the cybersecurity team is underperforming against MTTR and MTTD. Which of the following would help the team\nachieve improved performance?", "options": [{"letter": "A", "text": "Alert volume"}, {"letter": "B", "text": "Impact analysis"}, {"letter": "C", "text": "Lessons learned"}, {"letter": "D", "text": "Compensating controls\nCorrect Answer: C\n  Katie123456 1 month ago\nSelected Answer: C\nLESSONS LEARNED ALLOWS FOR FASTER MTTD AND MTTR CUZ IT IDENTIFIES WHAT WENT WRONG AND WHAT TO IMPROVE. I THOUGHT IT WAS\n\"A\" INITIALLY BYT THAT JUST IMPROVES ALERT VOLUME, NOT DIRECTLY PREFORMANCE\nupvoted 1 times"}], "answer": "N"}, {"id": 437, "question": "An IDS is triggered during after-hours operations. The indicator records an abnormal amount of SYN requests being sent to port 21 from\nnumerous external systems. A security analyst reports this information to the IR team for further investigation. Which of the following best\ndescribes this incident?", "options": [{"letter": "A", "text": "A sniff attack through the DNS port"}, {"letter": "B", "text": "A buffer overflow attack through the Telnet port"}, {"letter": "C", "text": "A reconnaissance attack through the SSH port"}, {"letter": "D", "text": "A DDoS attack through the FTP port\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  Nilab Highly Voted  9 months, 3 weeks ago\nSelected Answer: D\n• The IDS is triggered after hours – Indicates suspicious or malicious activity when legitimate traffic is unlikely.\n• An abnormal amount of SYN requests – This is a classic signature of a SYN flood, a type of Denial-of-Service (DoS) or Distributed Denial-of-Service\n(DDoS) attack.\n• The target is port 21, which is used by FTP (File Transfer Protocol).\n• Numerous external systems are involved – Suggests a DDoS, not just a single-source DoS\nupvoted 6 times\n  HeatSquad77 Most Recent  3 months ago\nSelected Answer: D\nThe incident is best described as D. A DDoS attack through the FTP port.\nExplanation:\nPort 21 is the well-known TCP port for FTP (File Transfer Protocol) control connections.\nAn abnormal (high volume) of SYN requests from numerous external systems targeting a single service/port is a classic signature of a TCP SYN flood\nattack.\nupvoted 1 times"}], "answer": "N"}, {"id": 438, "question": "A security analyst reviews a packet capture and identifies the following output as anomalous:\nWhich of the following activities explains the output?", "options": [{"letter": "A", "text": "Nmap Xmas scan"}, {"letter": "B", "text": "Nikto’s web scan"}, {"letter": "C", "text": "Socat’s proxying traffic using the urgent flag"}, {"letter": "D", "text": "Angry IP Scanner output\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  HeatSquad77 3 months ago\nSelected Answer: A\nThe most likely activity explaining the anomalous packet capture output is A. Nmap Xmas scan.\nExplanation:\nA Nmap Xmas scan (nmap -sX) sends TCP packets with the FIN, PSH (Push), and URG (Urgent) flags set simultaneously.\nupvoted 3 times"}], "answer": "N"}, {"id": 439, "question": "While performing a dynamic analysis of a malicious file, a security analyst notices the memory address changes every time the process runs.\nWhich of the following controls is most likely preventing the analyst from finding the proper memory address of the piece of malicious code?", "options": [{"letter": "A", "text": "Address space layout randomization"}, {"letter": "B", "text": "Data execution prevention"}, {"letter": "C", "text": "Stack canary"}, {"letter": "D", "text": "Code obfuscation\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  HeatSquad77 3 months ago\nSelected Answer: A\nExplanation:\nAddress Space Layout Randomization (ASLR) is a memory protection technique (enabled by default on modern OSes like Windows, Linux, macOS)\nthat randomizes the base addresses of key memory regions—such as the executable image, stack, heap, and loaded libraries—every time a process\nstarts.\nupvoted 1 times\n  Nilab 9 months, 3 weeks ago\nSelected Answer: A\n• ASLR is a security feature that randomizes the memory addresses used by system and application components (like libraries, the stack, heap, etc.)\nevery time a program is executed.\n• Its goal is to prevent attackers from reliably predicting the location of code in memory, making exploitation (e.g., buffer overflows) much more\ndifficult\nupvoted 3 times"}], "answer": "N"}, {"id": 440, "question": "An analyst finds that duplicate entries may exist in the asset inventory, which is skewing vulnerability scan data. Which of the following is the best\nway for the analyst to improve the effectiveness of the vulnerability scan?", "options": [{"letter": "A", "text": "Device fingerprinting"}, {"letter": "B", "text": "Network mapping"}, {"letter": "C", "text": "Uncredentialed reports"}, {"letter": "D", "text": "Dynamic scans\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  HeatSquad77 3 months ago\nSelected Answer: A\nExplanation:\nDuplicate entries in the asset inventory (e.g., the same device appearing multiple times under different names/IPs/MACs due to DHCP changes,\nvirtual interfaces, misconfigurations, or incomplete discovery) cause vulnerability scanners to report inflated or duplicated findings. This skews\nmetrics (e.g., total vulnerabilities, risk scores, compliance reports) and wastes remediation effort on the same issues\nupvoted 1 times\n  Nilab 9 months, 3 weeks ago\nSelected Answer: A\nDevice fingerprinting involves collecting detailed attributes of devices (e.g., OS, MAC address, software versions, open ports).\n• This helps to uniquely identify each device, even if it changes IP addresses or DNS names.\n• It prevents duplicate entries in asset inventories and improves the accuracy and effectiveness of vulnerability scans.\nupvoted 2 times"}], "answer": "N"}, {"id": 441, "question": "A security analyst identifies a device on which different malware was detected multiple times even after the systems were scanned and cleaned\nseveral times. Which of the following actions would be most effective to ensure the device does not have residual malware?", "options": [{"letter": "A", "text": "Update the device and scan offline in safe mode."}, {"letter": "B", "text": "Replace the hard drive and reimage the device."}, {"letter": "C", "text": "Upgrade the device to the latest OS version."}, {"letter": "D", "text": "Download a secondary scanner and rescan the device.\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  HeatSquad77 3 months ago\nSelected Answer: B\nThe most effective action to ensure the device does not have residual malware is B. Replace the hard drive and reimage the device.\nExplanation:\nWhen a device continues to detect different malware (or variants) repeatedly despite multiple scans and cleanings, it strongly indicates persistent\ninfection that evades standard removal methods. Common culprits include:\nRootkits (kernel-level or bootkit persistence)\nFirmware-level malware (e.g., in UEFI/BIOS)\nMaster boot record (MBR) infections\nRegistry/run keys or scheduled tasks that reinstall malware\nFileless or memory-resident components that survive reboots/scans\nupvoted 1 times"}], "answer": "N"}, {"id": 442, "question": "A user is flagged for consistently consuming a high volume of network bandwidth over the past week. During the investigation, the security\nanalyst finds traffic to the following websites:\nWhich of the following data flows should the analyst investigate first?", "options": [{"letter": "A", "text": "netflix.com"}, {"letter": "B", "text": "youtube.com"}, {"letter": "C", "text": "tiktok.com"}, {"letter": "D", "text": "gmail.com"}, {"letter": "E", "text": on\nExplanation:\n• C. CVE details (Common Vulnerabilities and Exposures): These provide standardized identifiers and descriptions of known vulnerabilities. The\ninfrastructure team needs this information to understand which vulnerabilities a patch addresses, the severity, and urgency for remediation.\n• D. Baseline configuration: Helps the team determine what’s expected on a system, making it easier to detect deviations or missing patches. It’s\ncrucial for evaluating which systems are out of compliance and prioritizing patching.\nupvoted 1 times"}], "answer": "N"}, {"id": 445, "question": "Security analysts can review the Windows Registry on endpoints to get insights into:", "options": [{"letter": "A", "text": "domain account privileges."}, {"letter": "B", "text": "mandatory access control zones."}, {"letter": "C", "text": "system-critical configuration items."}, {"letter": "D", "text": "application and security event logs.\nCorrect Answer: C\nCommunity vote distribution\nC (88%)                        A (12%)\n  HeatSquad77 3 months ago\nSelected Answer: C\nExplanation:\nThe Windows Registry is a hierarchical database that stores low-level settings and configuration data for the operating system, installed applications,\nhardware devices, user preferences, and security-related policies on Windows endpoints.\nupvoted 1 times\n  Superash 9 months, 2 weeks ago\nSelected Answer: C\nNot A because account privilege from Active Directory\nupvoted 3 times\n  Nilab 9 months, 3 weeks ago\nSelected Answer: C\nI was about to go for D the realised that is event viewer ;0\nupvoted 3 times\n  Nilab 9 months, 3 weeks ago\nSelected Answer: A\nThe Windows Registry is a hierarchical database that stores low-level settings for the operating system and installed applications. It includes:\n• System configuration\n• Installed software and drivers\n• User profiles and settings\n• Startup processes\n• Network configurations\n• File associations\nThese are system-critical configuration items that can be reviewed for signs of misconfiguration, persistence mechanisms (used by malware), or\nunauthorized changes.\nupvoted 1 times"}], "answer": "N"}, {"id": 446, "question": "During an internal code review, software called “ACE” was discovered to have a vulnerability that allows the execution of arbitrary code. The\nvulnerability is in a legacy, third-party vendor resource that is used by the ACE software. ACE is used worldwide and is essential for many\nbusinesses in this industry. Developers informed the Chief Information Security Officer that removal of the vulnerability will take time. Which of the\nfollowing is the first action to take?", "options": [{"letter": "A", "text": "Look for potential IoCs in the company."}, {"letter": "B", "text": "Inform customers of the vulnerability."}, {"letter": "C", "text": "Remove the affected vendor resource from the ACE software."}, {"letter": "D", "text": "Develop a compensating control until the issue can be fixed permanently.\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  HeatSquad77 3 months ago\nSelected Answer: D\nThe first action to take is D. Develop a compensating control until the issue can be fixed permanently.\nExplanation:\nThis scenario involves a discovered vulnerability (arbitrary code execution) in a legacy third-party component within widely used, business-critical\nsoftware (\"ACE\"). The fix will take time, per the developers.\nIn vulnerability management and risk mitigation (core to CompTIA CySA+ CS0-003, Domain 2: Vulnerability Management and Domain 3: Security\nOperations), the priority when a permanent remediation (patch/code change) is delayed is to reduce risk immediately through interim measures.\nupvoted 1 times"}], "answer": "N"}, {"id": 447, "question": "An analyst notices that logs contain multiple events for computer account changes during monthly patch maintenance windows, resulting in a\nflood of tickets. The events generated are from the same system and time frame. The analyst determines that these tickets could be closed\nwithout human interaction. Which of the following is the best tool for automatically closing tickets containing the same information?", "options": [{"letter": "A", "text": "SOAR"}, {"letter": "B", "text": "EDR"}, {"letter": "C", "text": "CASB"}, {"letter": "D", "text": "SIEM\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  HeatSquad77 3 months ago\nSelected Answer: A\nExplanation:\nThe scenario describes benign, expected events (computer account changes during scheduled monthly patch maintenance windows) from the same\nsystem and same time frame, generating duplicate/flooded tickets that can be safely closed without human review. This is a classic case of known\nbenign noise or false positive suppression that needs automated handling to reduce analyst fatigue and ticket backlog.\nupvoted 1 times\n  Nilab 9 months, 3 weeks ago\nSelected Answer: A\nSOAR chatgpt\nupvoted 1 times"}], "answer": "N"}, {"id": 448, "question": "A security administrator is tasked with modifying the vulnerability scan process to reduce the network traffic but maintain thorough checks. Which\nof the following scanning approaches should be implemented?", "options": [{"letter": "A", "text": "Credentialed scans"}, {"letter": "B", "text": "Individual scans"}, {"letter": "C", "text": "Security baseline scans"}, {"letter": "D", "text": "Agent-based scans\nCorrect Answer: D\nCommunity vote distribution\nD (88%)                         A (12%)\n  HeatSquad77 3 months ago\nSelected Answer: D\nThe most appropriate scanning approach to implement is D. Agent-based scans.\nExplanation:\nAgent-based scans install lightweight software agents directly on the target endpoints (servers, workstations, etc.).\nupvoted 1 times\n  2d3d7b4 5 months, 2 weeks ago\nSelected Answer: D\nAgent-based systems will take up less bandwidth.\nupvoted 2 times\n  azuredemo2022three 7 months, 1 week ago\nSelected Answer: D\nAgent-based scanning installs a lightweight agent on each host that performs local vulnerability checks and then reports results back — this\ndrastically cuts the amount of network scanning traffic while still giving deep, thorough visibility (local file/config checks, installed software, patch\nstatus).\nupvoted 2 times\n  Kakster 7 months, 2 weeks ago\nSelected Answer: D\nThe questions states they want to reduce the network traffic. Credentialed scans do NOT reduce network traffic. Agent-based scans can conduct\nthorough scans AND reduce network traffic.\nupvoted 2 times\n  0af9954 8 months, 1 week ago\nSelected Answer: A\ncredential\nupvoted 1 times\n  Kakster 7 months, 2 weeks ago\nCredentialed scans do NOT reduce network traffic. Agent-based scans can conduct thorough scans AND reduce network traffic.\nupvoted 1 times"}], "answer": "N"}, {"id": 449, "question": "A red team engineer discovers that analyzing multiple pieces of less sensitive public information results in knowledge of a sensitive piece of\nconfidential information. Which of the following best describes this security issue?", "options": [{"letter": "A", "text": "Inference"}, {"letter": "B", "text": "Stored procedure"}, {"letter": "C", "text": "Aggregation"}, {"letter": "D", "text": "Cross-origin resource sharing\nCorrect Answer: A\nCommunity vote distribution\nA (83%)                            C (17%)\n  JayWeston Highly Voted  10 months ago\nThe key concept is \"analyzing multiple pieces of less sensitive\" data.\nAggregation – involves combining data.\nInference - involved the ability to deduce data.\nInference is more like noticing the Pentagon is ordering a lot of pizzas at 10pm and deducing that they are monitoring a over seas mission.\nupvoted 6 times\n  HeatSquad77 Most Recent  3 months ago\nSelected Answer: A\nExplanation:\nInference (or inference attack) occurs when an attacker (here, a red team engineer) deduces or derives sensitive/confidential information by\nanalyzing and combining multiple pieces of non-sensitive or public/less-sensitive data.\nupvoted 1 times\n  Karl2011 3 months, 1 week ago\nSelected Answer: C\nAggregation is taking less sensitive items and when combined it becomes highly sensitive. this describes whats happening here. Inference is making\na \"educated guess\" from something you observed but does not MEAN such is happening\nupvoted 1 times\n  Zeydose 5 months, 1 week ago\nSelected Answer: A\nAfter some digging, I believe the answer is A. Inference is the combination of data that was AGGREGATED to come to a Inference, in this case a new\npiece of sensitive information. Aggregation happens before Inference.\nupvoted 2 times\n  Justheretolook 1 year ago\nSelected Answer: A\nThe correct answer is: A. Inference\nExplanation:\n• Inference refers to the ability to deduce sensitive or confidential information by analyzing multiple pieces of less sensitive or public information. It’s\na common issue in information security and privacy, where data that seems harmless on its own can lead to unintended disclosure when combined.\nWhy not the others?\n• B. Stored procedure – A database object; unrelated to data leakage via analysis.\n• C. Aggregation – Similar but distinct; it involves combining data to produce sensitive information, whereas inference involves deducing sensitive\ndata indirectly.\n• D. Cross-origin resource sharing (CORS) – A web security feature that governs resource sharing across domains; unrelated to deducing sensitive\ninfo from public data.\nupvoted 2 times\n  JayWeston 10 months ago\nYour definition of aggregation is spot on and explains why the answer should be aggregation and not inference.\nupvoted 2 times"}], "answer": "N"}, {"id": 450, "question": "A group of hacktivists has breached and exfiltrated data from several of a bank’s competitors. Given the following network log output:\nWhich of the following represents the greatest concerns with regard to potential data exfiltration? (Choose two.)", "options": [{"letter": "A", "text": "1"}, {"letter": "B", "text": "2"}, {"letter": "C", "text": "3"}, {"letter": "D", "text": "4"}, {"letter": "E", "text": "5"}, {"letter": "F", "text": "6"}, {"letter": "G", "text": "7\nCorrect Answer: DG\nCommunity vote distribution\nDG (100%)\n  Katie123456 1 month ago\nSelected Answer: DG\nAT FIRST I THOUGHT IT WAS SMB BUT LOOKING AT THE IP'S THE SMB TRANSFER IS FROM 172.X.X.X TO 172.X.X.X SO THIS TRANSFER IS INTERNAL\nBUT THE HTTPS IS INTERNAL TO EXTERNAL SO THATS THE INSECURE ONE\nupvoted 1 times\n  1f2b013 5 months, 2 weeks ago\nSelected Answer: DG\nD is connection to an external ip and G is using insecure transfer protocol.\nupvoted 2 times"}], "answer": "N"}, {"id": 451, "question": "A security analyst notices multiple attempts of the same exploit being made on the perimeter network. The behavioral patterns indicate that a TCP\nSYN flood attack has been initiated, followed by a port scan of the company's public IP range. No other attacks are being performed from the\nactor's source IP address. All of the SYN flood attempts were thwarted by the firewall's stateful packet inspection engine. Which of the following\nis the most likely type of threat actor in this scenario?", "options": [{"letter": "A", "text": "Nation-state"}, {"letter": "B", "text": "Script kiddie"}, {"letter": "C", "text": "Advanced persistent threat"}, {"letter": "D", "text": "Organized crime\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  HeatSquad77 3 months ago\nSelected Answer: B\nThe most likely type of threat actor in this scenario is B. Script kiddie.\nThis scenario describes a very basic, noisy, and unsophisticated attack sequence: a TCP SYN flood (a classic, easy-to-launch volumetric DoS attack\nusing tools like hping3 or LOIC) followed immediately by a port scan of the public IP range. The attacks come from a single source IP, no evasion\ntechniques are used, the SYN flood fails against standard stateful inspection (as expected from basic mitigation), and nothing more advanced or\ntargeted follows—no exploitation of discovered ports, no lateral movement, no persistence, no data exfiltration, and no attempts to hide the source\nupvoted 1 times"}], "answer": "N"}, {"id": 452, "question": "SIMULATION\n-\nApproximately 100 employees at your company have received a phishing email. As a security analyst, you have been tasked with handling this\nsituation.\nINSTRUCTIONS\n-\nReview the information provided and determine the following:\n1. How many employees clicked on the link in the phishing email?\n2. On how many workstations was the malware installed?\n3. What is the executable file name of the malware?\nIf at any time you would like to bring back the initial state of the simulation. please click the Reset All button.\nCorrect Answer:\n  willyww Highly Voted  10 months, 1 week ago\nplease a need an expert to help me with this question!!\nupvoted 8 times\n  CyberKing_850 7 months, 1 week ago\nHow did you do? Don't mind the name I'm a rookie looking for guidance and I'm thoroughly confused. Need guidance on how to analyze the data.\nupvoted 1 times\n  Timmytimmy Most Recent  1 month ago\nI found a link to the same question CS0-002 https://www.examtopics.com/discussions/comptia/view/80474-exam-cs0-002-topic-1-question-28-\ndiscussion/\nIt actually shows the email, saying to download the mail client and gives a link. If you hover on the link, it apparently shows it as the chzweb address.\nSo people who are saying the answer is 7 visited and 4 downloaded \"mailclient.exe\" seem to be right. If the picture of the email were here, this\nwouldn't have been hard at all.\nupvoted 1 times\n  datmatt 2 months, 1 week ago\nfirst log shows 100 emails came in from 4:00 - 4:01. Second log shows 7 IPs visited the chz.talapia site. Third log shows that 4 of those IPs that\nvisited started mailclient.exe exactly 30 seconds after.\nupvoted 1 times\n  6f9c9e3 6 months, 2 weeks ago\nSeems malware is mailclient.exe\n4 eviews a web server for XSS and runs the following Nmap scan:\nWhich of the following most accurately describes the result of the scan?", "options": [{"letter": "A", "text": "An output of characters > and \" as the parameters used in the attempt"}, {"letter": "B", "text": "The vulnerable parameter ID and unfiltered characters returned"}, {"letter": "C", "text": "The vulnerable parameter ID and unfiltered or encoded characters passed > and \" as unsafe"}, {"letter": "D", "text": "The vulnerable parameter ID with a SQL Injection attempt\nCorrect Answer: B\nCommunity vote distribution\nC (86%)                      B (14%)\n  milo34 2 months ago\nSelected Answer: B\nif i may ask, whay is this c and not b? those charachers are not encoded?\nupvoted 1 times\n  Nilab 9 months, 3 weeks ago\nSelected Answer: C\nThe question is repeated.. C is correct\nupvoted 2 times\n  libm2 10 months, 2 weeks ago\nSelected Answer: C\nits correct\nupvoted 4 times"}], "answer": "N"}, {"id": 455, "question": "A security analyst has just received an incident ticket regarding a ransomware attack. Which of the following would most likely help an analyst\nproperly triage the ticket?", "options": [{"letter": "A", "text": "Incident response plan"}, {"letter": "B", "text": "Lessons learned"}, {"letter": "C", "text": "Playbook"}, {"letter": "D", "text": "Tabletop exercise\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  HeatSquad77 3 months ago\nSelected Answer: C\nPlaybooks are tactical, step-by-step guides specifically designed for particular incident types (e.g., ransomware). They provide immediate, actionable\nprocedures for triage: initial assessment, classification of severity, containment steps (like isolating affected systems), evidence collection,\nnotification thresholds, and escalation paths. This enables fast, consistent decision-making during time-sensitive events like ransomware, where\nrapid triage can limit encryption spread and data loss.\nupvoted 1 times"}], "answer": "N"}, {"id": 456, "question": "Which of the following is the best authentication method to secure access to sensitive data?", "options": [{"letter": "A", "text": "An assigned device that generates a randomized code for log-in"}, {"letter": "B", "text": "Biometrics and a device with a personalized code for log-in"}, {"letter": "C", "text": "Alphanumeric/special character username and passphrase for log-in"}, {"letter": "D", "text": "A one-time code received by email and push authorization for log-in\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  HeatSquad77 3 months ago\nSelected Answer: B\nThis option represents the strongest form of multi-factor authentication (MFA) among the choices, combining two distinct factors:\nSomething you are — Biometrics (e.g., fingerprint, facial recognition, iris scan), which is unique to the individual and difficult to forge or steal\nremotely.\nSomething you have — A device (likely a hardware token, smart card, or dedicated authenticator) that generates a personalized code (such as a time-\nbased one-time password/TOTP or challenge-response code).\nupvoted 1 times\n  Nilab 9 months, 3 weeks ago\nSelected Answer: B\nBiometrics and a device with a personalized code for log-in\nupvoted 2 times\n  ash455 11 months, 1 week ago\nSelected Answer: B\nB makes sense\nupvoted 2 times\n  ybyttv 11 months, 2 weeks ago\nSelected Answer: B\nMFA: Something you have + something you know\nupvoted 3 times"}], "answer": "N"}, {"id": 457, "question": "A security analyst runs the following command:\nWhich of the following should the analyst recommend first to harden the system?", "options": [{"letter": "A", "text": "Disable all protocols that do not use encryption."}, {"letter": "B", "text": "Configure client certificates for domain services."}, {"letter": "C", "text": "Ensure that this system is behind a NGFW."}, {"letter": "D", "text": "Deploy a publicly trusted root CA for secure websites.\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  HeatSquad77 3 months ago\nSelected Answer: A\nThe analyst should recommend first: A. Disable all protocols that do not use encryption.\nThe Nmap scan output shows:\n23/tcp open telnet — Telnet is a plaintext protocol that transmits data (including credentials) in clear text, making it highly vulnerable to\neavesdropping, man-in-the-middle (MITM) attacks, credential sniffing, and replay attacks. This is a classic insecure service that should never be\nexposed, especially on an internal or perimeter-facing system.\n443/tcp open https — Encrypted (TLS), generally acceptable if properly configured.\n636/tcp open ldaps — Encrypted LDAP over SSL/TLS, also secure by default.\nupvoted 1 times"}], "answer": "N"}, {"id": 458, "question": "Which of the following is best suited for determining the methods of an adversary?", "options": [{"letter": "A", "text": "ОWASP"}, {"letter": "B", "text": "Cyber Kill Chain"}, {"letter": "C", "text": "MITRE ATT&CK"}, {"letter": "D", "text": "Diamond Model of Intrusion Analysis\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  HeatSquad77 3 months ago\nSelected Answer: C\nMITRE ATT&CK (Adversarial Tactics, Techniques, and Common Knowledge) is specifically designed as a comprehensive, real-world-derived\nknowledge base that catalogs adversary methods in detail — including specific tactics (why/what goal the adversary is pursuing), techniques (how\nthey achieve it), sub-techniques, and procedures (real-world examples of how groups implement them). It directly maps observed behaviors to known\nTTPs (Tactics, Techniques, and Procedures), making it the go-to framework for identifying, categorizing, and understanding the precise methods\nadversaries use across the attack lifecycle.\nupvoted 1 times"}], "answer": "N"}, {"id": 459, "question": "An organization adds an MSSP to supplement its security monitoring operations during weekends and holidays. Which of the following would best\ndemonstrate procurement value to the Chief Information Security Officer?", "options": [{"letter": "A", "text": "Stakeholder validation metrics"}, {"letter": "B", "text": "Mean time to respond"}, {"letter": "C", "text": "Alert volume"}, {"letter": "D", "text": "Number of escalations per week\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  HeatSquad77 3 months ago\nSelected Answer: B\nWhen an organization procures an MSSP specifically to supplement security monitoring during off-hours (weekends and holidays), the primary\nbusiness justification is to ensure rapid detection and response to incidents when internal staff coverage is limited or unavailable. This directly\naddresses risk reduction by minimizing the potential impact of threats that could otherwise go undetected or unaddressed for extended periods.\nupvoted 1 times\n  Nilab 9 months, 3 weeks ago\nSelected Answer: B\nMean time to respond\nupvoted 2 times"}], "answer": "N"}, {"id": 460, "question": "Which of the following explains the reason a security analyst would map an attack route?", "options": [{"letter": "A", "text": "To find critical paths that can be used to stop an adversary from advancing"}, {"letter": "B", "text": "To create an inventory of all IT assets to import into a database"}, {"letter": "C", "text": "To operationalize intelligence gathered from a previous step in the investigation"}, {"letter": "D", "text": "To categorize the tactics according to the MITRE ATT&CK framework\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  HeatSquad77 3 months ago\nSelected Answer: A\nThe correct answer is A. To find critical paths that can be used to stop an adversary from advancing.\nMapping an attack route (also called attack path mapping, attack graph, or chaining attack steps) is a key activity in incident response, threat hunting,\nand defensive operations. The primary purpose is to visualize and analyze how an adversary could (or did) move through the environment—from initial\naccess to lateral movement, privilege escalation, persistence, exfiltration, or impact.\nupvoted 1 times"}], "answer": "N"}, {"id": 461, "question": "The most recent vulnerability scan results show the following:\nThe vulnerability team learned the following from the asset owners:\n• Server HQFIN01 is a financial transaction database server used in the company's largest business unit.\n• Server HQADMIN02 is utilized by an end user with administrator privileges to several critical applications.\n• No compensating controls exist for either issue.\nWhich of the following would the vulnerability team most likely do to determine remediation prioritization?", "options": [{"letter": "A", "text": "Review the BCP and prioritize the remediation of the asset that would take more time to bring online for operational use."}, {"letter": "B", "text": "Contact the network and desktop engineering teams to discuss prioritizing the asset that is faster to remediate."}, {"letter": "C", "text": "Reference the BIA to determine the value designation and prioritize vulnerability remediation of the more critical asset."}, {"letter": "D", "text": "Identify the network placement and configuration of each asset, then prioritize the asset with the least recent backups.\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  HeatSquad77 3 months ago\nSelected Answer: C\nThe vulnerability team would most likely do: C. Reference the BIA to determine the value designation and prioritize vulnerability remediation of the\nmore critical asset.\nIn vulnerability management (a core CySA+ CS0-003 Domain 2 topic), remediation prioritization goes beyond just CVSS scores or exploitability. When\nno compensating controls exist and multiple assets are affected, teams must incorporate business context and asset criticality to focus limited\nresources on the highest-risk items to the organization.\nupvoted 1 times\n  3be4e12 9 months, 1 week ago\nSelected Answer: C"}, {"letter": "C", "text": "Reference the BIA to determine the value designation and prioritize vulnerability remediation of the more critical asset.\nWhy?\nA Business Impact Analysis (BIA) helps determine the criticality of assets based on their role in business operations.\nSince HQFIN01 supports financial transactions in the company’s largest business unit, it likely has a higher business impact than HQADMIN02.\nPrioritizing based on business value and operational impact ensures the most critical systems are protected first.\nWhy not the others?"}, {"letter": "A", "text": "Review the BCP: BCP focuses on recovery, not prioritization of remediation."}, {"letter": "B", "text": "Contact engineering teams: Speed of remediation is useful but doesn’t address business impact."}, {"letter": "D", "text": "Identify network placement and backups: Important for recovery planning, but not for prioritizing based on business criticality.\nupvoted 2 times"}], "answer": "N"}, {"id": 462, "question": "A company’s policy is to follow NIST standards and use strong encryption to avoid disclosure of sensitive information in transit between any\nsystems. An analyst reviews a lab web server and receives the following outputs:\nWhich of the following should the analyst identify as the most concerning?", "options": [{"letter": "A", "text": "TLS 1.0 is enabled."}, {"letter": "B", "text": "The certificate is self-signed."}, {"letter": "C", "text": "SSLv3 is disabled."}, {"letter": "D", "text": "TLS 1.3 is not widely supported."}, {"letter": "E", "text": "TLS compression is disabled.\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  3be4e12 9 months, 1 week ago\nSelected Answer: A\nCorrect Answer: A. TLS 1.0 is enabled.\nWhy this is most concerning:\nTLS 1.0 and 1.1 are deprecated by NIST and major standards bodies due to known vulnerabilities and lack of support for modern cryptographic\nalgorithms.\nTheir presence violates NIST SP 800-52 Rev. 2, which mandates the use of TLS 1.2 or higher for secure communications.\nKeeping these protocols enabled increases the risk of downgrade attacks and weak cipher usage.\nWhy not the others?"}, {"letter": "B", "text": "The certificate is self-signed: Not ideal for production, but acceptable in a lab or internal test environment."}, {"letter": "C", "text": "SSLv3 is disabled: This is good—SSLv3 is obsolete and insecure."}, {"letter": "D", "text": "TLS 1.3 is not widely supported: While TLS 1.3 is preferred, TLS 1.2 is still compliant and widely used."}, {"letter": "E", "text": "TLS compression is disabled: This is a security best practice to prevent CRIME attacks.\nupvoted 4 times\n  jiggu12 9 months, 2 weeks ago\nSelected Answer: A\nit is like that\nupvoted 3 times"}], "answer": "N"}, {"id": 463, "question": "The Chief Information Security Officer wants the same level of security to be present whether a remote worker logs in at home or at a coffee shop.\nWhich of the following should be recommended as a starting point?", "options": [{"letter": "A", "text": "Non-persistent virtual desktop infrastructures"}, {"letter": "B", "text": "Passwordless authentication"}, {"letter": "C", "text": "Standard-issue laptops"}, {"letter": "D", "text": "Serverless workloads\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  HeatSquad77 3 months ago\nSelected Answer: A\nThe recommended starting point is A. Non-persistent virtual desktop infrastructures.\nTo achieve the same level of security for remote workers regardless of location (home, coffee shop, or any untrusted network), non-persistent VDI\n(Virtual Desktop Infrastructure) is the strongest and most direct approach\nupvoted 1 times\n  3be4e12 9 months, 1 week ago\nSelected Answer: A"}, {"letter": "A", "text": "Non-persistent virtual desktop infrastructures (VDI)\nHere's why:\nNon-persistent VDI provides a secure, centrally managed desktop environment that resets after each session.\nIt ensures no sensitive data is stored locally, reducing risk if the device is compromised.\nSecurity policies, patches, and access controls are uniformly enforced, regardless of where the user logs in.\nIt supports network segmentation and monitoring, helping detect and contain threats.\nWhy not the others?"}, {"letter": "B", "text": "Passwordless authentication: Improves login security but doesn’t address broader endpoint or session risks."}, {"letter": "C", "text": "Standard-issue laptops: Helps with hardware consistency but doesn’t guarantee secure environments across networks."}, {"letter": "D", "text": "Serverless workloads: Relevant to application architecture, not endpoint security for remote users.\nupvoted 2 times"}], "answer": "N"}, {"id": 464, "question": "A report contains IoC and TTP information for a zero-day exploit that leverages vulnerabilities in a specific version of a web application. Which of\nthe following actions should a SOC analyst take first after receiving the report?", "options": [{"letter": "A", "text": "Implement a vulnerability scan to determine whether the environment is at risk."}, {"letter": "B", "text": "Block the IP addresses and domains from the report in the web proxy and firewalls."}, {"letter": "C", "text": "Verify whether the information is relevant to the organization."}, {"letter": "D", "text": "Analyze the web application logs to identify any suspicious or malicious activity.\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  HeatSquad77 3 months ago\nSelected Answer: C\nThe correct answer is C. Verify whether the information is relevant to the organization.\nIn a real-world SOC workflow (and as emphasized in CompTIA CySA+ CS0-003 Domain 3 – Incident Response and Management), the very first step\nwhen receiving any external threat intelligence report—especially one containing IoCs and TTPs for a zero-day exploit—is to assess relevance to your\nspecific environment before taking any resource-intensive or potentially disruptive actions.\nupvoted 1 times\n  3be4e12 9 months, 1 week ago\nSelected Answer: C\nVerify whether the information is relevant to the organization.\nHere's why:\nZero-day exploits are highly targeted and may not affect all environments.\nBefore taking action, the analyst must validate whether the vulnerable web application version exists in the organization’s infrastructure.\nThis ensures that resources are focused on real threats, not theoretical ones.\nWhy not the others (as a first step)?"}, {"letter": "A", "text": "Implement a vulnerability scan: Useful, but only after confirming relevance. Scanning blindly may waste time or miss the specific exploit."}, {"letter": "B", "text": "Block IPs/domains: Premature unless the IoCs are confirmed to be active and relevant."}, {"letter": "D", "text": "Analyze logs: Important for detection, but only after confirming the application is in use and potentially exposed.\nupvoted 1 times"}], "answer": "N"}, {"id": 465, "question": "After updating the email client to the latest patch, only about 15% of the workforce is able to use email. Windows 10 users do not experience\nissues, but Windows 11 users have constant issues. Which of the following did the change management team fail to do?", "options": [{"letter": "A", "text": "Implementation"}, {"letter": "B", "text": "Testing"}, {"letter": "C", "text": "Rollback"}, {"letter": "D", "text": "Validation\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  HeatSquad77 3 months ago\nSelected Answer: B\nThe change management team failed to do: B. Testing.\nThe scenario describes a classic change management failure where a patch was deployed to production without adequate pre-deployment testing in\na representative environment.\nKey indicators:\nThe patch applied successfully (implementation occurred).\nOnly Windows 11 users are affected → Windows 10 users are fine.\nThis points to an OS-specific compatibility/regression issue with the email client patch on Windows 11 that was not caught beforehand.\nupvoted 1 times\n  Nilab 9 months, 3 weeks ago\nSelected Answer: B\nTesting is the correct answer\nupvoted 1 times"}], "answer": "N"}, {"id": 466, "question": "Which of the following does a security policy do?", "options": [{"letter": "A", "text": "Establishes a cost model for security activity"}, {"letter": "B", "text": "Identifies and clarifies security goals and objectives"}, {"letter": "C", "text": "Enables management to define system access rules"}, {"letter": "D", "text": "Allows management to define system recovery requirements\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  HeatSquad77 3 months ago\nSelected Answer: B\nThe correct answer is B. Identifies and clarifies security goals and objectives.\nA security policy is a high-level, formal document that defines the organization's overall approach to information security. Its primary purpose is to:\nEstablish the security goals and objectives of the organization.\nCommunicate management's commitment to protecting information assets.\nSet the strategic direction and guiding principles for security across the enterprise.\nProvide a foundation for more detailed procedures, standards, guidelines, and controls.\nupvoted 1 times\n  3be4e12 9 months, 1 week ago\nSelected Answer: B"}, {"letter": "B", "text": "Identifies and clarifies security goals and objectives\nA security policy is a formal document that:\nDefines the organization's security goals and objectives\nEstablishes rules and expectations for protecting assets\nGuides decision-making for security controls and procedures\nCommunicates responsibilities to employees and stakeholders\nWhy the other options are incorrect:"}, {"letter": "A", "text": "Establishes a cost model for security activity: That’s typically part of budgeting or financial planning, not a security policy."}, {"letter": "C", "text": "Enables management to define system access rules: This is done through access control policies, which are subsets of a broader security policy."}, {"letter": "D", "text": "Allows management to define system recovery requirements: That’s covered in disaster recovery plans or BCP, not the general security policy.\nupvoted 1 times"}], "answer": "N"}, {"id": 467, "question": "A vulnerability scan shows the following vulnerabilities in the environment:\nAt the same time, the following security advisory was released:\n\"A zero-day vulnerability with a CVSS score of 10 may be affecting your web server. The vendor is working on a patch or workaround.\"\nWhich of the following actions should the security analyst take first?", "options": [{"letter": "A", "text": "Contact the web systems administrator and request that they shut down the asset."}, {"letter": "B", "text": "Monitor the patch releases for all items and escalate patching to the appropriate team."}, {"letter": "C", "text": "Run the vulnerability scan again to verify the presence of the critical finding and the zero-day vulnerability in the environment."}, {"letter": "D", "text": "Forward the advisory to the web security team and initiate the prioritization strategy for the other vulnerabilities.\nCorrect Answer: C\nCommunity vote distribution\nD (88%)                          C (12%)\n  huffery Highly Voted  10 months, 4 weeks ago\nSelected Answer: D\nThe zero-day vulnerability is critical and high severity (CVSS 10), but the patch is not yet available.\nImmediate shutdown of the web server (Option A) may cause significant disruption and should be a last resort.\nMonitoring patch releases and escalating patching (Option B) is important, but the first step is to inform the relevant team so they can plan mitigation\nand prioritize.\nRunning another vulnerability scan (Option C) may not detect a zero-day yet because it’s newly disclosed.\nTherefore, the best immediate action is to:\nInform the web security team about the zero-day.\nStart prioritizing other known critical vulnerabilities (like storage server and firewall) which can be remediated immediately.\nupvoted 7 times\n  3be4e12 9 months, 1 week ago\nZero-day vulnerabilities often cannot be detected by scanners immediately, so re-scanning (Option C) may not yield useful results.\nCySA+ emphasizes communication, coordination, and prioritization—forwarding the advisory ensures the right team is informed and can begin\nmitigation or monitoring.\nSimultaneously, prioritizing known critical vulnerabilities (like the storage server and firewall) aligns with best practices in vulnerability\nmanagement and risk reduction.\nupvoted 2 times\n  3be4e12 Most Recent  9 months, 1 week ago\nSelected Answer: C"}, {"letter": "A", "text": "Contact the web systems administrator and request shutdown: Premature without confirmation. Could disrupt operations unnecessarily."}, {"letter": "B", "text": "Monitor patch releases and escalate: Important, but not the first step. You need to confirm the vulnerability exists first."}, {"letter": "D", "text": "Forward the advisory and initiate prioritization: Also useful, but again, verification should come first to guide prioritization.\nupvoted 1 times"}], "answer": "N"}, {"id": 468, "question": "Which of the following threat-hunting concepts is most concerned with identifying the behaviors of the bad actor?", "options": [{"letter": "A", "text": "Threat intelligence sharing"}, {"letter": "B", "text": "Indicators of compromise"}, {"letter": "C", "text": "Insider threat analysis"}, {"letter": "D", "text": "Tactics, techniques, and procedures\nCorrect Answer: B\nCommunity vote distribution\nD (100%)\n  ybyttv 11 months, 2 weeks ago\nSelected Answer: D\nThe TTP specify the bad behavior\nupvoted 4 times\n  Mikeymick 11 months, 2 weeks ago\nDis the right anseer\nupvoted 1 times"}], "answer": "N"}, {"id": 469, "question": "Which of the following best explains the importance of playbooks for incident response teams?", "options": [{"letter": "A", "text": "Playbooks define compliance controls and help keep the monitoring process that is in place fully aligned with regulatory requirements as\ndesigned by international rules."}, {"letter": "B", "text": "Playbooks help implement mitigation controls to prevent the occurrence of incidents in accordance with internal policies and procedures as\ndesigned by the IT team."}, {"letter": "C", "text": "Playbooks set baseline requirements that are implemented before incidents happen to ensure the proper monitoring process in order to\ncollect metrics and KPIs that will be used for lessons-learned procedures after a postmortem analysis."}, {"letter": "D", "text": "Playbooks help minimize negative impacts and restore data, systems, and operations through highly detailed, preplanned procedures that\nwill be followed when particular types of incidents occur.\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  HeatSquad77 3 months ago\nSelected Answer: D\nThe correct answer is D. Playbooks help minimize negative impacts and restore data, systems, and operations through highly detailed, preplanned\nprocedures that will be followed when particular types of incidents occur.\nExplanation:\nIn incident response (especially per CompTIA CySA+ CS0-003, NIST SP 800-61, and modern SOC/MDR practices), playbooks are tactical, step-by-step,\nincident-type-specific guides designed for use during an active incident. Their primary importance is to enable fast, consistent, repeatable, and\neffective response\nupvoted 1 times\n  Nilab 9 months, 3 weeks ago\nSelected Answer: D\nIncident response playbooks are crucial tools used by response teams to:\n• Standardize the response process for specific types of incidents (e.g., ransomware, phishing, DDoS).\n• Minimize downtime and damage by enabling quick and coordinated action.\n• Ensure nothing critical is missed under pressure.\n• Provide step-by-step instructions tailored to the nature of the threat.\nThey are highly detailed and preplanned, which allows teams to react quickly and consistently, rather than improvising during high-stress situations.\nupvoted 3 times"}], "answer": "N"}, {"id": 470, "question": "Alerts from the security dashboard are reporting a cloud-based host is suspected to be corrupt. The OS is not loading. The initial investigation\nconcludes that the OS files were modified. Which of the following security controls provided the report?", "options": [{"letter": "A", "text": "FIM"}, {"letter": "B", "text": "DLP"}, {"letter": "C", "text": "NIDS"}, {"letter": "D", "text": "API gateway\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  Obichampagne 2 months ago\nSelected Answer: A\nPay attention to this phrase: The initial investigation concludes that the OS files were modified. File Integrity Monitoring\nupvoted 2 times\n  HeatSquad77 3 months ago\nSelected Answer: A\nThe security control that provided the report is A. FIM.\nFile Integrity Monitoring (FIM) is specifically designed to detect unauthorized or unexpected changes (modifications, additions, deletions) to critical\nfiles, including operating system files, binaries, configuration files, and other system components.\nIn this scenario:\nA cloud-based host is suspected to be corrupt.\nThe OS is not loading (boot failure often results from corrupted/tampered system files).\nInitial investigation confirms OS files were modified.\nupvoted 1 times\n  Nilab 9 months, 3 weeks ago\nSelected Answer: A\nFIM The correct answer\nupvoted 1 times\n  Tenten87 11 months ago\nSelected Answer: A"}, {"letter": "A", "text": "FIM (File Integrity Monitoring)\nupvoted 1 times"}], "answer": "N"}, {"id": 471, "question": "A company received a shipment of new network switches. Immediately after installing the switches, a security analyst notices suspicious traffic\ncoming from one of the new switches. Which of the following best describes the threat actor?", "options": [{"letter": "A", "text": "Insider threat"}, {"letter": "B", "text": "Supply chain"}, {"letter": "C", "text": "Nation-state"}, {"letter": "D", "text": "Organized crime\nCorrect Answer: B\nCommunity vote distribution\nB (50%)                         C (50%)\n  HeatSquad77 3 months ago\nSelected Answer: B"}, {"letter": "B", "text": "Supply chain\nExplanation:\nSince the suspicious traffic started immediately after installing new switches, it suggests the devices were compromised before arriving at the\norganization.\nThis points to a supply chain attack, where malicious code or hardware modifications are inserted during manufacturing, shipping, or distribution.\nupvoted 1 times\n  SecOps3 5 months, 1 week ago\nSelected Answer: C\n'describes the threat actor' not the kind of attack\nupvoted 1 times"}], "answer": "N"}, {"id": 472, "question": "Which of the following best describes the benefit of implementing a PAM solution?", "options": [{"letter": "A", "text": "Measuring and validating the integrity of the database"}, {"letter": "B", "text": "Controlling and monitoring the use of administrative accounts"}, {"letter": "C", "text": "Storing and protecting PKI certificate private keys"}, {"letter": "D", "text": "Configuring and enforcing password complexity requirements\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  HeatSquad77 3 months ago\nSelected Answer: B"}, {"letter": "B", "text": "Controlling and monitoring the use of administrative accounts\nExplanation:\nA Privileged Access Management (PAM) solution is specifically designed to:\nSecure privileged (admin/root) accounts\nControl who can use them\nMonitor and record privileged sessions\nEnforce least privilege\nRotate and vault privileged credentials\nPAM reduces the risk of credential abuse and limits damage from compromised admin accounts.\nupvoted 1 times\n  bes_i 5 months, 3 weeks ago\nSelected Answer: B\n-----------------B\nupvoted 2 times\n  Shawn100 9 months, 1 week ago\nSelected Answer: B\nPAM (Privileged Access Management)\nPAM is a cybersecurity strategy and set of technologies for protecting an organization's critical assets from unauthorized access. The core idea is to\nsecure, manage, and monitor privileged accounts. These are accounts with elevated permissions, like administrator or root accounts, that can access\nsensitive systems, data, and applications. Think of it as a digital vault for your most powerful keys.\nupvoted 3 times\n  JayWeston 10 months ago\nSelected Answer: B\nThis question is the worse. In Linux PAM can be used to set password complexity requirements (D), but more broadly it is used for monitoring and\ncontrolling accounts (B). I am guessing that the answer is B.\nupvoted 2 times"}], "answer": "N"}, {"id": 473, "question": "Several users received a phishing email containing a malicious file that bypassed the organization’s email security tool. Based on the SIEM logs,\nusers did not open the file within the environment. In which of the following phases of the MITRE ATT&CK framework was the attack stopped?", "options": [{"letter": "A", "text": "Lateral movement"}, {"letter": "B", "text": "Execution"}, {"letter": "C", "text": "Initial access"}, {"letter": "D", "text": "Discovery\nCorrect Answer: B\nCommunity vote distribution\nB (67%)                          C (33%)\n  HeatSquad77 3 months ago\nSelected Answer: B"}, {"letter": "B", "text": "Execution\nExplanation:\nLet’s break down what happened:\nA phishing email with a malicious attachment was delivered.\nThe email security tool failed to block it.\nUsers did not open the file.\nTherefore, the malicious payload was never run.\nupvoted 1 times\n  FernandaCampelo 3 months, 2 weeks ago\nSelected Answer: B\nThe phishing email successfully reached users, so the attempt at Initial Access occurred. However, no user opened or ran the malicious file,\naccording to the SIEM logs. Since the payload was never executed, the attacker never progressed beyond that point.\nupvoted 2 times\n  rhino1596 4 months, 4 weeks ago\nSelected Answer: B\nExecution\nupvoted 2 times\n  Brittle 5 months, 2 weeks ago\nSelected Answer: B\nPhishing email delivered → This means the attacker successfully attempted Initial Acces
