365, "question": "A company was able to reduce triage time by focusing on historical trend analysis. The business partnered with the security team to achieve a\n50% reduction in phishing attempts year over year. Which of the following action plans led to this reduced triage time?", "options": [{"letter": "A", "text": "Patching"}, {"letter": "B", "text": "Configuration management"}, {"letter": "C", "text": "Awareness, education, and training"}, {"letter": "D", "text": "Threat modeling\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  ada26b1 Highly Voted  1 year, 1 month ago\nSelected Answer: C\nAwareness, education, and training\nBy focusing on historical trend analysis and partnering with the security team, the company likely implemented a targeted effort to raise awareness\namong employees about phishing attempts. This could include educating employees on how to identify phishing emails, recognizing suspicious links,\nand responding appropriately to such threats.\nupvoted 5 times"}], "answer": "N"}, {"id": 366, "question": "A security audit for unsecured network services was conducted, and the following output was generated:\nWhich of the following services should the security team investigate further? (Choose two.)", "options": [{"letter": "A", "text": "21"}, {"letter": "B", "text": "22"}, {"letter": "C", "text": "23"}, {"letter": "D", "text": "636"}, {"letter": "E", "text": "1723"}, {"letter": "F", "text": "3389\nCorrect Answer: CE\nCommunity vote distribution\nCE (100%)\n  Wolf541 Highly Voted  1 year, 4 months ago\nSelected Answer: CE\nI am not sure not why those ports are issues could someone please explain?\nupvoted 7 times\n  Popeyes_Chicken 1 year, 4 months ago\nPPTP (Point-to-Point Tunneling Protocol) is considered insecure because it uses weak encryption standards, outdated authentication methods like\nMS-CHAP. It's vulnerable to various attacks due to its outdated design, making it easy for adversaries to intercept and decrypt data transmitted\nthrough a PPTP connection.\nTelnet transmits data in cleartext, ssh should be used instead.\nupvoted 11 times"}], "answer": "N"}, {"id": 367, "question": "Several incidents have occurred with a legacy web application that has had little development work completed. Which of the following is the most\nlikely cause of the incidents?", "options": [{"letter": "A", "text": "Misconfigured web application firewall"}, {"letter": "B", "text": "Data integrity failure"}, {"letter": "C", "text": "Outdated libraries"}, {"letter": "D", "text": "Insufficient logging\nCorrect Answer: C\nCommunity vote distribution\nC (83%)                         A (17%)\n  ada26b1 Highly Voted  1 year, 1 month ago\nSelected Answer: C\nLegacy applications often rely on older versions of software libraries, frameworks, and components. These outdated libraries might have known\nvulnerabilities that could be exploited by attackers, especially if they are not patched or updated.\nupvoted 5 times\n  JayWeston Most Recent  10 months ago\nSelected Answer: A\nIf you just did some work on the waf why would you not assume that work involved some miss configurations\nupvoted 1 times"}], "answer": "N"}, {"id": 368, "question": "An incident response team is assessing attack vectors of malware that is encrypting data with ransomware. There are no indications of a network-\nbased intrusion. Which of the following is the most likely root cause of the incident?", "options": [{"letter": "A", "text": "USB drop"}, {"letter": "B", "text": "LFI"}, {"letter": "C", "text": "Cross-site forgery"}, {"letter": "D", "text": "SQL injection"}], "answer": "A"}, {"id": 369, "question": "Which of the following best explains the importance of the implementation of a secure software development life cycle in a company with an\ninternal development team?", "options": [{"letter": "A", "text": "Increases the product price by using the implementation as a piece of marketing"}, {"letter": "B", "text": "Decreases the risks of the software usage and complies with regulatory requirements"}, {"letter": "C", "text": "Improves the agile process and decreases the amount of tests before the final deployment"}, {"letter": "D", "text": "Transfers the responsibility for security flaws to the vulnerability management team\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  HeatSquad77 3 months ago\nSelected Answer: B\nA secure SDLC integrates security practices (e.g., threat modeling, secure coding standards, code reviews, static/dynamic analysis, security testing)\ninto every phase of the software development process—from requirements gathering through design, implementation, testing, deployment, and\nmaintenance. This \"shift-left\" approach identifies and mitigates vulnerabilities early, when they are cheapest and easiest to fix, significantly reducing\nthe overall risk of exploitable flaws in production software. It directly lowers the likelihood of security incidents, data breaches, unauthorized access,\nor other risks associated with using the developed software\nupvoted 1 times\n  helenwonderland 8 months, 2 weeks ago\nSelected Answer: B\nssdlc goal is to reduce risks such as vulnerabilities, data breaches, and exploitation.\nupvoted 1 times\n  isubsutton 11 months, 3 weeks ago\nSelected Answer: B\ndefinitely B\nupvoted 1 times"}], "answer": "N"}, {"id": 370, "question": "A security analyst needs to block vulnerable ports and disable legacy protocols. The analyst has ensured NetBIOS trio, Telnet, SMB, and TFTP are\nblocked and/or disabled. Which of the following additional protocols should the analyst block next?", "options": [{"letter": "A", "text": "LDAPS v3"}, {"letter": "B", "text": "SNMP v1"}, {"letter": "C", "text": "TLS 1.3"}, {"letter": "D", "text": "Kerberos v5\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  HeatSquad77 3 months ago\nSelected Answer: B\nThe correct answer is B. SNMP v1.\nThis question aligns with CompTIA CySA+ (CS0-003) objectives around disabling insecure/legacy protocols to reduce attack surface. The already-\nblocked items (NetBIOS trio on ports 137-139, Telnet on 23, SMBv1 on 445/139, and TFTP on 69) are classic insecure or legacy protocols with well-\nknown vulnerabilities like plaintext transmission, weak/no authentication, or remote code execution risks.\nupvoted 2 times\n  1574aa7 10 months, 1 week ago\nSelected Answer: B\nagree with user above SNMP v1 from the options is the outdated\nupvoted 3 times\n  noa808a 1 year, 1 month ago\nSelected Answer: B\nCorrect answer is B, as current SNMP version is v3.\nupvoted 4 times"}], "answer": "N"}, {"id": 371, "question": "A company is launching a new application in its internal network, where internal customers can communicate with the service desk. The security\nteam needs to ensure the application will be able to handle unexpected strings with anomalous formats without crashing. Which of the following\nprocesses is the most applicable for testing the application to find how it would behave in such a situation?", "options": [{"letter": "A", "text": "Fuzzing"}, {"letter": "B", "text": "Coding review"}, {"letter": "C", "text": "Debugging"}, {"letter": "D", "text": "Static analysis\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  Wolf541 Highly Voted  1 year, 4 months ago\nSelected Answer: A\nBy preforming fuzzing they will be able to test random inputs won't cause issues with the application.\nupvoted 7 times\n  HeatSquad77 Most Recent  3 months ago\nSelected Answer: A\nThe most applicable process for testing the application to see how it behaves when handling unexpected strings with anomalous formats (without\ncrashing) is A. Fuzzing.\nFuzzing (fuzz testing) is specifically designed for this scenario. It involves automatically feeding the application large volumes of invalid, unexpected,\nmalformed, random, or boundary-case input data—including specially crafted anomalous strings—to stress-test input handling, parsing logic, memory\nmanagement, and error recovery. The primary goals are to trigger crashes, hangs, memory leaks, assertion failures, buffer overflows, unhandled\nexceptions, or other abnormal behaviors that indicate potential vulnerabilities or robustness issues.\nupvoted 1 times"}], "answer": "N"}, {"id": 372, "question": "A SOC analyst observes reconnaissance activity from an IP address. The activity follows a pattern of short bursts toward a low number of targets.\nAn open-source review shows that the IP has a bad reputation. The perimeter firewall logs indicate the inbound traffic was allowed. The\ndestination hosts are high-value assets with EDR agents installed. Which of the following is the best action for the SOC to take to protect against\nany further activity from the source IP?", "options": [{"letter": "A", "text": "Add the IP address to the EDR deny list."}, {"letter": "B", "text": "Create a SIEM signature to trigger on any activity from the source IP subnet detected by the web proxy or firewalls for immediate\nnotification."}, {"letter": "C", "text": "Implement a prevention policy for the IP on the WAF."}, {"letter": "D", "text": "Activate the scan signatures for the IP on the NGFWs.\nCorrect Answer: B\nCommunity vote distribution\nD (69%)                           B (26%)     (5%\n  Only12go Highly Voted  1 year ago\nSelected Answer: D"}, {"letter": "A", "text": "Add the IP to the EDR deny list:\nEDR operates on endpoints. While the destination hosts are covered, this won't prevent initial connection attempts or protect other network assets."}, {"letter": "B", "text": "Create a SIEM signature for alerting:\nHelpful for visibility, but reactive only—doesn't block the activity. Good for correlation, but not a defense action."}, {"letter": "C", "text": "Implement WAF policy:\nA WAF is only effective against HTTP/S traffic targeting web applications. If the reconnaissance includes non-web protocols (which is likely), this\nwon't stop it.\n🛡️ Summary:\nD is the most comprehensive and proactive defense measure—it ensures reconnaissance from that IP is detected and blocked at the perimeter,\nprotecting all internal assets, not just those with EDR.\nupvoted 6 times\n  Popeyes_Chicken Highly Voted  1 year, 4 months ago\nSelected Answer: B\nStuck between B and D depending on what \"further activity\" entails, but I'm going with B. Preventing a precursor to a potential attack doesn't seem\nlike it covers the full scope of what they're looking for in \"further activity\". However, using a SIEM to trigger on any activity from the source would\nallow an analyst to respond more effectively to tactic shifts / provide a wider safety net. D seems to narrow.\nupvoted 5 times\n  cj207800 Most Recent  11 months, 2 weeks ago\nSelected Answer: D\nI agree with only12go\nupvoted 2 times\n  ybyttv 11 months, 3 weeks ago\nSelected Answer: D\nLet the ngfw which is on the perimeter to block it.\nIf you use siem to trigger notification, you will receive lots of notifications and spend your time on it. And you get nothing.\nupvoted 2 times\n  Justheretolook 1 year ago\nSelected Answer: D\nThe best action for the SOC to take in this scenario is:"}, {"letter": "D", "text": "Activate the scan signatures for the IP on the NGFWs.\n⸻\nHere’s why:\n• The activity involves reconnaissance in short bursts, which is often indicative of scanning or probing behavior.\n• The perimeter firewall is currently allowing the traffic, which means the source IP is not yet being blocked.\n• The NGFW (Next-Generation Firewall) can inspect traffic and apply intrusion prevention signatures or scan detection policies.\n• Activating scan signatures for that IP will help detect and block future scanning behavior at the network edge, preventing further reconnaissance\nattempts.\nupvoted 1 times\n  Cyde 1 year, 3 months ago\nSelected Answer: D\nI'm going with D because the security team is enabling specific security rules on the NGFWs to monitor and possibly block malicious activities\nassociated with a particular IP address based on known threat signatures\nupvoted 2 times\n  Cyde 1 year, 3 months ago\nand the question says ...\"the best action for the SOC to take to protect against any further activity from the source IP\"...\nupvoted 1 times\n  Wolf541 1 year, 4 months ago\nSelected Answer: A\naccording to chat gpt:Adding the IP address to the EDR (Endpoint Detection and Response) deny list is the best immediate action in this scenario\nbecause it blocks further potential malicious activity from the source IP at the endpoint level. This approach directly protects the high-value assets,\nwhich already have EDR agents installed. It ensures the IP cannot interact with those critical systems, even if the traffic reaches them.\nupvoted 1 times\n  Popeyes_Chicken 1 year, 4 months ago\nEDR works at the endpoint level. It doesn't prevent further reconnaissance at the network perimeter.\nupvoted 4 times"}], "answer": "N"}, {"id": 373, "question": "A company’s internet-facing web application has been compromised several times due to identified design flaws. The company would like to\nminimize the risk of these incidents from reoccurring and has provided the developers with better security training. However, the company cannot\nallocate any more internal resources to the issue. Which of the following are the best options to help identify flaws within the system? (Choose\ntwo.)", "options": [{"letter": "A", "text": "Deploying a WAF"}, {"letter": "B", "text": "Performing a forensic analysis"}, {"letter": "C", "text": "Contracting a penetration test"}, {"letter": "D", "text": "Holding a tabletop exercise"}, {"letter": "E", "text": "Creating a bug bounty program"}, {"letter": "F", "text": "Implementing threat modeling\nCorrect Answer: CE\nCommunity vote distribution\nCE (100%)\n  donjuanx Highly Voted  1 year, 4 months ago\nSelected Answer: CE\nKeyword is the company can not spare anymore internal resources. Thus making creating a bug bounty program and having an external company\nconduct a penetration test the only answers that involve not using internal resources.\nupvoted 9 times\n  HeatSquad77 Most Recent  3 months ago\nSelected Answer: CE\nThe best options to help identify flaws within the system are C. Contracting a penetration test and E. Creating a bug bounty program.\nExplanation:\nThe question focuses on identifying (discovering/detecting) existing design flaws in an already-compromised internet-facing web application, after\nproviding developer training but with no additional internal resources available. This limits options to external or crowdsourced approaches that bring\nin outside expertise or incentives without taxing internal teams.\nupvoted 1 times"}], "answer": "N"}, {"id": 374, "question": "The SOC receives a number of complaints regarding a recent uptick in desktop error messages that are associated with workstation access to an\ninternal web application. An analyst, identifying a recently modified XML file on the web server, retrieves a copy of this file for review, which\ncontains the following code:\nWhich of the following XML schema constraints would stop these desktop error messages from appearing?", "options": [{"letter": "A", "text": ""}, {"letter": "B", "text": ""}, {"letter": "C", "text": ""}, {"letter": "D", "text": "Correct Answer: B\nCommunity vote distribution\nB (100%)\n  Popeyes_Chicken Highly Voted  1 year, 4 months ago\nSelected Answer: B\nB uses a pattern that matches only alphanumeric characters ([a-zA-Z 0-9]*). This restriction would prevent any special characters from being\nincluded, which block the injection of malicious scripts.\nupvoted 6 times\n  7167087 Most Recent  1 year, 4 months ago\nSelected Answer: B\nNone of these answers are correct.\nupvoted 4 times"}], "answer": "N"}, {"id": 375, "question": "A SOC team lead occasionally collects some DNS information for investigations. The team lead assigns this task to a new junior analyst. Which of\nthe following is the best way to relay the process information to the junior analyst?", "options": [{"letter": "A", "text": "Ask another team member to demonstrate their process."}, {"letter": "B", "text": "Email a link to a website that shows someone demonstrating a similar process."}, {"letter": "C", "text": "Let the junior analyst research and develop a process."}, {"letter": "D", "text": "Write a step-by-step document on the team wiki outlining the process.\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  helenwonderland 8 months, 2 weeks ago\nSelected Answer: D\nDocumentation on the team wiki ensures the process is clearly defined, standardized, and repeatable.\nupvoted 1 times"}], "answer": "N"}, {"id": 376, "question": "Which of the following choices is most likely to cause obstacles in vulnerability remediation?", "options": [{"letter": "A", "text": "Not meeting an SLA"}, {"letter": "B", "text": "Patch prioritization"}, {"letter": "C", "text": "Organizational governance"}, {"letter": "D", "text": "Proprietary systems\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  HeatSquad77 3 months ago\nSelected Answer: D\nThe choice most likely to cause obstacles in vulnerability remediation is D. Proprietary systems.\nProprietary systems (custom-developed or vendor-specific software/hardware where source code, patching mechanisms, or update processes are\ncontrolled exclusively by the owner/vendor) frequently create significant barriers to effective remediation\nupvoted 1 times\n  Jolly_7 1 year, 1 month ago\nSelected Answer: D\nProprietary systems is the correct answer\nupvoted 3 times\n  fafd232_ 1 year, 1 month ago\nSelected Answer: D\nI'm split between C and D. Aren't they both inhibitors to remediation? And I imagine C would be more likely, since most companies don't have\nproprietary systems\nupvoted 2 times\n  noa808a 1 year, 1 month ago\nProprietary systems will always be an inhibitor to remediation, where as some orgs may be very security-intensive and have a governance\nstructure that actually promotes security over system availability. So I think the best answer is D.\nupvoted 3 times"}], "answer": "N"}, {"id": 377, "question": "A security analyst needs to identify services in a small, critical infrastructure ICS network. Many components in the network are likely to break if\nthey receive malformed or unusually large requests. Which of the following is the safest method to use when identifying service versions?", "options": [{"letter": "A", "text": "Use nmap -sV to identify all assets on the network."}, {"letter": "B", "text": "Use Burp Suite to conduct service identification."}, {"letter": "C", "text": "Use nc to manually perform banner grabbing."}, {"letter": "D", "text": "Use Nessus with restricted concurrent connections.\nCorrect Answer: D\nCommunity vote distribution\nC (87%)                         D (13%)\n  exitbob Highly Voted  1 year, 3 months ago\nSelected Answer: C\nManual banner grabbing with netcat (nc) lets the analyst send minimal, carefully crafted inputs to elicit a service banner. This minimizes the risk of\naccidentally sending a request that could disrupt operations.\nupvoted 7 times\n  Justheretolook Most Recent  1 year ago\nSelected Answer: C\nThe safest method to identify service versions in a fragile ICS (Industrial Control Systems) network is:"}, {"letter": "C", "text": "Use nc to manually perform banner grabbing.\n⸻\nExplanation:\nICS networks are highly sensitive, and many components can crash or malfunction if probed too aggressively. Therefore, low-impact, manual\ntechniques are preferred over automated or intrusive scanners.\nupvoted 3 times\n  mastermint 1 year ago\nSelected Answer: C\nSafest Option:\nC -> Manually connects to a port (e.g., nc 192.168.1.1 80) and checks banners.\nNo unexpected probes—avoids malformed requests.\nLow risk since it only reads initial service responses.\nWhy D is a bad option, Nessus (Vulnerability Scanner with Throttling)\nRisk: Even with restricted connections, Nessus sends intrusive probes that could destabilize ICS devices.\nUse Case: Better for IT networks, not ICS.\nupvoted 4 times\n  Only12go 1 year ago\nSelected Answer: C"}, {"letter": "C", "text": "Use nc (netcat) to manually perform banner grabbing\nManually banner-grabbing with nc lets the analyst send a single, minimal request to each host and observe the returned service banner. Because the\nanalyst fully controls the content and size of each probe, this approach avoids the malformed or high-volume traffic that can crash fragile ICS devices,\nmaking it the safest way to identify service versions in a critical-infrastructure network.\nAlthough limiting Nessus concurrency reduces volume, it does not eliminate the potentially harmful content of the probes. Manual banner grabbing is\nstill the lowest-risk method for service-version discovery in sensitive ICS environments.\nupvoted 3 times\n  noa808a 1 year, 1 month ago\nSelected Answer: D\nThe best answer is D, as nessus is an automated tool that guarantees requests will not be malformed.\nupvoted 1 times\n  f90ecff 1 year, 1 month ago\nSelected Answer: C\nNessus can be tuned for sensitive environments — and in some ICS contexts, it’s appropriate with the right care. But in terms of safest possible\nmethod, especially when you don’t know how fragile the systems are, the manual approach (nc) remains best.\nupvoted 4 times\n  Jolly_7 1 year, 1 month ago\nSelected Answer: D\nUse Nessus with restricted concurrent connections.\nupvoted 2 times"}], "answer": "N"}, {"id": 378, "question": "A web application has a function to retrieve content from an internal URL to identify CSRF attacks in the logs. The security analyst is building a\nregular expression that will filter out the correctly formatted requests. The target URL is https://10.1.2.3/api, and the receiving API only accepts\nGET requests and uses a single integer argument named “id.” Which of the following regular expressions should the analyst use to achieve the\nobjective?", "options": [{"letter": "A", "text": "^(?!https://10\\.1\\.2\\.3/api\\?id=[0-9]+)"}, {"letter": "B", "text": "^https://10\\.1\\.2\\.3/api\\?id=\\d+"}, {"letter": "C", "text": "(?:^https://10\\.1\\.2\\.3/api\\?id=[0-9]+)"}, {"letter": "D", "text": "^https://10\\.1\\.2\\.3/api\\?id=[0-9]+$"}], "answer": "D"}, {"id": 379, "question": "A security analyst needs to identify a computer based on the following requirements to be mitigated:\n• The attack method is network based with low complexity.\n• No privileges or user action is needed.\n• The confidentiality and availability level is high with a low integrity level.\nGiven the following CVSS 3.1 output:\nComputer1 -\nCVSS3.1/AV:C:L/PR:N/UI:R/S:U/C:H/I:L/A:H\nComputer2 -\nCVSS3.1/AV:L/AC:L/PR:N/UI:N/S:U/C:H/I:L/A:H\nComputer3 -\nCVSS3.1/AV:C:H/PR:N/UI:N/S:U/C:H/I:L/A:H\nComputer4 -\nCVSS3.1/AV:C:L/PR:N/UI:N/S:U/C:H/I:L/A:H\nWhich of the following machines should the analyst mitigate?", "options": [{"letter": "A", "text": "Computer1"}, {"letter": "B", "text": "Computer2"}, {"letter": "C", "text": "Computer3"}, {"letter": "D", "text": "Computer4"}], "answer": "B"}, {"id": 380, "question": "An analyst would like to start automatically ingesting IoCs into the EDR tool. Which of the following sources would be the most cost effective for\nthe analyst to use?", "options": [{"letter": "A", "text": "Government bulletins"}, {"letter": "B", "text": "Social media"}, {"letter": "C", "text": "Dark web"}, {"letter": "D", "text": "Blogs\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  HeatSquad77 3 months ago\nSelected Answer: A\nGovernment bulletins (e.g., from CISA in the US, which publishes alerts, advisories, Known Exploited Vulnerabilities catalogs, and Automated\nIndicator Sharing (AIS) feeds) provide high-quality, verified, and actionable IoCs—such as malicious IPs, domains, hashes, URLs, and file signatures—\noften in machine-readable formats (e.g., STIX/TAXII). These are free to access and subscribe to, with structured feeds designed for automated\ningestion into security tools like EDR platforms (via APIs, TAXII servers, or direct downloads). They focus on actively exploited threats relevant to\nbroad audiences, making them reliable for automatic blocking/enrichment without subscription costs or high noise levels.\nupvoted 1 times\n  Wolf541 1 year, 4 months ago\nSelected Answer: A\nFree government bulletins makes the most sense\nupvoted 4 times"}], "answer": "N"}, {"id": 381, "question": "A user clicks on a malicious adware link, and the malware successfully downloads to the machine. The malware has a script that invokes\ncommand-and-control activity. Which of the following actions is the best way to contain the incident without any additional impact?", "options": [{"letter": "A", "text": "Disable the user account until the malware investigation is complete."}, {"letter": "B", "text": "Review EDR information to determine whether the file was detected and quarantined locally."}, {"letter": "C", "text": "Block the server on the proxy and firewall."}, {"letter": "D", "text": "Submit a recategorization update to the vendor.\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  HeatSquad77 3 months ago\nSelected Answer: C\nThe best way to contain the incident without any additional impact is C. Block the server on the proxy and firewall.\nExplanation:\nThe malware has successfully downloaded and is actively invoking command-and-control (C2) activity, meaning the infected machine is\ncommunicating (or attempting to communicate) with an external malicious server to receive instructions, exfiltrate data, download additional\npayloads, or join a botnet. In incident response (per NIST SP 800-61 and CompTIA CySA+ guidance), containment focuses on stopping the attacker's\nability to control the malware or cause further harm quickly and with minimal disruption.\nupvoted 2 times\n  Jolly_7 1 year, 1 month ago\nSelected Answer: C\nBlock the server on the proxy and firewall.\nupvoted 3 times"}], "answer": "N"}, {"id": 382, "question": "During normal security monitoring activities, the following activity was observed:\ncd C:\\Users\\Documents\\HR\\Employees\ntakeown/f .*\nSUCCESS:\nWhich of the following best describes the potentially malicious activity observed?", "options": [{"letter": "A", "text": "Registry changes or anomalies"}, {"letter": "B", "text": "Data exfiltration"}, {"letter": "C", "text": "Unauthorized privileges"}, {"letter": "D", "text": "File configuration changes\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  ada26b1 Highly Voted  1 year, 1 month ago\nSelected Answer: C"}, {"letter": "C", "text": "Unauthorized privileges\nHere's why:\nThe command takeown /f .* is used to take ownership of files or directories in Windows. Specifically:\ntakeown /f ./* allows a user to take ownership of files within the directory specified (C:\\Users\\Documents\\HR\\Employees in this case).\ntakeown is a command-line utility that allows a user to take ownership of files or folders that they do not have permissions to access, which is often\nused by administrators but can also be used by malicious actors to escalate privileges.\nupvoted 7 times\n  Wolf541 Highly Voted  1 year, 4 months ago\nSelected Answer: C\nThat command allows the user to take ownership of all the files in that file directory allowing them to preform unauthorized privileges\nupvoted 5 times"}], "answer": "N"}, {"id": 383, "question": "A security manager is looking at a third-party vulnerability metric (SMITTEN) to improve upon the company’s current method that relies on\nCVSSv3. Given the following:\nWhich of the following vulnerabilities should be prioritized?", "options": [{"letter": "A", "text": "Vulnerability 1"}, {"letter": "B", "text": "Vulnerability 2"}, {"letter": "C", "text": "Vulnerability 3"}, {"letter": "D", "text": "Vulnerability 4\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  taketaa Highly Voted  1 year ago\nSelected Answer: B\nOption B is correct because it is an active exploited vulnerability, on external-facing system. Yes, option C is far more vulnerable and it is also\nexposed externally, but, because you have to prioritize on what is being currently exploited, option B is a far better choice.\nupvoted 5 times\n  BNhlapo Most Recent  1 day, 13 hours ago\nSelected Answer: B\nSaw this question on the exam. About half of the questions in my exam are on this dump. Even those that are not here, familiarising yourself with the\nquestioning style proved helpful. Study all PBQs on here.\nupvoted 1 times"}], "answer": "N"}, {"id": 384, "question": "Which of the following should be performed first when creating a BCP to ensure that all critical functions and financial implications have been\nconsidered?", "options": [{"letter": "A", "text": "Failover test"}, {"letter": "B", "text": "Tabletop exercise"}, {"letter": "C", "text": "Security policies"}, {"letter": "D", "text": "Business impact analysis\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  BlackSkullz Highly Voted  1 year, 1 month ago\nSelected Answer: D\nBusiness Impact Analysis is the process of identifying what is critical to the organization and the impact they may cause if they were to go down\nupvoted 5 times\n  Superash Most Recent  9 months, 2 weeks ago\nSelected Answer: D\nBIA_ first step\nupvoted 2 times"}], "answer": "N"}, {"id": 385, "question": "Which of the following best describes root cause analysis?", "options": [{"letter": "A", "text": "It describes the tactics, techniques, and procedures used in an incident."}, {"letter": "B", "text": "It provides a detailed path outlining the origin of an issue and how to eliminate it permanently."}, {"letter": "C", "text": "It outlines the who-what-when-where-why, which is often used in conjunction with legal proceedings."}, {"letter": "D", "text": "It generates a report of ongoing activities, including what was done, what is being done, and what will be done next.\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  HeatSquad77 3 months ago\nSelected Answer: B\nThe option that best describes root cause analysis (RCA) is B. It provides a detailed path outlining the origin of an issue and how to eliminate it\npermanently.\nRoot cause analysis is a structured, systematic process used in incident response and problem-solving (including cybersecurity) to identify the\nunderlying or fundamental cause(s) of an incident or problem—going beyond immediate symptoms or surface-level indicators. It traces the sequence\nof events and contributing factors back to their origin (\"detailed path outlining the origin\") and recommends corrective actions or permanent fixes to\nprevent recurrence (\"how to eliminate it permanently\"). This aligns directly with definitions from NIST, Splunk, Proofpoint, and other cybersecurity\nsources, where RCA focuses on long-term prevention rather than temporary workarounds.\nupvoted 1 times"}], "answer": "N"}, {"id": 386, "question": "A security administrator has found indications of dictionary attacks against the company’s external-facing portal. Which of the following should\nbe implemented to best mitigate the password attacks?", "options": [{"letter": "A", "text": "Multifactor authentication"}, {"letter": "B", "text": "Password complexity"}, {"letter": "C", "text": "Web application firewall"}, {"letter": "D", "text": "Lockout policy"}], "answer": "A"}, {"id": 387, "question": "The security team reviews a web server for XSS and runs the following Nmap scan:\nWhich of the following most accurately describes the result of the scan?", "options": [{"letter": "A", "text": "An output of characters > and \" as the parameters used in the attempt"}, {"letter": "B", "text": "The vulnerable parameter ID http://172.31.15.2/1.php?id=2 and unfiltered characters returned"}, {"letter": "C", "text": "The vulnerable parameter and unfiltered or encoded characters passed > and \" as unsafe"}, {"letter": "D", "text": "The vulnerable parameter id=2 with a SQL injection attempt\nCorrect Answer: C\nCommunity vote distribution\nC (78%)                             D (22%)\n  Kaneshiro 10 months ago\nSelected Answer: C\nThis is the same as question 17, but the answer is D. The vulnerable parameter and characters > and \" with a reflected XSS attempt.\nBut here in question 387, the answer is C. The vulnerable parameter and unfiltered or encoded characters passed > and \" as unsafe. This option is\nalso in question 17, but it's incorrect there, while here in question 387 it's correct, and option D. The vulnerable parameter and characters > and \" with\na reflected XSS attempt. It's not available, and the following appears: D. The vulnerable parameter id=2 with a SQL injection attempt. Which is\nincorrect in this case. Does anyone know why?\nLink to question: https://www.examtopics.com/exams/comptia/cs0-003/view/\nupvoted 2 times\n  Justheretolook 1 year ago\nSelected Answer: C\nThe correct answer is: C. The vulnerable parameter and unfiltered or encoded characters passed > and “ as unsafe\nExplanation:\nThe Nmap scan using the http-unsafe-output-escaping script found that the parameter id at http://172.31.15.2/1.php?id=2 reflects special characters\nlike >, \", and ' in its output without proper escaping. This behavior is a key indicator of a potential Cross-Site Scripting (XSS) vulnerability, where user-\nsupplied input is reflected back in the response and interpreted as executable code in the browser.\nupvoted 1 times\n  panzer 1 year, 2 months ago\nSelected Answer: C"}, {"letter": "C", "text": "Because the parameters specific to XSS, have returned reflected - Correct"}, {"letter": "A", "text": "Wrong, because it doesn't sepcify anywere that an output was observed"}, {"letter": "B", "text": "Wrong, because it isn't specified anywhere that the parameters were returned"}, {"letter": "D", "text": "Wrdong, SQLi could be identified by errors, or by delaied time because of the specific payload. Which was not observed here.\nupvoted 4 times\n  DARKVEGETA 1 year, 3 months ago\nSelected Answer: D\nAnswer is D\nupvoted 1 times\n  DARKVEGETA 1 year, 3 months ago\nSelected Answer: D\nThe answer is D. Not sure why this is marked at C. This is the exact same question for question 17 in the beginning of this practice exam and it was\nmarked D as well.\nupvoted 1 times\n  Kaneshiro 10 months ago\nYes, This is the same as question 17, but the answer is D. The vulnerable parameter and characters > and \" with a reflected XSS attempt.\nBut here in question 387, the answer is C. The vulnerable parameter and unfiltered or encoded characters passed > and \" as unsafe. This option is\nalso in question 17, but it's incorrect there, while here in question 387 it's correct, and option D. The vulnerable parameter and characters > and \"\nwith a reflected XSS attempt. It's not available, and the following appears: D. The vulnerable parameter id=2 with a SQL injection attempt. Which is\nincorrect in this case.\nupvoted 2 times"}], "answer": "N"}, {"id": 388, "question": "A security analyst has identified outgoing network traffic leaving the enterprise at odd times. The traffic appears to pivot across network segments\nand target domain servers. The traffic is then routed to a geographic location to which the company has no association. Which of the following\nbest describes this type of threat?", "options": [{"letter": "A", "text": "Hacktivist"}, {"letter": "B", "text": "Zombie"}, {"letter": "C", "text": "Insider threat"}, {"letter": "D", "text": "Nation-state actor\nCorrect Answer: D\nCommunity vote distribution\nD (64%)                          B (36%)\n  Cos007 Highly Voted  1 year, 3 months ago\nSelected Answer: D\nThe characteristics of the attack—odd-hour outgoing traffic, lateral movement across network segments, targeting domain servers, and exfiltrating\ndata to an unassociated geographic location—strongly suggest a sophisticated, targeted cyberattack. Nation-state actors typically engage in\nadvanced persistent threats (APTs), using stealthy and persistent techniques to compromise and extract sensitive data over an extended period.\nupvoted 7 times\n  2d3d7b4 Most Recent  5 months, 2 weeks ago\nSelected Answer: B\nI think it's zombie, the wording sounds like it,\nI am stuck between B and D, but the wording.\nupvoted 1 times\n  3eb5fb6 1 year ago\nSelected Answer: B\nAnother ambiguous, junk question from CompTIA.\nA \"zombie\" refers to a compromised device that is under the control of an external actor and is used to perform various activities, including lateral\nmovement within a network and communicating with external command-and-control servers. In this scenario, the observed behavior—outgoing traffic\nleaving at unusual times, pivoting across network segments, and eventually routing to a geographic location unrelated to the company—suggests that\none or more devices within the network have been compromised.\nupvoted 3 times"}], "answer": "N"}, {"id": 389, "question": "Based on an internal assessment, a vulnerability management team wants to proactively identify risks to the infrastructure prior to production\ndeployments. Which of the following best supports this approach?", "options": [{"letter": "A", "text": "Threat modeling"}, {"letter": "B", "text": "Penetration testing"}, {"letter": "C", "text": "Bug bounty"}, {"letter": "D", "text": "SDLC training\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  ada26b1 Highly Voted  1 year, 1 month ago\nSelected Answer: A\nThreat modeling is a process where security teams identify and assess potential threats, vulnerabilities, and risks early in the development lifecycle.\nIt helps organizations understand potential attack vectors and prioritize security measures before the system is deployed to production. This\nproactive approach enables teams to address security concerns earlier in the design and development phases.\nupvoted 6 times\n  HeatSquad77 Most Recent  3 months ago\nSelected Answer: A\nThreat modeling is a structured, proactive process performed during the design and development phases (before production deployment) to identify,\nanalyze, and prioritize potential threats, risks, attack vectors, and vulnerabilities in systems or infrastructure. It involves techniques like STRIDE,\nDREAD, attack trees, or data flow diagrams to map how adversaries might exploit the system, assess impacts, and recommend mitigations or design\nchanges early—when fixes are cheapest and least disruptive. This directly aligns with the vulnerability management team's goal of identifying risks\nprior to production deployments, shifting security \"left\" in the SDLC to prevent issues from reaching live environments.\nupvoted 1 times"}], "answer": "N"}, {"id": 390, "question": "Which of the following best explains the importance of utilizing an incident response playbook?", "options": [{"letter": "A", "text": "It prioritizes the business-critical assets for data recovery."}, {"letter": "B", "text": "It establishes actions to execute when inputs trigger an event."}, {"letter": "C", "text": "It documents the organization asset management and configuration."}, {"letter": "D", "text": "It defines how many disaster recovery sites should be staged.\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  HeatSquad77 3 months ago\nSelected Answer: B\nThe option that best explains the importance of utilizing an incident response playbook is B. It establishes actions to execute when inputs trigger an\nevent.\nAn incident response playbook is a structured, documented guide (often specific to incident types like ransomware, phishing, or data breaches) that\noutlines predefined, step-by-step actions, procedures, roles, and decision points to follow when certain triggers or indicators (e.g., alerts, anomalous\nbehavior, or confirmed compromise) are detected. It ensures a consistent, coordinated, repeatable, and efficient response—reducing chaos,\nminimizing damage, speeding up containment/recovery, and improving overall effectiveness under pressure.\nupvoted 1 times"}], "answer": "N"}, {"id": 391, "question": "Which of the following defines the proper sequence of data volatility regarding the evidence collection process, from the most to least volatile?", "options": [{"letter": "A", "text": "Routing table, registers, physical memory, archival media, hard disk, physical configuration"}, {"letter": "B", "text": "Routing table, registers, physical memory, temporary partition, hard disk, physical configuration"}, {"letter": "C", "text": "Cache, routing table, physical memory, network topology, temporary partition, hard disk"}, {"letter": "D", "text": "Cache, routing table, physical memory, temporary partition, hard disk, physical configuration\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  HeatSquad77 3 months ago\nSelected Answer: D\nExplanation:\nIn digital forensics and incident response (per RFC 3227 \"Guidelines for Evidence Collection and Archiving,\" NIST guidelines, and CompTIA\nCySA+/Security+ exam content), evidence must be collected in order of volatility—starting with the most ephemeral data (lost instantly on power loss\nor system changes) and moving to the most persistent. This ensures critical transient evidence is preserved before it disappears.\nupvoted 1 times\n  Justheretolook 1 year ago\nSelected Answer: D\nThe correct answer is: D. Cache, routing table, physical memory, temporary partition, hard disk, physical configuration\nExplanation:\nIn digital forensics, data volatility refers to how quickly data is lost when power is removed or systems are shut down. The order of volatility (OOV)\nfrom most to least volatile is:\n1. Cache – Stored in CPU, lost instantly when power is off.\n2. Routing table – Dynamic data in memory, changes frequently.\n3. Physical memory (RAM) – Volatile and gone after shutdown.\n4. Temporary partition – Includes swap/page files, less volatile than RAM.\n5. Hard disk – Non-volatile, data persists even without power.\n6. Physical configuration – Includes device setup and network layout; rarely changes.\nupvoted 3 times"}], "answer": "N"}, {"id": 392, "question": "A security analyst needs to support an organization’s legal case against a threat actor. Which of the following processes provides the best way to\nassist in the prosecution of the case?", "options": [{"letter": "A", "text": "Chain of custody"}, {"letter": "B", "text": "Evidence gathering"}, {"letter": "C", "text": "Securing the scene"}, {"letter": "D", "text": "Forensic analysis\nCorrect Answer: A\nCommunity vote distribution\nA (70%)                           D (30%)\n  HeatSquad77 3 months ago\nSelected Answer: A\nChain of custody is the documented, chronological record of the seizure, custody, control, transfer, handling, and analysis of evidence from the\nmoment it is collected until it is presented in court. It establishes the integrity, authenticity, and admissibility of the evidence by proving it has not\nbeen tampered with, altered, contaminated, or mishandled. In legal proceedings against a threat actor (e.g., civil lawsuits for damages or criminal\nreferrals for prosecution), a broken or poorly documented chain of custody can render evidence inadmissible, weaken the case, lead to dismissal, or\ncreate reasonable doubt—even if the evidence itself is compelling.\nupvoted 1 times\n  cj207800 11 months, 1 week ago\nSelected Answer: A\nThe best process for supporting an organization’s legal case against a threat actor is one that ensures the integrity and admissibility of evidence in\ncourt. While all the options—evidence gathering, securing the scene, forensic analysis, and chain of custody—are important steps in an investigation,\nmaintaining a proper chain of custody is critical for legal proceedings.\nupvoted 2 times\n  Justheretolook 1 year ago\nSelected Answer: A\nThe correct answer is: A. Chain of custody\nExplanation:\nChain of custody is the most critical process when supporting a legal case because it:\n• Documents the handling of evidence from the moment it’s collected to its presentation in court.\n• Ensures the integrity and authenticity of the evidence.\n• Helps prove that the evidence was not tampered with or altered, which is essential for it to be admissible in legal proceedings.\nWhy not the others?\n• B. Evidence gathering – Important, but without a documented chain of custody, the evidence may not be legally valid.\n• C. Securing the scene – A necessary first step, but doesn’t ensure legal admissibility.\n• D. Forensic analysis – Helps understand what happened, but it must be based on properly handled evidence.\nupvoted 2 times\n  Susan4041 1 year ago\nSelected Answer: A\nMaintaining the chain of custody is crucial to ensure that evidence is admissible in court. It provides a documented history of who collected, handled,\ntransferred, or analyzed the evidence, ensuring its integrity and authenticity throughout the legal process.\nupvoted 1 times\n  noa808a 1 year, 1 month ago\nSelected Answer: D\nThe correct answer is Forensic analysis, as this will provide evidence to be used in the case. Chain of custody refers to how the evidence is handled\nafter it is aggregated.\nupvoted 3 times\n  Jolly_7 1 year, 1 month ago\nSelected Answer: A\nChain of custody\nupvoted 1 times"}], "answer": "N"}, {"id": 393, "question": "An end user forwarded an email with a file attachment to the SOC for review. The SOC analysts think the file was specially crafted for the target.\nWhich of the following investigative actions would best determine if the attachment was malicious?", "options": [{"letter": "A", "text": "Review the file in Virus Total to determine if the domain is associated with any phishing."}, {"letter": "B", "text": "Review the email header to analyze the DKIM, DMARC, and SPF values."}, {"letter": "C", "text": "Review the source IP address in AbuseIPDB."}, {"letter": "D", "text": "Review the attachment’s behavior in a sandbox environment while running Wireshark.\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  yeahnodontthinkso Highly Voted  1 year, 4 months ago\nSelected Answer: D\nD is the only one that makes sense.\nA) It was specifically crafted for the target, Virus Total won't pick it up.\nB) Email headers won't give you any useful info.\nC) This doesn't prove that the attachment is malicious.\nupvoted 7 times\n  ybyttv 11 months, 3 weeks ago\nI agree your answer, but have comments about B. Analyst already believe the file is crafted, which means it's malicious. It's good to check where\nthe sender is.\nupvoted 2 times"}], "answer": "N"}, {"id": 394, "question": "Which of the following is instituting a security policy that users must lock their systems when stepping away from their desks an example of?", "options": [{"letter": "A", "text": "Configuration management"}, {"letter": "B", "text": "Compensating control"}, {"letter": "C", "text": "Awareness, education, and training"}, {"letter": "D", "text": "Administrative control"}], "answer": "D"}, {"id": 395, "question": "A security analyst needs to identify an asset that should be remediated based on the following information:\nWhich of the following assets should the analyst remediate first?", "options": [{"letter": "A", "text": "Mail server"}, {"letter": "B", "text": "Domain controller"}, {"letter": "C", "text": "Web server"}, {"letter": "D", "text": "File server"}], "answer": "A"}, {"id": 396, "question": "A security analyst runs tcpdump on the 10.203.10.22 machine and observes thousands of packets as shown below:\nWhich of the following activities explains the tcpdump output?", "options": [{"letter": "A", "text": "Incoming nmap -sA scan"}, {"letter": "B", "text": "hping3 --udp scan over the network"}, {"letter": "C", "text": "C2 communications leaving the network"}, {"letter": "D", "text": "Malware beaconing\nCorrect Answer: D\nCommunity vote distribution\nA (100%)\n  ouflomana 1 year, 1 month ago\nSelected Answer: A\nMatches the behavior: Nmap ACK scan (nmap -sA) sends TCP ACK packets to various ports to determine firewall rules, not to establish a connection.\nNo SYN, no payload, just ACK to test if a port is filtered/unfiltered.\nupvoted 4 times\n  BlackSkullz 1 year, 1 month ago\nSelected Answer: A\nThis is an nmap -sA scan, or an ACK scan, from another local workstation. It's coming from one port on the source IP and being received by multiple\nports on the destination/victim IP because it's checking for open ports. Both IPs are on the same network so there isn't any malware beaconing or C2\ncommunication. And given that these are ack packets, it isn't anything UDP related\nupvoted 4 times\n  BlackSkullz 1 year, 1 month ago\nI mistyped on the \"checking for open ports\" part. The purpose of an ACK scan is usually to identify which ports are reachable through a firewall.\nNo response indicates that the port is filtered and the traffic was blocked. A response, typically a RST packet, indicates that the port is unfiltered\nand was allowed through the firewall\nupvoted 1 times"}], "answer": "N"}, {"id": 397, "question": "Which of the following is the best metric to use when reviewing and addressing findings that caused an incident?", "options": [{"letter": "A", "text": "Mean time to restore"}, {"letter": "B", "text": "Mean time to respond"}, {"letter": "C", "text": "Mean time to remediate"}, {"letter": "D", "text": "Mean time to detect\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  HeatSquad77 3 months ago\nSelected Answer: C\nThe best metric to use when reviewing and addressing findings that caused an incident is C. Mean time to remediate.\nExplanation:\nThe question focuses on findings (vulnerabilities, misconfigurations, control gaps, or other weaknesses) that were the root cause of the incident.\nAfter an incident occurs, the post-incident review (lessons learned, root cause analysis, after-action report) should evaluate how long it took to fix or\nmitigate those specific findings once they were identified or became known.\nupvoted 1 times\n  Justheretolook 1 year ago\nSelected Answer: C\nThe correct answer is: C. Mean time to remediate\nExplanation:\nWhen reviewing and addressing findings that caused an incident, the key metric is how long it takes to fully fix the underlying issues — this is best\nmeasured by:\n• Mean Time to Remediate (MTTR): The average time it takes to identify, address, and resolve the root cause of the incident and ensure it won’t\nreoccur.\nWhy not the others?\n• A. Mean time to restore – Measures how quickly services are brought back online, but doesn’t focus on fixing root causes.\n• B. Mean time to respond – Measures how fast a team begins responding to an incident, not how long it takes to fix it.\n• D. Mean time to detect – Important for early detection, but not related to addressing and resolving the issue.\nupvoted 4 times"}], "answer": "N"}, {"id": 398, "question": "A cybersecurity analyst is setting up a security control that monitors network traffic and produces an active response to a security event. Which of\nthe following tools is the analyst configuring?", "options": [{"letter": "A", "text": "EDR"}, {"letter": "B", "text": "IPS"}, {"letter": "C", "text": "CASB"}, {"letter": "D", "text": "WAF\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  HeatSquad77 3 months ago\nSelected Answer: B\nAn IPS is a network security control that is positioned inline (in the traffic path) to monitor network traffic in real time for suspicious or malicious\npatterns (e.g., signatures of exploits, anomalies, or policy violations). When a security event is detected, it produces an active response by\nautomatically blocking, dropping, or resetting the malicious traffic/packets, preventing the threat from reaching its target. This matches the\ndescription exactly: monitoring + active (preventive) response on the network level.\nupvoted 1 times\n  Cos007 1 year, 3 months ago\nSelected Answer: B\nThe answer is B.\nAn IPS (Intrusion Prevention System) is a security control that monitors network traffic and takes active measures to block or mitigate threats in real\ntime. Unlike an IDS (Intrusion Detection System), which only detects and alerts on suspicious activity, an IPS can actively respond by blocking\nmalicious traffic, resetting connections, or applying security rules.\nupvoted 4 times"}], "answer": "N"}, {"id": 399, "question": "A security analyst working for an airline is prioritizing vulnerabilities found on a system. The system has the following requirements:\n• Can store periodically audited documents required for takeoffs and landings\n• Can keep critical records regarding the company’s operations\n• Data can be made public upon request and authorization\nWhich of the following vulnerabilities should be remediated first?", "options": [{"letter": "A", "text": "A broken access control vulnerability impacting data integrity"}, {"letter": "B", "text": "A heap overflow vulnerability impacting the system’s usability"}, {"letter": "C", "text": "A DoS vulnerability impacting the system’s availability"}, {"letter": "D", "text": "A zero-day vulnerability impacting the system’s confidentiality\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  HeatSquad77 3 months ago\nSelected Answer: A\nThe vulnerability that should be remediated first is A. A broken access control vulnerability impacting data integrity.\nReasoning:\nPrioritization of vulnerabilities in vulnerability management (a core CySA+ objective) follows the CIA triad (Confidentiality, Integrity, Availability)\naligned with the system's specific requirements and business impact.\nupvoted 1 times\n  BlackSkullz 1 year, 1 month ago\nSelected Answer: A\nIntegrity is the most important factor to consider here. A loss of integrity of the stored, audited data could result in failures of operations such as\nlandings and takeoffs, where accuracy of data is paramount.\nupvoted 2 times"}], "answer": "N"}, {"id": 400, "question": "Which of the following are process improvements that can be realized by implementing a SOAR solution? (Choose two.)", "options": [{"letter": "A", "text": "Minimize security attacks."}, {"letter": "B", "text": "Itemize tasks for approval."}, {"letter": "C", "text": "Reduce repetitive tasks."}, {"letter": "D", "text": "Minimize setup complexity."}, {"letter": "E", "text": "Define a security strategy."}, {"letter": "F", "text": "Generate reports and metrics.\nCorrect Answer: CF\nCommunity vote distribution\nCF (100%)\n  HeatSquad77 3 months ago\nSelected Answer: CF\nExplanation:\nSOAR platforms are specifically designed to enhance security operations efficiency by automating repetitive, manual, and time-consuming tasks (e.g.,\nalert triage, log enrichment, basic investigations, data collection from multiple tools, or routine remediation steps). This reduces analyst fatigue,\nminimizes human error in mundane workflows, and frees up time for complex threat hunting or strategic work—directly leading to reduced repetitive\ntasks as a core benefit.\nupvoted 1 times\n  carletten 1 year, 2 months ago\nSelected Answer: CF\nConfirm C and F\nupvoted 3 times"}], "answer": "N"}, {"id": 401, "question": "Which of the following best describe the external requirements that are imposed for incident management communication? (Choose two).", "options": [{"letter": "A", "text": "Law enforcement involvement"}, {"letter": "B", "text": "Compliance with regulatory requirements"}, {"letter": "C", "text": "Transparency to stockholders"}, {"letter": "D", "text": "Defined SLAs regarding services"}, {"letter": "E", "text": "Industry advocacy group participation"}, {"letter": "F", "text": "Framework guidelines\nCorrect Answer: BF\nCommunity vote distribution\nAB (39%)             BD (26%)         BF (26%)     BC (9%)\n  kmicic77 Highly Voted  11 months, 3 weeks ago\nSelected Answer: BD\nModel o3 and Gemini 2.5 Pro both say it's B and D.\nB) laws (GDPR, HIPAA, SOX, SEC cybersecurity-disclosure rules, etc.) have legal force; failure to follow them can trigger fines or criminal liability.\nD) SLAs are contractual obligations negotiated with customers or partners. Because they’re contracts, they’re legally enforceable and external to the\nsecurity team.\nupvoted 5 times\n  kaka321 Most Recent  1 month, 2 weeks ago\nSelected Answer: BC\nBC describe the external requirement to fulfil or enforce for incident response communication.. Note A is path of C\nupvoted 1 times\n  Gduru1960 4 months ago\nSelected Answer: BC"}, {"letter": "B", "text": "Compliance with regulatory requirements and C. Transparency to stockholders, because regulators and securities/market disclosure obligations\nimpose external rules and timelines on what you must communicate and when during incident management.\nA can apply in some incidents, but law enforcement involvement is not a universal external requirement for incident communications, whereas\nregulatory reporting and shareholder disclosure duties are formal, broadly applicable obligations with defined thresholds and timelines.\nupvoted 1 times\n  2d3d7b4 5 months, 2 weeks ago\nSelected Answer: BD\nI Feel B and D flow better, you have to follow regulatory laws, and you need to keep to your SLA,\nupvoted 1 times\n  3lVhylla 6 months ago\nSelected Answer: BC\nim going with B-C, they make more sense for me then the others one\nupvoted 1 times\n  6f9c9e3 6 months, 2 weeks ago\nSelected Answer: BF\nRegulations like GDPR, HIPAA, PCI DSS, etc., define how and when incidents must be communicated externally.\nFrameworks provide standardized requirements and recommendations for incident response and communication.\nReason why A is not picked:\nWhile law enforcement might become involved, this is not a general external requirement—it depends on the incident type (e.g., cybercrime) and local\nlaw.\nupvoted 1 times\n  1574aa7 10 months ago\nSelected Answer: BF\nI pick these , as they seem to be enforced by external party , as you always need to be compliant with regulatory entities , and usually have to follow\nframework guidelines as well ,\nupvoted 1 times\n  deskleave123 10 months ago\nSelected Answer: AB\nI'm going with AB.\nFramework guidelines are not externally imposed, they are self imposed. Adherence to frameworks might be best practice, but as far as I'm aware\nthere's no specific legal requirement to follow them.\nupvoted 2 times\n  ybyttv 11 months, 3 weeks ago\nSelected Answer: AB\nOnly A and B is something enforced by external party.\nIn case law enforcement is involved, there is standard what could be disclosed what's not; The same to the regulatory requirements.\nupvoted 4 times\n  ada26b1 1 year, 1 month ago\nSelected Answer: AB"}, {"letter": "A", "text": "Law enforcement involvement"}, {"letter": "B", "text": "Compliance with regulatory requirements\nHere's why:"}, {"letter": "A", "text": "Law enforcement involvement:\nIn cases of cybercrime or incidents involving criminal activity, law enforcement may need to be involved. This is an external requirement that\norganizations must comply with when handling certain incidents, particularly those that involve breaches of sensitive data, fraud, or attacks that\nviolate the law."}, {"letter": "B", "text": "Compliance with regulatory requirements:\nOrganizations must often comply with various legal and regulatory requirements that mandate how incidents should be reported and managed. These\nrequirements can include notifying regulatory bodies about data breaches, financial impacts, or specific compliance obligations depending on the\nindustry (e.g., GDPR, HIPAA, or PCI-DSS). Failing to comply with these regulations can lead to significant fines and legal consequences.\nupvoted 4 times\n  fafd232_ 1 year, 1 month ago\nSelected Answer: BF\nInitially thought it was B and C. Here's ChatGPT 's (o1 model) answer:\n\"From a CySA+ perspective, “external requirements” for incident‐management communication generally refer to mandates that come from outside the\norganization, such as government laws or imposed industry frameworks. In this context, the two best choices are:"}, {"letter": "B", "text": "Compliance with regulatory requirements\n(e.g., HIPAA, GDPR, PCI DSS)"}, {"letter": "F", "text": "Framework guidelines\n(e.g., NIST 800-series, ISO 27001, COBIT)\nThese two options represent external rules and standards that are typically imposed (rather than chosen) by regulatory bodies or industry frameworks\nand must be followed when handling and communicating about security incidents.\"\nupvoted 4 times"}], "answer": "N"}, {"id": 402, "question": "A security analyst observes a high volume of SYN flags from an unexpected source toward a web application server within one hour. The traffic is\nnot flagging for any exploit signatures.\nWhich of the following scenarios best describes this activity?", "options": [{"letter": "A", "text": "A legitimate connection is continuously attempting to establish a connection with a downed web server."}, {"letter": "B", "text": "A script kiddie is attempting to execute a DDoS through a ping flood attack."}, {"letter": "C", "text": "An attacker is executing reconnaissance activities by mapping which ports are open and closed."}, {"letter": "D", "text": "A web exploit attempt is likely occurring and the security analyst is not seeing it.\nCorrect Answer: C\nCommunity vote distribution\nC (100%)\n  ada26b1 Highly Voted  1 year, 1 month ago\nSelected Answer: C"}, {"letter": "C", "text": "An attacker is executing reconnaissance activities by mapping which ports are open and closed.\nHere's why:\nThe observed behavior—a high volume of SYN flags toward a web application server—is indicative of a SYN scan or a reconnaissance activity. In this\nscenario, the attacker is trying to gather information about the open ports on the target system.\nupvoted 5 times"}], "answer": "N"}, {"id": 403, "question": "Which of the following features is a key component of Zero Trust architecture?", "options": [{"letter": "A", "text": "Single strong source of user identity"}, {"letter": "B", "text": "Implementation of IT governance"}, {"letter": "C", "text": "Business continuity plan"}, {"letter": "D", "text": "Quality assurance"}, {"letter": "E", "text": "Internal auditing process\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  carletten Highly Voted  1 year, 2 months ago\nSelected Answer: A\nA single strong source of user identity is crucial because Zero Trust requires strict identity verification for all users and devices before granting\naccess to resources.\nThis often involves multi-factor authentication (MFA), identity federation, and continuous authentication to ensure that only authorized users can\naccess sensitive systems and data.\nupvoted 5 times"}], "answer": "N"}, {"id": 404, "question": "An organization wants to establish a disaster recovery plan for critical applications that are hosted on premises. Which of the following is the first\nstep to prepare for supporting this new requirement?", "options": [{"letter": "A", "text": "Choose a vendor to utilize for the disaster recovery location."}, {"letter": "B", "text": "Establish prioritization of continuity from data and business owners."}, {"letter": "C", "text": "Negotiate vendor agreements to support disaster recovery capabilities."}, {"letter": "D", "text": "Advise the leadership team that a geographical area for recovery must be defined.\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  HeatSquad77 3 months ago\nSelected Answer: B\nThe correct answer is B. Establish prioritization of continuity from data and business owners.\nThis is the first step in preparing to support a new disaster recovery (DR) requirement for on-premises critical applications.\nStandard disaster recovery and business continuity planning (per frameworks like NIST SP 800-34, ISO standards, and CompTIA Security+/CySA+\nguidance) begins with understanding business needs and priorities before jumping into technical, vendor, or site decisions.\nupvoted 1 times\n  BlackSkullz 1 year, 1 month ago\nSelected Answer: B\nIn order to establish a DR plan for critical assets, you need to figure out which assets are critical to your organization in the first place\nupvoted 3 times"}], "answer": "N"}, {"id": 405, "question": "A junior security analyst opened ports on the company’s firewall, and the company experienced a data breach. Which of the following most likely\ncaused the data breach?", "options": [{"letter": "A", "text": "Environmental hacktivist"}, {"letter": "B", "text": "Accidental insider threat"}, {"letter": "C", "text": "Nation-state"}, {"letter": "D", "text": "Organized crime group\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  HeatSquad77 3 months ago\nSelected Answer: B\nThe correct answer is B. Accidental insider threat.\nIn this scenario, a junior security analyst (an authorized employee) intentionally or mistakenly opened ports on the company's firewall, which directly\nled to the data breach. This describes an accidental insider threat — an internal actor who, without malicious intent, causes harm through error, lack\nof experience, poor judgment, or misconfiguration.\nupvoted 1 times\n  noa808a 1 year, 1 month ago\nSelected Answer: B\nAnswers A, C, and D all refer to who would be the most likely to exploit the open ports, but the junior security analyst opened the ports, and therefore\ncaused the incident to occur.\nupvoted 4 times"}], "answer": "N"}, {"id": 406, "question": "When undertaking a cloud migration of multiple SaaS applications, an organization’s systems administrators struggled with the complexity of\nextending identity and access management to cloud-based assets. Which of the following service models would have reduced the complexity of\nthis project?", "options": [{"letter": "A", "text": "OpenID"}, {"letter": "B", "text": "SDN"}, {"letter": "C", "text": "ZTNA"}, {"letter": "D", "text": "SWG\nCorrect Answer: A\nCommunity vote distribution\nA (68%)                          C (32%)\n  magmadiver1937 5 months, 3 weeks ago\nSelected Answer: A\nI chose A but I am not confident in my choice. I think this question is poorly worded.\nupvoted 1 times\n  Kaneshiro 10 months, 1 week ago\nSelected Answer: A\nThe key word in the question is \"Complexity.\" While ZTNA is more robust, its implementation is more complex. In this specific case, OpenID\nrepresents an easier solution to implement based on what is required.\nupvoted 4 times\n  Tenten87 11 months ago\nSelected Answer: C\nNOT OpenID: A federated identity protocol useful for authentication, but it doesn’t address broader IAM complexity across multiple SaaS systems.\nupvoted 1 times\n  cj207800 11 months, 1 week ago\nSelected Answer: C\nOpenID: is an authentication protocol, not a service model. It enables single sign-on but doesn’t address holistic access management across cloud\nassets. Justheretolook explains ZTNA.\nupvoted 1 times\n  Justheretolook 1 year ago\nSelected Answer: C\nThe correct answer is: C. ZTNA (Zero Trust Network Access)\nExplanation:\n• C. ZTNA (Zero Trust Network Access) helps simplify secure access to cloud applications by assuming that no user or device is trusted by default,\neven if they are inside the network. It integrates identity and access management (IAM) into its model, offering centralized, secure, and policy-driven\naccess controls. This significantly reduces the complexity of extending IAM to multiple SaaS applications during a cloud migration.\nOther options:\n• A. OpenID – An authentication protocol, not a service model. It helps with identity federation but doesn’t address the broader complexity of access\ncontrol in multi-cloud or SaaS environments.\nupvoted 4 times\n  noa808a 1 year, 1 month ago\nSelected Answer: A\nOpenID.\nupvoted 3 times\n  f90ecff 1 year, 1 month ago\nSelected Answer: C\nOpenID helps authenticate users — ZTNA helps manage and secure access in cloud environments. OpenID could be part of the solution, but ZTNA\naddresses the full scope of the problem described.\nupvoted 1 times\n  Jolly_7 1 year, 1 month ago\nSelected Answer: A\nOpenID\nupvoted 2 times\n  ada26b1 1 year, 1 month ago\nSelected Answer: A\nOpenID is the best choice because it simplifies the process of authentication and can help reduce complexity by providing a standardized approach to\nmanaging identity across multiple cloud-based assets.\nupvoted 3 times\n  fafd232_ 1 year, 1 month ago\nSelected Answer: A\nSimilar to question 301 from this exam bank (https://www.examtopics.com/discussions/comptia/view/151862-exam-cs0-003-topic-1-question-321-\ndiscussion/)\nBoth that question, and ChatGPT (o1 model) claims the answer is A. I don't see how ZTNA helps with this at all.\nupvoted 4 times\n  Cyber_admin31 1 year, 2 months ago\nSelected Answer: C\nZero Trust Network Access (ZTNA) simplifies this by ensuring secure access based on identity, device posture, and other factors rather than trusting\nthe network perimeter. - ChatGPT says\nupvoted 2 times"}], "answer": "N"}, {"id": 407, "question": "An analyst produces a weekly endpoint status report for the management team. The report Includes specific details for each endpoint in relation\nto organizational baselines. Which of the following best describes the report type?", "options": [{"letter": "A", "text": "Forensics"}, {"letter": "B", "text": "Mitigation"}, {"letter": "C", "text": "Vulnerability"}, {"letter": "D", "text": "Compliance\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  ada26b1 1 year, 1 month ago\nSelected Answer: D\nA compliance report ensures that an organization's systems, policies, and activities meet specific standards, regulations, or organizational baselines.\nIn this case, the endpoint status report includes details for each endpoint, comparing them against the organizational baselines. This is typically done\nto ensure that systems are compliant with internal security policies, regulatory requirements, or other compliance frameworks.\nupvoted 4 times"}], "answer": "N"}, {"id": 408, "question": "A user is suspected of violating policy by logging in to a Linux VM during non-business hours. Which of the following system files is the best way\nto track the user’s activities?", "options": [{"letter": "A", "text": "/var/log/secure"}, {"letter": "B", "text": "/etc/motd"}, {"letter": "C", "text": "/var/log/messages"}, {"letter": "D", "text": "/etc/passwd\nCorrect Answer: A\nCommunity vote distribution\nA (100%)\n  noa808a Highly Voted  1 year, 1 month ago\nSelected Answer: A\n/var/log/secure is correct.\nupvoted 5 times\n  Superash Most Recent  9 months, 2 weeks ago\nSelected Answer: A"}, {"letter": "A", "text": "/var/log/secure\nupvoted 2 times\n  Justheretolook 1 year ago\nSelected Answer: A\nThe correct answer is: A. /var/log/secure\nExplanation:\n• A. /var/log/secure – This file logs authentication-related events on many Linux distributions, including login attempts, sudo commands, and SSH\naccess. It’s the best source to determine when a user logged in, making it ideal for tracking unauthorized or off-hours logins.\nupvoted 3 times"}], "answer": "N"}, {"id": 409, "question": "A user’s computer is performing slower than the day before, and unexpected windows continually open and close. The user did not install any new\nprograms, and after the user restarted the desktop, the issue was not resolved. Which of the following incident response actions should be taken\nnext?", "options": [{"letter": "A", "text": "Restart in safe mode and start a virus scan."}, {"letter": "B", "text": "Disconnect from the network and leave the PC turned on."}, {"letter": "C", "text": "Contain the device and implement a legal hold."}, {"letter": "D", "text": "Reformat and reimage the OS.\nCorrect Answer: B\nCommunity vote distribution\nB (91%)                          A (9%)\n  robizman 9 months, 2 weeks ago\nSelected Answer: B\nWhen a computer shows signs of potential compromise (e.g., unexpected behavior, performance issues, suspicious windows), the next best incident\nresponse action is to:\nDisconnect it from the network to prevent further spread or data exfiltration.\nLeave it powered on to preserve volatile data (e.g., RAM contents, running processes, network connections) that could be critical for forensic\nanalysis.\nupvoted 2 times\n  Justheretolook 1 year ago\nSelected Answer: B\nThe correct answer is: B. Disconnect from the network and leave the PC turned on.\nExplanation:\n• B. Disconnect from the network and leave the PC turned on – This action is part of the containment phase of incident response. It prevents potential\nspread of malware or data exfiltration while preserving the system’s current state for forensic analysis.\nupvoted 3 times\n  ada26b1 1 year, 1 month ago\nSelected Answer: A\nGiven the symptoms—slower performance and unexpected windows opening and closing—this could indicate malware (such as a virus or adware)\nrunning on the computer. Restarting the computer did not resolve the issue, which suggests that the problem persists and is likely being caused by\nmalicious software.\nupvoted 1 times\n  Cos007 1 year, 3 months ago\nSelected Answer: B\nThe answer is B.\nSince the computer is showing signs of malware infection (slow performance, unexpected windows opening and closing), the priority is to prevent\nfurther damage and contain the threat. Disconnecting from the network stops potential data exfiltration and prevents lateral movement across the\nenterprise. Leaving the PC turned on helps preserve forensic evidence for investigation.\nupvoted 2 times\n  Cyde 1 year, 3 months ago\nSelected Answer: B\nI am going with B because restarting could delete all forensic evidences or allow the possible malware to change its behavior (A), a legal hold i sonly\nneeded for legal cases and CompTIA didn't mention it (C), and (D) should only be done after investigation and containment.\nupvoted 3 times\n  Zywczi 1 year, 3 months ago\nIt was already restarted by the user so IMO this option gives us nothing new, I would pick A\nupvoted 2 times"}], "answer": "N"}, {"id": 410, "question": "Which of the following risk management decisions should be considered after evaluating all other options?", "options": [{"letter": "A", "text": "Transfer"}, {"letter": "B", "text": "Acceptance"}, {"letter": "C", "text": "Mitigation"}, {"letter": "D", "text": "Avoidance\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  noa808a Highly Voted  1 year, 1 month ago\nSelected Answer: B\nJust another fantastic, no context at all question from comptia. Wohoo!\nupvoted 6 times\n  HeatSquad77 Most Recent  3 months ago\nSelected Answer: B\nThe correct answer is B. Acceptance.\nIn risk management (including frameworks like NIST, ISO 31000, and those covered in CompTIA CySA+ CS0-003), the standard risk\ntreatment/response options are typically:\nAvoidance — Eliminate the risk by not proceeding with the activity or changing plans.\nMitigation (or Reduction) — Reduce the likelihood or impact through controls.\nTransfer — Shift the risk to a third party (e.g., insurance, outsourcing, contracts).\nAcceptance — Acknowledge the risk and decide to live with it (no further action), often with monitoring.\nupvoted 1 times"}], "answer": "N"}, {"id": 411, "question": "A security analyst finds an application that cannot enforce the organization’s password policy. An exception is granted. As a compensating\ncontrol, all users must confirm that their passwords comply with the organization’s policy. Which of the following types of compensating controls\nis the organization using?", "options": [{"letter": "A", "text": "Corrective"}, {"letter": "B", "text": "Managerial"}, {"letter": "C", "text": "Technical"}, {"letter": "D", "text": "Detective\nCorrect Answer: B\nCommunity vote distribution\nB (100%)\n  Justheretolook 1 year ago\nSelected Answer: B\nThe correct answer is: B. Managerial\nExplanation:\n• Managerial controls (also known as administrative controls) are policy-based or procedural controls that guide or influence user behavior. In this\ncase, requiring users to confirm that their passwords comply with the organization’s policy is a policy-driven control, not enforced by technical means.\nupvoted 2 times"}], "answer": "N"}, {"id": 412, "question": "A company has recently experienced a security breach via a public-facing service. Analysis of the event on the server was traced back to the\nfollowing piece of code:\nSELECT * From user_data WHERE Username = 0 and userid= 1 or 1=1;--\nWhich of the following controls would be best to implement?", "options": [{"letter": "A", "text": "Deploy a wireless application protocol."}, {"letter": "B", "text": "Remove the end-of-life component."}, {"letter": "C", "text": "Implement proper access control."}, {"letter": "D", "text": "Validate user input.\nCorrect Answer: D\nCommunity vote distribution\nD (100%)\n  BlackSkullz Highly Voted  1 year, 1 month ago\nSelected Answer: D\nIt's a SQL injection\nupvoted 6 times"}], "answer": "N"}, {"id": 413, "question": "HOTSPOT\n-\nA systems administrator is reviewing the output of a vulnerability scan.\nINSTRUCTIONS\n-\nReview the information in each tab.\nBased on the organization’s environment architecture and remediation standards, select the server to be patched within 14 days and select the\nappropriate technique and mitigation.\nIf at any time you would like to bring back the initial state of the simulation, please click the Reset All button.\nCorrect Answer:\n  srtysrhtyjumnuyedt Highly Voted  1 year ago\nGiven answer is correct.\n*The vulnerability remediation timeframes tab tells us that CVSS 7.9 < 9.0 are the only vulnerabilities that must be patched within 14 days.\n*The output tab tells us that there are three servers that are vulnerable within this CVSS range, and they are all CVSS 8.1:\n192.168.50.5\n192.168.60.5\n192.168.76.5\n*The environment tab tells us:\n192.168.50.5 is in the uat.comptia.org environment\n192.168.60.5 is in the prod.comptia.org environment\n192.168.76.5 is in the dev.comptia.org environment.\n*The vulnerability remediation timeframes tab also tells us that this vulnerability only applies to the prod environment, thereby eliminating the other\ntwo, and leaving us with 192.168.60.5 as the only one we need to patch.\n*The output tab tells us the following about CVSS 8.1:\nUntrusted SSL/TLS Server X.509 certificate (The server's TLS/SSL certificate is signed by a certificate authority that is untrusted or unknown). The fix\nfor this is patch; upload signed certificate from trusted third-party provider\nAnswer:\n192.168.60.5\nPatch; upload signed certificate from trusted third-party provider\nupvoted 9 times\n  Dogsitter_3 Highly Voted  10 months, 2 weeks ago\nHad this question on the exam\nupvoted 5 times\n  DarionAllen2 9 months, 2 weeks ago\nTaking mine in two days\nupvoted 1 times\n  2d3d7b4 5 months, 2 weeks ago\nhow did yours go?\nupvoted 1 times\n  iliecomptia Most Recent  1 year, 1 month ago\nPatching within 14 days only applies to vulnerablities with CVSS between 7.9 and 9 of Prod environment.\nOnly vulnerability which falls in this cathegory is Untrusted SSL/TLS Server X.509 certificate.\nPatching it and uploading a cert from a trusted provider directly addresses the issue.\nupvoted 2 times", "options": [{"letter": "", "text": "No answer choices parsed. Use the PDF for this PBQ/image-based item."}], "answer": "N"}, {"id": 414, "question": "A security analyst provides the management team with an after action report for a security incident. Which of the following is the management\nteam most likely to review in order to correct validated issu
